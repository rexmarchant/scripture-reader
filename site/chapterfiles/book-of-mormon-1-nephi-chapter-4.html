window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",

  audioSrc: "https://archive.org/download/1-nephi-ch-4/1%20Nephi%20Ch%204.mp3",
  lyrics: [{"time":0,"text":"First Nephi, Chapter 4"},{"time":1.619,"text":"1. And it came to pass that after I, Nephi, had been carried away in the Spirit and seen all these things, I returned to the tent of my father."},{"time":13.36,"text":"2. And it came to pass that I beheld my brethren; And they were disputing one with another concerning the things which my father had spoken unto them,"},{"time":22.2,"text":"3. For he truly spake many great things unto them which were hard to be understood save a man should inquire of the Lord;"},{"time":29.88,"text":"4. And they being hard in their hearts, therefore they did not look unto the Lord as they had ought."},{"time":36.4,"text":"5. And now I, Nephi, was grieved because of the hardness of their hearts, and also because of the things which I had seen, And knew they must unavoidably come to pass because of the great wickedness of the children of men."},{"time":50.36,"text":"6. And it came to pass that I was overcome because of my afflictions, For I considered that mine afflictions were great above all because of the destruction of my people, for I had beheld their fall."},{"time":61.64,"text":"7. And it came to pass that after I had received strength, I spake unto my brethren, desiring to know of them the cause of their disputations."},{"time":71.24,"text":"8. And they said: \"Behold, we cannot understand the words which our father hath spoken concerning the natural branches of the olive tree, and also concerning the Gentiles.\""},{"time":82.76,"text":"9. And I said unto them: \"Have ye inquired of the Lord?\""},{"time":87.24,"text":"10. And they said unto me: \"We have not, for the Lord maketh no such thing known unto us.\""},{"time":93.88,"text":"11. \"Behold,\" I said unto them, \"how is it that ye do not keep the commandments of the Lord?"},{"time":100.6,"text":"12. How is it that ye will perish because of the hardness of your hearts?"},{"time":105.56,"text":"13. Do ye not remember the thing which the Lord hath said: 'If ye will not harden your hearts and ask Me in faith, believing that ye shall receive - with diligence in keeping My commandments - surely these things shall be made known unto you'?"},{"time":120.36,"text":"14. Behold, I say unto you that the house of Israel was compared unto an olive tree by the Spirit of the Lord which was in our father."},{"time":129.4,"text":"15. And behold, are we not broken off from the house of Israel? And are we not a branch of the house of Israel?"},{"time":137.8,"text":"16. And now the thing which our father meaneth concerning the grafting in of the natural branches through the fullness of the Gentiles is that in the latter days when our seed shall have dwindled in unbelief, Yea, for the space of many years and many generations after that the Messiah hath manifested Himself in body unto the children of men, Then shall the fullness of the gospel of the Messiah come unto the Gentiles, And from the Gentiles unto the remnant of our seed."},{"time":164.28,"text":"17. And at that day shall the remnant of our seed know that they are of the house of Israel, and that they are the covenant people of the Lord;"},{"time":172.36,"text":"18. And then shall they know and come to the knowledge of their forefathers, And also to the knowledge of the gospel of their Redeemer which was ministered unto their fathers by Him;"},{"time":182.52,"text":"19. Wherefore, they shall come to the knowledge of their Redeemer and the very points of His doctrine, that they may know how to come unto Him and be saved."},{"time":191.48,"text":"20. And then at that day will they not rejoice and give praise unto their Everlasting God, their Rock and their Salvation?"},{"time":199.4,"text":"21. Yea, at that day will they not receive strength and nourishment from the True Vine?"},{"time":206.04,"text":"22. Yea, will they not come unto the true fold of God?"},{"time":210.52,"text":"23. Behold, I say unto you, Yea; They shall be numbered again among the house of Israel;"},{"time":217.96,"text":"24. They shall be grafted in, being a natural branch of the olive tree, into the true olive tree."},{"time":224.92000000000002,"text":"25. And this is what our father meaneth."},{"time":228.2,"text":"26. And he meaneth that it will not come to pass until after that they are scattered by the Gentiles;"},{"time":234.36,"text":"27. And he meaneth that it shall come by way of the Gentiles, that the Lord may show His power unto the Gentiles for the very cause that He shall be rejected of the Jews, or of the house of Israel."},{"time":246.2,"text":"28. Wherefore, our father hath not spoken of our seed alone, but also of all the house of Israel, pointing to the covenant which should be fulfilled in the latter days,"},{"time":257,"text":"29. Which covenant the Lord made to our father Abraham, saying: 'In thy Seed shall all the kindreds of the earth be blessed.'\""},{"time":265.16,"text":"30. And it came to pass that I, Nephi, spake much unto them concerning these things,"},{"time":271.96,"text":"31. Yea, I spake unto them concerning the restoration of the Jews in the latter days;"},{"time":278.28,"text":"32. And I did rehearse unto them the words of Isaiah which spake concerning the restoration of the Jews, or of the house of Israel;"},{"time":286.84000000000003,"text":"33. And after that they were restored, they should no more be confounded, neither should they be scattered again."},{"time":293.72,"text":"34. And it came to pass that I did speak so many words unto my brethren that they were pacified and did humble themselves before the Lord."},{"time":302.52,"text":"35. And it came to pass that they did speak unto me again, saying: \"What meaneth the thing which our father saw in a dream?"},{"time":307.027,"text":"36. What meaneth the tree which he saw?\""},{"time":314.12,"text":"37. And I said unto them: \"It was a representation of the tree of life.\""},{"time":319.24,"text":"38. And they said unto me: \"What meaneth the rod of iron which our father saw that led to the tree?\""},{"time":325.96,"text":"39. And I said unto them that it was the word of God and that whoso would hearken unto the word of God and would hold fast unto it, they would never perish,"},{"time":335.24,"text":"40. Neither could the temptations and the fiery darts of the adversary overpower them unto blindness to lead them away to destruction."},{"time":343.96,"text":"41. Wherefore, I, Nephi, did exhort them to give heed unto the word of the Lord,"},{"time":350.36,"text":"42. Yea, I did exhort them with all the energies of my soul and with all the faculty which I possessed that they would give heed to the word of God and remember to keep His commandments always in all things."},{"time":362.44,"text":"43. And they said unto me: \"What meaneth the river of water which our father saw?\""},{"time":368.04,"text":"44. And I said unto them that the water which my father saw was filthiness,"},{"time":373.64,"text":"45. And so much was his mind swallowed up in other things that he beheld not the filthiness of the water."},{"time":380.36,"text":"46. And I said unto them that it was an awful gulf which separateth the wicked from the tree of life, and also from the saints of God."},{"time":388.92,"text":"47. And I said unto them that it was a representation of that awful hell which the angel said unto me was prepared for the wicked."},{"time":397.4,"text":"48. And I said unto them that our father also saw that the justices of God did also divide the wicked from the righteous,"},{"time":405.15999999999997,"text":"49. And the brightness thereof was like unto the brightness of a flaming fire which ascendeth up unto God forever and ever and hath no end."},{"time":413.8,"text":"50. And they said unto me: \"Doth this thing mean the torment of the body in the days of probation? Or doth it mean the final state of the soul after the death of the temporal body? Or doth it speak of the things which are temporal?\""},{"time":428.92,"text":"51. And it came to pass that I said unto them that it was a representation of things both temporal and spiritual,"},{"time":436.28,"text":"52. For the day should come that they must be judged of their works, Yea, even the works which were done by the temporal body in their days of probation."},{"time":446.04,"text":"53. Wherefore, if they should die in their wickedness, they must be cast off also as to the things which are spiritual, which are pertaining unto righteousness;"},{"time":455.8,"text":"54. Wherefore, they must be brought to stand before God to be judged of their works;"},{"time":461.56,"text":"55. And if their works have been filthiness, they must needs be filthy;"},{"time":466.68,"text":"56. And if they be filthy, it must needs be that they cannot dwell in the kingdom of God,"},{"time":472.76,"text":"57. If so, the kingdom of God must be filthy also;"},{"time":477.32,"text":"58. But behold I say unto you, the kingdom of God is not filthy, And there cannot any unclean thing enter into the kingdom of God"},{"time":485.96,"text":"59. Wherefore, there must needs be a place of filthiness prepared for that which is filthy;"},{"time":492.2,"text":"60. And there is a place prepared, yea, even that awful hell of which I have spoken, And the devil is the preparator of it."},{"time":501,"text":"61. Wherefore, the final state of the souls of men is to dwell in the kingdom of God, or to be cast out because of that justice of which I have spoken;"},{"time":510.52,"text":"62. Wherefore, the wicked are separated from the righteous, And also from that tree of life whose fruit is most precious and most desirable of all other fruits;"},{"time":521,"text":"63. Yea, and it is the greatest of all the gifts of God."},{"time":525.8,"text":"64. And thus I spake unto my brethren. Amen."}]
};
