<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "Mosiah",
  chapter: "Chapter 7",
  audioSrc: "https://archive.org/download/mosiah-ch-7/Mosiah%20Ch%207.mp3",
  lyrics: [{"time":0.0,"text":"Mosiah Chapter 7"},{"time":1.215,"text":"1. And now it came to pass that Zeniff conferred the kingdom upon Noah, one of his sons, Therefore, Noah began to reign in his stead; And he did not walk in the ways of his father;"},{"time":13.581,"text":"2. For behold, he did not keep the commandments of God, but he did walk after the desires of his own heart,"},{"time":22.118,"text":"3. And he had many wives and concubines,"},{"time":25.242,"text":"4. And he did cause his people to commit sin and do that which was abominable in the sight of the Lord,"},{"time":31.288,"text":"5. Yea, and they did commit whoredoms and all manner of wickedness."},{"time":37.333,"text":"6. And he laid a tax of one fifth part of all they possessed: A fifth part of their gold and of their silver, And a fifth part of their ziff and of their copper and of their brass and their iron, And a fifth part of their fatlings, And also a fifth part of all their grain;"},{"time":53.093,"text":"7. And all this did he take to support himself and his wives and his concubines, and also his priests and their wives and their concubines. Thus he had changed the affairs of the kingdom,"},{"time":67.6,"text":"8. For he put down all the priests that had been consecrated by his father and consecrated new ones in their stead, such as were lifted up in the pride of their hearts;"},{"time":76.778,"text":"9. Yea, and thus were they supported in their laziness and in their idolatry and in their whoredoms by the taxes which King Noah had put upon his people; Thus did the people labor exceedingly to support iniquity;"},{"time":93.445,"text":"10. Yea, and they also became idolatrous because they were deceived by the vain and flattering words of the king and priests, For they did speak flattering things unto them."},{"time":100.935,"text":"11. And it came to pass that King Noah built many elegant and spacious buildings, And he ornamented them with fine work of wood, And of all manner of precious things - of gold and of silver, and of iron and of brass, and of ziff and of copper;"},{"time":115.817,"text":"12. And he also built him a spacious palace and a throne in the midst thereof, all of which was of fine wood and was ornamented with gold and silver and with precious things;"},{"time":127.2,"text":"13. And he also caused that his workmen should work all manner of fine work within the walls of the temple - of fine wood and of copper and of brass;"},{"time":135.88,"text":"14. And the seats which were set apart for the high priests, which were above all the other seats, he did ornament with pure gold;"},{"time":144.613,"text":"15. And he caused a breastwork to be built before them, that they might rest their bodies and their arms upon while they should speak lying and vain words to his people."},{"time":154.0,"text":"16. And it came to pass that he built a tower near the temple, yea, a very high tower, Even so high that he could stand upon the top thereof and overlook the Land of Shilom, and also the Land of Shemlon which was possessed by the Lamanites; And he could even look over all the land round about."},{"time":172.192,"text":"17. And it came to pass that he caused many buildings to be built in the Land Shilom;"},{"time":177.566,"text":"18. And he caused a great tower to be built on the hill north of the Land Shilom which had been a resort for the children of Nephi at the time they fled out of the land."},{"time":187.52,"text":"19. And thus he did do with the riches which he obtained by the taxation of his people."},{"time":194.8,"text":"20. And it came to pass that he placed his heart upon his riches; And he spent his time in riotous living with his wives and his concubines, And so did also his priests spend their time with harlots."},{"time":207.76,"text":"21. And it came to pass that he planted vineyards round about in the land; And he built winepresses and made wine in abundance; And therefore he became a winebibber, and also his people."},{"time":219.2,"text":"22. And it came to pass that the Lamanites began to come in upon his people, upon small numbers, and to slay them in their fields and while they were tending their flocks;"},{"time":229.52,"text":"23. And King Noah sent guards round about the land to keep them off, but he did not send a sufficient number, And the Lamanites came upon them and killed them and drove many of their flocks out of the land;"},{"time":240.427,"text":"24. Thus the Lamanites began to destroy them and to exercise their hatred upon them."},{"time":247.52,"text":"25. And it came to pass that King Noah sent his armies against them and they were driven back, or they drove them back for a time; Therefore, they returned rejoicing in their spoil."},{"time":258.64,"text":"26. And now because of this great victory, they were lifted up in the pride of their hearts; They did boast in their own strength, saying that their fifty could stand against thousands of the Lamanites;"},{"time":268.977,"text":"27. And thus they did boast and did delight in blood and the shedding of the blood of their brethren, And this because of the wickedness of their king and priests."},{"time":279.2,"text":"28. And it came to pass that there was a man among them whose name was Abinadi; And he went forth among them and began to prophesy, saying:"},{"time":287.951,"text":"29. \"Behold, thus saith the Lord and thus hath He commanded me, saying:"},{"time":294.084,"text":"30. 'Go forth and say unto this people, thus saith the Lord:"},{"time":302.802,"text":"31. Wo be unto this people! for I have seen their abominations and their wickedness and their whoredoms; And except they repent, I will visit them in Mine anger;"},{"time":311.52,"text":"32. And except they repent and turn to the Lord their God, behold, I will deliver them into the hands of their enemies,"},{"time":318.373,"text":"33. Yea, and they shall be brought into bondage; And they shall be afflicted by the hand of their enemies."},{"time":325.451,"text":"34. 'And it shall come to pass that they shall know that I Am the Lord their God and am a jealous God, visiting the iniquities of My people."},{"time":334.489,"text":"35. 'And it shall come to pass that except this people repent and turn unto the Lord their God, they shall be brought into bondage; And none shall deliver them, except it be the Lord, the Almighty God."},{"time":347.208,"text":"36. 'Yea, and it shall come to pass that when they shall cry unto Me, I will be slow to hear their cries; Yea, and I will suffer them that they be smitten by their enemies;"},{"time":358.452,"text":"37. And except they repent in sackcloth and ashes and cry mightily to the Lord their God, I will not hear their prayers, Neither will I deliver them out of their afflictions.'"},{"time":368.278,"text":"38. \"And thus saith the Lord, And thus hath He commanded me.\""},{"time":373.095,"text":"39. Now it came to pass that when Abinadi had spoken these words unto them, they were wroth with him and sought to take away his life, but the Lord delivered him out of their hands."},{"time":384.994,"text":"40. Now when King Noah had heard of the words which Abinadi had spoken unto the people, he was also wroth;"},{"time":392.77,"text":"41. And he saith: \"Who is Abinadi, that I and my people should be judged of him? Or who is the Lord that shall bring upon my people such great affliction?"},{"time":402.4,"text":"42. \"I command you to bring Abinadi hither that I may slay him, for he hath said these things that he might stir up my people to anger, one with another, and to raise contentions among my people; Therefore, I will slay him.\""},{"time":416.654,"text":"43. Now the eyes of the people were blinded; Therefore, they hardened their hearts against the words of Abinadi and they sought from that time forward to take him;"},{"time":427.065,"text":"44. And King Noah hardened his heart against the word of the Lord and he did not repent of his evil doings."},{"time":434.108,"text":"45. And it came to pass that after the space of two years that Abinadi came among them in disguise, that they knew him not, and began again to prophesy among them, saying:"},{"time":445.055,"text":"46. \"Thus hath the Lord commanded me, saying: 'Abinadi, go and prophesy unto this My people, for they have hardened their hearts against My words; They have repented not of their evil doings;"},{"time":459.28,"text":"47. Therefore, I will visit them in My anger, yea, in My fierce anger will I visit them in their iniquities and abominations; Yea, wo be unto this generation! '"},{"time":469.712,"text":"48. \"And the Lord said unto me: 'Stretch forth thy hand and prophesy, saying: Thus saith the Lord, it shall come to pass that this generation, because of their iniquities, shall be brought into bondage and shall be smitten on the cheek,"},{"time":484.61,"text":"49. Yea, and shall be driven by men and shall be slain, And the vultures of the air and the dogs, yea, and the wild beasts shall devour their flesh."},{"time":495.4,"text":"50. 'And it shall come to pass that the life of King Noah shall be valued even as a garment in a hot furnace, for he shall know that I Am the Lord."},{"time":504.458,"text":"51. 'And it shall come to pass that I will smite this My people with sore afflictions, yea, with famine and with pestilence; And I will cause that they shall howl all the day long;"},{"time":517.12,"text":"52. Yea, and I will cause that they shall have burdens lashed upon their backs and they shall be driven before like a dumb ass."},{"time":523.665,"text":"53. 'And it shall come to pass that I will send forth hail among them and it shall smite them; And they shall also be smitten with the east wind; And insects shall pester their land also and devour their grain,"},{"time":536.56,"text":"54. And they shall be smitten with a great pestilence; And all this will I do because of their iniquities and abominations."},{"time":544.588,"text":"55. 'And it shall come to pass that except they repent, I will utterly destroy them from off the face of the earth;"},{"time":552.416,"text":"56. Yet they shall leave a record behind them and I will preserve them for other nations which shall possess the land;"},{"time":560.4,"text":"57. Yea, even this will I do that I may discover the abominations of this people to other nations.'\""},{"time":567.52,"text":"58. And many things did Abinadi prophesy against this people."},{"time":570.951,"text":"59. And it came to pass that they were angry with him; And they took him and carried him bound before the king and saith unto the king:"},{"time":579.36,"text":"60. \"Behold, we have brought a man before thee which has prophesied evil concerning thy people and saith that God will destroy them;"},{"time":586.91,"text":"61. And he also prophesieth evil concerning thy life and saith that thy life shall be as a garment in a furnace of fire;"},{"time":595.167,"text":"62. And again, he saith that thou shalt be as a stalk, even as a dry stalk of the field which is run over by the beasts and trodden underfoot;"},{"time":604.08,"text":"63. And again, he saith thou shalt be as the blossoms of a thistle which, when it is fully ripe, if the wind bloweth, it is driven forth upon the face of the land; And he pretendeth the Lord hath spoken it;"},{"time":616.06,"text":"64. And he saith all this shall come upon thee, except thou repent, And this because of thine iniquities."},{"time":624.13,"text":"65. \"And now, O king, What great evil hast thou done? Or what great sins have thy people committed, That we should be condemned of God or judged of this man?"},{"time":638.053,"text":"66. \"And now, O king, Behold, we are guiltless, And thou, O king, hast not sinned; Therefore, this man hast lied concerning you, And he hath prophesied in vain."},{"time":652.16,"text":"67. \"And behold, we are strong; We shall not come into bondage or be taken captive by our enemies; Yea, and thou hast prospered in the land, And thou shalt also prosper."},{"time":664.076,"text":"68. \"Behold, here is the man; We deliver him into thy hands; Thou mayest do with him as seemeth thee good.\""},{"time":672.48,"text":"69. And it came to pass that King Noah caused that Abinadi should be cast into prison;"},{"time":678.4,"text":"70. And he commanded that the priests should gather themselves together that he might hold a council with them what he should do with him."},{"time":685.752,"text":"71. And it came to pass that they saith unto the king: \"Bring him hither that we may question him.\""},{"time":691.788,"text":"72. And the king commanded that he should be brought before them,"},{"time":695.595,"text":"73. And they began to question him that they might cross him, that thereby they might have wherewith to accuse him;"},{"time":703.36,"text":"74. But he answered them boldly and withstood all their questions, yea, to their astonishment,"},{"time":709.206,"text":"75. For he did withstand them in all their questions and did confound them in all their words."},{"time":715.92,"text":"76. And it came to pass that one of them saith unto him: \"What meaneth the words which are written and which have been taught by our fathers, saying:"},{"time":725.76,"text":"77. 'How beautiful upon the mountains are the feet of him that bringeth good tidings, That publisheth peace, That bringeth good tidings of good, That publisheth salvation, That saith unto Zion, \"Thy God reigneth!\""},{"time":738.28,"text":"78. Thy watchmen shall lift up the voice, With the voice together shall they sing; For they shall see eye to eye when the Lord shall bring again Zion."},{"time":747.417,"text":"79. Break forth into joy! Sing together, ye waste places of Jerusalem! For the Lord hath comforted His people, He hath redeemed Jerusalem."},{"time":759.36,"text":"80. The Lord hath made bare His holy arm in the eyes of all the nations; And all the ends of the earth shall see the salvation of our God! '?\""},{"time":770.8,"text":"81. And now Abinadi saith unto them: \"Are you priests and pretend to teach this people and to understand the spirit of prophesying, And yet desireth to know of me what these things mean?"},{"time":782.24,"text":"82. \"I say unto you, wo be unto you for perverting the ways of the Lord! For if ye understand these things, ye have not taught them, therefore ye have perverted the ways of the Lord;"},{"time":794.96,"text":"83. Ye have not applied your hearts to understanding, therefore ye have not been wise; Therefore, what teachest thou this people?\""},{"time":803.189,"text":"84. And they said: \"We teach the law of Moses.\""},{"time":807.92,"text":"85. And again, he saith unto them: \"If ye teach the law of Moses, why do ye not keep it?"},{"time":814.16,"text":"86. Why do ye set your hearts upon riches?"},{"time":817.68,"text":"87. Why do ye commit whoredoms and spend your strength with harlots? Yea, and cause this people to commit sin, that the Lord hath sent me to prophesy against this people, yea, even a great evil against this people?"},{"time":833.467,"text":"88. \"Knowest thou not that I speak the truth?"},{"time":839.093,"text":"89. Yea, thou knowest that I speak the truth, And you had ought to tremble before God."},{"time":844.72,"text":"90. \"And it shall come to pass that ye shall be smitten for thine iniquities, for ye have said that ye teach the law of Moses;"},{"time":853.064,"text":"91. And what knowest thou concerning the law of Moses?"},{"time":856.88,"text":"92. Doth salvation come by the law of Moses? What sayest thou?\""},{"time":862.24,"text":"93. And they answered and said that salvation did come by the law of Moses."},{"time":868.56,"text":"94. And Abinadi saith unto them: \"I know if ye keep the commandments of God, ye shall be saved;"},{"time":877.909,"text":"95. Yea, if ye keep the commandments which the Lord delivered unto Moses in the Mount of Sinai, saying: 'I Am the Lord thy God which has brought thee out of the Land of Egypt, out of the house of bondage;"},{"time":887.258,"text":"96. Thou shalt have no other god before Me!"},{"time":890.92,"text":"97. Thou shalt not make unto thee any graven image, or any likeness of anything in the heaven above, or things which are in the earth beneath.'\""},{"time":900.8,"text":"98. Now Abinadi saith unto them: \"Have ye done all this? I say unto you, nay, ye have not."},{"time":909.76,"text":"99. \"And have ye taught this people that they should do all these things? I say unto you, nay, ye have not.\""},{"time":917.501,"text":"100. And now when the king had heard these words, he said unto his priests: \"Away with this fellow and slay him! For what have we to do with him? For he is mad.\""},{"time":930.107,"text":"101. And they stood forth and attempted to lay their hands on him, but he withstood them and said unto them: \"Touch me not, for God shall smite you if ye lay your hands upon me, For I have not delivered the message which the Lord sent me to deliver,"},{"time":945.659,"text":"102. Neither have I told you that which ye requested that I should tell; Therefore, God will not suffer that I shall be destroyed at this time,"},{"time":954.011,"text":"103. But I must fulfill the commandments wherewith God hath commanded me; And because I have told you the truth ye are angry with me;"},{"time":963.189,"text":"104. And again, because I have spoken the word of God ye have judged me, that I am mad.\""},{"time":969.497,"text":"105. Now it came to pass after Abinadi had spoken these words, that the people of King Noah durst not lay their hands on him,"},{"time":977.531,"text":"106. For the Spirit of the Lord was upon him and his face shone with exceeding luster, even as Moses' did while in the Mount of Sinai while speaking with the Lord;"},{"time":987.787,"text":"107. And he spake with power and authority from God. And he continued his words, saying: \"Ye see that ye have not power to slay me, therefore I finish my message;"},{"time":1000.8,"text":"108. Yea, and I perceive that it cuts you to your hearts because I tell you the truth concerning your iniquities; Yea, and my words fill you with wonder and amazement and with anger;"},{"time":1012.72,"text":"109. But I finish my message and then it matters not whither I go, if it so be that I am saved;"},{"time":1019.28,"text":"110. But this much I tell you - What you do with me after this shall be as a type and a shadow of things which are to come."},{"time":1026.04,"text":"111. \"And now I read unto you the remainder of the commandments of God, for I perceive that they are not written in your hearts;"},{"time":1034.405,"text":"112. I perceive that ye have studied and taught iniquity the most part of your lives;"},{"time":1040.206,"text":"113. And now, ye remember that I said unto you: 'Thou shalt not make unto thee any graven image, Or any likeness of things which are in heaven above, or which are in the earth beneath, or which are in the water under the earth.'"},{"time":1054.8,"text":"114. \"And again: 'Thou shalt not bow down thyself unto them, nor serve them, For I, the Lord thy God, am a jealous God, Visiting the iniquities of the fathers upon the children unto the third and fourth generation of them that hate Me, And showing mercy unto thousands of them that love Me and keep My commandments."},{"time":1073.369,"text":"115. 'Thou shalt not take the name of the Lord thy God in vain, For the Lord will not hold him guiltless that taketh His name in vain."},{"time":1083.2,"text":"116. 'Remember the Sabbath day, to keep it holy;"},{"time":1086.329,"text":"117. Six days shalt thou labor and do all thy work, But the seventh day, the Sabbath of the Lord thy God, thou shalt not do any work - Thou, nor thy son, nor thy daughter, nor thy manservant, nor thy maidservant, nor thy cattle, nor thy stranger that is within thy gates,"},{"time":1105.244,"text":"118. For in six days the Lord made heaven and earth and the sea and all that in them is; Wherefore, the Lord blessed the Sabbath day and hallowed it."},{"time":1115.6,"text":"119. 'Honor thy father and thy mother, that thy days may be long upon the land which the Lord thy God giveth thee;"},{"time":1122.26,"text":"120. Thou shalt not kill;"},{"time":1124.633,"text":"121. Thou shalt not commit adultery;"},{"time":1127.6,"text":"122. Thou shalt not steal;"},{"time":1130.086,"text":"123. Thou shalt not bear false witness against thy neighbor;"},{"time":1135.68,"text":"124. Thou shalt not covet thy neighbor's house; Thou shalt not covet thy neighbor's wife, nor his manservant, nor his maidservant, nor his ox, nor his ass, nor anything that is thy neighbor's.'\""}]
};
