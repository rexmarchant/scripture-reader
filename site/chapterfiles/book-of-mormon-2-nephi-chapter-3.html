  lyrics: [{"time":0,"text":"Second Nephi, Chapter 3"},{"time":1.976,"text":"1. And now I, Nephi, speak concerning the prophecies of which my father hath spoken concerning Joseph who was carried into Egypt,"},{"time":12.88,"text":"2. For behold, he truly prophesied concerning all his seed;"},{"time":17.821,"text":"3. And the prophecies which he wrote - there are not many greater;"},{"time":23.619,"text":"4. And he prophesied concerning us and our future generations,"},{"time":28.624,"text":"5. And they are written upon the plates of brass."},{"time":33.76,"text":"6. Wherefore, after my father had made an end of speaking concerning the prophecies of Joseph, he called the children of Laman, his sons and his daughters, and saith unto them:"},{"time":45.2,"text":"7. Behold, my sons and my daughters which are the sons and the daughters of my firstborn: I would that ye should give ear unto my words,"},{"time":54.104,"text":"8. For the Lord God hath said that, Inasmuch as ye shall keep My commandments, ye shall prosper in the land;"},{"time":62.72,"text":"9. And inasmuch as ye will not keep My commandments, ye shall be cut off from My presence."},{"time":69.44,"text":"10. But behold, my sons and my daughters, I cannot go down to my grave save I should leave a blessing upon you;"},{"time":76.2,"text":"11. For behold, I know that if ye are brought up in the right way that ye should go, ye will not depart from it;"},{"time":84.907,"text":"12. Wherefore, if ye are cursed, behold, I leave my blessing upon you that the cursing may be taken from you and be answered upon the heads of your parents;"},{"time":96.08,"text":"13. Wherefore, because of my blessing, the Lord God will not suffer that ye shall perish; Wherefore, He will be merciful unto you and unto your seed forever."},{"time":106.8,"text":"14. And it came to pass that after my father had made an end of speaking to the sons and daughters of Laman, he caused the sons and daughters of Lemuel to be brought before him;"},{"time":117.301,"text":"15. And he spake unto them, saying: Behold, my sons and my daughters which are the sons and the daughters of my second son,"},{"time":125.76,"text":"16. Behold, I leave unto you the same blessing which I left unto the sons and daughters of Laman; Wherefore, thou shalt not utterly be destroyed, but in the end thy seed shall be blessed."},{"time":136.531,"text":"17. And it came to pass that when my father had made an end of speaking unto them, Behold, it came to pass that he spake unto the sons of Ishmael, yea, and even all his household;"},{"time":149.76,"text":"18. And after that he had made an end of speaking unto them, he spake unto Sam, saying:"},{"time":158.72,"text":"19. Blessed art thou and thy seed, For thou shalt inherit the land like unto thy brother Nephi"},{"time":165.84,"text":"20. and thy seed shall be numbered with his seed;"},{"time":169.061,"text":"21. And thou shalt be even like unto thy brother and thy seed like unto his seed; And thou shalt be blessed in all thy days."},{"time":178.64,"text":"22. And it came to pass that after Lehi had spake unto all his household according to the feelings of his heart and the Spirit of the Lord which was in him, he waxed old;"},{"time":189.204,"text":"23. And it came to pass that he died and was buried."},{"time":193.067,"text":"24. And it came to pass that not many days after his death, Laman and Lemuel and the sons of Ishmael were angry with me because of the admonitions of the Lord,"},{"time":203.566,"text":"25. For I, Nephi, was constrained to speak unto them according to the word,"},{"time":211.44,"text":"26. For I had spake many things unto them, and also my father before his death,"},{"time":217.84,"text":"27. Many of which sayings are written upon mine other plates, for a more history part are written upon mine other plates."},{"time":224.213,"text":"28. And upon these I write the things of my soul and many of the scriptures which are engraven upon the plates of brass,"},{"time":233.179,"text":"29. For my soul delighteth in the scriptures, And my heart pondereth them and writeth them for the learning and the profit of my children;"},{"time":242.48,"text":"30. Behold, my soul delighteth in the things of the Lord, And my heart pondereth continually upon the things which I have seen and heard."},{"time":252.326,"text":"31. Nevertheless, notwithstanding the great goodness of the Lord in showing me His great and marvelous works, My heart exclaimeth, O wretched man that I am! Yea, my heart sorroweth because of my flesh,"},{"time":266.946,"text":"32. My soul grieveth because of mine iniquities;"},{"time":271.36,"text":"33. I am encompassed about because of the temptations and the sins which doth so easily beset me;"},{"time":278.64,"text":"34. And when I desire to rejoice, my heart groaneth because of my sins. Nevertheless, I know in whom I have trusted -"},{"time":287.56,"text":"35. My God hath been my support; He hath led me through mine afflictions in the wilderness, And He hath preserved me upon the waters of the great deep;"},{"time":298.32,"text":"36. He hath filled me with His love, even unto the consuming of my flesh;"},{"time":303.28,"text":"37. He hath confounded mine enemies unto the causing of them to quake before me."},{"time":310.4,"text":"38. Behold, He hath heard my cry by day, And He hath given me knowledge by visions in the nighttime;"},{"time":318.32,"text":"39. And by day have I waxed bold in mighty prayer before Him, yea, my voice have I sent up on high, And angels came down and ministered unto me;"},{"time":327.92,"text":"40. And upon the wings of His Spirit hath my body been carried away upon exceeding high mountains;"},{"time":336.15999999999997,"text":"41. And mine eyes hath beheld great things, yea, even too great for man; Therefore, I was bidden that I should not write them."},{"time":350.4,"text":"42. O then, if I have seen so great things, If the Lord in His condescension unto the children of men hath visited me in so much mercy, Why should my heart weep and my soul linger in the valley of sorrow? And my flesh waste away and my strength slacken because of mine afflictions?"},{"time":364.64,"text":"43. And why should I yield to sin because of my flesh?"},{"time":369.28,"text":"44. Yea, why should I give way to temptations, that the evil one have place in my heart to destroy my peace and afflict my soul?"},{"time":378.085,"text":"45. Why am I angry because of mine enemy?"},{"time":381.84,"text":"46. Awake, my soul! no longer droop in sin;"},{"time":388.8,"text":"47. Rejoice, O my heart! and give place no more for the enemy of my soul;"},{"time":396.4,"text":"48. Do not anger again because of mine enemies;"},{"time":400.391,"text":"49. Do not slacken my strength because of mine afflictions;"},{"time":404.88,"text":"50. Rejoice, O my heart! and cry unto the Lord and say, O Lord, I will praise Thee forever! Yea, my soul will rejoice in Thee, My God and the Rock of my salvation."},{"time":415.36,"text":"51. O Lord, wilt Thou redeem my soul?"},{"time":425.84,"text":"52. Wilt Thou deliver me out of the hands of mine enemies?"},{"time":429.6,"text":"53. Wilt Thou make me that I may shake at the appearance of sin?"},{"time":435.84,"text":"54. May the gates of hell be shut continually before me because that my heart is broken and my spirit is contrite!"},{"time":443.687,"text":"55. O Lord, wilt Thou not shut the gates of Thy righteousness before me, That I may walk in the path of the low valley, That I may be strict in the plain road."},{"time":455.186,"text":"56. O Lord, wilt Thou encircle me around in the robe of Thy righteousness?"},{"time":462.243,"text":"57. O Lord, wilt Thou make a way for mine escape before mine enemies?"},{"time":467.82,"text":"58. Wilt Thou make my path strait before me?"},{"time":469.991,"text":"59. Wilt Thou not place a stumbling block in my way,"},{"time":474.88,"text":"60. But that Thou wouldst clear my way before me and hedge not up my way, but the ways of mine enemy."},{"time":480.56,"text":"61. O Lord, I have trusted in Thee and I will trust in Thee forever;"},{"time":486.24,"text":"62. I will not put my trust in the arm of flesh, For I know that cursed is he that putteth his trust in the arm of flesh,"},{"time":494.26,"text":"63. Yea, cursed is he that putteth his trust in man or maketh flesh his arm;"},{"time":501.04,"text":"64. Yea, I know that God will give liberally to him that asketh;"},{"time":506.08,"text":"65. Yea, my God will give me if I ask not amiss; Therefore, I will lift up my voice unto Thee; Yea, I will cry unto Thee, my God, the Rock of my righteousness;"},{"time":519.52,"text":"66. Behold, my voice shall forever ascend up unto Thee, my Rock and mine Everlasting God. Amen."}]
