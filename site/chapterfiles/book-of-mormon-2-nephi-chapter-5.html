window.CHAPTER_DATA = {

  book: "2 Nephi",

  audioSrc: "https://archive.org/download/2-nephi-ch-5/2%20Nephi%20Ch%205.mp3",
  lyrics: [{"time":0,"text":"Second Nephi, Chapter 5"},{"time":2.064,"text":"1. The words of Jacob, the brother of Nephi, which he spake unto the people of Nephi."},{"time":10.32,"text":"2. Behold, my beloved brethren, that I, Jacob, having been called of God and ordained after the manner of His holy order,"},{"time":20.16,"text":"3. And having been consecrated by my brother Nephi, unto whom ye look as a king or a protector, and on whom ye depend for safety -"},{"time":29.6,"text":"4. Behold, ye know that I have spoken unto you exceeding many things;"},{"time":35.68,"text":"5. Nevertheless, I speak unto you again, for I am desirous for the welfare of your souls,"},{"time":43.12,"text":"6. Yea, mine anxiety is great for you and ye yourselves know that it ever has been;"},{"time":50.16,"text":"7. For I have exhorted you with all diligence, And I have taught you the words of my father,"},{"time":57.2,"text":"8. And I have spoken unto you concerning all things which are written from the creation of the world."},{"time":64.32,"text":"9. And now behold, I would speak unto you concerning things which are and which are to come;"},{"time":71.2,"text":"10. Wherefore, I will read you the words of Isaiah,"},{"time":76,"text":"11. And they are the words which my brother hath desired me that I should speak unto you,"},{"time":82.24,"text":"12. And I speak them unto you for your sakes, that ye may learn and glorify the name of your God."},{"time":89.36,"text":"13. And now the words which I shall read are they which Isaiah spake concerning all the house of Israel,"},{"time":96.96000000000001,"text":"14. Wherefore, they may be likened unto you, for ye are of the house of Israel,"},{"time":103.36,"text":"15. And there are many things which have been spoken by Isaiah which may be likened unto you because that ye are of the house of Israel;"},{"time":111.92,"text":"16. And now these are the words:"},{"time":115.52000000000001,"text":"17. Thus saith the Lord God: Behold, I will lift up Mine hand to the Gentiles and set up My standard to the people;"},{"time":124.64,"text":"18. And they shall bring thy sons in their arms, And thy daughters shall be carried upon their shoulders;"},{"time":131.68,"text":"19. And kings shall be thy nursing fathers, And their queens thy nursing mothers;"},{"time":137.84,"text":"20. They shall bow down to thee with their faces toward the earth and lick up the dust of thy feet."},{"time":144.32,"text":"21. And thou shalt know that I Am the Lord, For they shall not be ashamed that wait for Me."},{"time":151.04,"text":"22. And now I, Jacob, would speak somewhat concerning these words; For behold, the Lord hath shown me that they which were at Jerusalem from whence we came have been slain and carried away captive;"},{"time":164.64,"text":"23. Nevertheless, the Lord hath shown unto me that they should return again."},{"time":170.64,"text":"24. And He also hath shown unto me that the Lord God, the Holy One of Israel, should manifest Himself unto them in the flesh;"},{"time":179.6,"text":"25. And after that He should manifest Himself, they should scourge Him and crucify Him, according to the words of the angel which spake it unto me;"},{"time":189.36,"text":"26. And after that they have hardened their hearts and stiffened their necks against the Holy One of Israel, Behold, the judgments of the Holy One of Israel shall come upon them."},{"time":200.07999999999998,"text":"27. And the day cometh that they shall be smitten and afflicted;"},{"time":205.12,"text":"28. Wherefore, after they are driven to and fro - for thus saith the angel - many shall be afflicted in the flesh and shall not be suffered to perish because of the prayers of the faithful, Wherefore, they shall be scattered and smitten and hated;"},{"time":219.84,"text":"29. Nevertheless, the Lord will be merciful unto them, that when they shall come to the knowledge of their Redeemer, they shall be gathered together again to the lands of their inheritance."},{"time":230.88,"text":"30. And blessed are the Gentiles, they of whom the prophet hath written;"},{"time":236.64,"text":"31. For behold, if it so be that they shall repent and fight not against Zion and do not unite themselves to that great and abominable church, they shall be saved,"},{"time":248.32,"text":"32. For the Lord God will fulfill His covenants which He hath made unto His children; And for this cause the prophet hath written these things:"},{"time":257.68,"text":"33. Wherefore, they that fight against Zion and the covenant people of the Lord shall lick up the dust of their feet;"},{"time":259.874,"text":"34. And the people of the Lord shall not be ashamed,"},{"time":269.76,"text":"35. For the people of the Lord are they which wait for Him, For they still wait for the coming of the Messiah."},{"time":276.56,"text":"36. And behold, according to the words of the prophet, the Messiah will set Himself again the second time to recover them;"},{"time":284.96,"text":"37. Wherefore, He will manifest Himself unto them in power and great glory, unto the destruction of their enemies, when that day cometh when they shall believe in Him;"},{"time":295.6,"text":"38. And none will He destroy that believeth in Him."},{"time":300.08,"text":"39. And they that believe not in Him shall be destroyed - both by fire and by tempest, and by earthquakes and by bloodsheds, and by pestilence and by famine."},{"time":311.36,"text":"40. And they shall know that the Lord is God, the Holy One of Israel:"},{"time":316.88,"text":"41. For shall the prey be taken from the mighty? Or the lawful captive delivered?"},{"time":323.36,"text":"42. But thus saith the Lord: Even the captives of the mighty shall be taken away, And the prey of the terrible shall be delivered. For the Mighty God shall deliver His covenant people."},{"time":335.76,"text":"43. For thus saith the Lord: I will contend with them that contendeth with thee, And I will feed them that oppress thee with their own flesh."},{"time":345.36,"text":"44. And they shall be drunken with their own blood as with sweet wine."},{"time":350.48,"text":"45. And all flesh shall know that I, the Lord, am thy Savior, And thy Redeemer, the Mighty One of Jacob."},{"time":359.28,"text":"46. Yea, for thus saith the Lord, have I put thee away? Or have I cast thee off forever?"},{"time":367.28,"text":"47. For thus saith the Lord: Where is the bill of your mother's divorcement?"},{"time":373.36,"text":"48. To whom have I put thee away? Or to which of My creditors have I sold you?"},{"time":380.16,"text":"49. Yea, to whom have I sold you?"},{"time":384.32,"text":"50. Behold, for your iniquities have ye sold yourselves, And for your transgressions is your mother put away."},{"time":392.56,"text":"51. Wherefore, when I came, there was no man. When I called, yea, there was none to answer."},{"time":401.28,"text":"52. O house of Israel, Is My hand shortened at all that it cannot redeem? Or have I no power to deliver?"},{"time":410.08,"text":"53. Behold, at My rebuke I dry up the sea - I make the rivers a wilderness, And their fish to stink because the waters are dried up, And they dieth because of thirst."},{"time":421.68,"text":"54. I clothe the heavens with blackness, And I make sackcloth their covering."},{"time":427.52,"text":"55. The Lord God hath given Me the tongue of the learned, That I should know how to speak a word in season unto thee, O house of Israel,"},{"time":436.72,"text":"56. when ye are weary. He wakeneth morning by morning,"},{"time":442.08,"text":"57. He wakeneth Mine ear to hear as the learned."},{"time":446.48,"text":"58. The Lord God hath opened Mine ear and I was not rebellious, Neither turned away back."},{"time":453.76,"text":"59. I gave My back to the smiter, And My cheeks to them that plucked off the hair;"},{"time":459.92,"text":"60. I hid not My face from shame and spitting. For the Lord God will help Me; Therefore, shall I not be confounded;"},{"time":469.6,"text":"61. Therefore, have I set My face like a flint, And I know that I shall not be ashamed. And the Lord is near and He justifieth Me;"},{"time":480,"text":"62. Who will contend with Me?"},{"time":483.36,"text":"63. Let us stand together."},{"time":486.56,"text":"64. Who is Mine adversary?"},{"time":489.6,"text":"65. Let him come near Me and I will smite him with the strength of My mouth, For the Lord God will help Me;"},{"time":497.2,"text":"66. And all they which shall condemn Me - Behold, all they shall wax old as a garment, And the moth shall eat them up."},{"time":505.84,"text":"67. Who is among you that feareth the Lord? That obeyeth the voice of His Servant? That walketh in darkness and hath no light?"},{"time":516.08,"text":"68. Behold, all ye that kindleth fire, that compass yourselves about with sparks, Walk in the light of your fire and in the sparks which ye have kindled -"},{"time":526.88,"text":"69. This shall ye have of Mine hand: Ye shall lie down in sorrow."},{"time":534.76,"text":"70. Hearken unto Me, ye that follow after righteousness, Look unto the Rock from whence ye are hewn, And to the hole of the pit from whence ye are digged."},{"time":542.64,"text":"71. Look unto Abraham, your father, And unto Sarah, she that bear you; For I called him alone and blessed him."},{"time":551.76,"text":"72. For the Lord shall comfort Zion, He will comfort all her waste places;"},{"time":557.84,"text":"73. And He will make her wilderness like Eden, And her desert like the garden of the Lord;"},{"time":564.24,"text":"74. Joy and gladness shall be found therein, Thanksgiving and the voice of melody."},{"time":570.72,"text":"75. Hearken unto Me, My people, And give ear unto Me, O My nation;"},{"time":577.2,"text":"76. For a law shall proceed from Me, And I will make My judgment to rest for a light thing of the people."},{"time":584.56,"text":"77. My righteousness is near, My salvation is gone forth, And Mine arm shall judge the people;"},{"time":590.93,"text":"78. The isles shall wait upon Me, And on Mine arm shall they trust."},{"time":597.44,"text":"79. Lift up your eyes to the heavens, And look upon the earth beneath."},{"time":602.88,"text":"80. For the heavens shall vanish away like smoke, And the earth shall wax old like a garment, And they that dwell therein shall die in like manner;"},{"time":612.4,"text":"81. But My salvation shall be forever, And My righteousness shall not be abolished."},{"time":619.24,"text":"82. Hearken unto Me, ye that know righteousness, the people in whose heart I have written My law:"},{"time":626.08,"text":"83. Fear ye not the reproach of men, Neither be ye afraid of their revilings."},{"time":632.4,"text":"84. For the moth shall eat them up like a garment, And the worm shall eat them like wool;"},{"time":638.8,"text":"85. But My righteousness shall be forever, And My salvation from generation to generation."},{"time":646,"text":"86. Awake, awake! put on strength, O arm of the Lord! Awake, as in the ancient days."},{"time":655.6,"text":"87. Art Thou not it that hath cut Rahab and wounded the dragon?"},{"time":660.72,"text":"88. Art Thou not it which hath dried the sea - the waters of the great deep?"},{"time":666.48,"text":"89. That hath made the depths of the sea a way for the ransomed to pass over?"},{"time":672.24,"text":"90. Therefore, the redeemed of the Lord shall return and come with singing unto Zion; And everlasting joy and holiness shall be upon their heads;"},{"time":682.24,"text":"91. And they shall obtain gladness and joy; Sorrow and mourning shall flee away."},{"time":688.56,"text":"92. I Am He, yea, I Am He that comforteth you."},{"time":693.84,"text":"93. Behold, who art thou that thou shouldst be afraid of man which shall die? And of the son of man which shall be made like unto grass?"},{"time":704.08,"text":"94. And forgettest the Lord thy Maker that hath stretched forth the heavens and laid the foundations of the earth?"},{"time":711.6,"text":"95. And hast feared continually every day because of the fury of the oppressor, as if he were ready to destroy?"},{"time":719.28,"text":"96. And where is the fury of the oppressor?"},{"time":723.12,"text":"97. The captive exile hasteneth, that he may be loosed and that he should not die in the pit, nor that his bread should fail."},{"time":730.48,"text":"98. But I Am the Lord thy God, whose waves roared - The Lord of Hosts is My name."},{"time":736.876,"text":"99. And I have put My words in thy mouth and hath covered thee in the shadow of Mine hand, That I may plant the heavens and lay the foundations of the earth and say unto Zion, Behold, thou art My people."},{"time":750.96,"text":"100. Awake, awake! stand up, O Jerusalem, which hast drunk at the hand of the Lord the cup of His fury!"},{"time":760.48,"text":"101. Thou hast drunken the dregs of the cup of trembling, wrung out;"},{"time":766.16,"text":"102. And none to guide her among all the sons she hath brought forth;"},{"time":771.6,"text":"103. Neither that taketh her by the hand of all the sons she hath brought up."},{"time":777.2,"text":"104. These two sons are come unto thee - who shall be sorry for thee? - Thy desolation and destruction, and the famine and the sword -"},{"time":786.929,"text":"105. And by whom shall I comfort thee?"},{"time":790.72,"text":"106. Thy sons have fainted, save these two; They lie at the head of all the streets, as a wild bull in a net; They are full of the fury of the Lord, the rebuke of thy God."},{"time":802.64,"text":"107. Therefore, hear now this, thou afflicted and drunken, and not with wine."},{"time":809.52,"text":"108. Thus saith thy Lord - the Lord and thy God pleadeth the cause of His people:"},{"time":815.92,"text":"109. Behold, I have taken out of thine hand the cup of trembling, the dregs of the cup of My fury; Thou shalt no more drink it again."},{"time":824.192,"text":"110. But I will put it into the hand of them that afflict thee, which have said to thy soul, Bow down, that we may go over."},{"time":834.24,"text":"111. And thou hast laid thy body as the ground and as the street to them that went over."},{"time":840.8,"text":"112. Awake, awake! put on thy strength, O Zion; Put on thy beautiful garments, O Jerusalem, the holy city!"},{"time":849.92,"text":"113. For henceforth, there shall no more come into thee the uncircumcised and the unclean."},{"time":857.92,"text":"114. Shake thyself from the dust! Arise! Sit down, O Jerusalem! Loose thyself from the bands of thy neck, O captive daughter of Zion!"}]
