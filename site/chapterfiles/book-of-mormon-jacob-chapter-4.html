  lyrics: [{"time":0.0,"text":"Jacob Chapter 4"},{"time":1.484,"text":"1. And now behold, my brethren, as I said unto you that I would prophesy, Behold, this is my prophecy:"},{"time":10.88,"text":"2. That the things which this prophet Zenos spake concerning the house of Israel, in the which he likened them unto a tame olive tree, must surely come to pass;"},{"time":21.28,"text":"3. And in the day that He shall set His hand again the second time to recover His people is the day, yea, even the last time, that the servants of the Lord shall go forth in His power to nourish and prune His vineyard; And after that the end soon cometh."},{"time":36.96,"text":"4. And how blessed are they who have labored diligently in His vineyard! And how cursed are they which shall be cast out into their own place!"},{"time":46.64,"text":"5. And the world shall be burned with fire;"},{"time":50.32,"text":"6. And how merciful is our God unto us! for He remembereth the house of Israel, both roots and branches, And He stretches forth His hands unto them all the day long;"},{"time":62.4,"text":"7. And they are a stiff-necked and a gainsaying people, But as many as will not harden their hearts shall be saved in the kingdom of God."},{"time":70.64,"text":"8. Wherefore my beloved brethren, I beseech of you in words of soberness that ye would repent and come with full purpose of heart and cleave unto God as He cleaveth unto you;"},{"time":81.2,"text":"9. And while His arm of mercy is extended toward you in the light of the day, harden not your hearts;"},{"time":88.56,"text":"10. Yea, today, if ye will hear His voice, harden not your hearts, For why will ye die?"},{"time":96.16,"text":"11. For behold, after that ye have been nourished by the good word of God all the day long, Will ye bring forth evil fruit, that ye must be hewn down and cast into the fire?"},{"time":107.44,"text":"12. Behold, will ye reject these words?"},{"time":111.52,"text":"13. Will ye reject the words of the prophets? And will ye reject all the words which have been spoken concerning Christ, after that so many have spoken concerning Him? And deny the good word of Christ and the power of God and the gift of the Holy Ghost? And quench the Holy Spirit and make a mock of the great plan of redemption which hath been laid for you?"},{"time":135.52,"text":"14. Know ye not that if ye will do these things, that the power of the redemption and the resurrection which is in Christ will bring you to stand with shame and awful guilt before the bar of God?"},{"time":147.2,"text":"15. And according to the power of justice - for justice cannot be denied - that ye must go away into that lake of fire and brimstone, Whose flames are unquenchable and whose smoke ascendeth up forever and ever, which lake of fire and brimstone is endless torment?"},{"time":163.28,"text":"16. O then, my beloved brethren, repent ye and enter ye in at the strait gate! And continue in the way which is narrow until ye shall obtain eternal life;"},{"time":175.12,"text":"17. O be wise! What can I say more?"},{"time":179.6,"text":"18. Finally, I bid you farewell until I shall meet you before the pleasing bar of God, which bar striketh the wicked with awful dread and fear. Amen."}]
