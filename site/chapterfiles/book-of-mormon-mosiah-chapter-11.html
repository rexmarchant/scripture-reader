<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "Mosiah",
  chapter: "Chapter 11",
  audioSrc: "https://archive.org/download/mosiah-ch-11/Mosiah%20Ch%2011.mp3",
  lyrics: [{"time":0.0,"text":"Mosiah Chapter 11"},{"time":1.061,"text":"1. Now Alma having been warned of the Lord that the armies of King Noah would come upon them and had made it known to his people, Therefore, they gathered together their flocks and took of their grain and departed into the wilderness before the armies of King Noah;"},{"time":17.36,"text":"2. And the Lord did strengthen them, that the people of King Noah could not overtake them to destroy them."},{"time":22.928,"text":"3. And it came to pass that they fled eight days' journey into the wilderness;"},{"time":28.08,"text":"4. And they came to a land, yea, even a very beautiful and pleasant land, a land of pure water."},{"time":35.6,"text":"5. And it came to pass that they pitched their tents and began to till the ground and began to build buildings, etc., Yea, they were industrious and did labor exceedingly."},{"time":45.153,"text":"6. And it came to pass that the people were desirous that Alma should be their king, for he was beloved by his people;"},{"time":53.76,"text":"7. But he saith unto them: \"Behold, it is not expedient that we should have a king, for thus saith the Lord: ' Ye shall not esteem one flesh above another, or one man shall not think himself above another '; Therefore I say unto you, it is not expedient that ye should have a king."},{"time":70.96,"text":"8. \"Nevertheless, if it were possible that ye could always have a just man to be your king, it would be well for you to have a king;"},{"time":79.43,"text":"9. But remember the iniquity of King Noah and his priests; And I, myself, was caught in a snare and did many things which were abominable in the sight of the Lord, which caused me sore repentance."},{"time":95.045,"text":"10. \"Nevertheless, after much tribulation the Lord did hear my cries and did answer my prayers, And hath made me an instrument in His hands in bringing so many of you to a knowledge of His truth."},{"time":106.732,"text":"11. \"Nevertheless, in this I do not glory, for I am unworthy to glory of myself."},{"time":112.096,"text":"12. \"And now I say unto you, as you have been oppressed by King Noah and have been in bondage to him and his priests and have been brought into iniquity by them, Therefore, ye were bound with the bands of iniquity."},{"time":125.102,"text":"13. \"And now as ye have been delivered by the power of God out of these bonds,"},{"time":131.029,"text":"14. Yea, even out of the hands of King Noah and his people, and also from the bonds of iniquity, Even so, I desire that ye should stand fast in this liberty wherewith ye have been made free and that ye trust no man to be a king over you,"},{"time":146.832,"text":"15. And also trusting no one to be your teachers nor your ministers, except he be a man of God, walking in His ways and keeping His commandments.\""},{"time":155.544,"text":"16. Thus did Alma teach his people that every man should love his neighbor as himself, that there should be no contention among them."},{"time":164.414,"text":"17. And now Alma was their high priest, he being the founder of their church."},{"time":169.72,"text":"18. And it came to pass that none received authority to preach or to teach, except it were by him from God;"},{"time":178.08,"text":"19. Therefore, he consecrated all their priests and all their teachers, And none were consecrated except it were just men;"},{"time":186.085,"text":"20. Therefore, they did watch over their people and did nourish them with things pertaining to righteousness."},{"time":192.8,"text":"21. And it came to pass that they began to prosper exceedingly in the land; And they called the land Helam."},{"time":198.386,"text":"22. And it came to pass that they did multiply and prosper exceedingly in the Land of Helam; And they built a city which they called the City of Helam."},{"time":208.907,"text":"23. Nevertheless, the Lord seeth fit to chasten His people, yea, He trieth their patience and their faith;"},{"time":216.937,"text":"24. Nevertheless, whosoever putteth his trust in Him, the same shall be lifted up at the last day;"},{"time":223.36,"text":"25. Yea, and thus it was with this people."},{"time":226.24,"text":"26. For behold, I will show unto you that they were brought into bondage and none could deliver them but the Lord their God, Yea, even the God of Abraham and of Isaac and of Jacob."},{"time":237.991,"text":"27. And it came to pass that He did deliver them, And He did show forth His mighty power unto them; And great were their rejoicings."},{"time":247.6,"text":"28. For behold, it came to pass that while they were in the Land of Helam, yea, in the City of Helam, while tilling the land round about, Behold, an army of the Lamanites were in the borders of the land."},{"time":259.92,"text":"29. Now it came to pass that the brethren of Alma fled from their fields and gathered themselves together into the City of Helam; And they were much frightened because of the appearance of the Lamanites."},{"time":269.242,"text":"30. But Alma went forth and stood among them and exhorted them that they should not be frightened, But that they should remember the Lord their God and He would deliver them;"},{"time":280.74,"text":"31. Therefore, they hushed their fears and began to cry unto the Lord, that He would soften the hearts of the Lamanites, That they would spare them and their wives and children."},{"time":291.084,"text":"32. And it came to pass that the Lord did soften the hearts of the Lamanites;"},{"time":297.111,"text":"33. And Alma and his brethren went forth and delivered themselves up into their hands; And the Lamanites took possession of the Land of Helam."},{"time":306.739,"text":"34. Now the armies of the Lamanites which had followed after the people of King Limhi had been lost in the wilderness for many days;"},{"time":313.858,"text":"35. And behold, they had found those priests of King Noah in a place which they called Amulon, And they had begun to possess the Land of Amulon and had begun to till the ground."},{"time":325.612,"text":"36. Now the name of the leader of those priests was Amulon."},{"time":330.144,"text":"37. And it came to pass that Amulon did plead with the Lamanites, And he also sent forth their wives, which were the daughters of the Lamanites, to plead with their brethren, that they should not destroy their husbands."},{"time":343.89,"text":"38. And it came to pass that the Lamanites had compassion on Amulon and his brethren and did not destroy them because of their wives,"},{"time":352.174,"text":"39. And Amulon and his brethren did join the Lamanites; And they were traveling in the wilderness in search of the Land of Nephi when they discovered the Land of Helam which was possessed by Alma and his brethren."},{"time":364.587,"text":"40. And it came to pass that the Lamanites promised unto Alma and his brethren that if they would show them the way which led to the Land of Nephi, that they would grant unto them their lives and their liberty."},{"time":376.194,"text":"41. But it came to pass that after Alma had shown them the way that led to the Land of Nephi, the Lamanites would not keep their promise, But they set guards round about the Land of Helam, over Alma and his brethren;"},{"time":389.272,"text":"42. And the remainder of them went to the Land of Nephi, And a part of them returned to the Land of Helam, and also brought with them the wives and the children of the guards which had been left in the land."},{"time":401.592,"text":"43. And the king of the Lamanites had granted unto Amulon that he should be a king and a ruler over his people which were in the Land of Helam; Nevertheless, he should have no power to do anything contrary to the will of the king of the Lamanites."},{"time":414.29,"text":"44. And it came to pass that Amulon did gain favor in the eyes of the king of the Lamanites; Therefore, the king of the Lamanites granted unto him and his brethren that they should be appointed teachers over his people,"},{"time":425.571,"text":"45. Yea, even over the people which were in the Land of Shemlon and in the Land of Shilom and in the Land of Amulon,"},{"time":436.853,"text":"46. For the Lamanites had taken possession of all these lands; Therefore, the king of the Lamanites had appointed kings over all these lands."},{"time":446.56,"text":"47. And now the name of the king of the Lamanites was Laman, being called after the name of his father, And therefore, he was called King Laman;"},{"time":454.56,"text":"48. And he was king over a numerous people; And he appointed teachers of the brethren of Amulon in every land which was possessed by his people."},{"time":463.68,"text":"49. And thus the language of Nephi began to be taught among all the people of the Lamanites;"},{"time":471.04,"text":"50. And they were a people friendly one with another; Nevertheless they knew not God, Neither did the brethren of Amulon teach them anything concerning the Lord their God, neither the law of Moses,"},{"time":482.211,"text":"51. Nor did they teach them the words of Abinadi, But they taught them that they should keep their record and that they might write one to another."},{"time":491.28,"text":"52. And thus the Lamanites began to increase in riches and began to trade one with another and wax great, And began to be a cunning and a wise people as to the wisdom of the world,"},{"time":502.88,"text":"53. Yea, a very cunning people, delighting in all manner of wickedness and plunder, except it were among their own brethren."},{"time":510.6,"text":"54. And now it came to pass that Amulon began to exercise authority over Alma and his brethren and began to persecute him and cause that his children should persecute their children;"},{"time":521.685,"text":"55. For Amulon knew Alma, that he had been one of the king's priests, And that it was he that believed the words of Abinadi and was driven out before the king; And therefore, he was wroth with him, for he was subject to King Laman,"},{"time":537.36,"text":"56. Yet he exercised authority over them and put tasks upon them and put taskmasters over them."},{"time":544.08,"text":"57. And it came to pass that so great were their afflictions that they began to cry mightily to God."},{"time":549.231,"text":"58. And it came to pass that Amulon commanded them that they should stop their cries; And he put guards over them to watch them, that whosoever should be found calling upon God should be put to death."},{"time":560.834,"text":"59. And it came to pass that Alma and his people did not raise their voices to the Lord their God, but did pour out their hearts to Him; And He did know the thoughts of their hearts."},{"time":572.88,"text":"60. And it came to pass that the voice of the Lord came to them in their afflictions, saying: \"Lift up your heads and be of good comfort, for I know of the covenant which ye have made unto Me; And I will covenant with this My people and deliver them out of bondage;"},{"time":587.6,"text":"61. And I will also ease the burdens which are put upon your shoulders, that even you cannot feel them upon your backs even while you are in bondage;"},{"time":595.718,"text":"62. And this will I do that ye may stand as witnesses for Me hereafter, And that ye may know of a surety that I, the Lord God, do visit My people in their afflictions.\""},{"time":606.044,"text":"63. And now it came to pass that the burdens which were laid upon Alma and his brethren were made light,"},{"time":613.453,"text":"64. Yea, the Lord did strengthen them, that they could bear up their burdens with ease; And they did submit cheerfully and with patience to all the will of the Lord."},{"time":624.64,"text":"65. And it came to pass that so great was their faith and their patience that the voice of the Lord came unto them again, saying: \"Be of good comfort, for on the morrow I will deliver thee out of bondage.\""},{"time":635.432,"text":"66. And He saith unto Alma: \"Thou shalt go before this people, And I will go with thee and deliver this people out of bondage.\""},{"time":644.063,"text":"67. Now it came to pass that Alma and his people, in the nighttime, gathered their flocks together, and also of their grain, Yea, even all the nighttime were they gathering their flocks together;"},{"time":655.671,"text":"68. And in the morning the Lord caused a deep sleep to come upon the Lamanites, Yea, and all their taskmasters were in a profound sleep."},{"time":665.142,"text":"69. And it came to pass that Alma and his people departed into the wilderness; And when they had traveled all day, they pitched their tents in a valley; And they called the name of the valley Alma because he led their way in the wilderness."},{"time":678.027,"text":"70. Yea, and in the Valley of Alma they poured out their thanks to God because He had been merciful unto them and eased their burdens and had delivered them out of bondage,"},{"time":689.355,"text":"71. For they were in bondage and none could deliver them except it were the Lord their God;"},{"time":694.94,"text":"72. And they gave thanks to God, Yea, all their men and all their women and all their children that could speak lifted their voices in the praises of their God."},{"time":704.7,"text":"73. And now the Lord said unto Alma: \"Haste thee and get thou and this people out of this land, for the Lamanites have awakened and doth pursue thee;"},{"time":715.495,"text":"74. Therefore, get thee out of this land, And I will stop the Lamanites in this valley, that they come no further in pursuit of this people.\""},{"time":722.88,"text":"75. And it came to pass that they departed out of the valley and took their journey into the wilderness."},{"time":728.872,"text":"76. And it came to pass that after they had been in the wilderness twelve days, they arrived to the Land of Zarahemla; And King Mosiah did also receive them with joy."},{"time":739.68,"text":"77. And now King Mosiah caused that all the people should be gathered together."},{"time":746.4,"text":"78. Now there were not so many of the children of Nephi, or so many of those which were descendants of Nephi, as there were of the people of Zarahemla, which was a descendant of Mulek and those which came with him into the wilderness;"},{"time":758.632,"text":"79. And there were not so many of the people of Nephi and of the people of Zarahemla as there were of the Lamanites, Yea, they were not half so numerous."},{"time":769.6,"text":"80. And now all the people of Nephi were assembled together, And also all the people of Zarahemla; And they were gathered together in two bodies."},{"time":778.781,"text":"81. And it came to pass that Mosiah did read, and caused to be read, the records of Zeniff to his people, Yea, he read the records of the people of Zeniff from the time they left the Land of Zarahemla until the time they returned again;"},{"time":793.28,"text":"82. And he also read the account of Alma and his brethren and all their afflictions from the time they left the Land of Zarahemla until the time they returned again."},{"time":803.28,"text":"83. And now when Mosiah had made an end of reading the records, his people which tarried in the land were struck with wonder and amazement, for they knew not what to think;"},{"time":813.751,"text":"84. For when they beheld those that had been delivered out of bondage, they were filled with exceeding great joy."},{"time":820.16,"text":"85. And again, when they thought of their brethren which had been slain by the Lamanites, they were filled with sorrow and even shed many tears of sorrow."},{"time":829.52,"text":"86. And again, when they thought of the immediate goodness of God and His power in delivering Alma and his brethren out of the hands of the Lamanites and of bondage, they did raise their voices and gave thanks to God."},{"time":841.84,"text":"87. And again, when they thought upon the Lamanites which were their brethren, of their sinful and polluted state, they were filled with pain and anguish for the welfare of their souls."},{"time":854.667,"text":"88. And it came to pass that when those which were the children of Amulon and his brethren - which had taken to wife the daughters of the Lamanites - They were displeased with the conduct of their fathers,"},{"time":866.345,"text":"89. And they would no longer be called by the names of their fathers; Therefore, they took upon themselves the name of Nephi, that they might be called the children of Nephi and be numbered among those which were called Nephites."},{"time":880.165,"text":"90. And now all the people of Zarahemla were numbered with the Nephites, And this because the kingdom had been conferred upon none but those which were descendants of Nephi."},{"time":890.284,"text":"91. And now it came to pass that when Mosiah had made an end of speaking and reading to the people, he desired that Alma should also speak to the people."},{"time":900.72,"text":"92. And it came to pass that Alma did speak unto them when they were assembled together in large bodies; And he went from one body to another preaching unto the people repentance and faith on the Lord;"},{"time":910.994,"text":"93. And he did exhort the people of Limhi and his brethren, all those that had been delivered out of bondage, that they should remember that it was the Lord that did deliver them."},{"time":922.32,"text":"94. And it came to pass that after Alma had taught the people many things and had made an end of speaking to them, that King Limhi was desirous that he might be baptized, And all his people were desirous that they might be baptized also;"},{"time":935.56,"text":"95. Therefore, Alma did go forth into the water and did baptize them, Yea, he did baptize them after the manner he did his brethren in the Waters of Mormon;"},{"time":945.651,"text":"96. Yea, and as many as he did baptize did belong to the church of God, And this because of their belief on the words of Alma."},{"time":954.912,"text":"97. And it came to pass that King Mosiah granted unto Alma that he might establish churches throughout all the Land of Zarahemla, And gave him power to ordain priests and teachers over every church."},{"time":966.287,"text":"98. Now this was done because there were so many people that they could not all be governed by one teacher, Neither could they all hear the word of God in one assembly; Therefore, they did assemble themselves together in different bodies, being called churches,"},{"time":983.28,"text":"99. Every church having their priests and their teachers, And every priest preaching the word according as it was delivered to him by the mouth of Alma."},{"time":992.414,"text":"100. And thus, notwithstanding there being many churches, they were all one church, yea, even the church of God;"},{"time":999.704,"text":"101. For there was nothing preached in all the churches except it were repentance and faith in God."},{"time":1006.254,"text":"102. And now there were seven churches in the Land of Zarahemla."},{"time":1010.373,"text":"103. And it came to pass that whosoever was desirous to take upon them the name of Christ, or of God, they did join the churches of God and they were called the people of God;"},{"time":1021.246,"text":"104. And the Lord did pour out His Spirit upon them and they were blessed and prospered in the land."},{"time":1027.271,"text":"105. Now it came to pass that there were many of the rising generation that could not understand the words of King Benjamin, being little children at the time he spake unto his people, And they did not believe the tradition of their fathers;"},{"time":1040.987,"text":"106. They did not believe what had been said concerning the resurrection of the dead, Neither did they believe concerning the coming of Christ."},{"time":1048.489,"text":"107. And now because of their unbelief, they could not understand the word of God, And their hearts were hardened;"},{"time":1056.576,"text":"108. And they would not be baptized, neither would they join the church;"},{"time":1062.72,"text":"109. And they were a separate people as to their faith, and remained so ever after, even in their carnal and sinful state, for they would not call upon the Lord their God."},{"time":1072.712,"text":"110. And now in the reign of Mosiah, they were not half so numerous as the people of God, But because of the dissensions among the brethren, they became more numerous."},{"time":1081.689,"text":"111. For it came to pass that they did deceive many with their flattering words which were in the church, and did cause them to commit many sins;"},{"time":1093.07,"text":"112. Therefore, it became expedient that those who committed sin that were in the church should be admonished by the church."},{"time":1099.058,"text":"113. And it came to pass that they were brought before the priests and delivered up unto the priests by the teachers; And the priests brought them before Alma which was the high priest."},{"time":1110.96,"text":"114. Now King Mosiah had given Alma the authority over the church."},{"time":1115.164,"text":"115. And it came to pass that Alma did not know concerning them, for there were many witnesses against them, Yea, the people stood and testified of their iniquity in abundance."},{"time":1125.784,"text":"116. Now there had not any such thing happened before in the church; Therefore, Alma was troubled in his spirit and he caused that they should be brought before the king."},{"time":1132.753,"text":"117. And he saith unto the king: \"Behold, here are many which we have brought before thee which are accused of their brethren, Yea, and they have been taken in divers iniquities,"},{"time":1147.689,"text":"118. And they do not repent of their iniquities; Therefore, we have brought them before thee that thou may judge them according to their crimes.\""},{"time":1156.22,"text":"119. But King Mosiah saith unto Alma: \"Behold, I judge them not; Therefore, I deliver them into thy hands to be judged.\""},{"time":1165.52,"text":"120. And now the spirit of Alma was again troubled; And he went and inquired of the Lord what he should do concerning this matter, for he feared that he should do wrong in the sight of God."},{"time":1176.377,"text":"121. And it came to pass that after he had poured out his whole soul to God, the voice of the Lord came to him, saying: \"Blessed art thou, Alma, and blessed are they which were baptized in the Waters of Mormon;"},{"time":1190.108,"text":"122. Thou art blessed because of thy exceeding faith in the words alone of My servant Abinadi,"},{"time":1196.169,"text":"123. And blessed are they because of their exceeding faith in the words alone which thou hast spoken unto them;"},{"time":1203.459,"text":"124. And blessed art thou because thou hast established a church among this people, And they shall be established and they shall be My people;"},{"time":1212.64,"text":"125. Yea, blessed is this people which are willing to bear My name, for in My name shall they be called and they are Mine;"},{"time":1220.32,"text":"126. And because thou hast inquired of Me concerning the transgressor, thou art blessed."},{"time":1225.813,"text":"127. \"Thou art My servant and I covenant with thee that thou shalt have eternal life; And thou shalt serve Me and go forth in My name and shall gather together My sheep;"},{"time":1237.2,"text":"128. And he that will hear My voice shall be My sheep, And him shall ye receive into the church, And him will I also receive,"},{"time":1245.6,"text":"129. For behold, this is My church. \"Whosoever that is baptized shall be baptized unto repentance,"},{"time":1254.24,"text":"130. And whosoever ye receive shall believe in My name and him will I freely forgive."},{"time":1260.32,"text":"131. \"For it is I that taketh upon Me the sins of the world; For it is I that hath created them; And it is I that granteth unto him that believeth, in the end, a place at My right hand;"},{"time":1271.52,"text":"132. For behold, in My name are they called, And if they know Me, they shall come forth and shall have a place eternally at My right hand."},{"time":1279.564,"text":"133. \"And it shall come to pass that when the second trump shall sound, then shall they that never knew Me come forth and shall stand before Me;"},{"time":1289.2,"text":"134. And then shall they know that I Am the Lord their God, that I Am their Redeemer, but they would not be redeemed;"},{"time":1295.893,"text":"135. And then will I confess unto them that I never knew them; And they shall depart into everlasting fire prepared for the devil and his angels."},{"time":1306.64,"text":"136. \"Therefore, I say unto you that he that will not hear My voice, the same shall ye not receive into My church, For him I will not receive at the last day."},{"time":1317.2,"text":"137. \"Therefore I say unto you, Go, And whosoever transgresseth against Me, him shall ye judge according to the sins which he hath committed;"},{"time":1325.704,"text":"138. And if he confess his sins before thee and Me and repenteth in the sincerity of his heart, him shall ye forgive and I will forgive him also;"},{"time":1335.792,"text":"139. Yea, and as often as My people repent will I forgive them their trespasses against Me;"},{"time":1341.68,"text":"140. And ye shall also forgive one another your trespasses, For verily I say unto you, he that forgiveth not his neighbor's trespasses when he saith that he repenteth, the same hath brought himself under condemnation."},{"time":1355.28,"text":"141. \"Now I say unto you, Go, And whosoever will not repent of his sins, the same shall not be numbered among My people; And this shall be observed from this time forward.\""},{"time":1366.236,"text":"142. And it came to pass when Alma had heard these words, he wrote them down that he might have them, And that he might judge the people of that church according to the commandments of God."},{"time":1376.952,"text":"143. And it came to pass that Alma went and judged those that had been taken in iniquity, according to the word of the Lord;"},{"time":1385.671,"text":"144. And whosoever repented of their sins and did confess them, them he did number among the people of the church;"},{"time":1392.889,"text":"145. And those that would not confess their sins and repent of their iniquity, the same were not numbered among the people of the church and their names were blotted out."},{"time":1402.194,"text":"146. And it came to pass that Alma did regulate all the affairs of the church;"},{"time":1407.333,"text":"147. And they began again to have peace and to prosper exceedingly in the affairs of the church, walking circumspectly before God, receiving many and baptizing many."},{"time":1418.72,"text":"148. And now all these things did Alma and his fellow laborers do which were over the church, Walking in all diligence, Teaching the word of God in all things, Suffering all manner of afflictions, Being persecuted by all those who did not belong to the church of God;"},{"time":1435.6,"text":"149. And they did admonish their brethren; And they were also admonished, everyone, by the word of God according to his sins, or to the sins which he had committed, Being commanded of God to pray without ceasing and to give thanks in all things."},{"time":1449.28,"text":"150. And now it came to pass that the persecutions which were inflicted on the church by the unbelievers became so great that the church began to murmur and complain to their leaders concerning the matter; And they did complain to Alma,"},{"time":1461.829,"text":"151. And Alma laid the case before their king, Mosiah, And Mosiah consulted with his priests."},{"time":1468.132,"text":"152. And it came to pass that King Mosiah sent a proclamation throughout the land round about that there should not any unbeliever persecute any of those which belonged to the church of God."},{"time":1480.941,"text":"153. And there was a strict command throughout all the churches that there should be no persecutions among them, That there should be an equality among all men, That they should let no pride nor haughtiness disturb their peace,"},{"time":1494.24,"text":"154. That every man should esteem his neighbor as himself, Laboring with their own hands for their support,"},{"time":1500.07,"text":"155. Yea, and all their priests and teachers should labor with their own hands for their support in all cases, save it were in sickness or in much want. And doing these things, they did abound in the grace of God,"},{"time":1515.144,"text":"156. And there began to be much peace again in the land; And the people began to be very numerous and began to scatter abroad upon the face of the earth,"},{"time":1525.204,"text":"157. Yea, on the north and on the south, on the east and on the west, Building large cities and villages in all quarters of the land;"},{"time":1533.28,"text":"158. And the Lord did visit them and prosper them and they became a large and a wealthy people."},{"time":1539.164,"text":"159. Now the sons of Mosiah were numbered among the unbelievers, And also one of the sons of Alma was numbered among them, he being called Alma after his father; Nevertheless, he became a very wicked and an idolatrous man;"},{"time":1552.976,"text":"160. And he was a man of many words and did speak much flattery to the people, Therefore, he led many of the people to do after the manner of his iniquities,"},{"time":1563.92,"text":"161. And he became a great hinderment to the prosperity of the church of God - Stealing away the hearts of the people, Causing much dissension among the people, Giving a chance for the enemy of God to exercise his power over them."},{"time":1576.12,"text":"162. And now it came to pass that while he was going about to destroy the church of God - for he did go about secretly with the sons of Mosiah, seeking to destroy the church and to lead astray the people of the Lord contrary to the commandments of God, or even the king -"},{"time":1593.36,"text":"163. And as I said unto you, as they were going about rebelling against God, Behold, the angel of the Lord appeared unto them; And he descended as it were in a cloud, And he spake as it were with a voice of thunder which caused the earth to shake upon which they stood;"},{"time":1607.962,"text":"164. And so great was their astonishment that they fell to the earth and understood not the words which he spake unto them."},{"time":1617.3,"text":"165. Nevertheless, he cried again, saying: \"Alma, arise and stand forth! for why persecuteth thou the church of God?"},{"time":1626.048,"text":"166. For the Lord hath said, 'This is My church and I will establish it and nothing shall overthrow it, save it is the transgression of My people.'\""},{"time":1636.24,"text":"167. And again the angel saith: \"Behold, the Lord hath heard the prayers of His people, and also the prayers of His servant Alma, which is thy father,"},{"time":1645.6,"text":"168. For he hath prayed with much faith concerning thee, that thou mightest be brought to the knowledge of the truth;"},{"time":1652.974,"text":"169. Therefore, for this purpose have I come to convince thee of the power and authority of God, that the prayers of His servants might be answered according to their faith."},{"time":1662.267,"text":"170. \"And now behold, can ye dispute the power of God?"},{"time":1666.8,"text":"171. For behold, doth not my voice shake the earth?"},{"time":1671.76,"text":"172. And can ye not also behold me before you?"},{"time":1676.72,"text":"173. And I am sent from God."},{"time":1678.976,"text":"174. \"Now I say unto thee, Go, And remember the captivity of thy fathers in the Land of Helam and in the Land of Nephi, And remember how great things He hath done for them, for they were in bondage and He hath delivered them."},{"time":1693.24,"text":"175. \"And now I say unto thee, Alma, Go thy way and seek to destroy the church no more, that their prayers may be answered; And this even if thou wilt of thyself be cast off.\""},{"time":1703.909,"text":"176. And now it came to pass that these were the last words which the angel spake unto Alma, And he departed."},{"time":1711.16,"text":"177. And now Alma and those that were with him fell again to the earth, for great was their astonishment; For with their own eyes they had beheld an angel of the Lord and his voice was as thunder which shook the earth,"},{"time":1724.16,"text":"178. And they knew that there was nothing save the power of God that could shake the earth and cause it to tremble as though it would part asunder."},{"time":1732.88,"text":"179. And now the astonishment of Alma was so great that he became dumb, that he could not open his mouth, Yea, and he became weak, even that he could not move his hands;"},{"time":1743.36,"text":"180. Therefore, he was taken by those that were with him and carried helpless, even until he was laid before his father;"},{"time":1750.499,"text":"181. And they rehearsed unto his father all that had happened unto them, And his father rejoiced, for he knew that it was the power of God."},{"time":1760.08,"text":"182. And he caused that a multitude should be gathered together, that they might witness what the Lord had done for his son, and also for those that were with him;"},{"time":1769.179,"text":"183. And he caused that the priests should assemble themselves together; And they began to fast and to pray to the Lord their God that He would open the mouth of Alma, that he might speak,"},{"time":1779.571,"text":"184. And also that his limbs might receive their strength, That the eyes of the people might be opened to see and know of the goodness and glory of God."},{"time":1787.977,"text":"185. And it came to pass after they had fasted and prayed for the space of two days and two nights, the limbs of Alma received their strength; And he stood up and began to speak unto them, bidding them to be of good comfort."},{"time":1802.568,"text":"186. For, said he: \"I have repented of my sins and have been redeemed of the Lord; Behold, I am born of the Spirit."},{"time":1811.96,"text":"187. \"And the Lord said unto me: ' Marvel not that all mankind - yea, men and women, all nations, kindreds, tongues and people - must be born again,"},{"time":1823.6,"text":"188. Yea, born of God, Changed from their carnal and fallen state to a state of righteousness, Being redeemed of God, becoming His sons and daughters, And thus they become new creatures; And unless they do this, they can in no wise inherit the kingdom of God.'"},{"time":1840.8,"text":"189. \"I say unto you, unless this be the case, they must be cast off; And this I know because I was like to be cast off."},{"time":1850.463,"text":"190. \"Nevertheless, after wading through much tribulation, repenting nigh unto death, The Lord in mercy hath seen fit to snatch me out of an everlasting burning, And I am born of God!"},{"time":1861.5,"text":"191. My soul hath been redeemed from the gall of bitterness and bonds of iniquity!"},{"time":1868.08,"text":"192. I was in the darkest abyss, but now I behold the marvelous light of God!"},{"time":1872.96,"text":"193. My soul was racked with eternal torment, but I am snatched and my soul is pained no more!"},{"time":1879.44,"text":"194. \"I rejected my Redeemer and denied that which had been spoken of by our fathers."},{"time":1885.84,"text":"195. \"But now that they may foresee that He will come and that He remembereth every creature of His creating,"},{"time":1891.445,"text":"196. And He will make Himself manifest unto all, Yea, every knee shall bow and every tongue confess before Him;"},{"time":1900.362,"text":"197. Yea, even at the last day when all men shall stand to be judged of Him, then shall they confess that He is God;"},{"time":1909.558,"text":"198. Then shall they confess, who live without God in the world, that the judgment of an everlasting punishment is just upon them;"},{"time":1917.64,"text":"199. And they shall quake and tremble and shrink beneath the glance of His all-searching eye.\""},{"time":1923.205,"text":"200. And now it came to pass that Alma began from this time forward to teach the people, And those which were with Alma at the time the angel appeared unto them,"},{"time":1933.525,"text":"201. Traveling round about through all the land, Publishing to all the people the things which they had heard and seen, And preaching the word of God in much tribulation, being greatly persecuted by those which were unbelievers, being smitten by many of them."},{"time":1949.92,"text":"202. But notwithstanding all this, they did impart much consolation to the church, confirming their faith, And exhorting them with longsuffering and much travail to keep the commandments of God."},{"time":1960.413,"text":"203. And four of them were the sons of Mosiah, And their names were Ammon and Aaron and Omner and Himni; These were the names of the sons of Mosiah."},{"time":1971.503,"text":"204. And after they had traveled throughout all the Land of Zarahemla and among all the people which were under the reign of King Mosiah, Zealously striving to repair all the injuries which they had done to the church,"},{"time":1984.72,"text":"205. Confessing all their sins, And publishing all the things which they had seen, And explaining the prophecies and the scriptures to all who desired to hear them -"},{"time":1994.64,"text":"206. And thus they were instruments in the hands of God in bringing many to the knowledge of the truth, Yea, to the knowledge of their Redeemer."},{"time":2002.907,"text":"207. And how blessed are they! for they did publish peace; They did publish good tidings of good, And they did declare unto the people that the Lord reigneth."}]
};
