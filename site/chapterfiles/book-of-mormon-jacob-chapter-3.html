<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "Jacob",
  chapter: "Chapter 3",
  audioSrc: "https://archive.org/download/jacob-ch-3/Jacob%20Ch%203.mp3",
  lyrics: [{"time":0.0,"text":"Jacob Chapter 3"},{"time":1.66,"text":"1. Now behold, it came to pass that I, Jacob, having ministered much unto my people in word, And I cannot write but a little of my words because of the difficulty of engraving our words upon plates, And we know that the things which we write upon plates must remain,"},{"time":19.4,"text":"2. But whatsoever things we write upon anything, save it be upon plates, must perish and vanish away, But we can write a few words upon plates which will give our children, and also our beloved brethren, a small degree of knowledge concerning us, or concerning their fathers."},{"time":36.36,"text":"3. Now in this thing we do rejoice, And we labor diligently to engraven these words upon plates, hoping that our beloved brethren and our children will receive them with thankful hearts, And look upon them, that they may learn with joy and not with sorrow, neither with contempt, concerning their first parents."},{"time":55.002,"text":"4. For, for this intent have we written these things: That they may know that we knew of Christ and we had a hope of His glory many hundred years before His coming, And not only we ourselves had a hope of His glory, but also all the holy prophets which were before us."},{"time":70.12,"text":"5. Behold, they believed in Christ and worshipped the Father in His name, And also we worship the Father in His name,"},{"time":79.36,"text":"6. And for this intent we keep the law of Moses, it pointing our souls to Him; And for this cause it is sanctified unto us for righteousness, Even as it was accounted unto Abraham in the wilderness to be obedient unto the commands of God in offering up his son Isaac, which was a similitude of God and His Only Begotten Son."},{"time":97.96,"text":"7. Wherefore, we search the prophets, And we have many revelations and the spirit of prophecy, And having all these witnesses, we obtain a hope, And our faith becometh unshaken, insomuch that we truly can command in the name of Jesus, And the very trees obey us, or the mountains, or the waves of the sea;"},{"time":117.24,"text":"8. Nevertheless, the Lord God showeth us our weakness, that we may know that it is by His grace and His great condescensions unto the children of men that we have power to do these things."},{"time":128.72,"text":"9. Behold, great and marvelous are the works of the Lord!"},{"time":134.08,"text":"10. How unsearchable are the depths of the mysteries of Him! And it is impossible that man should find out all His ways;"},{"time":142.84,"text":"11. And no man knoweth of His ways, save it be revealed unto him; Wherefore brethren, despise not the revelations of God."},{"time":151.8,"text":"12. For behold, by the power of His word man came upon the face of the earth, Which earth was created by the power of His word;"},{"time":159.76,"text":"13. Wherefore, if God being able to speak and the world was, and to speak and man was created, O then, why not able to command the earth, or the workmanship of His hands upon the face of it, according to His will and pleasure?"},{"time":175.16,"text":"14. Wherefore brethren, seek not to counsel the Lord, but to take counsel from His hand;"},{"time":181.44,"text":"15. For behold, ye yourselves know that He counseleth in wisdom and in justice and in great mercy over all His works;"},{"time":190.36,"text":"16. Wherefore beloved brethren, be reconciled unto Him through the atonement of Christ, His Only Begotten Son,"},{"time":197.88,"text":"17. That ye may obtain a resurrection, according to the power of the resurrection which is in Christ, And be presented as the firstfruits of Christ unto God, Having faith and obtained a good hope of glory in Him before He manifesteth Himself in the flesh."},{"time":212.96,"text":"18. And now beloved, marvel not that I tell you these things, For why not speak of the atonement of Christ and attain to a perfect knowledge of Him, as to attain to the knowledge of a resurrection and the world to come?"},{"time":226.44,"text":"19. Behold, my brethren, he that prophesieth, let him prophesy to the understanding of men, For the Spirit speaketh the truth and lieth not;"},{"time":235.8,"text":"20. Wherefore, it speaketh of things as they really are and of things as they really will be; Wherefore, these things are manifested unto us plainly for the salvation of our souls."},{"time":247.96,"text":"21. But behold, we are not witnesses alone in these things, for God also spake them unto prophets of old."},{"time":255.88,"text":"22. But behold, the Jews were a stiff-necked people, And they despised the words of plainness and killed the prophets and sought for things that they could not understand;"},{"time":265.72,"text":"23. Wherefore, because of their blindness, which blindness came by looking beyond the mark, they must needs fall,"},{"time":274.4,"text":"24. For God hath taken away His plainness from them and delivered unto them many things which they cannot understand, because they desired it;"},{"time":283.2,"text":"25. And because they desired it, God hath done it, that they may stumble."},{"time":288.64,"text":"26. And now I, Jacob, am led on by the Spirit unto prophesying, For I perceive by the workings of the Spirit which is in me that by the stumbling of the Jews they will reject the stone upon which they might build and have safe foundation;"},{"time":303.2,"text":"27. But behold, according to the scriptures this stone shall become the great and the last and the only sure foundation upon which the Jews can build."},{"time":313.04,"text":"28. And now my beloved, how is it possible that these, after having rejected the sure foundation, can ever build upon it, that it may become the head of their corner?"},{"time":322.92,"text":"29. Behold, my beloved brethren, I will unfold this mystery unto you, if I do not by any means get shaken from my firmness in the Spirit and stumble because of my overanxiety for you."},{"time":335.4,"text":"30. Behold, my brethren, do ye not remember to have read the words of the prophet Zenos which spake unto the house of Israel, saying: Hearken, O ye house of Israel, and hear the words of me, a prophet of the Lord;"},{"time":350.96,"text":"31. For behold, thus saith the Lord: \"I will liken thee, O house of Israel, like unto a tame olive tree which a man took and nourished in his vineyard, And it grew and waxed old and began to decay."},{"time":364.88,"text":"32. \"And it came to pass that the Master of the vineyard went forth and He saw that His olive tree began to decay; And He saith: 'I will prune it and dig about it and nourish it, that perhaps it may shoot forth young and tender branches and it perish not.'"},{"time":379.72,"text":"33. \"And it came to pass that He pruned it and digged about it and nourished it according to His word."},{"time":385.96,"text":"34. \"And it came to pass that after many days it began to put forth somewhat a little, young and tender branches; But behold, the main top thereof began to perish."},{"time":396.68,"text":"35. \"And it came to pass that the Master of the vineyard saw it and He saith unto His Servant: 'It grieveth Me that I should lose this tree;"},{"time":404.36,"text":"36. Wherefore, go and pluck the branches from a wild olive tree and bring them hither unto Me, And We will pluck off those main branches which are beginning to wither away, And We will cast them into the fire that they may be burned."},{"time":418.92,"text":"37. 'And behold, ' saith the Lord of the vineyard, 'I take away many of these young and tender branches and I will graft them whithersoever I will;"},{"time":428.2,"text":"38. And it mattereth not that if it so be that the root of this tree will perish, I may preserve the fruit thereof unto Myself;"},{"time":435.64,"text":"39. Wherefore, I will take these young and tender branches and I will graft them whithersoever I will;"},{"time":443.24,"text":"40. Take Thou the branches of the wild olive tree and graft them in, in the stead thereof;"},{"time":449.9,"text":"41. And these which I have plucked off I will cast into the fire and burn them, that they may not cumber the ground of My vineyard.'"},{"time":457.82,"text":"42. \"And it came to pass that the Servant of the Lord of the vineyard did according to the word of the Lord of the vineyard and grafted in the branches of the wild olive tree;"},{"time":467.58,"text":"43. And the Lord of the vineyard caused that it should be digged about and pruned and nourished, saying unto His Servant: 'It grieveth Me that I should lose this tree;"},{"time":477.38,"text":"44. Wherefore, that perhaps I might preserve the roots thereof, that they perish not, that I might preserve them unto Myself, I have done this thing;"},{"time":486.58,"text":"45. Wherefore, go Thy way; Watch the tree and nourish it according to My words;"},{"time":493.98,"text":"46. And these will I place in the nethermost part of My vineyard, whithersoever I will - it mattereth not unto Thee;"},{"time":501.5,"text":"47. And I do it that I may preserve unto Myself the natural branches of the tree, And also that I may lay up fruit thereof against the season unto Myself, for it grieveth Me that I should lose this tree and the fruit thereof.'"},{"time":515.1,"text":"48. \"And it came to pass that the Lord of the vineyard went His way and hid the natural branches of the tame olive tree in the nethermost parts of the vineyard, Some in one and some in another, according to His will and pleasure."},{"time":527.46,"text":"49. \"And it came to pass that a long time passed away; And the Lord of the vineyard saith unto His Servant: 'Come, let Us go down into the vineyard that We may labor in the vineyard.'"},{"time":538.42,"text":"50. \"And it came to pass that the Lord of the vineyard, and also the Servant, went down into the vineyard to labor."},{"time":545.82,"text":"51. \"And it came to pass that the Servant saith unto His Master: 'Behold, look here! Behold the tree! '"},{"time":553.74,"text":"52. \"And it came to pass that the Lord of the vineyard looked and beheld the tree in the which the wild olive branches had been grafted; And it had sprung forth and began to bear fruit;"},{"time":564.26,"text":"53. And He beheld that it was good; And the fruit thereof was like unto the natural fruit."},{"time":570.46,"text":"54. \"And He saith unto the Servant: 'Behold, the branches of the wild tree hath taken hold of the moisture of the root thereof, that the root thereof hath brought forth much strength;"},{"time":581.82,"text":"55. And because of the much strength of the root thereof, the wild branches hath brought forth tame fruit;"},{"time":589.06,"text":"56. Now if We had not grafted in these branches, the tree thereof would have perished;"},{"time":595.3,"text":"57. And now behold, I shall lay up much fruit which the tree thereof hath brought forth, And the fruit thereof I shall lay up against the season unto Mine own self.'"},{"time":605.82,"text":"58. \"And it came to pass that the Lord of the vineyard saith unto the Servant: 'Come, let us go to the nethermost parts of the vineyard and behold if the natural branches of the tree hath not brought forth much fruit also, That I may lay up of the fruit thereof against the season unto Mine own self.'"},{"time":622.9,"text":"59. \"And it came to pass that they went forth whither the Master of the vineyard had hid the natural branches of the tree; And He saith unto the Servant, 'Behold these.'"},{"time":633.02,"text":"60. \"And He beheld the first, that it had brought forth much fruit, And He beheld also that it was good."},{"time":636.521,"text":"61. \"And He saith unto the Servant: 'Take of the fruit thereof and lay it up against the season, that I may preserve it unto Mine own self;"},{"time":648.94,"text":"62. For behold, ' saith He, 'this long time have I nourished it and it hath brought forth much fruit.'"},{"time":656.26,"text":"63. \"And it came to pass that the Servant saith unto His Master: 'How comest Thou hither to plant this tree, or this branch of the tree? For behold, it was the poorest spot in all the land of Thy vineyard.'"},{"time":670.06,"text":"64. \"And the Lord of the vineyard saith unto Him: 'Counsel Me not; I knew that it was a poor spot of ground; Wherefore I said unto Thee, I have nourished it this long time, And Thou beholdest that it hath brought forth much fruit.'"},{"time":684.34,"text":"65. \"And it came to pass that the Lord of the vineyard saith unto His Servant: 'Look hither; Behold, I have planted another branch of the tree also, And Thou knowest that this spot of ground was poorer than the first;"},{"time":697.22,"text":"66. But behold the tree; I have nourished it this long time and it hath brought forth much fruit; Therefore, gather it and lay it up against the season, that I may preserve it unto Mine own self.'"},{"time":709.46,"text":"67. \"And it came to pass that the Lord of the vineyard saith again unto His Servant: 'Look hither and behold another branch also which I have planted; Behold that I have nourished it also and it hath brought forth fruit.'"},{"time":722.14,"text":"68. \"And He saith unto the Servant: 'Look hither and behold the last; Behold, this have I planted in a good spot of ground, And I have nourished it this long time and only a part of the tree hath brought forth tame fruit, And the other part of the tree hath brought forth wild fruit; Behold, I have nourished this tree like unto the others.'"},{"time":742.32,"text":"69. \"And it came to pass that the Lord of the vineyard saith unto the Servant: 'Pluck off the branches that have not brought forth good fruit and cast them into the fire.'"},{"time":751.84,"text":"70. \"But behold, the Servant saith unto Him: 'Let Us prune it and dig about it and nourish it a little longer, that perhaps it may bring forth good fruit unto Thee, that Thou canst lay it up against the season.'"},{"time":764.52,"text":"71. \"And it came to pass that the Lord of the vineyard and the Servant of the Lord of the vineyard did nourish all the fruit of the vineyard."},{"time":772.08,"text":"72. \"And it came to pass that a long time had passed away; And the Lord of the vineyard saith unto His Servant: 'Come, let Us go down into the vineyard, that We may labor again in the vineyard;"},{"time":783.56,"text":"73. For behold, the time draweth near and the end soon cometh; Wherefore, I must lay up fruit against the season unto Mine own self.'"},{"time":793.12,"text":"74. \"And it came to pass that the Lord of the vineyard and the Servant went down into the vineyard; And They came to the tree whose natural branches had been broken off and the wild branches had been grafted in; And behold, all sorts of fruit did cumber the tree."},{"time":808.08,"text":"75. \"And it came to pass that the Lord of the vineyard did taste of the fruit, every sort according to its number;"},{"time":815.24,"text":"76. And the Lord of the vineyard saith: 'Behold, this long time have We nourished this tree, And I have laid up unto Myself against the season much fruit;"},{"time":825.32,"text":"77. But behold, this time it hath brought forth much fruit and there is none of it which is good;"},{"time":832.04,"text":"78. And behold, there are all kinds of bad fruit, And it profiteth Me nothing, notwithstanding all Our labor; And now it grieveth Me that I should lose this tree.'"},{"time":843.24,"text":"79. \"And the Lord of the vineyard saith unto the Servant: 'What shall We do unto the tree, that I may preserve again good fruit thereof unto Mine own self?'"},{"time":852.76,"text":"80. \"And the Servant saith unto His Master: 'Behold, because Thou didst graft in the branches of the wild olive tree, they have nourished the roots, that they are alive and they have not perished; Wherefore, Thou beholdest that they are yet good.'"},{"time":867.72,"text":"81. \"And it came to pass that the Lord of the vineyard saith unto His Servant: 'The tree profiteth Me nothing, And the roots thereof profiteth Me nothing, so long as it shall bring forth evil fruit;"},{"time":878.68,"text":"82. Nevertheless, I know that the roots are good and for Mine own purpose I have preserved them; And because of their much strength, they have hitherto brought forth from the wild branches good fruit,"},{"time":891.28,"text":"83. But behold, the wild branches have grown and have overrun the roots thereof; And because that the wild branches have overcome the roots thereof, it hath brought forth much evil fruit;"},{"time":903.0,"text":"84. And because that it hath brought forth so much evil fruit, Thou beholdest that it beginneth to perish, And it will soon become ripened that it may be cast into the fire, except We should do something for it to preserve it.'"},{"time":916.94,"text":"85. \"And it came to pass that the Lord of the vineyard saith unto His Servant: 'Let Us go down into the nethermost parts of the vineyard and behold if the natural branches have also brought forth evil fruit.'"},{"time":929.32,"text":"86. \"And it came to pass that They went down into the nethermost parts of the vineyard."},{"time":934.8,"text":"87. \"And it came to pass that They beheld that the fruit of the natural branches had become corrupt also, yea, the first and the second and also the last; And they had all become corrupt;"},{"time":946.68,"text":"88. And the wild fruit of the last had overcome that part of the tree which brought forth good fruit, even that the branch had withered away and died."},{"time":955.72,"text":"89. \"And it came to pass that the Lord of the vineyard wept and saith unto the Servant: ' What could I have done more for My vineyard?"},{"time":962.28,"text":"90. Behold, I knew that all the fruit of the vineyard, save it were these, had become corrupted;"},{"time":970.24,"text":"91. And now these which have once brought forth good fruit have also become corrupted;"},{"time":976.16,"text":"92. And now all the trees of My vineyard are good for nothing, save it be to be hewn down and cast into the fire;"},{"time":984.0,"text":"93. And behold, this last, whose branch hath withered away, I did plant in a good spot of ground - Yea, even that which was choice unto Me above all other parts of the land of My vineyard;"},{"time":996.6,"text":"94. And Thou beheldest that I also cut down that which cumbered this spot of ground, that I might plant this tree in the stead thereof;"},{"time":1005.24,"text":"95. And Thou beheldest that a part thereof brought forth good fruit and a part thereof brought forth wild fruit;"},{"time":1012.8,"text":"96. And because that I plucked not the branches thereof and cast them into the fire, Behold, they have overcome the good branch, that it hath withered away."},{"time":1022.68,"text":"97. 'And now behold, notwithstanding all the care which We have taken of My vineyard, The trees thereof hath become corrupted, that they bring forth no good fruit;"},{"time":1033.28,"text":"98. And these I had hope to preserve, to have laid up fruit thereof against the season unto Mine own self."},{"time":1040.56,"text":"99. 'But behold, they have become like unto the wild olive tree and they are of no worth but to be hewn down and cast into the fire; And it grieveth Me that I should lose them;"},{"time":1051.28,"text":"100. But what could I have done more in My vineyard?"},{"time":1055.06,"text":"101. Have I slackened Mine hand, that I have not nourished it?"},{"time":1059.16,"text":"102. Nay, I have nourished it and I have digged it and I have pruned it and I have dunged it, And I have stretched forth Mine hand almost all the daylong, And the end draweth nigh,"},{"time":1071.36,"text":"103. And it grieveth Me that I should hew down all the trees of My vineyard and cast them into the fire, that they should be burned;"},{"time":1079.16,"text":"104. Who is it that hath corrupted My vineyard?'"},{"time":1082.82,"text":"105. \"And it came to pass that the Servant saith unto His Master: 'Is it not the loftiness of Thy vineyard?"},{"time":1089.52,"text":"106. Hath not the branches thereof overcome the roots which are good?"},{"time":1094.4,"text":"107. And because that the branches have overcome the roots thereof - For behold, they grew faster than the strength of the roots thereof, taking strength unto themselves -"},{"time":1105.28,"text":"108. Behold I say, is not this the cause that the trees of Thy vineyard hath become corrupted?'"},{"time":1111.56,"text":"109. \"And it came to pass that the Lord of the vineyard saith unto the Servant: ' Let Us go to and hew down the trees of the vineyard and cast them into the fire, that they shall not cumber the ground of My vineyard, for I have done all - What could I have done more for My vineyard?'"},{"time":1126.56,"text":"110. \"But behold, the Servant saith unto the Lord of the vineyard: 'Spare it a little longer.'"},{"time":1133.04,"text":"111. \"And the Lord saith: 'Yea, I will spare it a little longer, for it grieveth Me that I should lose the trees of My vineyard;"},{"time":1141.04,"text":"112. Wherefore, let Us take of the branches of these which I have planted in the nethermost parts of My vineyard and let Us graft them into the tree from whence they came;"},{"time":1151.64,"text":"113. And let Us pluck from the tree those branches whose fruit is most bitter and graft in the natural branches of the tree in the stead thereof;"},{"time":1160.64,"text":"114. And this will I do that the tree may not perish, that perhaps I may preserve unto Myself the roots thereof for Mine own purpose."},{"time":1169.44,"text":"115. 'And behold, the roots of the natural branches of the tree, which I planted whithersoever I would, are yet alive;"},{"time":1177.12,"text":"116. Wherefore, that I may preserve them also for Mine own purpose, I will take of the branches of this tree and I will graft them in unto them;"},{"time":1186.32,"text":"117. Yea, I will graft in unto them the branches of their mother tree, that I may preserve the roots also unto Mine own self, That when they shall be sufficiently strong, that perhaps they may bring forth good fruit unto Me and I may yet have glory in the fruit of My vineyard."},{"time":1202.44,"text":"118. \"And it came to pass that They took from the natural tree which had become wild and grafted in unto the natural trees which also had become wild;"},{"time":1211.96,"text":"119. And They also took of the natural trees which had become wild and grafted into their mother tree."},{"time":1218.48,"text":"120. \"And the Lord of the vineyard saith unto the Servant: 'Pluck not the wild branches from the trees, save it be those which are most bitter, And in them Ye shall graft according to that which I have said;"},{"time":1230.52,"text":"121. And We will nourish again the trees of the vineyard, And We will trim up the branches thereof, And We will pluck from the trees those branches which are ripened that must perish and cast them into the fire."},{"time":1242.48,"text":"122. 'And this I do that perhaps the roots thereof may take strength because of their goodness and because of the change of the branches, that the good may overcome the evil,"},{"time":1252.48,"text":"123. And because that I have preserved the natural branches and the roots thereof, And that I have grafted in the natural branches again into their mother tree and have preserved the roots of their mother tree, That perhaps the trees of My vineyard may bring forth again good fruit,"},{"time":1267.92,"text":"124. And that I may have joy again in the fruit of My vineyard, And perhaps that I may rejoice exceedingly that I have preserved the roots and the branches of the first fruit."},{"time":1277.48,"text":"125. 'Wherefore, go to and call servants that we may labor diligently with our mights in the vineyard, That we may prepare the way that I may bring forth again the natural fruit, which natural fruit is good and the most precious above all other fruit."},{"time":1291.88,"text":"126. 'Wherefore, let Us go to and labor with Our mights this last time, For behold, the end draweth nigh, And this is for the last time that I shall prune My vineyard;"},{"time":1304.2,"text":"127. Graft in the branches; Begin at the last, that they may be first, and that the first may be last; And dig about the trees - both old and young, the first and the last, and the last and the first - That all may be nourished once again for the last time."},{"time":1319.6,"text":"128. 'Wherefore, dig about them and prune them and dung them once more for the last time, For the end draweth nigh;"},{"time":1328.52,"text":"129. And if it so be that these last grafts shall grow and bring forth the natural fruit, then shall Ye prepare the way for them that they may grow;"},{"time":1337.62,"text":"130. And as they begin to grow, Ye shall clear away the branches which bring forth bitter fruit, according to the strength of the good and the size thereof;"},{"time":1347.1,"text":"131. And Ye shall not clear away the bad thereof all at once, lest the roots thereof should be too strong for the graft, And the graft thereof shall perish and I lose the trees of My vineyard;"},{"time":1358.7,"text":"132. For it grieveth Me that I should lose the trees of My vineyard. 'Wherefore, Ye shall clear away the bad according as the good shall grow, That the root and the top may be equal in strength, until the good shall overcome the bad, And the bad be hewn down and cast into the fire, that they cumber not the ground of My vineyard; And thus will I sweep away the bad out of My vineyard."},{"time":1381.38,"text":"133. 'And the branches of the natural tree will I graft in again into the natural tree; And the branches of the natural tree will I graft into the natural branches of the tree;"},{"time":1391.82,"text":"134. And thus will I bring them together again, that they shall bring forth the natural fruit and they shall be one;"},{"time":1399.02,"text":"135. And the bad shall be cast away, yea, even out of all the land of My vineyard; For behold, only this once will I prune My vineyard.'"},{"time":1408.74,"text":"136. \"And it came to pass that the Lord of the vineyard sent His Servant, And the Servant went and did as the Lord had commanded Him and brought other servants, and they were few;"},{"time":1419.14,"text":"137. And the Lord of the vineyard saith unto them: 'Go to and labor in the vineyard with your mights,"},{"time":1425.62,"text":"138. For behold, this is the last time that I shall nourish My vineyard, For the end is nigh at hand and the season speedily cometh;"},{"time":1434.88,"text":"139. And if ye labor with your mights with Me, ye shall have joy in the fruit which I shall lay up unto Myself against the time which will soon come."},{"time":1443.82,"text":"140. \"And it came to pass that the servants did go to it and labor with their mights, And the Lord of the vineyard labored also with them, And they did obey the commandments of the Lord of the vineyard in all things;"},{"time":1455.86,"text":"141. And there began to be the natural fruit again in the vineyard, And the natural branches began to grow and thrive exceedingly,"},{"time":1463.74,"text":"142. And the wild branches began to be plucked off and to be cast away, And they did keep the root and the top thereof equal, according to the strength thereof."},{"time":1473.82,"text":"143. \"And thus they labored with all diligence according to the commandments of the Lord of the vineyard, Even until the bad had been cast away out of the vineyard and the Lord had preserved unto Himself, that the trees had become again the natural fruit;"},{"time":1488.22,"text":"144. And they became like unto one body, And the fruit were equal, And the Lord of the vineyard had preserved unto Himself the natural fruit which was most precious unto Him from the beginning."},{"time":1499.5,"text":"145. \"And it came to pass that when the Lord of the vineyard saw that His fruit was good and that His vineyard was no more corrupt, He calleth up His servants and saith unto them: 'Behold, for this last time have we nourished My vineyard, And thou beholdest that I have done according to My will,"},{"time":1515.9,"text":"146. And I have preserved the natural fruit, that it is good, even like as it was in the beginning; And blessed art thou,"},{"time":1523.94,"text":"147. For because that ye have been diligent in laboring with Me in My vineyard and have kept My commandments, And hath brought unto Me again the natural fruit, that My vineyard is no more corrupted and the bad is cast away, Behold, ye shall have joy with Me because of the fruit of My vineyard."},{"time":1540.22,"text":"148. 'For behold, for a long time will I lay up of the fruit of My vineyard unto Mine own self against the season which speedily cometh;"},{"time":1549.3,"text":"149. And for the last time have I nourished My vineyard and pruned it and dug about it and dunged it;"},{"time":1555.34,"text":"150. Wherefore, I will lay up unto Mine own self of the fruit for a long time, according to that which I have spoken."},{"time":1563.82,"text":"151. 'And when the time cometh that evil fruit shall again come into My vineyard, Then will I cause the good and the bad to be gathered;"},{"time":1571.66,"text":"152. And the good will I preserve unto Myself and the bad will I cast away into its own place;"},{"time":1578.14,"text":"153. And then cometh the season and the end, And My vineyard will I cause to be burned with fire.'\""}]
};
</script>
