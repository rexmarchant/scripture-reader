  lyrics: [{"time":0,"text":"First Nephi, Chapter 7"},{"time":1.248,"text":"1. And now it came to pass that after I, Nephi, after that I had read these things which were engraven upon the plates of brass, My brethren came unto me and said unto me: \"What meaneth these things which ye have read?"},{"time":16.608,"text":"2. Behold, are they to be understood according to things which are spiritual, which shall come to pass according to the spirit and not the flesh?\""},{"time":25.2,"text":"3. And I, Nephi, saith unto them: \"Behold, they were made manifest unto the prophet by the voice of the Spirit,"},{"time":32.631,"text":"4. For by the Spirit are all things made known unto the prophets which shall come upon the children of men according to the flesh."},{"time":40.489,"text":"5. Wherefore, the things of which I have read are things pertaining to things both temporal and spiritual;"},{"time":47.555,"text":"6. For it appears that the house of Israel, sooner or later, will be scattered upon all the face of the earth, and also among all nations."},{"time":59.44,"text":"7. And behold, there are many which are already lost from the knowledge of they which are at Jerusalem;"},{"time":64.84,"text":"8. Yea, the more part of all the tribes have been led away,"},{"time":70.12,"text":"9. And they are scattered to and fro upon the isles of the sea;"},{"time":75.2,"text":"10. And whither they are, none of us knoweth, save that we know that they have been led away."},{"time":81.467,"text":"11. And since that they have been led away, these things have been prophesied concerning them, And also concerning all they which shall hereafter be scattered and be confounded because of the Holy One of Israel, For against Him will they harden their hearts;"},{"time":96.72,"text":"12. Wherefore, they shall be scattered among all nations and shall be hated by all men."},{"time":102.8,"text":"13. Nevertheless, after that they have been nursed by the Gentiles and the Lord hath lifted up His hand upon the Gentiles and set them up for a standard - And their children shall be carried in their arms, And their daughters shall be carried upon their shoulders; Behold, these things of which are spoken are temporal, For thus are the covenants of the Lord with our fathers;"},{"time":123.36,"text":"14. And it meaneth us in the days to come, And also all our brethren which are of the house of Israel."},{"time":130.16,"text":"15. And it meaneth that the time cometh that after all the house of Israel have been scattered and confounded, that the Lord God will raise up a mighty nation among the Gentiles, Yea, even upon the face of this land;"},{"time":142.92000000000002,"text":"16. And by them shall our seed be scattered."},{"time":146.64,"text":"17. And after that our seed is scattered, the Lord God will proceed to do a marvelous work among the Gentiles which shall be of great worth unto our seed;"},{"time":155.925,"text":"18. Wherefore, it is likened unto their being nursed by the Gentiles and being carried in their arms and upon their shoulders."},{"time":163.28,"text":"19. And it shall also be of worth unto the Gentiles,"},{"time":167.28,"text":"20. And not only unto the Gentiles, but unto all the house of Israel unto the making known of the covenants of the Father of heaven unto Abraham, saying: 'In thy Seed shall all the kindreds of the earth be blessed.'"},{"time":180.32,"text":"21. And I would, my brethren, that ye should know that all the kindreds of the earth cannot be blessed unless He shall make bare His arm in the eyes of the nations;"},{"time":189.36,"text":"22. Wherefore, the Lord God will proceed to make bare His arm in the eyes of all the nations in bringing about His covenants and His gospel unto they which are of the house of Israel."},{"time":199.68,"text":"23. Wherefore, He will bring them again out of captivity, And they shall be gathered together to the lands of their first inheritance;"},{"time":206.865,"text":"24. And they shall be brought out of obscurity and out of darkness;"},{"time":211.41,"text":"25. And they shall know that the Lord is their Savior and their Redeemer, the Mighty One of Israel."},{"time":218.28,"text":"26. And the blood of that great and abominable church, which is the whore of all the earth, shall turn upon their own heads,"},{"time":227.04,"text":"27. For they shall war among themselves; And the sword of their own hands shall fall upon their own heads, And they shall be drunken with their own blood."},{"time":237.2,"text":"28. And every nation which shall war against thee, O house of Israel, shall be turned one against another;"},{"time":243.6,"text":"29. And they shall fall into the pit which they digged to ensnare the people of the Lord;"},{"time":249.04,"text":"30. And all they which fight against Zion shall be destroyed;"},{"time":253.44,"text":"31. And that great whore which hath perverted the right ways of the Lord, yea, that great and abominable church, shall tumble to the dust, And great shall be the fall of it."},{"time":264.96,"text":"32. 'For behold,' saith the prophet, 'that the time cometh speedily that Satan shall have no more power over the hearts of the children of men;"},{"time":273.76,"text":"33. For the day soon cometh that all the proud and they which do wickedly shall be as stubble; And the day cometh that they must be burned."},{"time":282.24,"text":"34. For the time soon cometh that the fullness of the wrath of God shall be poured out upon all the children of men,"},{"time":289.2,"text":"35. For He will not suffer that the wicked shall destroy the righteous."},{"time":298.4,"text":"36. Wherefore, He will preserve the righteous by His power, even if it so be that the fullness of His wrath must come, And the righteous be preserved, even unto the destruction of their enemies by fire;"},{"time":310.56,"text":"37. Wherefore, the righteous need not fear'; For thus saith the prophet: 'They shall be saved, even if it so be as by fire.'"},{"time":318.72,"text":"38. Behold my brethren, I say unto you that these things must shortly come, Yea, even blood and fire and vapor of smoke must come;"},{"time":328.8,"text":"39. And it must needs be upon the face of this earth;"},{"time":332.88,"text":"40. And it cometh unto men according to the flesh, if it so be that they will harden their hearts against the Holy One of Israel."},{"time":340.72,"text":"41. For behold, the righteous shall not perish;"},{"time":344.15999999999997,"text":"42. For the time surely must come that all they which fight against Zion shall be cut off."},{"time":351.36,"text":"43. And the Lord will surely prepare a way for His people, unto the fulfilling of the words of Moses which he spake, saying:"},{"time":359.52,"text":"44. 'A Prophet shall the Lord your God raise up unto you like unto me; Him shall ye hear in all things whatsoever He shall say unto you;"},{"time":368.08,"text":"45. And it shall come to pass that all they which will not hear that Prophet shall be cut off from among the people.'"},{"time":373.929,"text":"46. And now I, Nephi, declare unto you that this Prophet of whom Moses spake was the Holy One of Israel;"},{"time":383.828,"text":"47. Wherefore, He shall execute judgment in righteousness."},{"time":387.92,"text":"48. And the righteous need not fear, for it is they which shall not be confounded;"},{"time":393.68,"text":"49. But it is the kingdom of the devil which shall be built up among the children of men, Which kingdom is established among them which are in the flesh."},{"time":402.8,"text":"50. For the time speedily shall come that all churches which are built up to get gain, And all they which are built up to get power over the flesh, And they which are built up to become popular in the eyes of the world, And they which seek the lusts of the flesh, and the things of the world, and to do all manner of iniquity,"},{"time":420.64,"text":"51. Yea, in fine, all they which belong to the kingdom of the devil - It is they which need fear and tremble and quake;"},{"time":428.8,"text":"52. It is they which must be brought low in the dust;"},{"time":432.64,"text":"53. It is they which must be consumed as stubble;"},{"time":436.56,"text":"54. And this is according to the words of the prophet."},{"time":440.72,"text":"55. And the time cometh speedily that the righteous must be led up as calves of the stall, And the Holy One of Israel must reign in dominion and might and power and great glory."},{"time":451.84,"text":"56. And He gathereth His children from the four quarters of the earth;"},{"time":456.48,"text":"57. And He numbereth His sheep and they know Him;"},{"time":459.68,"text":"58. And there shall be one fold and one Shepherd;"},{"time":463.92,"text":"59. And He shall feed His sheep, And in Him they shall find pasture."},{"time":468.96,"text":"60. And because of the righteousness of His people, Satan hath no power;"},{"time":474.24,"text":"61. Wherefore, he cannot be loosed for the space of many years,"},{"time":479.36,"text":"62. For he hath no power over the hearts of the people, for they dwell in righteousness, And the Holy One of Israel reigneth."},{"time":487.04,"text":"63. And now behold, I, Nephi, say unto you that all these things must come according to the flesh;"},{"time":495.44,"text":"64. But behold, all nations, kindreds, tongues and people shall dwell safely in the Holy One of Israel, if it so be that they will repent."},{"time":505.6,"text":"65. And now I, Nephi, make an end, for I durst not speak further as yet concerning these things."},{"time":512.8,"text":"66. Wherefore my brethren, I would that ye should consider that the things which have been written upon the plates of brass are true,"},{"time":520.32,"text":"67. And they testify that a man must be obedient to the commandments of God."},{"time":525.76,"text":"68. Wherefore, ye need not suppose that I and my father are the only ones which have testified and also taught them."},{"time":534,"text":"69. Wherefore, if ye shall be obedient to the commandments and endure to the end, ye shall be saved at the last day."},{"time":541.12,"text":"70. And thus it is. Amen.\""}]
