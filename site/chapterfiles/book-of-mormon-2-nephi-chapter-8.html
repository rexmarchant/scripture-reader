<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "2 Nephi",
  chapter: "Chapter 8",
  audioSrc: "https://archive.org/download/2-nephi-ch-8/2%20Nephi%20Ch%208.mp3",
  lyrics: [{"time":0,"text":"Second Nephi, Chapter 8"},{"time":1.317,"text":"1. And now Jacob spake many more things to my people at that time; Nevertheless, only these things have I caused to be written, For the things which I have written sufficeth me."},{"time":15.36,"text":"2. And now I, Nephi, write more of the words of Isaiah, for my soul delighteth in his words;"},{"time":24,"text":"3. For I will liken his words unto my people and I will send them forth unto all my children, For he verily saw my Redeemer, even as I have seen Him,"},{"time":34.48,"text":"4. And my brother Jacob also hath seen Him, as I have seen Him; Wherefore, I will send their words forth unto my children to prove unto them that my words are true;"},{"time":46.48,"text":"5. Wherefore, by the words of three, God hath said, I will establish My word;"},{"time":53.6,"text":"6. Nevertheless, God sendeth more witnesses and He proveth all His words."},{"time":60,"text":"7. Behold, my soul delighteth in proving unto my people the truth of the coming of Christ,"},{"time":66.96,"text":"8. For, for this end hath the law of Moses been given;"},{"time":72.08,"text":"9. And all things which have been given of God from the beginning of the world unto man are the typifying of Him."},{"time":79.68,"text":"10. And also my soul delighteth in the covenants of the Lord which He hath made to our fathers;"},{"time":86.8,"text":"11. Yea, my soul delighteth in His grace and His justice and power and mercy, In the great and eternal plan of deliverance from death."},{"time":96.56,"text":"12. And my soul delighteth in proving unto my people that save Christ should come, all men must perish;"},{"time":104.16,"text":"13. For if there be no Christ, there be no God; And if there be no God, we are not, for there could have been no creation;"},{"time":113.2,"text":"14. But there is a God, And He is Christ, And He cometh in the fullness of His own time."},{"time":120.16,"text":"15. And now I write some of the words of Isaiah, that whoso of my people which shall see these words may lift up their hearts and rejoice for all men;"},{"time":130.24,"text":"16. Now these are the words and ye may liken them unto you and unto all men:"},{"time":136.32,"text":"17. The word that Isaiah, the son of Amoz, saw concerning Judah and Jerusalem."},{"time":143.76,"text":"18. And it shall come to pass in the last days when the mountain of the Lord's house shall be established in the top of the mountains, And shall be exalted above the hills; And all nations shall flow unto it."},{"time":156.16,"text":"19. And many people shall go and say: Come ye, and let us go up to the mountain of the Lord, to the house of the God of Jacob; And He will teach us of His ways, And we will walk in His paths. For out of Zion shall go forth the law, And the word of the Lord from Jerusalem."},{"time":174.72,"text":"20. And He shall judge among the nations and shall rebuke many people; And they shall beat their swords into plowshares and their spears into pruning hooks; Nation shall not lift up sword against nation, Neither shall they learn war anymore."},{"time":189.36,"text":"21. O house of Jacob, come ye and let us walk in the light of the Lord. Yea come, for ye have all gone astray - every one to his wicked ways."},{"time":200.64,"text":"22. Therefore, O Lord, Thou hast forsaken Thy people, the house of Jacob, Because they be replenished from the east and hearken unto soothsayers like the Philistines, And they please themselves in the children of strangers."},{"time":215.52,"text":"23. Their land also is full of silver and gold, neither is there any end of their treasures. Their land is also full of horses, neither is there any end of their chariots."},{"time":228.24,"text":"24. Their land also is full of idols; They worship the work of their own hands, that which their own fingers have made."},{"time":236.72,"text":"25. And the mean man boweth not down, And the great man humbleth himself not; Therefore, forgive him not."},{"time":245.04,"text":"26. O ye wicked ones! enter into the rock and hide thee in the dust, For the fear of the Lord and the glory of His majesty shall smite thee."},{"time":255.76,"text":"27. And it shall come to pass that the lofty looks of man shall be humbled, And the haughtiness of men shall be bowed down; And the Lord alone shall be exalted in that day."},{"time":266.72,"text":"28. For the day of the Lord of Hosts soon cometh upon all nations, yea, upon everyone - Yea, upon the proud and lofty and upon everyone which is lifted up; And he shall be brought low;"},{"time":280.24,"text":"29. Yea, and the day of the Lord shall come upon all the cedars of Lebanon - For they are high and lifted up - and upon all the oaks of Bashan,"},{"time":289.92,"text":"30. and upon all the high mountains, and upon all the hills, and upon all the nations which are lifted up,"},{"time":298.296,"text":"31. and upon every people, and upon every high tower, and upon every fenced wall,"},{"time":304.16,"text":"32. and upon all the ships of the sea, and upon all the ships of Tarshish, and upon all the pleasant pictures."},{"time":312.16,"text":"33. And the loftiness of man shall be bowed down, And the haughtiness of men shall be made low; And the Lord alone shall be exalted in that day,"},{"time":321.92,"text":"34. And the idols He shall utterly abolish."},{"time":324.204,"text":"35. And they shall go into the holes of the rocks and into the caves of the earth, For the fear of the Lord shall come upon them; And the glory of His majesty shall smite them when He ariseth to shake terribly the earth."},{"time":338.56,"text":"36. In that day a man shall cast his idols of silver and his idols of gold - Which he hath made for himself to worship - to the moles and to the bats,"},{"time":348.72,"text":"37. to go into the clefts of the rocks, and into the tops of the ragged rocks, For the fear of the Lord shall come upon them, And the majesty of His glory shall smite them when He ariseth to shake terribly the earth."},{"time":358.96,"text":"38. Cease ye from man, whose breath is in his nostrils; For wherein is he to be accounted of?"},{"time":369.2,"text":"39. For behold, the Lord, the Lord of Hosts, doth take away from Jerusalem and from Judah the stay and the staff - The whole staff of bread and the whole stay of water,"},{"time":381.52,"text":"40. the mighty man and the man of war, the judge and the prophet, and the prudent and the ancient;"},{"time":388,"text":"41. the captain of fifty and the honorable man, and the counselor and the cunning artificer, and the eloquent orator."},{"time":395.419,"text":"42. And I will give children unto them to be their princes, And babes shall rule over them."},{"time":402.056,"text":"43. And the people shall be oppressed, every one by another and every one by his neighbor; The child shall behave himself proudly against the ancient, And the base against the honorable."},{"time":414.15999999999997,"text":"44. When a man shall take hold of his brother of the house of his father and shall say, Thou hast clothing; Be thou our ruler, And let not this ruin come under thy hand -"},{"time":424.96,"text":"45. In that day shall he swear, saying: I will not be a healer; For in my house there is neither bread nor clothing; Make me not a ruler of the people."},{"time":434.16,"text":"46. For Jerusalem is ruined and Judah is fallen because their tongues and their doings have been against the Lord, to provoke the eyes of His glory -"},{"time":444.16,"text":"47. The show of their countenance doth witness against them and doth declare their sin to be even as Sodom, And they cannot hide it. Wo unto their souls! for they have rewarded evil unto themselves."},{"time":456.88,"text":"48. Say unto the righteous that it is well with them, for they shall eat the fruit of their doings."},{"time":465.8,"text":"49. Wo unto the wicked! for they shall perish, For the reward of their hands shall be upon them."},{"time":474.72,"text":"50. And My people! Children are their oppressors and women rule over them. O My people! They which lead thee cause thee to err and destroy the way of thy paths."},{"time":487.6,"text":"51. The Lord standeth up to plead and standeth to judge the people."},{"time":492.88,"text":"52. The Lord will enter into judgment with the ancients of His people and the princes thereof: For ye have eaten up the vineyard and the spoil of the poor in your houses."},{"time":503.52,"text":"53. What mean ye? Ye beat My people to pieces and grind the faces of the poor, saith the Lord God of Hosts."},{"time":512.48,"text":"54. Moreover, the Lord saith: Because the daughters of Zion are haughty and walk with stretched forth necks and wanton eyes, Walking and mincing as they go and making a tinkling with their feet,"},{"time":525.2,"text":"55. Therefore, the Lord will smite with a scab the crown of the head of the daughters of Zion, And the Lord will discover their secret parts."},{"time":533.36,"text":"56. In that day the Lord will take away the bravery of tinkling ornaments, and cauls and round tires like the moon;"},{"time":541.011,"text":"57. the chains and the bracelets and the mufflers;"},{"time":545.84,"text":"58. the bonnets and the ornaments of the legs, and the headbands and the tablets and the earrings,"},{"time":552.96,"text":"59. the rings and nose jewels;"},{"time":555.413,"text":"60. the changeable suits of apparel, and the mantles and the wimples and the crisping pins,"},{"time":563.42,"text":"61. the glasses and the fine linen and hoods and the veils."},{"time":570.24,"text":"62. And it shall all come to pass, instead of sweet smell, there shall be stink; And instead of a girdle, a rent; And instead of well - set hair, baldness; And instead of a stomacher, a girding of sackcloth; Burning, instead of beauty."},{"time":585.613,"text":"63. Thy men shall fall by the sword, And thy mighty in the war."},{"time":592.4,"text":"64. And her gates shall lament and mourn, And she shall be desolate and shall sit upon the ground."},{"time":599.92,"text":"65. And in that day seven women shall take hold of one man, saying: We will eat our own bread and wear our own apparel; Only let us be called by thy name, to take away our reproach!"},{"time":610.893,"text":"66. In that day shall the Branch of the Lord be beautiful and glorious - the fruit of the earth - and excellent and comely to them that are escaped of Israel."},{"time":622.24,"text":"67. And it shall come to pass, them that are left in Zion and remain in Jerusalem shall be called holy - Everyone that is written among the living in Jerusalem."},{"time":631.407,"text":"68. When the Lord shall have washed away the filth of the daughters of Zion, And shall have purged the blood of Jerusalem from the midst thereof by the spirit of judgment and by the spirit of burning -"},{"time":643.893,"text":"69. And the Lord will create upon every dwelling place of Mount Zion, And upon her assemblies, a cloud of smoke by day and the shining of a flaming fire by night; For upon all, the glory of Zion shall be a defense."},{"time":658.12,"text":"70. And there shall be a tabernacle for a shadow in the daytime from the heat, And for a place of refuge and a covert from storm and from rain."},{"time":666.754,"text":"71. And then will I sing to My Well-Beloved a song of My Beloved touching His vineyard: My Well-Beloved hath a vineyard in a very fruitful hill;"},{"time":676.747,"text":"72. And He fenced it and gathered out the stones thereof, and planted it with the choicest vine, and built a tower in the midst of it, and also made a winepress therein; And He looked, that it should bring forth grapes, And it brought forth wild grapes."},{"time":692.347,"text":"73. And now, O inhabitants of Jerusalem and men of Judah, Judge, I pray you, betwixt Me and My vineyard."},{"time":701.082,"text":"74. What could have been done more to My vineyard that I have not done in it? Wherefore, when I looked that it should bring forth grapes, it brought forth wild grapes."},{"time":713.12,"text":"75. And now, go to; I will tell you what I will do to My vineyard: I will take away the hedge thereof, and it shall be eaten up; And I will break down the wall thereof, and it shall be trodden down;"},{"time":726.4,"text":"76. And I will lay it waste. It shall not be pruned nor digged, but there shall come up briers and thorns. I will also command the clouds, that they rain no rain upon it."},{"time":738.64,"text":"77. For the vineyard of the Lord of Hosts is the house of Israel, And the men of Judah, His pleasant plant; And He looked for judgment, and behold, oppression; For righteousness, and behold, a cry."},{"time":751.216,"text":"78. Wo unto them that join house to house! till there can be no place that they may be placed alone in the midst of the earth."},{"time":761.581,"text":"79. In mine ears saith the Lord of Hosts, Of a truth, many houses shall be desolate, And great and fair cities without inhabitant."},{"time":774.08,"text":"80. Yea, ten acres of vineyard shall yield one bath, And the seed of a homer shall yield an ephah."},{"time":782.08,"text":"81. Wo unto them that rise up early in the morning! that they may follow strong drink, that continue until night and wine inflame them."},{"time":791.2,"text":"82. And the harp and the viol, the tabret and pipe, and wine are in their feasts; But they regard not the work of the Lord, Neither consider the operation of His hands."},{"time":801.84,"text":"83. Therefore, my people are gone into captivity because they have no knowledge, And their honorable men are famished, And their multitude dried up with thirst."},{"time":811.947,"text":"84. Therefore, hell hath enlarged herself and opened her mouth without measure; And their glory and their multitude and their pomp and he that rejoiceth shall descend into it."},{"time":822.92,"text":"85. And the mean man shall be brought down, And the mighty man shall be humbled, And the eyes of the lofty shall be humbled."},{"time":831.896,"text":"86. But the Lord of Hosts shall be exalted in judgment, And God that is holy shall be sanctified in righteousness."},{"time":839.88,"text":"87. Then shall the lambs feed after their manner, And the waste places of the fat ones shall strangers eat."},{"time":848.632,"text":"88. Wo unto them that draw iniquity with cords of vanity and sin as it were with a cart rope!"},{"time":855.909,"text":"89. That say, Let Him make speed, Hasten His work, that we may see it; And let the counsel of the Holy One of Israel draw nigh and come, that we may know it."},{"time":867.76,"text":"90. Wo unto them that call evil good and good evil! that put darkness for light and light for darkness; that put bitter for sweet and sweet for bitter."},{"time":877.804,"text":"91. Wo unto the wise in their own eyes, And prudent in their own sight!"},{"time":883.44,"text":"92. Wo unto the mighty to drink wine, And men of strength to mingle strong drink;"},{"time":889.5,"text":"93. Which justify the wicked for reward, And take away the righteousness of the righteous from him!"},{"time":896.891,"text":"94. Therefore, as the fire devoureth the stubble, And the flame consumeth the chaff, Their root shall be rottenness; And their blossom shall go up as dust because they have cast away the law of the Lord of Hosts and despised the word of the Holy One of Israel."},{"time":914,"text":"95. Therefore is the anger of the Lord kindled against His people, And He hath stretched forth His hand against them and hath smitten them; And the hills did tremble, And their carcasses were torn in the midst of the streets. For all this His anger is not turned away, But His hand stretched out still."},{"time":931.92,"text":"96. And He will lift up an ensign to the nations from far, And will hiss unto them from the end of the earth; And behold, they shall come with speed swiftly:"},{"time":941.335,"text":"97. None shall be weary, nor stumble among them, none shall slumber, nor sleep; neither shall the girdle of their loins be loosed, nor the latchet of their shoes be broken;"},{"time":953.244,"text":"98. Whose arrows shall be sharp and all their bows bent; And their horses' hoofs shall be counted like flint and their wheels like a whirlwind; Their roaring like a lion -"},{"time":964.227,"text":"99. They shall roar like young lions; Yea, they shall roar and lay hold of the prey and shall carry away safe, And none shall deliver."},{"time":975.04,"text":"100. And in that day they shall roar against them like the roaring of the sea. And if they look unto the land, Behold, darkness and sorrow; And the light is darkened in the heavens thereof."}]
};
