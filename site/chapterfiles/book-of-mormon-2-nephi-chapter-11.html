<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "2 Nephi",
  chapter: "Chapter 11",
  audioSrc: "https://archive.org/download/2-nephi-ch-11/2%20Nephi%20Ch%2011.mp3",
  lyrics: [{"time":0,"text":"Second Nephi, Chapter 11"},{"time":3.44,"text":"1. Now I, Nephi, do speak somewhat concerning the words which I have written, which have been spoken by the mouth of Isaiah;"},{"time":12.66,"text":"2. For behold, Isaiah spake many things which were hard for many of my people to understand, For they know not concerning the manner of prophesying among the Jews,"},{"time":23.42,"text":"3. For I, Nephi, have not taught them many things concerning the manner of the Jews, For their works were works of darkness and their doings were doings of abomination."},{"time":33.28,"text":"4. Wherefore, I write unto my people, unto all they that shall receive hereafter these things which I write, That they may know the judgments of God, that they come upon all nations according to the word which He hath spoken."},{"time":47.08,"text":"5. Wherefore, hearken O my people which are of the house of Israel and give ear to my words! For because that the words of Isaiah are not plain unto you, Nevertheless, they are plain unto all they that are filled with the spirit of prophecy;"},{"time":63.28,"text":"6. But I give unto you a prophecy according to the Spirit which is in me; Wherefore, I shall prophesy according to the plainness which hath been with me from the time that I came out from Jerusalem with my father."},{"time":75.92,"text":"7. For behold, my soul delighteth in plainness unto my people, that they may learn;"},{"time":82.03999999999999,"text":"8. Yea, and my soul delighteth in the words of Isaiah, For I came out from Jerusalem and mine eyes hath beheld the things of the Jews; And I know that the Jews do understand the things of the prophets, And there is none other people that understand the things of the prophets which were spoken unto the Jews, like unto them, Save it be that they are taught after the manner of the things of the Jews."},{"time":104.8,"text":"9. But behold, I, Nephi, have not taught my children after the manner of the Jews; But behold, I, of myself, have dwelt at Jerusalem, wherefore, I know concerning the regions round about;"},{"time":119.28,"text":"10. And I have made mention unto my children concerning the judgments of God which hath come to pass among the Jews - unto my children, according to all that which Isaiah hath spoken; And I do not write them;"},{"time":132,"text":"11. But behold, I proceed with mine own prophecy, according to my plainness, in the which I know that no man can err."},{"time":140.68,"text":"12. Nevertheless, in the days that the prophecies of Isaiah shall be fulfilled, men shall know of a surety at the times when they shall come to pass;"},{"time":149.36,"text":"13. Wherefore, they are of worth unto the children of men; And he that supposeth that they are not, unto them will I speak particularly and confine the words unto mine own people,"},{"time":161.12,"text":"14. For I know that they shall be of great worth unto them in the last days, for in that day shall they understand them; Wherefore, for their good have I written them."},{"time":171.07999999999998,"text":"15. And as one generation hath been destroyed among the Jews because of iniquity, Even so have they been destroyed from generation to generation according to their iniquities;"},{"time":182.2,"text":"16. And never hath any of them been destroyed, save it were foretold them by the prophets of the Lord;"},{"time":188.24,"text":"17. Wherefore, it hath been told them concerning the destruction which should come upon them immediately after my father left Jerusalem;"},{"time":197.12,"text":"18. Nevertheless, they hardened their hearts and, according to my prophecy, they have been destroyed, save it be those which are carried away captive into Babylon."},{"time":207.8,"text":"19. And now this I speak because of the Spirit which is in me;"},{"time":212.48,"text":"20. And notwithstanding that they have been carried away, they shall return again and possess the Land of Jerusalem; Wherefore, they shall be restored again to the lands of their inheritance."},{"time":224.4,"text":"21. But behold, they shall have wars and rumors of wars; And when the day cometh that the Only Begotten of the Father, yea, even the Father of heaven and of earth, shall manifest Himself unto them in the flesh, Behold, they will reject Him because of priestcrafts and the hardness of their hearts and the stiffness of their necks -"},{"time":243,"text":"22. Behold, they will crucify Him. And after that He is laid in a sepulcher for the space of three days, He shall rise from the dead with healing in His wings; And all they that shall believe on His name shall be saved in the kingdom of God;"},{"time":259.8,"text":"23. Wherefore, my soul delighteth to prophesy concerning Him, For I have seen His day and my heart doth magnify His holy name."},{"time":268.76,"text":"24. And behold, it shall come to pass that after the Messiah hath risen from the dead and hath manifested Himself unto His people, unto as many as will believe on His name, Behold, Jerusalem shall be destroyed again, For wo unto them that fight against God and the people of His church!"},{"time":285.6,"text":"25. Wherefore, the Jews shall be scattered among all nations, Yea, and also Babylon shall be destroyed; Wherefore, the Jews shall be scattered by other nations,"},{"time":297.96,"text":"26. And after that they have been scattered and the Lord God hath scourged them by other nations for the space of many generations - Yea, even down from generation to generation until they shall be persuaded to believe in Christ, the Son of God, and the atonement, which is infinite for all mankind -"},{"time":316.28,"text":"27. And when that day shall come that they shall believe in Christ, And worship the Father in His name, with pure hearts and clean hands, And look not forward anymore for another Messiah - And then at that time, the day will come that it must needs be expedient that they should believe these things."},{"time":334.64,"text":"28. And the Lord will set His hand again the second time to restore His people from their lost and fallen state;"},{"time":341.15999999999997,"text":"29. Wherefore, He will proceed to do a marvelous work and a wonder among the children of men."},{"time":347.6,"text":"30. Wherefore, He shall bring forth His words unto them, which words shall judge them at the last day,"},{"time":354.026,"text":"31. For they shall be given them for the purpose of convincing them of the true Messiah who was rejected by them,"},{"time":362.4,"text":"32. And unto the convincing of them that they need not look forward anymore for a Messiah to come,"},{"time":368.76,"text":"33. For there should not any come, save it should be a false messiah which should deceive the people;"},{"time":375.08,"text":"34. For there is save one Messiah spoken of by the prophets, And that Messiah is He which should be rejected of the Jews,"},{"time":383.04,"text":"35. For according to the words of the prophets, the Messiah cometh in six hundred years from the time that my father left Jerusalem;"},{"time":391.88,"text":"36. And according to the words of the prophets, and also the word of the angel of God, His name should be Jesus Christ, the Son of God."},{"time":401.24,"text":"37. And now my brethren, I have spoken plain that ye cannot err;"},{"time":406.84000000000003,"text":"38. And as the Lord God liveth that brought Israel up out of the Land of Egypt, And gave unto Moses power that he should heal the nations, that after that they had been bitten by the poisonous serpents, if they would cast their eyes unto the serpent which he did raise up before them, And also gave him power that he should smite the rock and the water should come forth,"},{"time":426,"text":"39. Yea, behold I say unto you that as these things are true, And as the Lord God liveth, There is none other name given under heaven, save it be this Jesus Christ of which I have spoken, whereby man can be saved."},{"time":440.6,"text":"40. Wherefore, for this cause hath the Lord God promised unto me that these things which I write shall be kept and preserved and handed down unto my seed from generation to generation: That the promise may be fulfilled unto Joseph that his seed should never perish as long as the earth should stand."},{"time":457.52,"text":"41. Wherefore, these things shall go from generation to generation as long as the earth shall stand; And they shall go according to the will and pleasure of God;"},{"time":468.32,"text":"42. And the nations which shall possess them shall be judged of them, according to the words which are written;"},{"time":475.08,"text":"43. For we labor diligently to write, to persuade our children and also our brethren to believe in Christ and to be reconciled to God,"},{"time":483.68,"text":"44. For we know that it is by grace that we are saved, after all that we can do."},{"time":489.84,"text":"45. And notwithstanding we believe in Christ, We keep the law of Moses and look forward with steadfastness unto Christ until the law shall be fulfilled, For, for this end was the law given;"},{"time":502.44,"text":"46. Wherefore, the law hath become dead unto us, And we are made alive in Christ because of our faith;"},{"time":509.8,"text":"47. Yet we keep the law because of the commandments;"},{"time":513.68,"text":"48. And we talk of Christ, We rejoice in Christ, We preach of Christ, We prophesy of Christ, And we write according to our prophecies, that our children may know to what source they may look for a remission of their sins."},{"time":527.08,"text":"49. Wherefore, we speak concerning the law, that our children may know the deadness of the law;"},{"time":533.96,"text":"50. And they, by knowing the deadness of the law, may look forward unto that life which is in Christ and know for what end the law was given;"},{"time":542.96,"text":"51. And after that the law is fulfilled in Christ, that they need not harden their hearts against Him when the law had ought to be done away."},{"time":551.48,"text":"52. And now behold, my people, ye are a stiff-necked people; Wherefore, I have spoken plain unto you, that ye cannot misunderstand;"},{"time":561.44,"text":"53. And the words which I have spoken shall stand as a testimony against you, For they are sufficient to teach any man the right way;"},{"time":569.72,"text":"54. For the right way is to believe in Christ and deny Him not, For by denying Him ye also deny the prophets and the law."},{"time":578.08,"text":"55. And now behold, I say unto you that the right way is to believe in Christ and deny Him not; And Christ is the Holy One of Israel."},{"time":586.76,"text":"56. Wherefore, ye must bow down before Him and worship Him with all your might, mind and strength and your whole soul; And if ye do this, ye shall in no wise be cast out;"},{"time":589.21,"text":"57. And inasmuch as it shall be expedient, ye must keep the performances and ordinances of God until the law shall be fulfilled which was given unto Moses."},{"time":609.12,"text":"58. And after that Christ shall have risen from the dead, He shall show Himself unto you, my children and my beloved brethren,"},{"time":617.84,"text":"59. And the words which He shall speak unto you shall be the law which ye shall do."},{"time":623.48,"text":"60. For behold, I say unto you that I have beheld that many generations shall pass away; And there shall be great wars and contentions among my people."},{"time":633.8,"text":"61. And after that the Messiah shall come, there shall be signs given unto my people of His birth, and also of His death and resurrection;"},{"time":642.64,"text":"62. And great and terrible shall that day be unto the wicked, for they shall perish;"},{"time":648.4,"text":"63. And they perish because they cast out the prophets and the saints and stone them and slay them;"},{"time":654.6,"text":"64. Wherefore, the cry of the blood of the saints shall ascend up to God from the ground against them."},{"time":660.56,"text":"65. Wherefore, all they that are proud and that do wickedly, the day that cometh shall burn them up, saith the Lord of Hosts, for they shall be as stubble;"},{"time":671.44,"text":"66. And they that kill the prophets and the saints, the depths of the earth shall swallow them up, saith the Lord of Hosts;"},{"time":679.56,"text":"67. And mountains shall cover them, And whirlwinds shall carry them away, And buildings shall fall upon them and crush them to pieces and grind them to powder;"},{"time":689.56,"text":"68. And they shall be visited with thunderings and lightnings and earthquakes and all manner of destructions;"},{"time":696.36,"text":"69. For the fire of the anger of the Lord shall be kindled against them and they shall be as stubble; And the day that cometh shall consume them, saith the Lord of Hosts."},{"time":706.36,"text":"70. O, the pain and the anguish of my soul for the loss of the slain of my people!"},{"time":712.64,"text":"71. For I, Nephi, hath seen it; And it well nigh consumeth me before the presence of the Lord, But I must cry unto my God, Thy ways are just!"},{"time":723.36,"text":"72. But behold the righteous that hearken unto the words of the prophets and destroy them not, but look forward unto Christ with steadfastness for the signs which are given, notwithstanding all persecutions - Behold, they are they which shall not perish;"},{"time":738.32,"text":"73. But the Son of Righteousness shall appear unto them and He shall heal them; And they shall have peace with Him until three generations shall have passed away, And many of the fourth generation shall have passed away in righteousness."},{"time":751.68,"text":"74. And when these things shall have passed away, a speedy destruction cometh unto my people, For notwithstanding the pains of my soul, I have seen it; Wherefore, I know that it shall come to pass;"},{"time":764.64,"text":"75. And they sell themselves for naught, For, for the reward of their pride and their foolishness, they shall reap destruction;"},{"time":773.08,"text":"76. For because they yieldeth unto the devil and choose works of darkness rather than light, therefore, they must go down to hell. For the Spirit of the Lord will not always strive with man;"},{"time":785.6,"text":"77. And when the Spirit ceaseth to strive with man, then cometh speedy destruction; And this grieveth my soul."},{"time":793.6,"text":"78. And as I spake concerning the convincing of the Jews that Jesus is the very Christ, It must needs be that the Gentiles be convinced also that Jesus is the Christ, the Eternal God, And that He manifesteth Himself unto all they that believe in Him by the power of the Holy Ghost,"},{"time":810.28,"text":"79. Yea, unto every nation, kindred, tongue and people, working mighty miracles, signs and wonders among the children of men according to their faith."},{"time":821.56,"text":"80. But behold, I prophesy unto you concerning the last days, Concerning the days when the Lord God shall bring these things forth unto the children of men,"},{"time":832.32,"text":"81. After that my seed and the seed of my brethren shall have dwindled in unbelief and shall have been smitten by the Gentiles,"},{"time":839.48,"text":"82. Yea, after that the Lord God shall have camped against them round about and shall have laid siege against them with a mount and raised forts against them;"},{"time":849.68,"text":"83. And after that they shall have been brought down low in the dust, even that they are not, Yet the words of the righteous shall be written, And the prayers of the faithful shall be heard, And all they which have dwindled in unbelief shall not be forgotten."},{"time":864.2,"text":"84. For they which shall be destroyed shall speak unto them out of the ground, And their speech shall be low, out of the dust, And their voice shall be as one that hath a familiar spirit,"},{"time":875.24,"text":"85. For the Lord God will give unto him power that he may whisper concerning them, even as it were out of the ground; And their speech shall whisper out of the dust."},{"time":884.96,"text":"86. For thus saith the Lord God: They shall write the things which shall be done among them, And they shall be written and sealed up in a book; And they that have dwindled in unbelief shall not have them, for they seek to destroy the things of God;"},{"time":897.88,"text":"87. Wherefore, as they which have been destroyed have been destroyed speedily, And the multitude of their terrible ones shall be as chaff that passeth away,"},{"time":907.72,"text":"88. Yea, thus saith the Lord God, it shall be at an instant, suddenly!"},{"time":912.949,"text":"89. And it shall come to pass that they which have dwindled in unbelief shall be smitten by the hand of the Gentiles;"},{"time":921.4,"text":"90. And the Gentiles are lifted up in the pride of their eyes and have stumbled because of the greatness of their stumbling block, that they have built up many churches;"},{"time":931.36,"text":"91. Nevertheless, they put down the power and the miracles of God, And preach up unto themselves their own wisdom and their own learning, that they may get gain and grind upon the face of the poor;"},{"time":943.08,"text":"92. And there are many churches built up which causeth envyings and strifes and malice;"},{"time":949.44,"text":"93. And there are also secret combinations, even as in times of old, according to the combinations of the devil; For he is the founder of all these things, yea, the founder of murder and works of darkness,"},{"time":962.32,"text":"94. Yea, and he leadeth them by the neck with a flaxen cord until he bindeth them with his strong cords forever."},{"time":970.92,"text":"95. For behold, my beloved brethren, I say unto you that the Lord God worketh not in darkness;"},{"time":978.2,"text":"96. He doeth not anything, save it be for the benefit of the world, For He loveth the world, even that He layeth down His own life that He may draw all men unto Him;"},{"time":988.88,"text":"97. Wherefore, He commandeth none that they shall not partake of His salvation."},{"time":994.56,"text":"98. Behold, doth He cry unto any, saying, Depart from Me?"},{"time":1000.28,"text":"99. Behold I say unto you, Nay! But He saith: Come unto Me, all ye ends of the earth, Buy milk and honey without money and without price."},{"time":1011.32,"text":"100. Behold, hath He commanded any that they should depart out of the synagogues, or out of the houses of worship?"},{"time":1019.36,"text":"101. Behold I say unto you, Nay!"},{"time":1022.32,"text":"102. Hath He commanded any that they should not partake of His salvation?"},{"time":1028.24,"text":"103. Behold I say unto you, Nay! But He hath given it free for all men; And He hath commanded His people that they should persuade all men unto repentance."},{"time":1039.04,"text":"104. Behold, hath the Lord commanded any that they should not partake of His goodness?"},{"time":1045.76,"text":"105. Behold I say unto you, Nay! But all men are privileged, the one like unto the other, And none are forbidden."},{"time":1054.88,"text":"106. He commandeth that there shall be no priestcrafts; For behold, priestcrafts are that men preach and set themselves up for a light unto the world, that they may get gain and praise of the world, But they seek not the welfare of Zion."},{"time":1068.28,"text":"107. Behold, the Lord hath forbidden this thing! Wherefore, the Lord God hath given a commandment that all men should have charity, which charity is love;"},{"time":1078.914,"text":"108. And except they should have charity, they were nothing; Wherefore, if they should have charity, they would not suffer the laborer in Zion to perish;"},{"time":1089.76,"text":"109. But the laborer in Zion shall labor for Zion, for if they labor for money they shall perish."},{"time":1096.4,"text":"110. And again, the Lord God hath commanded that men should not murder, That they should not lie, That they should not steal, That they should not take the name of the Lord their God in vain, That they should not envy, That they should not have malice, That they should not contend one with another, That they should not commit whoredoms, And that they should not do any of these things;"},{"time":1117.36,"text":"111. For whoso doeth them shall perish. For none of these iniquities come of the Lord, for He doeth that which is good among the children of men;"},{"time":1127.52,"text":"112. And He doeth nothing save it be plain unto the children of men;"},{"time":1132.56,"text":"113. And He inviteth them all to come unto Him and partake of His goodness;"},{"time":1137.8,"text":"114. And He denieth none that come unto Him - black and white, bond and free, male and female;"},{"time":1145.08,"text":"115. And He remembereth the heathen; And all are alike unto God - both Jew and Gentile."},{"time":1151.56,"text":"116. But behold, in the last days, or in the days of the Gentiles, Yea, behold, all the nations of the Gentiles, and also the Jews - Both they which shall come upon this land, And they which shall be upon other lands, yea, even upon all the lands of the earth - Behold, they will be drunken with iniquity and all manner of abominations."},{"time":1174.24,"text":"117. And when that day shall come, they shall be visited of the Lord of Hosts, With thunder and with earthquake, and with a great noise, and with storm and tempest, and with the flame of devouring fire;"},{"time":1187.32,"text":"118. And all the nations that fight against Zion and that distress her shall be as a dream of a night vision;"},{"time":1193.44,"text":"119. Yea, it shall be unto them even as unto a hungry man which dreameth, And behold - he eateth, But he awaketh, and his soul is empty;"},{"time":1204.2,"text":"120. Or like unto a thirsty man which dreameth, And behold - he drinketh, But he awaketh, And behold, he is faint, and his soul hath appetite; But he awaketh,"},{"time":1215.52,"text":"121. Yea, even so shall the multitude of all the nations be that fight against Mount Zion."},{"time":1222.84,"text":"122. For behold, all ye that do iniquity, stay yourselves and wonder; For ye shall cry out and cry, Yea, ye shall be drunken, but not with wine; Ye shall stagger, but not with strong drink."},{"time":1236.84,"text":"123. For behold, the Lord hath poured out upon you the spirit of deep sleep,"},{"time":1242.48,"text":"124. For behold, ye have closed your eyes; And ye have rejected the prophets, And your rulers and the seers hath He covered because of your iniquity."},{"time":1252.16,"text":"125. And it shall come to pass that the Lord God shall bring forth unto you the words of a book; And they shall be the words of them which have slumbered;"},{"time":1261.12,"text":"126. And behold, the book shall be sealed; And in the book shall be a revelation from God, from the beginning of the world to the ending thereof."},{"time":1269.96,"text":"127. Wherefore, because of the things which are sealed up, the things which are sealed shall not be delivered in the day of the wickedness and abominations of the people;"},{"time":1279.64,"text":"128. Wherefore, the book shall be kept from them;"},{"time":1284.16,"text":"129. But the book shall be delivered unto a man, And he shall deliver the words of the book, which are the words of they which have slumbered in the dust, And he shall deliver these words unto another; But the words which are sealed he shall not deliver, Neither shall he deliver the book."},{"time":1299.92,"text":"130. For the book shall be sealed by the power of God; And the revelation which was sealed shall be kept in the book until the own due time of the Lord, that they may come forth; For behold, they reveal all things from the foundation of the world unto the end thereof."},{"time":1314.92,"text":"131. And the day cometh that the words of the book which were sealed shall be read upon the housetops; And they shall be read by the power of Christ;"},{"time":1323.193,"text":"132. And all things shall be revealed unto the children of men which ever hath been among the children of men, and which ever will be, Even unto the end of the earth."},{"time":1333.64,"text":"133. Wherefore, at that day when the book shall be delivered unto the man of whom I have spoken, The book shall be hid from the eyes of the world that the eyes of none shall behold it, Save it be that three witnesses shall behold it by the power of God, besides him to whom the book shall be delivered, And they shall testify to the truth of the book and the things therein;"},{"time":1354.36,"text":"134. And there is none other which shall view it, Save it be a few according to the will of God, to bear testimony of His word unto the children of men; For the Lord God hath said that the words of the faithful should speak as if it were from the dead."},{"time":1368.84,"text":"135. Wherefore, the Lord God will proceed to bring forth the words of the book; And in the mouth of as many witnesses as seemeth Him good will He establish His word; And wo be unto him that rejecteth the word of God!"},{"time":1382.2,"text":"136. But behold, it shall come to pass that the Lord God shall say unto him to whom He shall deliver the book, Take these words which are not sealed and deliver them to another, That he may show them unto the learned, saying, Read this, I pray thee."},{"time":1397.72,"text":"137. And the learned shall say: Bring hither the book and I will read them."},{"time":1403.24,"text":"138. And now, because of the glory of the world and to get gain, will they say this, And not for the glory of God."},{"time":1411.48,"text":"139. And the man shall say: I cannot bring the book, for it is sealed."},{"time":1417.16,"text":"140. Then shall the learned say: I cannot read it."},{"time":1421.32,"text":"141. Wherefore, it shall come to pass that the Lord God will deliver again the book and the words thereof to him that is not learned; And the man that is not learned shall say: I am not learned."},{"time":1433.08,"text":"142. Then shall the Lord God say unto him: The learned shall not read them, for they have rejected them, And I am able to do Mine own work; Wherefore, thou shalt read the words which I shall give unto thee;"},{"time":1446.44,"text":"143. Touch not the things which are sealed, For I will bring them forth in Mine own due time, For I will show unto the children of men that I am able to do Mine own work."},{"time":1457.16,"text":"144. Wherefore, when thou hast read the words which I have commanded thee and obtained the witnesses which I have promised unto thee, Then shalt thou seal up the book again and hide it up unto Me, that I may preserve the words which thou hast not read until I shall see fit in Mine own wisdom to reveal all things unto the children of men."},{"time":1476.92,"text":"145. For behold, I Am God and I Am a God of miracles; And I will show unto the world that I Am the same yesterday, today and forever; And I work not among the children of men, save it be according to their faith."},{"time":1490.84,"text":"146. And again, it shall come to pass that the Lord shall say unto him that shall read the words that shall be delivered him: Forasmuch as this people draw near unto Me with their mouth and with their lips do honor Me, But have removed their heart far from Me and their fear toward Me is taught by the precept of men, Therefore, I will proceed to do a marvelous work among this people,"},{"time":1512.28,"text":"147. Yea, a marvelous work and a wonder; For the wisdom of their wise and learned shall perish, And the understanding of their prudent shall be hid."},{"time":1522.12,"text":"148. But wo unto them that seek deep to hide their counsel from the Lord!"},{"time":1527.08,"text":"149. And their works are in the dark and they say, Who seeth us? and Who knoweth us?"},{"time":1533.96,"text":"150. And they also say, Surely your turning of things upside down shall be esteemed as the potter's clay."},{"time":1541.08,"text":"151. But behold, I will show unto them, saith the Lord of Hosts, that I know all their works;"},{"time":1548.2,"text":"152. For shall the work say of him that made it, He made me not?"},{"time":1552.92,"text":"153. Or shall the thing framed say of him that framed it, He had no understanding?"},{"time":1558.92,"text":"154. But behold, saith the Lord of Hosts, I will show unto the children of men that it is not yet a very little while and Lebanon shall be turned into a fruitful field; And the fruitful field shall be esteemed as a forest."},{"time":1572.68,"text":"155. And in that day shall the deaf hear the words of the book, And the eyes of the blind shall see out of obscurity and out of darkness."},{"time":1575.748,"text":"156. And the meek also shall increase and their joy shall be in the Lord, And the poor among men shall rejoice in the Holy One of Israel."},{"time":1589.88,"text":"157. For assuredly as the Lord liveth, they shall see that the terrible one is brought to naught, and the scorner is consumed, and all that watch for iniquity are cut off, and they that make a man an offender for a word, and lay a snare for him that reproveth in the gate, and turn aside the just for a thing of naught."},{"time":1608.44,"text":"158. Therefore, thus saith the Lord, who redeemed Abraham, concerning the house of Jacob: Jacob shall not now be ashamed, Neither shall his face now wax pale;"},{"time":1620.12,"text":"159. But when he seeth his children, the work of My hands, in the midst of him, They shall sanctify My name, and sanctify the Holy One of Jacob, and shall fear the God of Israel;"},{"time":1632.36,"text":"160. They also that erred in spirit shall come to understanding, And they that murmured shall learn doctrine."}]
};
</script>

</body>
</html>
