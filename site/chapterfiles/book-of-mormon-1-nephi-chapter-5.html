<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "1 Nephi",
  chapter: "Chapter 5",
  audioSrc: "https://archive.org/download/1-nephi-ch-5/1%20Nephi%20Ch%205.mp3",
  lyrics: [{"time":0,"text":"First Nephi, Chapter 5"},{"time":3.2,"text":"1. And now it came to pass that after I, Nephi, had made an end of speaking to my brethren, behold, they said unto me: \"Thou hast declared unto us hard things, more than that which we are able to bear.\""},{"time":17.44,"text":"2. And it came to pass that I said unto them that I knew that I had spoken hard things against the wicked, according to the truth; And the righteous have I justified and testified that they should be lifted up at the last day; Wherefore, the guilty taketh the truth to be hard, for it cutteth them to the very center."},{"time":35.48,"text":"3. \"And now my brethren, if ye were righteous, and were willing to hearken to the truth, and give heed unto it, that ye might walk uprightly before God, Then ye would not murmur because of the truth and say, 'Thou speakest hard things against us.'\""},{"time":50.52,"text":"4. And it came to pass that I, Nephi, did exhort my brethren with all diligence to keep the commandments of the Lord."},{"time":58.84,"text":"5. And it came to pass that they did humble themselves before the Lord insomuch that I had joy and great hopes of them, that they would walk in the paths of righteousness;"},{"time":68.76,"text":"6. Now all these things were said and done as my father dwelt in a tent in the valley which he called Lemuel."},{"time":76.12,"text":"7. And it came to pass that I, Nephi, took one of the daughters of Ishmael to wife, And also my brethren took of the daughters of Ishmael to wife, And also Zoram took the eldest daughter of Ishmael to wife."},{"time":89.28,"text":"8. And thus my father had fulfilled all the commandments of the Lord which had been given unto him;"},{"time":96.12,"text":"9. And also, I, Nephi, had been blessed of the Lord exceedingly."},{"time":102.16,"text":"10. And it came to pass that the voice of the Lord spake unto my father by night and commanded him that on the morrow he should take his journey into the wilderness."},{"time":111.47999999999999,"text":"11. And it came to pass that as my father arose in the morning and went forth to the tent door, and to his great astonishment he beheld upon the ground a round ball of curious workmanship and it was of fine brass;"},{"time":124.68,"text":"12. And within the ball were two spindles, And the one pointed the way whither we should go into the wilderness."},{"time":132.12,"text":"13. And it came to pass that we did gather together whatsoever things we should carry into the wilderness and all the remainder of our provisions which the Lord had given unto us;"},{"time":142.44,"text":"14. And we did take seed of every kind that we might carry into the wilderness."},{"time":147.76,"text":"15. And it came to pass that we did take our tents and departed into the wilderness across the River Laman."},{"time":154.48,"text":"16. And it came to pass that we traveled for the space of four days nearly a south, southeast direction; And we did pitch our tents again; And we did call the name of the place Shazer."},{"time":165.84,"text":"17. And it came to pass that we did take our bows and our arrows and go forth into the wilderness to slay food for our families; And after that we had slain food for our families, we did return again to our families in the wilderness to the Place of Shazer;"},{"time":180.96,"text":"18. And we did go forth again in the wilderness following the same direction, keeping in the most fertile parts of the wilderness which were in the borders near the Red Sea."},{"time":191.16,"text":"19. And it came to pass that we did travel for the space of many days, slaying food by the way with our bows and our arrows and our stones and our slings."},{"time":201.36,"text":"20. And we did follow the directions of the ball which led us in the more fertile parts of the wilderness."},{"time":207.88,"text":"21. And after that we had traveled for the space of many days, we did pitch our tents for the space of a time, that we might again rest ourselves and obtain food for our families."},{"time":218.92000000000002,"text":"22. And it came to pass that as I, Nephi, went forth to slay food, behold, I did break my bow which was made of fine steel; And after that I did break my bow, behold, my brethren were angry with me because of the loss of my bow, for we did obtain no food."},{"time":237.28,"text":"23. And it came to pass that we did return without food to our families;"},{"time":242.68,"text":"24. And being much fatigued because of their journeying, they did suffer much for the want of food."},{"time":249.32,"text":"25. And it came to pass that Laman and Lemuel and the sons of Ishmael did begin to murmur exceedingly because of their sufferings and afflictions in the wilderness, And also my father began to murmur against the Lord his God; Yea, and they were all exceeding sorrowful, even that they did murmur against the Lord."},{"time":267.44,"text":"26. Now it came to pass that I, Nephi, having been afflicted with my brethren because of the loss of my bow and their bows having lost their springs, it began to be exceeding difficult, Yea, insomuch that we could obtain no food."},{"time":282.08,"text":"27. And it came to pass that I, Nephi, did speak much unto my brethren because that they had hardened their hearts again, even unto complaining against the Lord their God."},{"time":292.76,"text":"28. And it came to pass that I, Nephi, did make out of wood a bow and out of a straight stick an arrow; Wherefore, I did arm myself with a bow and an arrow, with a sling and with stones;"},{"time":305.16,"text":"29. And I said unto my father: \"Whither shall I go to obtain food?\""},{"time":310.4,"text":"30. And it came to pass that he did inquire of the Lord, for they had humbled themselves because of my words, for I did say many things unto them in the energy of my soul."},{"time":321,"text":"31. And it came to pass that the voice of the Lord came unto my father, And he was truly chastened because of his murmurings against the Lord insomuch that he was brought down into the depths of sorrow."},{"time":332.56,"text":"32. And it came to pass that the voice of the Lord said unto him: \"Look upon the ball and behold the things which are written!\""},{"time":340.2,"text":"33. And it came to pass that when my father beheld the things which were written upon the ball, he did fear and tremble exceedingly, And also my brethren and the sons of Ishmael and our wives."},{"time":352.44,"text":"34. And it came to pass that I, Nephi, beheld that the pointers which were in the ball, that they did work according to the faith and diligence and heed which we did give unto them."},{"time":363.28,"text":"35. And there was also written upon them a new writing which was plain to be read, which did give us understanding concerning the ways of the Lord; And it was written and changed from time to time according to the faith and diligence which we gave unto it."},{"time":373.38,"text":"36. And thus we see that by small means the Lord can bring about great things."},{"time":383.48,"text":"37. And it came to pass that I, Nephi, did go forth up into the top of the mountain according to the directions which were given upon the ball."},{"time":392.4,"text":"38. And it came to pass that I did slay wild beasts insomuch that I did obtain food for our families."},{"time":399.52,"text":"39. And it came to pass that I did return to our tents bearing the beasts which I had slain;"},{"time":405.84000000000003,"text":"40. And now when they beheld that I had obtained food, how great was their joy."},{"time":411.88,"text":"41. And it came to pass that they did humble themselves before the Lord and did give thanks unto Him."},{"time":418.48,"text":"42. And it came to pass that we did again take our journey, traveling nearly the same course as in the beginning;"},{"time":425.6,"text":"43. And after that we had traveled for the space of many days we did pitch our tents again, that we might tarry for the space of a time."},{"time":433.88,"text":"44. And it came to pass that Ishmael died and was buried in the place which was called Nahom."},{"time":439.84,"text":"45. And it came to pass that the daughters of Ishmael did mourn exceedingly because of the loss of their father and because of their afflictions in the wilderness;"},{"time":448.76,"text":"46. And they did murmur against my father because that he had brought them out of the Land of Jerusalem, saying: \"Our father is dead, yea, and we have wandered much in the wilderness, And we have suffered much affliction, hunger, thirst and fatigue; And after all these sufferings we must perish in the wilderness with hunger.\""},{"time":468.15999999999997,"text":"47. And thus they did murmur against my father, and also against me, And they were desirous to return again to Jerusalem."},{"time":470.72,"text":"48. And Laman saith unto Lemuel, and also unto the sons of Ishmael: \"Behold, let us slay our father, and also our brother Nephi who hath taken it upon him to be our ruler and our teacher, who are his elder brethren."},{"time":490.88,"text":"49. Now he saith that the Lord hath talked with him, and also that angels hath ministered unto him!"},{"time":497.88,"text":"50. But behold, we know that he lieth unto us and he telleth us these things; And he worketh many things by his cunning arts, that he may deceive our eyes, thinking perhaps that he may lead us away into some strange wilderness;"},{"time":512.28,"text":"51. And after that he hath led us away, he hath thought to make himself a king and a ruler over us, that he may do with us according to his will and pleasure.\""},{"time":521.94,"text":"52. And after this manner did my brother Laman stir up their hearts to anger."},{"time":527.48,"text":"53. And it came to pass that the Lord was with us; Yea, even the voice of the Lord came and did speak many words unto them and did chasten them exceedingly;"},{"time":537.96,"text":"54. And after that they were chastened by the voice of the Lord, they did turn away their anger and did repent of their sins insomuch that the Lord did bless us again with food, that we did not perish."},{"time":549.64,"text":"55. And it came to pass that we did again take our journey in the wilderness; And we did travel nearly eastward from that time forth;"},{"time":558.04,"text":"56. And we did travail and wade through much affliction in the wilderness; And our women bore children in the wilderness;"},{"time":565.72,"text":"57. And so great were the blessings of the Lord upon us that while we did live upon raw meat in the wilderness, our women did give plenty of suck for their children and were strong, yea, even like unto the men; And they began to bear their journeyings without murmuring."},{"time":581.14,"text":"58. And thus we see that the commandments of God must be fulfilled;"},{"time":586.26,"text":"59. And if it so be that the children of men keep the commandments of God, He doth nourish them and strengthen them and provide ways and means whereby they can accomplish the thing which He hath commanded them;"},{"time":598.18,"text":"60. Wherefore, He did provide ways and means for us while we did sojourn in the wilderness."},{"time":604.9,"text":"61. And we did sojourn for the space of many years, yea, even eight years in the wilderness."},{"time":612.02,"text":"62. And we did come to the land which we called Bountiful because of its much fruit, and also wild honey;"},{"time":619.14,"text":"63. And all these things were prepared of the Lord that we might not perish;"},{"time":624.38,"text":"64. And we beheld the sea which we called Irreantum, which being interpreted is \"many waters.\""},{"time":630.74,"text":"65. And it came to pass that we did pitch our tents by the seashore;"},{"time":635.58,"text":"66. And notwithstanding we had suffered many afflictions and much difficulty, yea, even so much that we cannot write them all, We were exceedingly rejoiced when we came to the seashore;"},{"time":647.38,"text":"67. And we called the place Bountiful because of its much fruit."},{"time":652.02,"text":"68. And it came to pass that after I, Nephi, had been in the Land Bountiful for the space of many days, the voice of the Lord came unto me, saying: \"Arise and get thee into the mountain.\""},{"time":664.42,"text":"69. And it came to pass that I arose and went up into the mountain and cried unto the Lord."},{"time":670.46,"text":"70. And it came to pass that the Lord spake unto me saying: \"Thou shalt construct a ship after the manner which I shall show thee, that I may carry thy people across these waters.\""},{"time":681.02,"text":"71. And I saith: \"Lord, whither shall I go that I may find ore to molten, that I may make tools to construct the ship after the manner which thou hast shown unto me?\""},{"time":691.9,"text":"72. And it came to pass that the Lord told me whither I should go to find ore that I might make tools."},{"time":698.62,"text":"73. And it came to pass that I, Nephi, did make bellows wherewith to blow the fire, of the skins of beasts;"},{"time":706.54,"text":"74. And after that I had made bellows that I might have wherewith to blow the fire, I did smite two stones together that I might make fire,"},{"time":715.26,"text":"75. For the Lord had not hitherto suffered that we should make much fire as we journeyed in the wilderness,"},{"time":721.86,"text":"76. For He saith: \"I will make that thy food shall become sweet, that ye cook it not;"},{"time":728.22,"text":"77. And I will also be your light in the wilderness;"},{"time":732.4,"text":"78. And I will prepare the way before you, if it so be that ye shall keep My commandments;"},{"time":737.76,"text":"79. Wherefore, inasmuch as ye shall keep My commandments ye shall be led toward the Promised Land, And ye shall know that it is by Me that ye are led.\""},{"time":747.68,"text":"80. Yea, and the Lord said also that, \"After ye have arrived to the Promised Land ye shall know that I, the Lord, am God,"},{"time":757.32,"text":"81. And that I, the Lord, did deliver you from destruction -"},{"time":761.84,"text":"82. Yea, that I did bring you out of the Land of Jerusalem.\""},{"time":767.44,"text":"83. Wherefore, I, Nephi, did strive to keep the commandments of the Lord, And I did exhort my brethren to faithfulness and diligence."},{"time":777.12,"text":"84. And it came to pass that I did make tools of the ore which I did molten out of the rock."},{"time":783.08,"text":"85. And when my brethren saw that I was about to build a ship, they began to murmur against me, saying:"},{"time":788.63,"text":"86. \"Our brother is a fool, for he thinketh that he can build a ship,"},{"time":794.72,"text":"87. Yea, and he also thinketh that he can cross these great waters.\""},{"time":800.92,"text":"88. And thus my brethren did complain against me and were desirous that they might not labor, for they did not believe that I could build a ship,"},{"time":810.04,"text":"89. Neither would they believe that I was instructed of the Lord."},{"time":814.24,"text":"90. And now it came to pass that I, Nephi, was exceeding sorrowful because of the hardness of their hearts;"},{"time":821.92,"text":"91. And now when they saw that I began to be sorrowful, they were glad in their hearts insomuch that they did rejoice over me, saying:"},{"time":829.235,"text":"92. \"We knew that ye could not construct a ship, for we knew that ye were lacking in judgment; Wherefore, thou canst not accomplish so great a work."},{"time":840.44,"text":"93. And thou art like unto our father, led away by the foolish imaginations of his heart;"},{"time":846.56,"text":"94. Yea, he hath led us out of the Land of Jerusalem and we have wandered in the wilderness for these many years,"},{"time":854.88,"text":"95. And our women have toiled, being big with child, And they have borne children in the wilderness and suffered all things, save it were death;"},{"time":864.16,"text":"96. And it would have been better that they had died before they came out of Jerusalem than to have suffered these afflictions."},{"time":870.68,"text":"97. Behold, these many years we have suffered in the wilderness, which time we might have enjoyed our possessions and the land of our inheritance, Yea, and we might have been happy."},{"time":883,"text":"98. And we know that the people which were in the Land of Jerusalem were a righteous people,"},{"time":888.64,"text":"99. For they keep the statutes and the judgments of the Lord and all His commandments according to the law of Moses, Wherefore, we know that they are a righteous people;"},{"time":898.92,"text":"100. And our father hath judged them and hath led us away because we would hearken unto his word;"},{"time":904.64,"text":"101. Yea, and our brother is like unto him.\""},{"time":909.2,"text":"102. And after this manner of language did my brethren murmur and complain against us."},{"time":915.12,"text":"103. And it came to pass that I, Nephi, spake unto them, saying: \"Do ye believe that our fathers, which were the children of Israel, would have been led away out of the hands of the Egyptians if they had not hearkened unto the words of the Lord?"},{"time":929.2,"text":"104. Yea, do ye suppose that they would have been led out of bondage if the Lord had not commanded Moses that he should lead them out of bondage?"},{"time":938.88,"text":"105. Now ye know that the children of Israel were in bondage; And ye know that they were laden with tasks which were grievous to be borne;"},{"time":947.28,"text":"106. Wherefore, ye know that it must needs be a good thing for them that they should be brought out of bondage."},{"time":954.48,"text":"107. Now ye know that Moses was commanded of the Lord to do that great work;"},{"time":960.28,"text":"108. And ye know that by his word the waters of the Red Sea were divided hither and thither and they passed through on dry ground."},{"time":968.4,"text":"109. But ye know that the Egyptians were drowned in the Red Sea, which were the armies of Pharaoh."},{"time":974.88,"text":"110. And ye also know that they were fed with manna in the wilderness."},{"time":978.88,"text":"111. Yea, and ye also know that Moses, by his word, according to the power of God which was in him, smote the rock and there came forth water that the children of Israel might quench their thirst."},{"time":992.2,"text":"112. And notwithstanding they being led - The Lord their God, their Redeemer, going before them, leading them by day, and giving light unto them by night, and doing all things for them which were expedient for man to receive - They hardened their hearts, and blinded their minds, and reviled against Moses, and against the true and living God."},{"time":1013.64,"text":"113. And it came to pass that according to His word He did destroy them;"},{"time":1018.56,"text":"114. And according to His word He did lead them;"},{"time":1022.4,"text":"115. And according to His word He did do all things for them;"},{"time":1026.8,"text":"116. And there was not anything done save it were by His word."},{"time":1031.24,"text":"117. And after they had crossed the River Jordan, He did make them mighty unto the driving out the children of the land, yea, unto the scattering them to destruction."},{"time":1041.36,"text":"118. And now do ye suppose that the children of this land - which were in the Land of Promise, which were driven out by our fathers - do ye suppose that they were righteous? Behold, I say unto you, Nay."},{"time":1055.52,"text":"119. Do ye suppose that our fathers would have been more choice than they, if they had been righteous?"},{"time":1060.72,"text":"120. I say unto you, Nay."},{"time":1064.48,"text":"121. Behold, the Lord esteemeth all flesh in one;"},{"time":1069.84,"text":"122. He that is righteous is favored of God;"},{"time":1073.48,"text":"123. But behold, this people had rejected every word of God, And they were ripe in iniquity, And the fullness of the wrath of God was upon them;"},{"time":1082.88,"text":"124. And the Lord did curse the land against them and bless it unto our fathers; Yea, He did curse it against them unto their destruction,"},{"time":1091.64,"text":"125. And He did bless it unto our fathers unto their obtaining power over it."},{"time":1096.2,"text":"126. Behold, the Lord hath created the earth, that it should be inhabited;"},{"time":1102.48,"text":"127. And He hath created His children, that they should possess it."},{"time":1107.28,"text":"128. And He raiseth up a righteous nation, And destroyeth the nations of the wicked."},{"time":1113.32,"text":"129. And He leadeth away the righteous into precious lands; And the wicked He destroyeth, And curseth the land unto them for their sakes."},{"time":1121.96,"text":"130. He ruleth high in the heavens, for it is His throne and this earth is His footstool."},{"time":1128.52,"text":"131. And He loveth them which will have Him to be their God;"},{"time":1131.88,"text":"132. Behold, He loved our fathers, And He covenanted with them, yea, even Abraham, Isaac and Jacob, And He remembered the covenants which He had made;"},{"time":1143.88,"text":"133. Wherefore, He did bring them out of the Land of Egypt. And He did straiten them in the wilderness with His rod, for they hardened their hearts even as ye have; And the Lord straitened them because of their iniquity;"},{"time":1158.08,"text":"134. He sent flying fiery serpents among them; And after they were bitten, He prepared a way that they might be healed;"},{"time":1166.04,"text":"135. And the labor which they had to perform was to look; And because of the simpleness of the way, or the easiness of it, there were many which perished."},{"time":1175.32,"text":"136. And they did harden their hearts from time to time, And they did revile against Moses and also against God;"},{"time":1182.12,"text":"137. Nevertheless, ye know that they were led forth by His matchless power into the Land of Promise."},{"time":1189.56,"text":"138. And now after all these things, the time has come that they have become wicked, yea, nearly unto ripeness;"},{"time":1197.8,"text":"139. And I know not but they are at this day about to be destroyed,"},{"time":1202.32,"text":"140. For I know that the day must surely come that they must be destroyed, save a few only which shall be led away into captivity."},{"time":1209.92,"text":"141. Wherefore, the Lord commanded my father that he should depart into the wilderness;"},{"time":1216.8,"text":"142. And the Jews also sought to take away his life, yea, and ye also have sought to take away his life;"},{"time":1224.08,"text":"143. Wherefore, ye are murderers in your hearts and ye are like unto them."},{"time":1229.12,"text":"144. Ye are swift to do iniquity, but slow to remember the Lord your God;"},{"time":1234.64,"text":"145. Ye have seen an angel and he spake unto you; Yea, ye have heard His voice from time to time,"},{"time":1242.08,"text":"146. And He hath spoken unto you in a still small voice, but ye were past feeling that ye could not feel His words;"},{"time":1250.24,"text":"147. Wherefore, He hath spoken unto you like unto the voice of thunder which did cause the earth to shake as if it were to divide asunder."},{"time":1258.8,"text":"148. And ye also know that by the power of His almighty word He can cause the earth that it shall pass away;"},{"time":1265.68,"text":"149. Yea, and ye know that by His word He can cause that rough places be made smooth and smooth places shall be broken up;"},{"time":1272.48,"text":"150. O then, why is it that ye can be so hard in your hearts?"},{"time":1279.28,"text":"151. Behold, my soul is rent with anguish because of you and my heart is pained; I fear lest ye shall be cast off forever;"},{"time":1287.68,"text":"152. Behold, I am full of the Spirit of God insomuch as if my frame had no strength.\""},{"time":1294.4,"text":"153. And now it came to pass that when I had spoken these words, they were angry with me and were desirous to throw me into the depths of the sea;"},{"time":1303.84,"text":"154. And as they came forth to lay their hands upon me, I spake unto them, saying: \"In the name of the Almighty God I command you that ye touch me not, for I am filled with the power of God even unto the consuming of my flesh;"},{"time":1318.08,"text":"155. And whoso shall lay their hands upon me shall wither even as a dried weed, And he shall be as naught before the power of God, for God shall smite him.\""},{"time":1327.76,"text":"156. And it came to pass that I, Nephi, saith unto them that they should murmur no more against their father, Neither should they withhold their labor from me, for God had commanded me that I should build a ship."},{"time":1340.72,"text":"157. And I saith unto them: \"If God had commanded me to do all things, I could do it;"},{"time":1347.04,"text":"158. If He should command me that I should say unto this water, 'Be thou earth!' - And it shall be earth; And if I should say it, it would be done."},{"time":1356.44,"text":"159. And now, if the Lord hath such great power and hath wrought so many miracles among the children of men, How is it that He cannot instruct me that I should build a ship?\""},{"time":1367.12,"text":"160. And it came to pass that I, Nephi, said many things unto my brethren insomuch that they were confounded and could not contend against me,"},{"time":1376.4,"text":"161. Neither durst they lay their hands upon me nor touch me with their fingers, even for the space of many days;"},{"time":1383.84,"text":"162. Now they durst not do this lest they should wither before me, so powerful was the Spirit of God; And thus it had wrought upon them."},{"time":1392.4,"text":"163. And it came to pass that the Lord said unto me: \"Stretch forth thine hand again unto thy brethren and they shall not wither before thee, but I will shock them,\" saith the Lord; \"And this will I do that they may know that I Am the Lord their God.\""},{"time":1406.76,"text":"164. And it came to pass that I stretched forth my hand unto my brethren and they did not wither before me, but the Lord did shake them even according to the word which He had spoken."},{"time":1417.64,"text":"165. And now they said: \"We know of a surety that the Lord is with thee, for we know that it is the power of the Lord that hath shaken us.\""},{"time":1426.56,"text":"166. And they fell down before me and were about to worship me, but I would not suffer them, saying: \"I am thy brother, yea, even thy younger brother;"},{"time":1436.04,"text":"167. Wherefore, worship the Lord thy God and honor thy father and thy mother, that thy days may be long in the land which the Lord thy God shall give thee.\""},{"time":1446.16,"text":"168. And it came to pass that they did worship the Lord and did go forth with me; And we did work timbers of curious workmanship,"},{"time":1454.84,"text":"169. And the Lord did show me from time to time after what manner I should work the timbers of the ship."},{"time":1461.2,"text":"170. Now I, Nephi, did not work the timbers after the manner which was learned by men, Neither did I build the ship after the manner of man,"},{"time":1470.6,"text":"171. But I did build it after the manner which the Lord had shown unto me; Wherefore, it was not after the manner of men."},{"time":1478.52,"text":"172. And I, Nephi, did go into the mount oft and I did pray oft unto the Lord; Wherefore, the Lord showed unto me great things."},{"time":1488.02,"text":"173. And it came to pass that after I had finished the ship according to the word of the Lord, my brethren beheld that it was good and that the workmanship thereof was exceeding fine;"},{"time":1497.92,"text":"174. Wherefore, they did humble themselves again before the Lord."},{"time":1503.48,"text":"175. And it came to pass that the voice of the Lord came unto my father, that we should arise and go down into the ship."},{"time":1510.96,"text":"176. And it came to pass that on the morrow, after that we had prepared all things - much fruits and meat from the wilderness and honey in abundance and provisions according to that which the Lord had commanded us -"},{"time":1523.12,"text":"177. We did go down into the ship with all our loading and our seeds and whatsoever thing we had brought with us, every one according to his age;"},{"time":1532.16,"text":"178. Wherefore, we did all go down into the ship with our wives and our children."},{"time":1538.24,"text":"179. And now my father had begat two sons in the wilderness; The elder was called Jacob and the younger Joseph."},{"time":1546.48,"text":"180. And it came to pass that after we had all gone down into the ship and had taken with us our provisions and things which had been commanded us,"},{"time":1555.04,"text":"181. We did put forth into the sea and were driven forth before the wind toward the Promised Land."},{"time":1561.84,"text":"182. And after that we had been driven forth before the wind for the space of many days, Behold, my brethren and the sons of Ishmael, and also their wives, began to make themselves merry insomuch that they began to dance and to sing and to speak with much rudeness,"},{"time":1577.48,"text":"183. Yea, even that they did forget by what power they had been brought thither -"},{"time":1583,"text":"184. Yea, they were lifted up unto exceeding rudeness."},{"time":1588.32,"text":"185. And I, Nephi, began to fear exceedingly lest the Lord should be angry with us and smite us because of our iniquity, that we should be swallowed up in the depths of the sea;"},{"time":1599.48,"text":"186. Wherefore, I, Nephi, began to speak to them with much soberness;"},{"time":1605.64,"text":"187. But behold, they were angry with me, saying: \"We will not that our younger brother shall be a ruler over us.\""},{"time":1613.6,"text":"188. And it came to pass that Laman and Lemuel did take me and bind me with cords, And they did treat me with much harshness;"},{"time":1621.24,"text":"189. Nevertheless, the Lord suffered it that He might show forth His power unto the fulfilling of His word which He hath spoken concerning the wicked."},{"time":1630.92,"text":"190. And it came to pass that after they had bound me insomuch that I could not move, the compass which had been prepared of the Lord did cease to work;"},{"time":1639.72,"text":"191. Wherefore, they knew not whither they should steer the ship, insomuch that there arose a great storm, yea, a great and terrible tempest;"},{"time":1649.72,"text":"192. And we were driven back upon the waters for the space of three days;"},{"time":1654.88,"text":"193. And they began to be frightened exceedingly lest they should be drowned in the sea,"},{"time":1659.72,"text":"194. Nevertheless, they did loose me not."},{"time":1664.08,"text":"195. And on the fourth day which we had been driven back, the tempest began to be exceeding sore,"},{"time":1670.8,"text":"196. And it came to pass that we were about to be swallowed up in the depths of the sea."},{"time":1676.36,"text":"197. And after that we had been driven back upon the waters for the space of four days, my brethren began to see that the judgments of God were upon them and that they must perish save that they should repent of their iniquities;"},{"time":1688.72,"text":"198. Wherefore, they came unto me and loosed the bands which were upon my wrists; And behold, they had much swollen exceedingly, And also mine ankles were much swollen, and great was the soreness thereof;"},{"time":1702.56,"text":"199. Nevertheless, I did look unto my God and I did praise Him all the day long, And I did not murmur against the Lord because of mine afflictions."},{"time":1711.92,"text":"200. Now my father Lehi had said many things unto them, and also unto the sons of Ishmael, But behold, they did breathe out much threatenings against anyone that should speak for me;"},{"time":1723.4,"text":"201. And my parents, being stricken in years and having suffered much grief because of their children, they were brought down, yea, even upon their sickbeds;"},{"time":1734,"text":"202. Because of their grief and much sorrow and the iniquity of my brethren, they were brought near even to be carried out of this time to meet their God;"},{"time":1742.52,"text":"203. Yea, their grey hairs were about to be brought down to lie low in the dust,"},{"time":1748.44,"text":"204. Yea, even they were near to be cast with sorrow into a watery grave."},{"time":1754.28,"text":"205. And Jacob and Joseph also being young, having need of much nourishment, were grieved because of the afflictions of their mother;"},{"time":1762.96,"text":"206. And also my wife with her tears and prayers, and also my children, did not soften the hearts of my brethren that they would loose me."},{"time":1772.12,"text":"207. And there was nothing, save it were the power of God which threatened them with destruction, could soften their hearts;"},{"time":1779.64,"text":"208. Wherefore, when they saw that they were about to be swallowed up in the depths of the sea, they repented of the thing which they had done insomuch that they loosed me."},{"time":1789.8,"text":"209. And it came to pass that after they had loosed me, behold, I took the compass and it did work whither I desired it;"},{"time":1797.8,"text":"210. And it came to pass that I prayed unto the Lord; And after that I had prayed, the winds did cease and the storm did cease, And there was a great calm."},{"time":1808,"text":"211. And it came to pass that I, Nephi, did guide the ship, that we sailed again toward the Promised Land."},{"time":1815.6,"text":"212. And it came to pass that after we had sailed for the space of many days, we did arrive to the Promised Land;"},{"time":1823.04,"text":"213. And we went forth upon the land and did pitch our tents, And we did call it the Promised Land."},{"time":1830.24,"text":"214. And it came to pass that we did begin to till the earth and we began to plant seeds, Yea, we did put all our seeds into the earth which we had brought from the Land of Jerusalem."},{"time":1841.72,"text":"215. And it came to pass that they did grow exceedingly; Wherefore, we were blessed in abundance."},{"time":1848.32,"text":"216. And it came to pass that we did find upon the Land of Promise, as we journeyed in the wilderness, That there were beasts in the forests of every kind - both the cow and the ox, and the ass and the horse, and the goat and the wild goat, And all manner of wild animals which were for the use of men;"},{"time":1866.2,"text":"217. And we did find all manner of ore - both of gold, and of silver, and of copper."},{"time":1872.8,"text":"218. And it came to pass that the Lord commanded me, wherefore I did make plates of ore, that I might engraven upon them the record of my people;"},{"time":1881.9,"text":"219. And upon the plates which I made I did engraven the record of my father, and also our journeyings in the wilderness and the prophecies of my father; And also many of mine own prophecies have I engraven upon them."},{"time":1894.84,"text":"220. And I knew not at that time when I made them that I should be commanded of the Lord to make these plates;"},{"time":1900.92,"text":"221. Wherefore, the record of my father and the genealogy of his forefathers and the more part of all our proceedings in the wilderness are engraven upon those first plates of which I have spoken;"},{"time":1912.76,"text":"222. Wherefore, the things which transpired before that I made these plates are, of a truth, more particularly made mention upon the first plates."},{"time":1923.28,"text":"223. And after that I made these plates by way of commandment, I, Nephi, received a commandment that the ministry and the prophecies - the more plain and precious parts of them - should be written upon these plates;"},{"time":1936.52,"text":"224. And that the things which were written should be kept for the instruction of my people which should possess the land, And also for other wise purposes, which purposes are known unto the Lord."},{"time":1947.16,"text":"225. Wherefore, I, Nephi, did make a record upon the other plates which gives an account, or which gives a greater account, of the wars and contentions and destructions of my people;"},{"time":1959.84,"text":"226. And now this have I done and commanded my people that they should do after that I was gone, And that these plates should be handed down from one generation to another, or from one prophet to another, until further commandments of the Lord."},{"time":1974.32,"text":"227. And an account of my making these plates shall be given hereafter;"},{"time":1979.32,"text":"228. And then behold, I proceed according to that which I have spoken; And this I do that the more sacred things may be kept for the knowledge of my people."},{"time":1989.08,"text":"229. Nevertheless, I do not write anything upon plates save it be that I think it be sacred;"},{"time":1995.44,"text":"230. And now if I do err, even did they err of old -"},{"time":2000.2,"text":"231. Not that I would excuse myself because of other men, But because of the weakness which is in me according to the flesh, I would excuse myself."},{"time":2009.2,"text":"232. For the things which some men esteem to be of great worth, both to the body and soul, others set at naught and trample under their feet;"},{"time":2018.24,"text":"233. Yea, even the very God of Israel do men trample under their feet;"},{"time":2024.04,"text":"234. I say trample under their feet, but I would speak in other words -"},{"time":2029.48,"text":"235. They do set Him at naught and hearken not to the voice of His counsels."},{"time":2034.76,"text":"236. And behold, He cometh, according to the words of the angel, in six hundred years from the time my father left Jerusalem."},{"time":2043.96,"text":"237. And the world, because of their iniquity, shall judge Him to be a thing of naught; Wherefore, they scourge Him, and He suffereth it; And they smite Him, and He suffereth it;"},{"time":2055.04,"text":"238. Yea, they spit upon Him, and He suffereth it - Because of His loving-kindness and His long-suffering toward the children of men."},{"time":2064.08,"text":"239. And the God of our fathers, which were led out of Egypt out of bondage, and also were preserved in the wilderness by Him,"},{"time":2072.2,"text":"240. Yea, the God of Abraham and of Isaac and the God of Jacob yieldeth Himself, according to the words of the angel, as a man into the hands of wicked men, To be lifted up, according to the words of Zenoch,"},{"time":2085.92,"text":"241. And to be crucified, according to the words of Neum,"},{"time":2090.88,"text":"242. And to be buried in a sepulcher, according to the words of Zenos which he spake concerning the three days of darkness,"},{"time":2094.734,"text":"243. Which should be a sign given of His death unto them who should inhabit the isles of the sea,"},{"time":2105.24,"text":"244. More especially given unto them which are of the house of Israel."},{"time":2109.88,"text":"245. For thus spake the prophet: \"The Lord God surely shall visit all the house of Israel at that day -"},{"time":2116.72,"text":"246. Some with His voice, because of their righteousness, unto their great joy and salvation,"},{"time":2123.24,"text":"247. And others with the thunderings and the lightnings of His power - by tempest, by fire, and by smoke and vapor of darkness, and by the opening of the earth, and by mountains which shall be carried up."},{"time":2136.04,"text":"248. And all these things must surely come,\" saith the prophet Zenos;"},{"time":2141.36,"text":"249. And the rocks of the earth must rend;"},{"time":2144.76,"text":"250. And because of the groanings of the earth, many of the kings of the isles of the sea shall be wrought upon by the Spirit of God to exclaim, 'The God of nature suffers!'"},{"time":2154.6,"text":"251. And as for they which are at Jerusalem,\" saith the prophet, \"they shall be scourged by all people,\" saith the prophet, \"because they crucified the God of Israel and turned their hearts aside, rejecting signs and wonders and power and glory of the God of Israel."},{"time":2170.72,"text":"252. And because they have turned their hearts aside,\" saith the prophet, \"and have despised the Holy One of Israel, they shall wander in the flesh and perish, And become a hiss and a byword and be hated among all nations."},{"time":2184,"text":"253. Nevertheless, when that day cometh,\" saith the prophet, \"that they no more turn aside their hearts against the Holy One of Israel, Then will He remember the covenants which He made to their fathers;"},{"time":2195.96,"text":"254. Yea, then will He remember the isles of the sea;"},{"time":2200.68,"text":"255. 'Yea, and all the people which are of the house of Israel will I gather in,' saith the Lord, according to the words of the prophet Zenos, 'from the four quarters of the earth.'"},{"time":2211.88,"text":"256. Yea, and all the earth shall see the salvation of the Lord,\" saith the prophet;"},{"time":2218.96,"text":"257. Every nation, kindred, tongue and people shall be blessed.\""},{"time":2224.16,"text":"258. And I, Nephi, have written these things unto my people that perhaps I might persuade them that they would remember the Lord their Redeemer."},{"time":2233.16,"text":"259. Wherefore, I speak unto all the house of Israel, if it so be that they should obtain these things."},{"time":2240.56,"text":"260. For behold, I have workings in the Spirit which doth weary me, even that all my joints are weak for they which are at Jerusalem;"},{"time":2249.4,"text":"261. For hast not the Lord been merciful to show unto me concerning them, even as He hast prophets of old?"},{"time":2256.72,"text":"262. For He surely did show unto prophets of old all things concerning them,"},{"time":2262.2,"text":"263. And also He did show unto many concerning us;"},{"time":2265.8,"text":"264. Wherefore, it must needs be that we know concerning them, for they are written upon the plates of brass."}]
};
