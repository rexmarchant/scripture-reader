  lyrics: [{"time":0,"text":"Second Nephi, Chapter 13"},{"time":2.307,"text":"1. And now I, Nephi, make an end of my prophesying unto you, my beloved brethren;"},{"time":10.96,"text":"2. And I cannot write but a few things which I know must surely come to pass, Neither can I write but a few of the words of my brother Jacob."},{"time":20.08,"text":"3. Wherefore, the things which I have written sufficeth me, save it be a few words which I must speak concerning the doctrine of Christ; Wherefore, I shall speak unto you plainly, according to the plainness of my prophesying,"},{"time":33.781,"text":"4. For my soul delighteth in plainness, for after this manner doth the Lord God work among the children of men."},{"time":41.44,"text":"5. For the Lord God giveth light unto the understanding, for He speaketh unto men according to their language unto their understanding;"},{"time":50.56,"text":"6. Wherefore, I would that ye should remember that I have spoken unto you concerning that prophet which the Lord showed unto me that should baptize the Lamb of God, which should take away the sin of the world."},{"time":61.929,"text":"7. And now if the Lamb of God, He being holy, should have need to be baptized by water to fulfill all righteousness, O then, how much more need have we, being unholy, to be baptized, yea, even by water!"},{"time":77.52,"text":"8. And now I would ask of you, my beloved brethren, wherein the Lamb of God did fulfill all righteousness in being baptized by water - Know ye not that He was holy?"},{"time":88.64,"text":"9. But notwithstanding He being holy, He showeth unto the children of men that according to the flesh He humbleth Himself before the Father, And witnesseth unto the Father that He would be obedient unto Him in keeping His commandments;"},{"time":101.84,"text":"10. Wherefore, after that He was baptized with water, the Holy Ghost descended upon Him in the form of a dove."},{"time":110,"text":"11. And again, it showeth unto the children of men the straitness of the path and the narrowness of the gate by which they should enter, He having set the example before them;"},{"time":119.83500000000001,"text":"12. And He saith unto the children of men: Follow thou Me."},{"time":124.132,"text":"13. Wherefore my beloved brethren, can we follow Jesus save we shall be willing to keep the commandments of the Father?"},{"time":132.96,"text":"14. And the Father saith: Repent ye! Repent ye! And be baptized in the name of My beloved Son!"},{"time":141.04,"text":"15. And also the voice of the Son came unto me, saying: He that is baptized in My name, To him will the Father give the Holy Ghost, like unto Me; Wherefore, follow Me and do the things which ye have seen Me do."},{"time":156.4,"text":"16. Wherefore my beloved brethren, I know that if ye shall follow the Son with full purpose of heart, Acting no hypocrisy and no deception before God, but with real intent, repenting of your sins, Witnessing unto the Father that ye are willing to take upon you the name of Christ by baptism, Yea, by following your Lord and Savior down into the water according to His word, Behold, then shall ye receive the Holy Ghost;"},{"time":180.596,"text":"17. Yea, then cometh the baptism of fire and of the Holy Ghost, And then can ye speak with the tongue of angels and shout praises unto the Holy One of Israel."},{"time":190.615,"text":"18. But behold, my beloved brethren, thus came the voice of the Son unto me, saying: After that ye have repented of your sins, And witnessed unto the Father that ye are willing to keep My commandments by the baptism of water, And have received the baptism of fire and of the Holy Ghost, And can speak with a new tongue, yea, even with the tongue of angels - And after this should deny Me, It would have been better for you that ye had not known Me."},{"time":216.72,"text":"19. And I heard a voice from the Father, saying: Yea, the words of My Beloved are true and faithful;"},{"time":225.52,"text":"20. He that endureth to the end, the same shall be saved."},{"time":230.56,"text":"21. And now my beloved brethren, I know by this that unless a man shall endure to the end in following the example of the Son of the living God, he cannot be saved."},{"time":241.12,"text":"22. Wherefore, do the things which I have told you that I have seen that your Lord and your Redeemer should do;"},{"time":247.311,"text":"23. For, for this cause have they been shown unto me: That ye might know the gate by which ye should enter."},{"time":254.876,"text":"24. For the gate by which ye should enter is repentance and baptism by water, And then cometh a remission of your sins by fire and by the Holy Ghost,"},{"time":264.236,"text":"25. And then are ye in this strait and narrow path which leads to eternal life; Yea, ye have entered in by the gate, Ye have done according to the commandments of the Father and the Son,"},{"time":276.213,"text":"26. And ye have received the Holy Ghost which witnesses of the Father and the Son unto the fulfilling of the promise which He hath made, that if ye entered in by the way ye should receive."},{"time":286.508,"text":"27. And now my beloved brethren, after that ye have got into this strait and narrow path, I would ask if all is done."},{"time":295.98199999999997,"text":"28. Behold, I say unto you, Nay; For ye have not come thus far save it were by the word of Christ, with unshaken faith in Him, Relying wholly upon the merits of Him who is mighty to save."},{"time":309.387,"text":"29. Wherefore, ye must press forward with a steadfastness in Christ, Having a perfect brightness of hope and a love of God and of all men."},{"time":319.099,"text":"30. Wherefore, if ye shall press forward, feasting upon the word of Christ and endure to the end, Behold, thus saith the Father, ye shall have eternal life."},{"time":329.28,"text":"31. And now behold, my beloved brethren, this is the way, And there is none other way nor name given under heaven whereby man can be saved in the kingdom of God."},{"time":339.621,"text":"32. And now behold, this is the doctrine of Christ, And the only and true doctrine of the Father and of the Son and of the Holy Ghost, which is one God without end. Amen."}]
