  lyrics: [{"time":0,"text":"Second Nephi, Chapter 10"},{"time":2.32,"text":"1. The burden of Babylon which Isaiah, the son of Amoz, did see."},{"time":9.28,"text":"2. Lift ye up a banner upon the high mountain, Exalt the voice unto them, Shake the hand, that they may go into the gates of the nobles."},{"time":18.4,"text":"3. I have commanded My sanctified ones; I have also called My mighty ones, For Mine anger is not upon them that rejoice in My highness."},{"time":27.36,"text":"4. The noise of the multitude in the mountains, like as of a great people! A tumultuous noise of the kingdoms of nations gathered together! The Lord of Hosts mustereth the hosts of the battle."},{"time":42.48,"text":"5. They come from a far country, from the end of heaven - Yea, the Lord and the weapons of His indignation - To destroy the whole land."},{"time":52.48,"text":"6. Howl ye, for the day of the Lord is at hand! It shall come as a destruction from the Almighty."},{"time":60.72,"text":"7. Therefore shall all hands be faint; Every man's heart shall melt,"},{"time":66.64,"text":"8. And they shall be afraid. Pangs and sorrows shall take hold of them; They shall be amazed one at another; Their faces shall be as flames."},{"time":77.44,"text":"9. Behold, the day of the Lord cometh - cruel, both with wrath and fierce anger - to lay the land desolate; And He shall destroy the sinners thereof out of it."},{"time":88.96000000000001,"text":"10. For the stars of heaven and the constellations thereof shall not give their light; The sun shall be darkened in His going forth, And the moon shall not cause her light to shine."},{"time":100.24000000000001,"text":"11. And I will punish the world for evil and the wicked for their iniquity; I will cause the arrogancy of the proud to cease and will lay down the haughtiness of the terrible."},{"time":109.84,"text":"12. I will make a man more precious than fine gold, even a man than the golden wedge of Ophir."},{"time":116.8,"text":"13. Therefore I will shake the heavens and the earth shall remove out of her place in the wrath of the Lord of Hosts and in the day of His fierce anger."},{"time":126.32,"text":"14. And it shall be as the chased roe and as a sheep that no man taketh up; They shall every man turn to his own people and flee everyone into his own land."},{"time":135.04,"text":"15. Everyone that is proud shall be thrust through, Yea, and everyone that is joined to the wicked shall fall by the sword."},{"time":146.16,"text":"16. Their children also shall be dashed to pieces before their eyes; Their houses shall be spoiled and their wives ravished."},{"time":154.96,"text":"17. Behold, I will stir up the Medes against them which shall not regard silver and gold, nor they shall not delight in it."},{"time":162.72,"text":"18. Their bows shall also dash the young men to pieces, And they shall have no pity on the fruit of the womb - Their eyes shall not spare children."},{"time":172.07999999999998,"text":"19. And Babylon, the glory of kingdoms, the beauty of the Chaldee's excellency, shall be as when God overthrew Sodom and Gomorrah."},{"time":181.6,"text":"20. It shall never be inhabited, Neither shall it be dwelt in from generation to generation, Neither shall the Arabian pitch tent there, Neither shall the shepherds make their fold there."},{"time":194.96,"text":"21. But wild beasts of the desert shall lie there, And their houses shall be full of doleful creatures, And owls shall dwell there and satyrs shall dance there."},{"time":205.28,"text":"22. And the wild beasts of the islands shall cry in their desolate houses and dragons in their pleasant palaces. And her time is near to come and her day shall not be prolonged, for I will destroy her speedily; Yea, for I will be merciful unto My people; But the wicked shall perish."},{"time":224.48,"text":"23. For the Lord will have mercy on Jacob and will yet choose Israel and set them in their own land; And the strangers shall be joined with them, And they shall cleave to the house of Jacob."},{"time":236.32,"text":"24. And the people shall take them and bring them to their place, yea, from far unto the ends of the earth; And they shall return to their lands of promise; And the house of Israel shall possess them, And the land of the Lord shall be for servants and handmaids; And they shall take them captives unto whom they were captives; And they shall rule over their oppressors."},{"time":255.554,"text":"25. And it shall come to pass that in that day, that the Lord shall give thee rest from thy sorrow and from thy fear and from the hard bondage wherein thou wast made to serve."},{"time":266.4,"text":"26. And it shall come to pass in that day, that thou shalt take up this proverb against the king of Babylon and say: How hath the oppressor ceased - the golden city ceased!"},{"time":278.8,"text":"27. The Lord hath broken the staff of the wicked, the scepters of the rulers."},{"time":284.48,"text":"28. He who smote the people in wrath with a continual stroke - he that ruled the nations in anger - is persecuted and none hindereth."},{"time":293.84000000000003,"text":"29. The whole earth is at rest and is quiet; They break forth into singing."},{"time":298.88,"text":"30. Yea, the fir trees rejoice at thee, and also the cedars of Lebanon, saying, Since thou art laid down, No feller is come up against us."},{"time":309.84,"text":"31. Hell from beneath is moved for thee to meet thee at thy coming; It stirreth up the dead for thee, even all the chief ones of the earth; It hath raised up from their thrones all the kings of the nations."},{"time":322.64,"text":"32. All they shall speak and say unto thee: Art thou also become weak as we? Art thou become like unto us?"},{"time":332.4,"text":"33. Thy pomp is brought down to the grave; The noise of thy viols is not heard; The worm is spread under thee, And the worms cover thee."},{"time":342.08,"text":"34. How art thou fallen from heaven, O Lucifer, son of the morning! Art thou cut down to the ground, which did weaken the nations!"},{"time":352.56,"text":"35. For thou hast said in thy heart: I will ascend into heaven, I will exalt my throne above the stars of God; I will sit also upon the mount of the congregation, in the sides of the north;"},{"time":364.96,"text":"36. I will ascend above the heights of the clouds, I will be like the Most High."},{"time":370.88,"text":"37. Yet thou shalt be brought down to hell, to the sides of the pit."},{"time":376.48,"text":"38. They that see thee shall narrowly look upon thee and shall consider thee and shall say: Is this the man that made the earth to tremble? that did shake kingdoms?"},{"time":386.844,"text":"39. and made the world as a wilderness? and destroyed the cities thereof? and opened not the house of his prisoners?"},{"time":398.24,"text":"40. All the kings of the nations, yea, all of them, lie in glory, every one of them in his own house."},{"time":405.52,"text":"41. But thou art cast out of thy grave like an abominable branch, And the raiment of those that are slain, thrust through with a sword, That go down to the stones of the pit, as a carcass trodden under feet."},{"time":418.8,"text":"42. Thou shalt not be joined with them in burial, Because thou hast destroyed thy land and slain thy people. The seed of evildoers shall never be renowned."},{"time":430.08,"text":"43. Prepare slaughter for his children for the iniquities of their fathers, that they do not rise, Nor possess the land, Nor fill the face of the world with cities."},{"time":440.96,"text":"44. For I will rise up against them, saith the Lord of Hosts, And cut off from Babylon the name and remnant and son and nephew, saith the Lord."},{"time":450.8,"text":"45. I will also make it a possession for the bittern and pools of water; And I will sweep it with the besom of destruction, saith the Lord of Hosts."},{"time":459.44,"text":"46. The Lord of Hosts hath sworn, saying: Surely as I have thought, so shall it come to pass; And as I have purposed, so shall it stand:"},{"time":472.72,"text":"47. That I will bring the Assyrian in My land, And upon My mountains tread him underfoot. Then shall his yoke depart from off them, And his burden depart from off their shoulders."},{"time":484,"text":"48. This is the purpose that is purposed upon the whole earth, And this is the hand that is stretched out upon all nations."},{"time":492.32,"text":"49. For the Lord of Hosts hath purposed, And who shall disannul? And His hand stretched out, And who shall turn it back?"},{"time":501.76,"text":"50. In the year that King Ahaz died was this burden:"},{"time":506.72,"text":"51. Rejoice not thou, whole Palestina, because the rod of him that smote thee is broken; For out of the serpent's root shall come forth a cockatrice, And his fruit shall be a fiery flying serpent."},{"time":520.56,"text":"52. And the firstborn of the poor shall feed, And the needy shall lie down in safety; And I will kill thy root with famine, And he shall slay thy remnant."},{"time":533.12,"text":"53. Howl, O gate! Cry, O city! Thou, whole Palestina, art dissolved; For there shall come from the north a smoke, And none shall be alone in his appointed times."},{"time":545.68,"text":"54. What shall then answer the messengers of the nations? That the Lord hath founded Zion! And the poor of His people shall trust in it!"}]
