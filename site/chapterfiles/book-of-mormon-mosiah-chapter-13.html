<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "Mosiah",
  chapter: "Chapter 13",
  audioSrc: "https://archive.org/download/mosiah-ch-13/Mosiah%20Ch%2013.mp3",
  lyrics: [{"time":0.0,"text":"Mosiah Chapter 13"},{"time":1.333,"text":"1. And now, as I said unto you that after King Mosiah had done these things, he took the plates of brass and all the things which he had kept and conferred them upon Alma which was the son of Alma -"},{"time":15.12,"text":"2. Yea, all the records, and also the interpreters - And conferred them upon him and commanding him that he should keep and preserve them, and also keep a record of the people, Handing them down from one generation to another, even as they had been handed down from the time that Lehi left Jerusalem."},{"time":33.233,"text":"3. Now when Mosiah had done this, he sent out through all the land, among all the people, desiring to know their will concerning who should be their king."},{"time":44.64,"text":"4. And it came to pass that the voice of the people came, saying: \"We are desirous that Aaron, thy son, should be our king and our ruler.\""},{"time":53.621,"text":"5. Now Aaron had gone up to the Land of Nephi, therefore, the king could not confer the kingdom upon him, Neither would Aaron take upon him the kingdom;"},{"time":62.875,"text":"6. Neither were any of the sons of Mosiah willing to take upon them the kingdom; Therefore, King Mosiah sent again among the people, yea, even a written word sent he among the people."},{"time":75.84,"text":"7. And these were the words that were written, saying: \"Behold, O ye my people, or my brethren, for I esteem you as such, For I desire that ye should consider the cause which ye are called to consider, for ye are desirous to have a king;"},{"time":90.792,"text":"8. Now I declare unto you that he to whom that the kingdom doth rightly belong hath declined and will not take upon him the kingdom."},{"time":99.956,"text":"9. \"And now if there should be another appointed in his stead, behold, I fear there would rise contentions among you;"},{"time":108.48,"text":"10. And who knoweth but what my son, to whom the kingdom doth belong, should turn to be angry and draw away a part of this people after him, which would cause wars and contentions among you, which would be the cause of shedding much blood and perverting the way of the Lord, Yea, and destroy the souls of much people."},{"time":126.208,"text":"11. \"Now I say unto you, let us be wise and consider these things, for we have no right to destroy my son, Neither should we have any right to destroy another, if he should be appointed in his stead;"},{"time":139.024,"text":"12. And if my son should turn again to his pride and vain things, he would recall the things which he had said and claim his right to the kingdom, which would cause him and also this people to commit much sin."},{"time":151.474,"text":"13. \"And now, let us be wise and look forward to these things and do that which will make for the peace of this people;"},{"time":160.191,"text":"14. Therefore, I will be your king the remainder of my days;"},{"time":164.56,"text":"15. Nevertheless, let us appoint judges to judge this people according to our law; And we will newly arrange the affairs of this people, for we will appoint wise men to be judges that will judge this people according to the commandments of God."},{"time":179.2,"text":"16. \"Now it is better that a man should be judged of God than of man, for the judgments of God are always just, But the judgments of man are not always just;"},{"time":188.979,"text":"17. Therefore, if it were possible that ye could have just men to be your kings which would establish the laws of God and judge this people according to His commandments, Yea, if ye could have men for your kings which would do even as my father Benjamin did for this people, I say unto you, if this could always be the case, then it would be expedient that ye should always have kings to rule over you."},{"time":212.613,"text":"18. \"And even I, myself, have labored with all the power and faculties which I have possessed, to teach you the commandments of God and to establish peace throughout the land,"},{"time":223.228,"text":"19. That there should be no wars, nor contentions, no stealing, nor plundering, nor murdering, nor no manner of iniquity;"},{"time":232.629,"text":"20. And whosoever hath committed iniquity, him have I punished according to the crime which he hath committed, according to the law which hath been given to us by our fathers."},{"time":242.766,"text":"21. \"Now I say unto you that because all men are not just, it is not expedient that ye should have a king or kings to rule over you,"},{"time":252.459,"text":"22. For behold, how much iniquity doth one wicked king cause to be committed! Yea, and what great destruction!"},{"time":261.2,"text":"23. Yea, remember King Noah, his wickedness and his abominations, And also the wickedness and abominations of his people."},{"time":269.179,"text":"24. \"Behold, what great destruction did come upon them, And also because of their iniquities, they were brought into bondage;"},{"time":277.374,"text":"25. And were it not for the interposition of their all-wise Creator, and this because of their sincere repentance, they must unavoidably remain in bondage until now."},{"time":288.28,"text":"26. \"But behold, He did deliver them because they did humble themselves before Him; And because they cried mightily unto Him, He did deliver them out of bondage;"},{"time":299.6,"text":"27. And thus doth the Lord work with His power in all cases among the children of men, extending the arm of mercy toward them that put their trust in Him."},{"time":309.36,"text":"28. \"And behold now I say unto you, ye cannot dethrone an iniquitous king, save it be through much contention and the shedding of much blood;"},{"time":318.127,"text":"29. For behold, he hath his friends in iniquity and he keepeth his guards about him; And he teareth up the laws of those which have reigned in righteousness before him, And he trampleth under his feet the commandments of God,"},{"time":321.289,"text":"30. And he enacteth laws and sendeth them forth among his people, Yea, laws after the manner of his own wickedness; And whosoever doth not obey his laws, he causeth to be destroyed,"},{"time":344.48,"text":"31. And whosoever doth rebel against him, he will send his armies against them to war, and if he can, he will destroy them;"},{"time":352.472,"text":"32. And thus an unrighteous king doth pervert the ways of all righteousness."},{"time":357.115,"text":"33. \"And now behold I say unto you, it is not expedient that such abominations should come upon you;"},{"time":365.44,"text":"34. Therefore, choose you by the voice of this people, judges, that ye may be judged according to the laws which hath been given you by our fathers, which are correct, And which were given them by the hand of the Lord."},{"time":379.013,"text":"35. \"Now it is not common that the voice of the people desireth anything contrary to that which is right, But it is common for the lesser part of the people to desire that which is not right;"},{"time":389.716,"text":"36. Therefore, this shall ye observe, and make it your law to do your business by the voice of the people;"},{"time":396.824,"text":"37. And if the time cometh that the voice of the people doth choose iniquity, then is the time that the judgments of God will come upon you,"},{"time":405.132,"text":"38. Yea, then is the time He will visit you with great destruction, even as He hath hitherto visited this land."},{"time":413.44,"text":"39. \"And now if ye have judges, and they do not judge you according to the law which has been given, ye can cause that they may be judged of a higher judge;"},{"time":423.375,"text":"40. If your higher judges doth not judge righteous judgments, ye shall cause that a small number of your lower judges should be gathered together and they shall judge your higher judges, according to the voice of the people;"},{"time":435.954,"text":"41. And I command you to do these things in the fear of the Lord."},{"time":440.531,"text":"42. \"And I command you to do these things and that ye have no king, That if these people commit sins and iniquities, they shall be answered upon their own heads;"},{"time":451.2,"text":"43. For behold I say unto you, the sins of many people have been caused by the iniquities of their kings, Therefore, their iniquities are answered upon the heads of their kings."},{"time":462.16,"text":"44. \"And now I desire that this inequality should be no more in this land, especially among this my people;"},{"time":468.412,"text":"45. But I desire that this land be a land of liberty, And every man may enjoy his rights and privileges alike, so long as the Lord seeth fit that we may live and inherit the land,"},{"time":477.886,"text":"46. Yea, even as long as any of our posterity remaineth upon the face of the land.\""},{"time":487.36,"text":"47. And many more things did King Mosiah write unto them, unfolding unto them all the trials and troubles of a righteous king,"},{"time":496.16,"text":"48. Yea, all the travails of soul for their people, and also all the murmurings of the people to their king; And he explained it all unto them,"},{"time":504.96,"text":"49. And he told them that these things had not ought to be, But that the burden should come upon all the people, that every man might bear his part."},{"time":513.88,"text":"50. And he also unfolded unto them all the disadvantages they labored under by having an unrighteous king to rule over them -"},{"time":525.26,"text":"51. Yea, all his iniquities and abominations, And all the wars and contentions and bloodshed, And the stealing and the plundering, And the committing of whoredoms and all manner of iniquities which cannot be enumerated -"},{"time":536.64,"text":"52. Telling them that these things ought not to be, that they were expressly repugnant to the commandments of God."},{"time":542.72,"text":"53. And now it came to pass after King Mosiah had sent these things forth among the people, they were convinced of the truth of his words;"},{"time":553.3,"text":"54. Therefore, they relinquished their desires for a king and became exceedingly anxious that every man should have an equal chance throughout all the land,"},{"time":560.89,"text":"55. Yea, and every man expressed a willingness to answer for his own sins."},{"time":568.48,"text":"56. Therefore, it came to pass that they assembled themselves together in bodies throughout the land to cast in their voices concerning who should be their judges, to judge them according to the law which had been given them."},{"time":580.57,"text":"57. And they were exceedingly rejoiced because of the liberty which had been granted unto them,"},{"time":586.32,"text":"58. And they did wax strong in love toward Mosiah; Yea, they did esteem him more than any other man,"},{"time":593.253,"text":"59. For they did not look upon him as a tyrant who was seeking for gain, yea, for that lucre which doth corrupt the soul,"},{"time":601.742,"text":"60. For he had not exacted riches of them, neither had he delighted in the shedding of blood, But he had established peace in the land and he had granted unto his people that they should be delivered from all manner of bondage;"},{"time":616.0,"text":"61. Therefore, they did esteem him, yea, exceedingly beyond measure."},{"time":621.92,"text":"62. And it came to pass that they did appoint judges to rule over them, or to judge them according to the law; And this they did throughout all the land."},{"time":630.488,"text":"63. And it came to pass that Alma was appointed to be the chief judge, he being also the high priest, his father having conferred the office upon him and had given him the charge concerning all the affairs of the church."},{"time":644.48,"text":"64. And now it came to pass that Alma did walk in the ways of the Lord, And he did keep His commandments and he did judge righteous judgments; And there was continual peace through the land;"},{"time":655.18,"text":"65. And thus commenced the reign of the judges throughout all the Land of Zarahemla, among all the people which were called the Nephites; And Alma was the first and chief judge."},{"time":666.08,"text":"66. And now it came to pass that his father died, being eighty and two years old, having lived to fulfill the commandments of God."},{"time":673.737,"text":"67. And it came to pass that Mosiah died also, in the thirty and third year of his reign, being sixty and three years old, Making in the whole five hundred and nine years from the time Lehi left Jerusalem."},{"time":688.72,"text":"68. And thus ended the reign of the kings over the people of Nephi; And thus ended the days of Alma who was the founder of their church."}]
};
