window.CHAPTER_DATA = {

  audioSrc: "https://archive.org/download/omni-ch-1/Omni%20Ch%201.mp3",
  lyrics: [{"time":0.0,"text":"Omni Chapter 1"},{"time":1.384,"text":"1. Behold, it came to pass that I, Omni, being commanded by my father Jarom, that I should write somewhat upon these plates to preserve our genealogy,"},{"time":13.04,"text":"2. Wherefore in my days, I would that ye should know that I fought much with the sword to preserve my people the Nephites from falling into the hands of their enemies, the Lamanites."},{"time":23.68,"text":"3. But behold, I, of myself, am a wicked man and I have not kept the statutes and the commandments of the Lord as I ought to have done."},{"time":33.251,"text":"4. And it came to pass that two hundred and seventy and six years had passed away; And we had many seasons of peace, And we had many seasons of serious war and bloodshed,"},{"time":44.32,"text":"5. Yea, and in fine, two hundred and eighty and two years had passed away; And I had kept these plates according to the commandments of my fathers and I conferred them upon my son Amaron; And I make an end."},{"time":57.92,"text":"6. And now I, Amaron, write the things whatsoever I write, which are few, in the book of my father;"},{"time":66.08,"text":"7. Behold, it came to pass that three hundred and twenty years had passed away and the more wicked part of the Nephites were destroyed,"},{"time":73.411,"text":"8. For the Lord would not suffer - after He had led them out of the Land of Jerusalem and kept and preserved them from falling into the hands of their enemies - Yea, He would not suffer that the words should not be verified which He spake unto our fathers, saying that, \"Inasmuch as ye will not keep My commandments, ye shall not prosper in the land.\""},{"time":95.2,"text":"9. Wherefore, the Lord did visit them in great judgment; Nevertheless, He did spare the righteous, that they should not perish, but did deliver them out of the hands of their enemies."},{"time":105.52,"text":"10. And it came to pass that I did deliver the plates unto my brother Chemish."},{"time":112.0,"text":"11. Now I, Chemish, write what few things I write in the same book with my brother; For behold, I saw the last which he wrote, that he wrote it with his own hand, And he wrote it in the day that he delivered them unto me;"},{"time":125.36,"text":"12. And after this manner we keep the records, for it is according to the commandments of our fathers; And I make an end."},{"time":134.918,"text":"13. Behold, I, Abinadom, I am the son of Chemish;"},{"time":139.68,"text":"14. Behold, it came to pass that I saw much war and contention between my people the Nephites and the Lamanites;"},{"time":146.46,"text":"15. And I with mine own sword have taken the lives of many of the Lamanites in the defense of my brethren;"},{"time":153.96,"text":"16. And behold, the record of this people is engraven upon plates which is had by the kings, according to the generations;"},{"time":162.76,"text":"17. And I know of no revelation, save that which has been written, neither prophecy; Wherefore, that which is sufficient is written; And I make an end."},{"time":173.76,"text":"18. Behold, I am Amaleki, the son of Abinadom;"},{"time":178.293,"text":"19. Behold, I will speak unto you somewhat concerning Mosiah, which was made king over the Land of Zarahemla;"},{"time":186.108,"text":"20. For behold, he being warned of the Lord that he should flee out of the Land of Nephi, And as many as would hearken unto the voice of the Lord should also depart out of the land with him into the wilderness."},{"time":198.24,"text":"21. And it came to pass that he did according as the Lord had commanded him,"},{"time":203.36,"text":"22. And they departed out of the land into the wilderness, as many as would hearken unto the voice of the Lord; And they were led by many preachings and prophesyings,"},{"time":212.136,"text":"23. And they were admonished continually by the word of God; And they were led by the power of His arm through the wilderness, until they came down into the land which is called the Land of Zarahemla,"},{"time":224.464,"text":"24. And they discovered a people which were called the people of Zarahemla."},{"time":230.16,"text":"25. Now there was great rejoicing among the people of Zarahemla, And also Zarahemla did rejoice exceedingly because that the Lord had sent the people of Mosiah with the plates of brass which contained the record of the Jews."},{"time":242.776,"text":"26. Behold, it came to pass that Mosiah discovered that the people of Zarahemla came out from Jerusalem at the time that Zedekiah, king of Judah, was carried away captive into Babylon;"},{"time":254.028,"text":"27. And they journeyed in the wilderness and were brought by the hand of the Lord across the great waters into the land where Mosiah discovered them; And they had dwelt there from that time forth;"},{"time":265.511,"text":"28. And at the time that Mosiah discovered them, they had become exceeding numerous."},{"time":271.2,"text":"29. Nevertheless, they had had many wars and serious contentions and had fallen by the sword from time to time;"},{"time":277.728,"text":"30. And their language had become corrupted, And they had brought no records with them;"},{"time":283.539,"text":"31. And they denied the being of their Creator; And Mosiah, nor the people of Mosiah, could not understand them."},{"time":291.102,"text":"32. But it came to pass that Mosiah caused that they should be taught in his language."},{"time":298.404,"text":"33. And it came to pass that after they were taught in the language of Mosiah, Zarahemla gave a genealogy of his fathers according to his memory; And they are written, but not in these plates."},{"time":310.227,"text":"34. And it came to pass that the people of Zarahemla and of Mosiah did unite together, And Mosiah was appointed to be their king."},{"time":318.749,"text":"35. And it came to pass in the days of Mosiah there was a large stone brought unto him with engravings on it, And he did interpret the engravings by the gift and power of God;"},{"time":329.573,"text":"36. And they gave an account of one Coriantumr and the slain of his people;"},{"time":332.45,"text":"37. And Coriantumr was discovered by the people of Zarahemla, And he dwelt with them for the space of nine moons."},{"time":343.258,"text":"38. It also spake a few words concerning his fathers,"},{"time":346.551,"text":"39. And his first parents came out from the Tower at the time the Lord confounded the language of the people; And the severity of the Lord fell upon them according to His judgments which are just, And their bones lay scattered in the Land Northward."},{"time":362.74,"text":"40. Behold, I, Amaleki, was born in the days of Mosiah, And I have lived to see his death; And Benjamin his son reigneth in his stead."},{"time":371.872,"text":"41. And behold, I have seen in the days of King Benjamin a serious war and much bloodshed between the Nephites and the Lamanites;"},{"time":381.31,"text":"42. But behold, the Nephites did obtain much advantage over them, Yea, insomuch that King Benjamin did drive them out of the Land of Zarahemla."},{"time":392.4,"text":"43. And it came to pass that I began to be old; And having no seed and knowing King Benjamin to be a just man before the Lord, Wherefore, I shall deliver up these plates unto him, Exhorting all men to come unto God, the Holy One of Israel,"},{"time":407.769,"text":"44. And believe in prophesying, and in revelations, and in the ministering of angels, and in the gift of speaking with tongues, and in the gift of interpreting languages, and in all things which are good;"},{"time":420.72,"text":"45. For there is nothing which is good, save it comes from the Lord, And that which is evil cometh from the devil."},{"time":427.2,"text":"46. And now my beloved brethren, I would that ye should come unto Christ, which is the Holy One of Israel, and partake of His salvation and the power of His redemption;"},{"time":439.04,"text":"47. Yea, come unto Him, and offer your whole souls as an offering unto Him, and continue in fasting and praying, and endure to the end; And as the Lord liveth, ye will be saved."},{"time":451.6,"text":"48. And now I would speak somewhat concerning a certain number which went up into the wilderness to return to the Land of Nephi,"},{"time":458.897,"text":"49. For there was a large number which were desirous to possess the land of their inheritance; Wherefore, they went up into the wilderness;"},{"time":468.383,"text":"50. And their leader, being a strong and a mighty man and a stiff-necked man, wherefore, he caused a contention among them, And they were all slain, save fifty, in the wilderness; And they returned again to the Land of Zarahemla."},{"time":482.132,"text":"51. And it came to pass that they also took others, to a considerable number, and took their journey again into the wilderness;"},{"time":490.836,"text":"52. And I, Amaleki, had a brother which also went with them, and I have not since known concerning them."},{"time":498.32,"text":"53. And I am about to lay down in my grave; And these plates are full;"},{"time":503.683,"text":"54. And I make an end of my speaking."}]
