  lyrics: [{"time":0.0,"text":"Mosiah Chapter 10"},{"time":1.061,"text":"1. And now it came to pass that Ammon and King Limhi began to consult with the people, how they should deliver themselves out of bondage;"},{"time":10.151,"text":"2. And even they did cause that all the people should gather themselves together, And this they did that they might have the voice of the people concerning the matter."},{"time":18.987,"text":"3. And it came to pass that they could find no way to deliver themselves out of bondage, Except it were to take their women and children and their flocks and their herds and their tents and depart into the wilderness,"},{"time":32.448,"text":"4. For the Lamanites being so numerous, that it was impossible for the people of Limhi to contend with them, thinking to deliver themselves out of bondage by the sword."},{"time":41.936,"text":"5. Now it came to pass that Gideon went forth and stood before the king and said unto him: \"Now O king, thou hast hitherto hearkened unto my words many times when we have been contending with our brethren the Lamanites."},{"time":55.579,"text":"6. \"And now O king, if thou hast not found me to be an unprofitable servant, or if thou hast hitherto listened to my words in any degree and they have been of service to thee, Even so, I desire that thou wouldst listen to my words at this time, And I will be thy servant and deliver this people out of bondage.\""},{"time":76.072,"text":"7. And the king granted unto him that he may speak;"},{"time":79.617,"text":"8. And Gideon saith unto him: \"Behold the back pass through the back wall on the back side of the city;"},{"time":87.468,"text":"9. The Lamanites, or the guards of the Lamanites, by night are drunken; Therefore, let us send a proclamation among all this people that they gather together their flocks and herds, that they may drive them into the wilderness by night;"},{"time":102.471,"text":"10. And I will go, according to thy command, and pay the last tribute of wine to the Lamanites and they will be drunken, And we will pass through the secret pass on the left of their camp when they are drunken and asleep;"},{"time":115.52,"text":"11. And we will depart with our women and our children, our flocks and our herds into the wilderness, And we will travel around the Land of Shilom.\""},{"time":124.804,"text":"12. And it came to pass that the king hearkened unto the words of Gideon."},{"time":130.64,"text":"13. And it came to pass that King Limhi caused that his people should gather their flocks together; And he sent the tribute of wine to the Lamanites, and he also sent more wine as a present unto them, And they did drink freely of the wine which King Limhi did send unto them."},{"time":146.24,"text":"14. And it came to pass that the people of King Limhi did depart by night into the wilderness with their flocks and their herds, And they went round about the Land of Shilom in the wilderness and bent their course toward the Land of Zarahemla, being led by Ammon and his brethren;"},{"time":161.071,"text":"15. And they had taken all their gold and silver and their precious things which they could carry, and also their provisions, with them into the wilderness; And they pursued their journey."},{"time":171.864,"text":"16. And after being many days in the wilderness, they arrived in the Land of Zarahemla and joined his people and became his subjects."},{"time":181.12,"text":"17. And it came to pass that Mosiah received them with joy, And he also received their records, and also the records which had been found by the people of Limhi."},{"time":191.44,"text":"18. And now it came to pass when the Lamanites had found that the people of Limhi had departed out of the land by night, that they sent an army into the wilderness to pursue them;"},{"time":201.76,"text":"19. And after they had pursued them two days, they could no longer follow their tracks; Therefore, they were lost in the wilderness."}]
