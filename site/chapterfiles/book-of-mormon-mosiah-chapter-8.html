<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "Mosiah",
  chapter: "Chapter 8",
  audioSrc: "https://archive.org/download/mosiah-ch-8/Mosiah%20Ch%208.mp3",
  lyrics: [{"time":0.0,"text":"Mosiah Chapter 8"},{"time":1.12,"text":"1. And it came to pass that after Abinadi had made an end of these sayings, that he said unto them: \"Have ye taught this people that they should observe to do all these things, for to keep these commandments?"},{"time":13.94,"text":"2. I say unto you, nay, for if ye had, the Lord would not have caused me to come forth and to prophesy evil concerning this people."},{"time":24.16,"text":"3. \"And now ye have said that salvation cometh by the law of Moses;"},{"time":28.903,"text":"4. I say unto you that it is expedient that ye should keep the law of Moses as yet, But I say unto you that the time shall come when it shall no more be expedient to keep the law of Moses."},{"time":41.06,"text":"5. \"And moreover, I say unto you that salvation doth not come by the law alone; And were it not for the atonement which God Himself shall make for the sins and iniquities of His people, that they must unavoidably perish, notwithstanding the law of Moses."},{"time":57.76,"text":"6. \"And now I say unto you that it was expedient that there should be a law given to the children of Israel, yea, even a very strict law, For they were a stiff-necked people, quick to do iniquity and slow to remember the Lord their God;"},{"time":71.618,"text":"7. Therefore, there was a law given them, yea, a law of performances and ordinances, A law which they were to observe strictly from day to day to keep them in remembrance of God and their duty toward Him."},{"time":84.821,"text":"8. \"But behold, I say unto you that all these things were types of things to come."},{"time":91.44,"text":"9. \"And now, did they understand the law?"},{"time":94.8,"text":"10. I say unto you, nay, they did not all understand the law, and this because of the hardness of their hearts, For they understood not that there could not any man be saved, except it were through the redemption of God."},{"time":107.68,"text":"11. \"For behold, did not Moses prophesy unto them concerning the coming of the Messiah and that God should redeem His people? Yea, and even all the prophets which have prophesied ever since the world began,"},{"time":121.628,"text":"12. Have they not spoken more or less concerning these things?"},{"time":126.522,"text":"13. Have they not said that God Himself should come down among the children of men and take upon Him the form of man and go forth in mighty power upon the face of the earth?"},{"time":136.88,"text":"14. Yea, and have they not said also that He should bring to pass the resurrection of the dead and that He, Himself, should be oppressed and afflicted?"},{"time":147.04,"text":"15. Yea, even doth not Isaiah say:"},{"time":149.68,"text":"16. 'Who hath believed our report? And to whom is the arm of the Lord revealed?"},{"time":156.244,"text":"17. 'For He shall grow up before Him as a tender plant, and as a root out of dry ground. He hath no form nor comeliness; And when we shall see Him, There is no beauty that we should desire Him."},{"time":170.669,"text":"18. He is despised and rejected of men, A Man of sorrows and acquainted with grief. And we hid, as it were, our faces from Him; He was despised, and we esteemed Him not."},{"time":184.96,"text":"19. 'Surely He hath borne our griefs and carried our sorrows; Yet we did esteem Him stricken, smitten of God and afflicted."},{"time":192.7,"text":"20. But He was wounded for our transgressions, He was bruised for our iniquities; The chastisement of our peace was upon Him, And with His stripes we are healed."},{"time":203.421,"text":"21. 'All we like sheep have gone astray; We have turned, everyone, to his own way; And the Lord hath laid on Him the iniquities of us all."},{"time":213.76,"text":"22. 'He was oppressed and He was afflicted, Yet He opened not His mouth; He is brought as a lamb to the slaughter, And as a sheep before her shearers is dumb, so He opened not His mouth."},{"time":224.8,"text":"23. He was taken from prison and from judgment, And who shall declare His generation? For He was cut off out of the land of the living; For the transgressions of My people was He stricken."},{"time":236.734,"text":"24. And He made His grave with the wicked and with the rich in His death, Because He had done no evil, Neither was any deceit in His mouth."},{"time":246.0,"text":"25. 'Yet it pleased the Lord to bruise Him; He hath put Him to grief. When thou shalt make His soul an offering for sin, He shall see His seed, He shall prolong His days, And the pleasure of the Lord shall prosper in His hand."},{"time":259.712,"text":"26. He shall see of the travail of His soul and shall be satisfied; By His knowledge shall My righteous Servant justify many, For He shall bear their iniquities."},{"time":269.68,"text":"27. Therefore, will I divide Him a portion with the great, And He shall divide the spoil with the strong, Because He hath poured out His soul unto death, And He was numbered with the transgressors, And He bear the sins of many, And made intercession for the transgressors.'\""},{"time":285.52,"text":"28. And now Abinadi saith unto them: \"I would that ye should understand that God Himself shall come down among the children of men and shall redeem His people;"},{"time":295.12,"text":"29. And because He dwelleth in flesh, He shall be called the Son of God;"},{"time":300.046,"text":"30. And having subjected the flesh to the will of the Father, being the Father and the Son - The Father, because He was conceived by the power of God, and the Son, because of the flesh, thus becoming the Father and Son,"},{"time":313.471,"text":"31. And They are one God, yea, the Very Eternal Father of heaven and of earth -"},{"time":320.21,"text":"32. And thus the flesh becoming subject to the Spirit, or the Son to the Father, being one God, suffereth temptation and yieldeth not to the temptation, But suffereth Himself to be mocked and scourged and cast out and disowned by His people."},{"time":335.28,"text":"33. \"And after all this, and after working many mighty miracles among the children of men, He shall be led, yea, even as Isaiah said - ' As a sheep before the shearer is dumb, so He opened not His mouth ' -"},{"time":349.76,"text":"34. Yea, even so He shall be led, crucified and slain, the flesh becoming subject even unto death, The will of the Son being swallowed up in the will of the Father."},{"time":360.444,"text":"35. \"And thus God breaketh the bands of death, Having gained the victory over death, giving the Son power to make intercession for the children of men,"},{"time":370.66,"text":"36. Having ascended into heaven, Having the bowels of mercy being filled with compassion toward the children of men,"},{"time":378.08,"text":"37. standing betwixt them and justice, Having broken the bands of death, taken upon Himself their iniquity and their transgressions, Having redeemed them and satisfied the demands of justice."},{"time":390.24,"text":"38. \"And now I say unto you, who shall declare His generation?"},{"time":395.6,"text":"39. Behold, I say unto you that when His soul has been made an offering for sin, He shall see His seed."},{"time":402.915,"text":"40. \"And now, what say ye? And who shall be His seed?"},{"time":408.8,"text":"41. Behold, I say unto you that whosoever hath heard the words of the prophets, yea, all the holy prophets which have prophesied concerning the coming of the Lord -"},{"time":419.76,"text":"42. I say unto you, that all those who hath hearkened unto their words and believed that the Lord would redeem His people and have looked forward to that day for a remission of their sins -"},{"time":429.832,"text":"43. I say unto you, that these are His seed, or they are heirs of the kingdom of God,"},{"time":437.68,"text":"44. For these are they whose sins He hath borne; These are they for whom He hath died to redeem them from their transgressions;"},{"time":444.61,"text":"45. And now, are they not His seed?"},{"time":448.46,"text":"46. \"Yea, and are not the prophets, everyone that has opened his mouth to prophesy that has not fallen into transgression - I mean all the holy prophets ever since the world began -"},{"time":460.748,"text":"47. I say unto you that they are His seed. \"And these are they which hath published peace, That hath brought good tidings of good, That hath published salvation, That saith unto Zion, 'Thy God reigneth! '"},{"time":464.24,"text":"48. \"And, O how beautiful upon the mountains were their feet!"},{"time":479.05,"text":"49. \"And again, how beautiful upon the mountains are the feet of those that art still publishing peace!"},{"time":486.469,"text":"50. \"And again, how beautiful upon the mountains are the feet of those who shall hereafter publish peace, Yea, from this time henceforth and forever!"},{"time":495.16,"text":"51. \"And behold, I say unto you, this is not all - For O how beautiful upon the mountains are the feet of Him that bringeth good tidings, that is, the founder of peace!"},{"time":507.12,"text":"52. Yea, even the Lord who hath redeemed His people, Yea, Him who hath granted salvation unto His people;"},{"time":516.32,"text":"53. For were it not for the redemption which He hath made for His people, which was prepared from the foundation of the world, I say unto you, were it not for this, that all mankind must have perished."},{"time":527.213,"text":"54. \"But behold, the bands of death shall be broken; And the Son reigneth and hath power over the dead; Therefore, He bringeth to pass the resurrection of the dead."},{"time":538.92,"text":"55. \"And there cometh a resurrection, even a first resurrection; Yea, even a resurrection of those that have been, and which are, and which shall be, Even until the resurrection of Christ, for so shall He be called."},{"time":553.68,"text":"56. \"And now, the resurrection of all the prophets and all those that have believed in their words, or all those that have kept the commandments of God, These shall come forth in the first resurrection; Therefore, they are the first resurrection;"},{"time":566.763,"text":"57. They are raised to dwell with God who hath redeemed them, Thus they have eternal life through Christ who hath broken the bands of death."},{"time":575.444,"text":"58. \"And there are those who have part in the first resurrection; And these are they that have died before Christ came, in their ignorance, not having salvation declared unto them;"},{"time":587.6,"text":"59. And thus the Lord bringeth about the restoration of these; And they have a part in the first resurrection, or hath eternal life, being redeemed by the Lord."},{"time":597.35,"text":"60. \"And little children also hath eternal life."},{"time":600.738,"text":"61. \"But behold and fear and tremble before God, for ye had ought to tremble, For the Lord redeemeth none such that rebelleth against Him and dieth in their sins,"},{"time":612.24,"text":"62. Yea, even all those that have perished in their sins ever since the world began, that have willfully rebelled against God, that have known the commandments of God and would not keep them; These are they that have no part in the first resurrection."},{"time":625.543,"text":"63. \"Therefore, had ye not ought to tremble?"},{"time":629.623,"text":"64. For salvation cometh to none such, for the Lord hath redeemed none such;"},{"time":636.076,"text":"65. Yea, neither can the Lord redeem such, for He cannot deny Himself, For He cannot deny justice when it hath its claim."},{"time":644.812,"text":"66. \"And now I say unto you, that the time shall come that the salvation of the Lord shall be declared to every nation, kindred, tongue and people;"},{"time":653.72,"text":"67. Yea, Lord, 'Thy watchmen shall lift up their voice, With the voice together shall they sing; For they shall see eye to eye when the Lord shall bring again Zion."},{"time":665.68,"text":"68. Break forth into joy! Sing together, ye waste places of Jerusalem! For the Lord hath comforted His people, He hath redeemed Jerusalem."},{"time":675.28,"text":"69. The Lord hath made bare His holy arm in the eyes of all the nations, And all the ends of the earth shall see the salvation of our God! '\""},{"time":685.634,"text":"70. And now it came to pass that after Abinadi had spoken these words, he stretched forth his hands and said: \"The time shall come when all shall see the salvation of the Lord;"},{"time":697.129,"text":"71. When every nation, kindred, tongue and people shall see eye to eye, And shall confess before God that His judgments are just."},{"time":705.573,"text":"72. \"And then shall the wicked be cast out, And they shall have cause to howl and weep and wail and gnash their teeth,"},{"time":713.781,"text":"73. And this because they would not hearken unto the voice of the Lord; Therefore, the Lord redeemeth them not, for they are carnal and devilish; And the devil hath power over them,"},{"time":725.316,"text":"74. Yea, even that old serpent that did beguile our first parents, which was the cause of their fall,"},{"time":731.958,"text":"75. Which was the cause of all mankind becoming carnal, sensual, devilish, knowing evil from good, subjecting themselves to the devil;"},{"time":742.72,"text":"76. Thus all mankind were lost; And behold, they would have been endlessly lost were it not that God redeemed His people from their lost and fallen state."},{"time":751.48,"text":"77. \"But remember that he that persists in his own carnal nature and goes on in the ways of sin and rebellion against God, He remaineth in his fallen state and the devil hath all power over him;"},{"time":764.04,"text":"78. Therefore, he is as though there was no redemption made, being an enemy to God; And also is the devil an enemy to God."},{"time":773.273,"text":"79. \"And now, if Christ had not come into the world, speaking of things to come as though they had already come, there could have been no redemption;"},{"time":781.293,"text":"80. And if Christ had not risen from the dead, or have broken the bands of death that the grave should have no victory and that death should have no sting, there could have been no resurrection."},{"time":794.0,"text":"81. \"But there is a resurrection; Therefore, the grave hath no victory, And the sting of death is swallowed up in Christ."},{"time":801.272,"text":"82. \"He is the light and the life of the world; Yea, a light that is endless, that can never be darkened; Yea, and also a life which is endless, that there can be no more death."},{"time":814.08,"text":"83. \"Even this mortal shall put on immortality, And this corruption shall put on incorruption and shall be brought to stand before the bar of God, To be judged of Him according to their works, whether they be good or whether they be evil."},{"time":827.24,"text":"84. \"If they be good, to the resurrection of endless life and happiness; And if they be evil, to the resurrection of endless damnation,"},{"time":835.52,"text":"85. Being delivered up to the devil who hath subjected them, which is damnation,"},{"time":842.32,"text":"86. Having gone according to their own carnal wills and desires, Having never called upon the Lord while the arms of mercy were extended toward them;"},{"time":851.16,"text":"87. For the arms of mercy were extended toward them and they would not, They being warned of their iniquities and yet they would not depart from them,"},{"time":860.56,"text":"88. And they were commanded to repent and yet they would not repent."},{"time":864.0,"text":"89. \"And now, had ye not ought to tremble and repent of your sins? \"And remember, only in and through Christ ye can be saved;"},{"time":872.785,"text":"90. Therefore, if ye teach the law of Moses, also teach that it is a shadow of those things which are to come;"},{"time":881.44,"text":"91. Teach them that redemption cometh through Christ the Lord, which is the Very Eternal Father. Amen.\""}]
};
