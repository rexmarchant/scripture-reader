  lyrics: [{"time":0.0,"text":"Words of Mormon Chapter 1"},{"time":2.141,"text":"1. And now I, Mormon, being about to deliver up the record which I have been making into the hands of my son Moroni, Behold, I have witnessed almost all the destruction of my people, the Nephites,"},{"time":15.3,"text":"2. And it is many hundred years after the coming of Christ that I deliver these records into the hands of my son; And it supposeth me that he will witness the entire destruction of my people;"},{"time":26.856,"text":"3. But may God grant that he may survive them, that he may write somewhat concerning them and somewhat concerning Christ, that perhaps someday it may profit them."},{"time":36.75,"text":"4. And now I speak somewhat concerning that which I have written, For after that I had made an abridgment from the plates of Nephi down to the reign of this King Benjamin of which Amaleki spake,"},{"time":47.84,"text":"5. I searched among the records which had been delivered into my hands, And I found these plates which contained this small account of the prophets from Jacob down to the reign of this King Benjamin, and also many of the words of Nephi."},{"time":62.804,"text":"6. And the things which are upon these plates pleasing me because of the prophecies of the coming of Christ, And my fathers knowing that many of them have been fulfilled,"},{"time":73.398,"text":"7. Yea, and I also know that as many things as have been prophesied concerning us down to this day have been fulfilled, And as many as go beyond this day must surely come to pass -"},{"time":83.991,"text":"8. Wherefore, I chose these things to finish my record upon them, which remainder of my record I shall take from the plates of Nephi; And I cannot write a hundredth part of the things of my people."},{"time":96.052,"text":"9. But behold, I shall take these plates which contain these prophesyings and revelations and put them with the remainder of my record, For they are choice unto me and I know they will be choice unto my brethren;"},{"time":108.348,"text":"10. And I do this for a wise purpose, For thus it whispereth me according to the workings of the Spirit of the Lord which is in me."},{"time":116.282,"text":"11. And now I do not know all things, but the Lord knoweth all things which are to come, Wherefore, He worketh in me to do according to His will;"},{"time":126.691,"text":"12. And my prayer to God is concerning my brethren, that they may once again come to the knowledge of God, yea, the redemption of Christ, That they may once again be a delightsome people."},{"time":138.758,"text":"13. And now I, Mormon, proceed to finish out my record which I take from the plates of Nephi, And I make it according to the knowledge and the understanding which God hath given me."},{"time":149.72,"text":"14. Wherefore, it came to pass that after Amaleki had delivered up these plates into the hands of King Benjamin, He took them and put them with the other plates which contained records which had been handed down by the kings from generation to generation until the days of King Benjamin;"},{"time":165.812,"text":"15. And they were handed down from King Benjamin from generation to generation until they have fallen into my hands."},{"time":173.528,"text":"16. And I, Mormon, pray to God that they may be preserved from this time henceforth;"},{"time":179.609,"text":"17. And I know that they will be preserved, For there are great things written upon them out of which my people and their brethren shall be judged at the great and last day, according to the word of God which is written."},{"time":193.136,"text":"18. And now concerning this King Benjamin: He had somewhat contentions among his own people;"},{"time":198.295,"text":"19. And it came to pass also that the armies of the Lamanites came down out of the Land of Nephi to battle against his people;"},{"time":207.724,"text":"20. But behold, King Benjamin gathered together his armies and he did stand against them, And he did fight with the strength of his own arm with the sword of Laban;"},{"time":216.96,"text":"21. And in the strength of the Lord they did contend against their enemies until they had slain many thousands of the Lamanites."},{"time":224.538,"text":"22. And it came to pass that they did contend against the Lamanites until they had driven them out of all the lands of their inheritance."},{"time":233.92,"text":"23. And it came to pass that after there had been false christs and their mouths had been shut and they punished according to their crimes,"},{"time":240.96,"text":"24. And after there had been false prophets and false preachers and teachers among the people, and all these having been punished according to their crimes,"},{"time":251.28,"text":"25. And after there having been much contentions and many dissensions away unto the Lamanites, Behold, it came to pass that King Benjamin, with the assistance of the holy prophets which were among his people - For behold, King Benjamin was a holy man and he did reign over his people in righteousness;"},{"time":267.542,"text":"26. And there were many holy men in the land and they did speak the word of God with power and with authority, And they did use much sharpness because of the stiffneckedness of the people -"},{"time":279.387,"text":"27. Wherefore, with the help of these, King Benjamin, by laboring with all the might of his body and the faculty of his whole soul, and also the prophets, Wherefore, they did once more establish peace in the land."}]
