  lyrics: [{"time":0.0,"text":"Mosiah Chapter 3"},{"time":1.137,"text":"1. And now it came to pass that when King Benjamin had thus spoken to his people, he sent among them desiring to know of his people if they believed the words which he had spoken unto them."},{"time":12.776,"text":"2. And they all cried with one voice, saying: \"Yea, we believe all the words which thou hast spoken unto us!"},{"time":20.88,"text":"3. And also we know of their surety and truth because of the Spirit of the Lord Omnipotent which hath wrought a mighty change in us, or in our hearts, That we have no more disposition to do evil, but to do good continually."},{"time":35.261,"text":"4. \"And we ourselves also, through the infinite goodness of God and the manifestations of His Spirit, have great views of that which is to come, And were it expedient, we could prophesy of all things;"},{"time":46.851,"text":"5. And it is the faith which we have had on the things which our king hath spoken unto us and hath brought us to this great knowledge whereby we do rejoice with such exceeding great joy;"},{"time":57.882,"text":"6. And we are willing to enter into a covenant with our God, to do His will and to be obedient to His commandments in all things that He shall command us all the remainder of our days, That we may not bring upon ourselves a never - ending torment as has been spoken by the angel, That we may not drink out of the cup of the wrath of God.\""},{"time":78.24,"text":"7. And now, these are the words which King Benjamin desired of them and therefore he said unto them: \"Ye have spoken the words that I desired, And the covenant which ye have made is a righteous covenant."},{"time":90.64,"text":"8. \"And now, because of the covenant which ye have made, ye shall be called the children of Christ, His sons and His daughters;"},{"time":98.515,"text":"9. For behold, this day He hath spiritually begotten you, for ye say that your hearts are changed through faith on His name; Therefore, ye are born of Him and have become His sons and His daughters."},{"time":111.232,"text":"10. \"And under this head ye are made free, And there is no other head whereby ye can be made free;"},{"time":118.89,"text":"11. There is no other name given whereby salvation cometh; Therefore, I would that ye should take upon you the name of Christ - all you that have entered into the covenant with God - that ye should be obedient unto the end of your lives."},{"time":132.552,"text":"12. \"And it shall come to pass that whosoever doeth this shall be found at the right hand of God, For he shall know the name by which he is called, For he shall be called by the name of Christ."},{"time":144.24,"text":"13. \"And now it shall come to pass that whosoever shall not take upon them the name of Christ must be called by some other name; Therefore, he findeth himself on the left hand of God."},{"time":155.04,"text":"14. \"And I would that ye should remember also that this is the name that I said I should give unto you that never should be blotted out, except it be through transgression;"},{"time":163.934,"text":"15. Therefore, take heed that ye do not transgress, that the name be not blotted out of your hearts."},{"time":171.264,"text":"16. \"I say unto you, I would that ye should remember to retain the name written always in your hearts, that ye are not found on the left hand of God, But that ye hear and know the voice by which ye shall be called, and also the name by which He shall call you."},{"time":187.787,"text":"17. \"For how knoweth a man the master which he hath not served and which is a stranger unto him and is far from the thoughts and intents of his heart?"},{"time":196.998,"text":"18. \"And again, doth a man take an ass which belongeth to his neighbor and keep him?"},{"time":203.6,"text":"19. I say unto you, Nay, He will not even suffer that he shall feed among his flocks, but will drive him away and cast him out;"},{"time":211.725,"text":"20. I say unto you, that even so shall it be among you if ye know not the name by which ye are called."},{"time":219.467,"text":"21. \"Therefore, I would that ye should be steadfast and immovable, always abounding in good works, That Christ, the Lord God Omnipotent, may seal you His, That you may be brought to heaven, That ye may have everlasting salvation and eternal life through the wisdom and power and justice and mercy of Him who created all things in heaven and in earth, who is God above all. Amen.\""}]
