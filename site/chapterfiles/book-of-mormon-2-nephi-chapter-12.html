<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "2 Nephi",
  chapter: "Chapter 12",
  audioSrc: "https://archive.org/download/2-nephi-ch-12/2%20Nephi%20Ch%2012.mp3",
  lyrics: [{"time":0,"text":"Second Nephi, Chapter 12"},{"time":3.32,"text":"1. And now behold, my brethren, I have spoken unto you according as the Spirit hath constrained me; Wherefore, I know that they must surely come to pass;"},{"time":14.4,"text":"2. And the things which shall be written out of the book shall be of great worth unto the children of men, And especially unto our seed which are a remnant of the house of Israel."},{"time":24.72,"text":"3. For it shall come to pass in that day, that the churches which are built up, and not unto the Lord, When the one shall say unto the other, Behold I, I am the Lord's, And the other shall say, I, I am the Lord's."},{"time":38.96,"text":"4. And thus shall everyone say that hath built up churches, and not unto the Lord."},{"time":45.12,"text":"5. And they shall contend one with another, And their priests shall contend one with another, And they shall teach with their learning and deny the Holy Ghost which giveth utterance;"},{"time":55.76,"text":"6. And they deny the power of God, the Holy One of Israel. And they say unto the people: Hearken unto us and hear ye our precept,"},{"time":66.08,"text":"7. For behold, there is no God today, For the Lord and the Redeemer hath done His work, And He hath given His power unto men."},{"time":66.424,"text":"8. Behold, hearken ye unto my precept; If they shall say there is a miracle wrought by the hand of the Lord, believe it not, For this day He is not a God of miracles; He hath done His work."},{"time":88.32,"text":"9. Yea, and there shall be many which shall say: Eat, drink and be merry, for tomorrow we die and it shall be well with us."},{"time":96.691,"text":"10. And there shall also be many which shall say, Eat, drink and be merry, nevertheless fear God; He will justify in committing a little sin; Yea, lie a little, Take the advantage of one because of his words, Dig a pit for thy neighbor - There is no harm in doing these things;"},{"time":115.181,"text":"11. And do all these things, for tomorrow we die; And if it so be that we are guilty, God will beat us with a few stripes, And at last we shall be saved in the kingdom of God."},{"time":127.08,"text":"12. Yea, and there shall be many which shall teach after this manner false and vain and foolish doctrines, And shall be puffed up in their hearts, And shall seek deep to hide their counsels from the Lord, And their works shall be in the dark, And the blood of the saints shall cry from the ground against them."},{"time":145.2,"text":"13. Yea, they have all gone out of the way - They have become corrupted,"},{"time":150.64,"text":"14. because of pride, And because of false teachers and false doctrines, their churches have become corrupted and their churches are lifted up, Because of pride, they are puffed up;"},{"time":161.68,"text":"15. They rob the poor, because of their fine sanctuaries, They rob the poor, because of their fine clothing; And they persecute the meek and the poor in heart, because in their pride they are puffed up -"},{"time":173.52,"text":"16. They wear stiff necks and high heads. Yea, and because of pride and wickedness and abominations and whoredoms they have all gone astray, save it be a few which are the humble followers of Christ;"},{"time":186.88,"text":"17. Nevertheless, they are led, that in many instances they do err, because they are taught by the precepts of men."},{"time":194.96,"text":"18. O the wise and the learned and the rich that are puffed up in the pride of their hearts! And all they that preach false doctrines, And all they that commit whoredoms and pervert the right way of the Lord; Wo! Wo! Wo be unto them! saith the Lord God Almighty, For they shall be thrust down to hell;"},{"time":209.9,"text":"19. Wo unto them that turn aside the just for a thing of naught, And revile against that which is good and say that it is of no worth!"},{"time":224.84,"text":"20. For the day shall come that the Lord God will speedily visit the inhabitants of the earth; And in that day that they are fully ripe in iniquity, they shall perish."},{"time":234.48,"text":"21. But behold, if the inhabitants of the earth shall repent of their wickedness and abominations, they shall not be destroyed, saith the Lord of Hosts."},{"time":245.64,"text":"22. But behold, that great and abominable church, the whore of all the earth, must tumble to the earth and great must be the fall thereof,"},{"time":255.76,"text":"23. For the kingdom of the devil must shake, And they which belong to it must needs be stirred up unto repentance, Or the devil will grasp them with his everlasting chains and they be stirred up to anger and perish."},{"time":267.257,"text":"24. For behold, at that day shall he rage in the hearts of the children of men and stir them up to anger against that which is good;"},{"time":276.173,"text":"25. And others will he pacify and lull them away into carnal security, that they will say: All is well in Zion; Yea, Zion prospereth, all is well."},{"time":287.68,"text":"26. And thus the devil cheateth their souls and leadeth them away carefully down to hell."},{"time":292.64,"text":"27. And behold, others he flattereth away and telleth them there is no hell, And he saith unto them: I am no devil, for there is none."},{"time":301.356,"text":"28. And thus he whispereth in their ears until he grasps them with his awful chains from whence there is no deliverance;"},{"time":309.5,"text":"29. Yea, they are grasped with death and hell; And death and hell and the devil and all that have been seized therewith must stand before the throne of God and be judged according to their works, From whence they must go into the place prepared for them, even a lake of fire and brimstone, which is endless torment."},{"time":328.987,"text":"30. Therefore, wo be unto him that is at ease in Zion!"},{"time":333.554,"text":"31. Wo be unto him that crieth, All is well! Yea, wo be unto him that hearkeneth unto the precepts of men and denieth the power of God and the gift of the Holy Ghost!"},{"time":338.122,"text":"32. Yea, wo be unto him that saith, We have received and we need no more!"},{"time":353.172,"text":"33. And in fine, wo unto all they that tremble and are angry because of the truth of God!"},{"time":359.84000000000003,"text":"34. For behold, he that is built upon the Rock, receiveth it with gladness; And he that is built upon a sandy foundation, trembleth lest he shall fall."},{"time":369.76,"text":"35. Wo be unto him that shall say, We have received the word of God and we need no more of the word of God, for we have enough!"},{"time":379.68,"text":"36. For behold, thus saith the Lord God: I will give unto the children of men, Line upon line and precept upon precept, Here a little and there a little;"},{"time":389.259,"text":"37. And blessed are they that hearken unto My precepts and lend an ear unto My counsel, For they shall learn wisdom;"},{"time":397.053,"text":"38. For unto him that receiveth, I will give more; And them that shall say, We have enough, from them shall be taken away even that which they have."},{"time":407.638,"text":"39. Cursed is he that putteth his trust in man, Or maketh flesh his arm, Or shall hearken unto the precepts of men, save their precepts shall be given by the power of the Holy Ghost."},{"time":419.339,"text":"40. Wo be unto the Gentiles! saith the Lord God of Hosts; For notwithstanding I shall lengthen out Mine arm unto them from day to day, they will deny Me;"},{"time":431.04,"text":"41. Nevertheless, I will be merciful unto them, saith the Lord God, if they will repent and come unto Me, For Mine arm is lengthened out all the day long, saith the Lord God of Hosts."},{"time":442.72,"text":"42. But behold, there shall be many at that day when I shall proceed to do a marvelous work among them, That I may remember My covenants which I have made unto the children of men, That I may set My hand again the second time to recover My people which are of the house of Israel,"},{"time":458.832,"text":"43. And also, that I may remember the promises which I have made unto thee, Nephi, and also unto thy father, that I would remember your seed, And that the words of your seed should proceed forth out of My mouth unto your seed."},{"time":473.736,"text":"44. And My words shall hiss forth unto the ends of the earth for a standard unto My people which are of the house of Israel;"},{"time":482.496,"text":"45. And because My words shall hiss forth, many of the Gentiles shall say: A Bible, a Bible, we have got a Bible, And there cannot be any more Bible."},{"time":493.336,"text":"46. But thus saith the Lord God: O fools! they shall have a Bible; And it shall proceed forth from the Jews, Mine ancient covenant people;"},{"time":503.609,"text":"47. And what thank they the Jews for the Bible which they receive from them?"},{"time":510.12,"text":"48. Yea, what do the Gentiles mean?"},{"time":513.08,"text":"49. Do they remember the travails and the labors and the pains of the Jews and their diligence unto Me in bringing forth salvation unto the Gentiles?"},{"time":522.36,"text":"50. O ye Gentiles, have ye remembered the Jews, Mine ancient covenant people?"},{"time":528.96,"text":"51. Nay! but ye have cursed them and have hated them and have not sought to recover them;"},{"time":536.4,"text":"52. But behold, I will return all these things upon your own heads; For I, the Lord, hath not forgotten My people."},{"time":544.136,"text":"53. Thou fool that shall say, A Bible, we have got a Bible and we need no more Bible!"},{"time":551.12,"text":"54. Have ye obtained a Bible, save it were by the Jews?"},{"time":553.605,"text":"55. Know ye not that there are more nations than one?"},{"time":564.952,"text":"56. Know ye not that I, the Lord your God, have created all men? And that I remember they which are upon the isles of the sea? And that I rule in the heavens above and in the earth beneath?"},{"time":573.813,"text":"57. And I bring forth My word unto the children of men, Yea, even upon all the nations of the earth?"},{"time":581.429,"text":"58. Wherefore murmur ye because that ye shall receive more of My word?"},{"time":588.755,"text":"59. Know ye not that the testimony of two nations is a witness unto you that I Am God? That I remember one nation like unto another?"},{"time":596.08,"text":"60. Wherefore, I speak the same words unto one nation like unto another."},{"time":601.38,"text":"61. And when the two nations shall run together, The testimony of the two nations shall run together also;"},{"time":608.301,"text":"62. And I do this that I may prove unto many that I Am the same yesterday, today and forever, And that I speak forth My words according to Mine own pleasure."},{"time":619.92,"text":"63. And because that I have spoken one word, Ye need not suppose that I cannot speak another; For My work is not yet finished; Neither shall it be until the end of man; Neither from that time henceforth and forever."},{"time":632.26,"text":"64. Wherefore, because that ye have a Bible, Ye need not suppose that it contains all My words; Neither need ye suppose that I have not caused more to be written;"},{"time":643.76,"text":"65. For I command all men - both in the east, and in the west, and in the north, and in the south, and in the islands of the sea - That they shall write the words which I speak unto them;"},{"time":655.84,"text":"66. For out of the books which shall be written, I will judge the world, Every man according to their works, According to that which is written."},{"time":664.416,"text":"67. For behold, I shall speak unto the Jews, and they shall write it;"},{"time":670.111,"text":"68. And I shall also speak unto the Nephites, and they shall write it;"},{"time":675.6,"text":"69. And I shall also speak unto the other tribes of the house of Israel which I have led away, and they shall write it;"},{"time":682.254,"text":"70. And I shall also speak unto all the nations of the earth, and they shall write it."},{"time":687.882,"text":"71. And it shall come to pass that the Jews shall have the words of the Nephites, And the Nephites shall have the words of the Jews;"},{"time":696.16,"text":"72. And the Nephites and the Jews shall have the words of the lost tribes of Israel; And the lost tribes of Israel shall have the words of the Nephites and the Jews."},{"time":705.933,"text":"73. And it shall come to pass that My people, which are of the house of Israel, Shall be gathered home unto the lands of their possessions; And My word also shall be gathered in one."},{"time":716.575,"text":"74. And I will show unto them that fight against My word, And against My people, which are of the house of Israel, That I Am God and that I covenanted with Abraham, That I would remember his seed forever."},{"time":728.809,"text":"75. And now behold, my beloved brethren, I would speak unto you; For I, Nephi, would not suffer that ye should suppose that ye are more righteous than the Gentiles shall be."},{"time":742.64,"text":"76. For behold, except ye shall keep the commandments of God, ye shall all likewise perish; And because of the words which have been spoken, ye need not suppose that the Gentiles are utterly destroyed."},{"time":755.233,"text":"77. For behold I say unto you, As many of the Gentiles as will repent are the covenant people of the Lord; And as many of the Jews as will not repent shall be cast off;"},{"time":766.144,"text":"78. For the Lord covenanteth with none, Save it be with them that repent and believe in His Son, which is the Holy One of Israel."},{"time":774.48,"text":"79. And now I would prophesy somewhat more concerning the Jews and the Gentiles."},{"time":780.72,"text":"80. For after the book of which I have spoken shall come forth and be written unto the Gentiles and sealed up again unto the Lord, There shall be many which shall believe the words which are written; And they shall carry them forth unto the remnant of our seed."},{"time":794.32,"text":"81. And then shall the remnant of our seed know concerning us - how that we came out from Jerusalem - And that they are a descendant of the Jews;"},{"time":802.66,"text":"82. And the gospel of Jesus Christ shall be declared among them; Wherefore, they shall be restored unto the knowledge of their fathers, And also to the knowledge of Jesus Christ which was had among their fathers."},{"time":815.484,"text":"83. And then shall they rejoice, For they shall know that it is a blessing unto them from the hand of God;"},{"time":822.905,"text":"84. And their scales of darkness shall begin to fall from their eyes; And many generations shall not pass away among them, save they shall be a white and a delightsome people."},{"time":833.284,"text":"85. And it shall come to pass that the Jews which are scattered also shall begin to believe in Christ; And they shall begin to gather in upon the face of the land;"},{"time":843.48,"text":"86. And as many as shall believe in Christ shall also become a delightsome people."},{"time":848.16,"text":"87. And it shall come to pass that the Lord God shall commence His work among all nations, kindreds, tongues and people, To bring about the restoration of His people upon the earth."},{"time":859.84,"text":"88. And with righteousness shall the Lord God judge the poor, And reprove with equity for the meek of the earth;"},{"time":866.735,"text":"89. And He shall smite the earth with the rod of His mouth; And with the breath of His lips shall He slay the wicked."},{"time":874.311,"text":"90. For the time speedily cometh that the Lord God shall cause a great division among the people; And the wicked will He destroy, And He will spare His people, Yea, even if it so be that He must destroy the wicked by fire."},{"time":888,"text":"91. And righteousness shall be the girdle of His loins, And faithfulness the girdle of His reins."},{"time":894.56,"text":"92. And then shall the wolf dwell with the lamb, And the leopard shall lie down with the kid, And the calf and the young lion and the fatling, together; And a little child shall lead them."},{"time":905.84,"text":"93. And the cow and the bear shall feed; Their young ones shall lie down together; And the lion shall eat straw like the ox."},{"time":913.244,"text":"94. And the sucking child shall play on the hole of the asp, And the weaned child shall put his hand on the cockatrice's den."},{"time":921.458,"text":"95. They shall not hurt nor destroy in all My holy mountain; For the earth shall be full of the knowledge of the Lord, As the waters cover the sea."},{"time":931.026,"text":"96. Wherefore, the things of all nations shall be made known; Yea, all things shall be made known unto the children of men -"},{"time":940.033,"text":"97. There is nothing which is secret, save it shall be revealed; There is no work of darkness, save it shall be made manifest in the light; And there is nothing which is sealed upon earth, save it shall be loosed -"},{"time":953.6,"text":"98. Wherefore, all things which have been revealed unto the children of men shall at that day be revealed;"},{"time":960.72,"text":"99. And Satan shall have power over the hearts of the children of men no more for a long time."},{"time":967.2,"text":"100. And now my beloved brethren, I must make an end of my sayings."}]
};
