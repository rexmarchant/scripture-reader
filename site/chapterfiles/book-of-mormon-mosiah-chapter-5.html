<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "Mosiah",
  chapter: "Chapter 5",
  audioSrc: "https://archive.org/download/mosiah-ch-5/Mosiah%20Ch%205.mp3",
  lyrics: [{"time":0.0,"text":"Mosiah Chapter 5"},{"time":1.124,"text":"1. And now it came to pass that after King Mosiah had had continual peace for the space of three years, he was desirous to know concerning the people which went up to dwell in the Land of Lehi-Nephi, or in the City of Lehi-Nephi;"},{"time":16.304,"text":"2. For his people had heard nothing from them from the time they left the Land of Zarahemla, Therefore, they wearied him with their teasings."},{"time":24.96,"text":"3. And it came to pass that King Mosiah granted that sixteen of their strong men might go up to the Land of Lehi-Nephi to inquire concerning their brethren."},{"time":33.2,"text":"4. And it came to pass that on the morrow they started to go up, having with them one Ammon, he being a strong and mighty man and a descendant of Zarahemla; And he was also their leader."},{"time":45.507,"text":"5. And now they knew not the course they should travel in the wilderness to go up to the Land of Lehi-Nephi, Therefore, they wandered many days in the wilderness, even forty days did they wander."},{"time":58.405,"text":"6. And when they had wandered forty days, they came to a hill which is north of the Land of Shilom and there they pitched their tents;"},{"time":65.924,"text":"7. And Ammon took three of his brethren - and their names were Amaleki, Helem, and Hem - and they went down into the Land of Nephi."},{"time":76.168,"text":"8. And behold, they met the king of the people which was in the Land of Nephi and in the Land of Shilom;"},{"time":83.373,"text":"9. And they were surrounded by the king's guard and were taken and were bound and were committed to prison."},{"time":89.968,"text":"10. And it came to pass when they had been in prison two days, they were again brought before the king and their bands were loosed;"},{"time":98.372,"text":"11. And they stood before the king and were permitted, or rather commanded, that they should answer the questions which he should ask them."},{"time":107.28,"text":"12. And he saith unto them: \"Behold, I am Limhi, the son of Noah, which was the son of Zeniff - which came up out of the Land of Zarahemla to inherit this land, which was the land of their fathers - which was made a king by the voice of the people."},{"time":122.08,"text":"13. \"And now, I desire to know the cause whereby ye were so bold as to come near the walls of the city when I, myself, was with my guards without the gate."},{"time":131.827,"text":"14. \"And now for this cause have I suffered that ye should be preserved - that I might inquire of you - Or else I should have caused that my guards should have put you to death. \"Ye are permitted to speak.\""},{"time":144.43,"text":"15. And now when Ammon saw that he was permitted to speak, he went forth and bowed himself before the king; And rising again, he said: \"O king, I am very thankful before God this day that I am yet alive and am permitted to speak,"},{"time":159.52,"text":"16. And I will endeavor to speak with boldness; For I am assured that if ye had known me, ye would not have suffered that I should have worn these bands,"},{"time":168.8,"text":"17. For I am Ammon and am a descendant of Zarahemla, And have come up out of the Land of Zarahemla to inquire concerning our brethren which Zeniff brought up out of that land.\""},{"time":179.44,"text":"18. And now it came to pass that after Limhi had heard the words of Ammon, he was exceeding glad and said: \"Now I know of a surety that my brethren which were in the Land of Zarahemla are yet alive;"},{"time":191.68,"text":"19. And now I will rejoice! And on the morrow I will cause that my people shall rejoice also."},{"time":199.76,"text":"20. \"For behold, we are in bondage to the Lamanites and are taxed with a tax which is grievous to be borne."},{"time":205.892,"text":"21. \"And now behold, our brethren will deliver us out of our bondage, or out of the hands of the Lamanites, and we will be their slaves,"},{"time":215.573,"text":"22. For it is better that we be slaves to the Nephites than to pay tribute to the king of the Lamanites.\""},{"time":223.469,"text":"23. And now King Limhi commanded his guards that they should no more bind Ammon nor his brethren, But caused that they should go to the hill which was north of Shilom and bring their brethren into the city, That thereby they might eat and drink and rest themselves from the labors of their journey,"},{"time":241.264,"text":"24. For they had suffered many things - they had suffered hunger, thirst and fatigue."},{"time":246.28,"text":"25. And now it came to pass on the morrow that King Limhi sent a proclamation among all his people, That thereby they might gather themselves together to the temple to hear the words which he should speak unto them."},{"time":259.288,"text":"26. And it came to pass that when they had gathered themselves together, that he spake unto them in this wise, saying:"},{"time":267.44,"text":"27. \"O ye my people, lift up your heads and be comforted; For behold, the time is at hand, or is not far distant, when we shall no longer be in subjection to our enemies, notwithstanding our many strugglings which have been in vain; Yet I trust there remaineth an effectual struggle to be made."},{"time":285.17,"text":"28. \"Therefore, lift up your heads and rejoice! And put your trust in God, in that God who was the God of Abraham and Isaac and Jacob,"},{"time":296.012,"text":"29. And also that God who brought the children of Israel out of the Land of Egypt and caused that they should walk through the Red Sea on dry ground, And fed them with manna, that they might not perish in the wilderness; And many more things did He do for them."},{"time":310.976,"text":"30. \"And again, that same God hath brought our fathers out of the Land of Jerusalem and hath kept and preserved His people, even until now."},{"time":320.324,"text":"31. \"And behold, it is because of our iniquities and abominations that has brought us into bondage;"},{"time":327.105,"text":"32. And ye all are witnesses this day that Zeniff who was made king over this people, he being overzealous to inherit the land of his fathers,"},{"time":335.579,"text":"33. Therefore, being deceived by the cunning and craftiness of King Laman, who having entered into a treaty with King Zeniff, And having yielded up into his hands the possessions of a part of the land, or even the City of Lehi-Nephi and the City of Shilom and the land round about,"},{"time":353.76,"text":"34. And all this he did for the sole purpose of bringing this people into subjection, or into bondage."},{"time":359.4,"text":"35. \"And behold, we at this time do pay tribute to the king of the Lamanites to the amount of one half of our corn and our barley, and even all our grain of every kind, And one half of the increase of our flocks and our herds;"},{"time":374.263,"text":"36. And even one half of all we have or possess the king of the Lamanites doth exact of us, or our lives."},{"time":382.004,"text":"37. \"And now, is not this grievous to be borne?"},{"time":385.68,"text":"38. And is not this our afflictions great?"},{"time":389.67,"text":"39. \"Now behold, how great reason have we to mourn!"},{"time":394.8,"text":"40. Yea, I say unto you, great are the reasons which we have to mourn.\"For behold, how many of our brethren have been slain and their blood hath been spilt in vain? And all because of iniquity;"},{"time":409.28,"text":"41. For if this people had not fallen into transgression, the Lord would not have suffered that this great evil should come upon them;"},{"time":416.56,"text":"42. But behold, they would not hearken unto His words; But there arose contentions among them, even so much that they did shed blood among themselves."},{"time":426.444,"text":"43. \"And a prophet of the Lord have they slain, Yea, a chosen man of God who told them of their wickedness and abominations, And prophesied of many things which are to come, yea, even the coming of Christ;"},{"time":439.76,"text":"44. And because he saith unto them that Christ was the God, the Father, of all things, And saith that He should take upon Him the image of man, And it should be the image after which man was created in the beginning -"},{"time":451.76,"text":"45. Or in other words, he said that man was created after the image of God, And that God should come down among the children of men and take upon Him flesh and blood and go forth upon the face of the earth;"},{"time":465.026,"text":"46. And now because he said this, they did put him to death. \"And many more things did they do which brought down the wrath of God upon them;"},{"time":475.92,"text":"47. Therefore, who wondereth that they are in bondage and that they are smitten with sore afflictions!"},{"time":482.32,"text":"48. \"For behold, the Lord hath said: 'I will not succor My people in the day of their transgression, but I will hedge up their ways, that they prosper not; And their doings shall be as a stumbling block before them.'"},{"time":494.286,"text":"49. \"And again He saith: 'If My people shall sow filthiness, they shall reap the chaff thereof in the whirlwind, And the effects thereof is poison.'"},{"time":504.56,"text":"50. \"And again He saith: 'If My people shall sow filthiness, they shall reap the east wind which bringeth immediate destruction.'"},{"time":511.536,"text":"51. \"And now behold, the promise of the Lord is fulfilled and ye are smitten and afflicted;"},{"time":518.051,"text":"52. But if ye will turn to the Lord with full purpose of heart and put your trust in Him, and serve Him with all diligence of mind - And if ye do this, He will, according to His own will and pleasure, deliver you out of bondage.\""},{"time":532.933,"text":"53. And it came to pass that after King Limhi had made an end of speaking to his people - for he spake many things unto them and only a few of them have I written in this book - He told his people all the things concerning their brethren which were in the Land of Zarahemla."},{"time":548.066,"text":"54. And he caused that Ammon should stand up before the multitude and rehearse unto them all that had happened unto their brethren from the time that Zeniff went up out of the land, even until the time that he himself came up out of the land;"},{"time":562.4,"text":"55. And he also rehearsed unto them the last words which King Benjamin had taught them, and explained them to the people of King Limhi so that they might understand all the words which he spake."},{"time":572.551,"text":"56. And it came to pass that after he had done all this, that King Limhi dismissed the multitude and caused that they should return, everyone unto his own house."},{"time":583.209,"text":"57. And it came to pass that he caused that the plates which contained the record of his people from the time that they left the Land of Zarahemla should be brought before Ammon, that he might read them."},{"time":595.12,"text":"58. Now as soon as Ammon had read the record, the king inquired of him to know if he could interpret languages;"},{"time":600.82,"text":"59. And Ammon told him that he could not."},{"time":604.18,"text":"60. And the king saith unto him: \"I being grieved for the afflictions of my people, I caused that forty and three of my people should take a journey into the wilderness, That thereby they might find the Land of Zarahemla, That we might appeal unto our brethren to deliver us out of bondage;"},{"time":621.537,"text":"61. And they were lost in the wilderness for the space of many days, yet they were diligent and found not the Land of Zarahemla, But returned to this land, having traveled in a land among many waters,"},{"time":634.135,"text":"62. Having discovered a land which was covered with bones of men and of beasts, etc., and was also covered with ruins of buildings of every kind,"},{"time":644.8,"text":"63. Having discovered a land which had been peopled with a people which were as numerous as the hosts of Israel."},{"time":650.42,"text":"64. \"And for a testimony that the things that they had said were true, they have brought twenty-four plates which are filled with engravings, And they are of pure gold."},{"time":661.76,"text":"65. \"And behold also, they have brought breastplates which are large, And they are of brass and of copper and are perfectly sound."},{"time":669.595,"text":"66. \"And again, they have brought swords - The hilts thereof hath perished, And the blades thereof were cankered with rust."},{"time":677.568,"text":"67. \"And there is no one in the land that is able to interpret the language or the engravings that are on the plates;"},{"time":686.035,"text":"68. Therefore I said unto thee, canst thou translate?"},{"time":689.63,"text":"69. \"And I say unto thee again: Knowest thou of anyone that can translate? For I am desirous that these records should be translated into our language;"},{"time":701.46,"text":"70. For perhaps they will give us a knowledge of a remnant of the people which have been destroyed, from whence these records came,"},{"time":708.413,"text":"71. Or, perhaps they will give us a knowledge of this very people which hath been destroyed; And I am desirous to know the cause of their destruction.\""},{"time":719.106,"text":"72. Now Ammon saith unto him: \"I can assuredly tell thee, O king, of a man that can translate the records, For he hath wherewith that he can look and translate all records that are of ancient date, And it is a gift from God,"},{"time":732.711,"text":"73. And the things are called interpreters; And no man can look in them except he be commanded, lest he should look for that he had not ought and he should perish,"},{"time":744.027,"text":"74. And whosoever is commanded to look in them, the same is called seer."},{"time":748.384,"text":"75. \"And behold, the king of the people which is in the Land of Zarahemla is the man that is commanded to do these things and which hath this high gift from God.\""},{"time":758.258,"text":"76. And the king saith that: \"A seer is greater than a prophet.\""},{"time":763.644,"text":"77. And Ammon saith that: \"A seer is a revelator and a prophet also; And a gift which is greater can no man have, except he should possess the power of God, which no man can, Yet a man may have great power given him from God."},{"time":777.486,"text":"78. \"But a seer can know of things which have passed, and also of things which are to come;"},{"time":783.52,"text":"79. And by them shall all things be revealed, or rather, shall secret things be made manifest and hidden things shall come to light, And things which are not known shall be made known by them;"},{"time":794.64,"text":"80. And also things shall be made known by them which otherwise could not be known;"},{"time":800.16,"text":"81. Thus God hath provided a means that man, through faith, might work mighty miracles; Therefore, he becometh a great benefit to his fellow beings.\""},{"time":809.84,"text":"82. And now when Ammon had made an end of speaking these words, the king rejoiced exceedingly and gave thanks to God, saying:"},{"time":818.4,"text":"83. \"Doubtless a great mystery is contained within these plates; And these interpreters were doubtless prepared for the purpose of unfolding all such mysteries to the children of men."},{"time":823.218,"text":"84. \"O how marvelous are the works of the Lord! And how long doth He suffer with His people!"},{"time":837.042,"text":"85. Yea, and how blind and impenetrable are the understandings of the children of men! For they will not seek wisdom, Neither do they desire that she should rule over them;"},{"time":853.484,"text":"86. Yea, they are as a wild flock which fleeth from the shepherd and scattereth, And are driven and are devoured by the beasts of the forest.\""}]
};
