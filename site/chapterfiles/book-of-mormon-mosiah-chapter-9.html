<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "Mosiah",
  chapter: "Chapter 9",
  audioSrc: "https://archive.org/download/mosiah-ch-9/Mosiah%20Ch%209.mp3",
  lyrics: [{"time":0.0,"text":"Mosiah Chapter 9"},{"time":1.26,"text":"1. And now it came to pass that when Abinadi had finished these sayings, that the king commanded that the priests should take him and cause that he should be put to death."},{"time":12.48,"text":"2. But there was one among them whose name was Alma, he also being a descendant of Nephi,"},{"time":19.28,"text":"3. And he was a young man; And he believed the words which Abinadi had spoken, for he knew concerning the iniquity which Abinadi had testified against them;"},{"time":28.8,"text":"4. Therefore, he began to plead with the king that he would not be angry with Abinadi, but suffer that he might depart in peace."},{"time":35.991,"text":"5. But the king was more wroth and caused that Alma should be cast out from among them and sent his servants after him, that they might slay him;"},{"time":45.36,"text":"6. But he fled from before them and hid himself, that they found him not;"},{"time":50.56,"text":"7. And he, being concealed for many days, did write all the words which Abinadi had spoken."},{"time":56.8,"text":"8. And it came to pass that the king caused that his guards should surround Abinadi and take him; And they bound him and cast him into prison;"},{"time":65.72,"text":"9. And after three days, having counseled with his priests, he caused that he should again be brought before him."},{"time":72.8,"text":"10. And he said unto him: \"Abinadi, we have found an accusation against thee and thou art worthy of death,"},{"time":80.4,"text":"11. For thou hast said that God Himself should come down among the children of men;"},{"time":88.72,"text":"12. And now for this cause thou shalt be put to death, unless thou wilt recall all the words which thou hast spoken evil concerning me and my people.\""},{"time":98.72,"text":"13. Now Abinadi saith unto him: \"I say unto you, I will not recall the words which I have spoken unto you concerning this people, for they are true;"},{"time":108.32,"text":"14. And that ye may know of their surety, I have suffered myself that I have fallen into your hands,"},{"time":115.093,"text":"15. yea, and I will suffer, even until death; And I will not recall my words, And they shall stand as a testimony against you;"},{"time":125.171,"text":"16. And if ye slay me, ye will shed innocent blood, And this shall also stand as a testimony against you at the last day.\""},{"time":133.12,"text":"17. And now King Noah was about to release him, for he feared his word, For he feared that the judgments of God would come upon him;"},{"time":141.238,"text":"18. But the priests lifted up their voices against him and began to accuse him, saying: \"He hath reviled the king!\""},{"time":149.129,"text":"19. Therefore, the king was stirred up in anger against him and he delivered him up, that he might be slain."},{"time":157.029,"text":"20. And it came to pass that they took him and bound him and scourged his skin with fagots, yea, even unto death."},{"time":165.663,"text":"21. And now when the flames began to scorch him, he cried unto them, saying: \"Behold! Even as ye have done unto me, so shall it come to pass that thy seed shall cause that many shall suffer the pains that I do suffer, even the pains of death by fire, And this because they believe in the salvation of the Lord their God."},{"time":186.657,"text":"22. \"And it will come to pass that ye shall be afflicted with all manner of diseases because of your iniquities;"},{"time":193.92,"text":"23. Yea, and ye shall be smitten on every hand and shall be driven and scattered to and fro, even as a wild flock is driven by wild and ferocious beasts;"},{"time":204.04,"text":"24. And in that day, ye shall be hunted and ye shall be taken by the hand of your enemies, And then ye shall suffer, as I suffer, the pains of death by fire;"},{"time":214.736,"text":"25. Thus God executeth vengeance upon those that destroy His people!"},{"time":218.546,"text":"26. \"O God, receive my soul!\""},{"time":222.355,"text":"27. And now when Abinadi had said these words, he fell, having suffered death by fire, Yea, having been put to death because he would not deny the commandments of God, Having sealed the truth of his words by his death."},{"time":237.095,"text":"28. And now it came to pass that Alma, who had fled from the servants of King Noah, repented of his sins and iniquities and went about privately among the people and began to teach the words of Abinadi,"},{"time":250.08,"text":"29. Yea, concerning that which was to come, And also concerning the resurrection of the dead and the redemption of the people, which was to be brought to pass through the power and sufferings and death of Christ, And His resurrection and ascension into heaven."},{"time":263.97,"text":"30. And as many as would hear his word he did teach;"},{"time":268.067,"text":"31. And he taught them privately, that it might not come to the knowledge of the king; And many did believe his words."},{"time":275.6,"text":"32. And it came to pass that as many as did believe him did go forth to a place which was called Mormon, Having received its name from the king, being in the borders of the land, Having been infested by times, or at seasons, by wild beasts."},{"time":292.4,"text":"33. Now there was in Mormon a fountain of pure water, And Alma resorted thither, there being near the water a thicket of small trees where he did hide himself in the daytime from the searches of the king."},{"time":303.528,"text":"34. And it came to pass that as many as believed him went thither to hear his words."},{"time":308.933,"text":"35. And it came to pass after many days there were a goodly number gathered together to the Place of Mormon to hear the words of Alma,"},{"time":318.383,"text":"36. Yea, all were gathered together that believed on his word to hear him;"},{"time":323.124,"text":"37. And he did teach them and did preach unto them repentance and redemption and faith on the Lord."},{"time":329.577,"text":"38. And it came to pass that he said unto them: \"Behold, here are the Waters of Mormon\" - for thus were they called -"},{"time":336.823,"text":"39. \"And now as ye are desirous to come into the fold of God and to be called His people, And are willing to bear one another's burdens, that they may be light,"},{"time":347.92,"text":"40. Yea, and are willing to mourn with those that mourn, Yea, and comfort those that stand in need of comfort, And to stand as witnesses of God at all times and in all things and in all places that ye may be in, even until death, That ye may be redeemed of God and be numbered with those of the first resurrection, that ye may have eternal life -"},{"time":368.792,"text":"41. Now, I say unto you, if this be the desires of your hearts, What have you against being baptized in the name of the Lord as a witness before Him that ye have entered into a covenant with Him that ye will serve Him and keep His commandments, that He may pour out His Spirit more abundantly upon you?\""},{"time":387.142,"text":"42. And now when the people had heard these words, they clapped their hands for joy and exclaimed: \"This is the desires of our hearts!\""},{"time":397.04,"text":"43. And now it came to pass that Alma took Helam, he being one of the first, and went and stood forth in the water and cried, saying: \"O Lord, pour out Thy Spirit upon Thy servant, that he may do this work with holiness of heart!\""},{"time":411.722,"text":"44. And when he had said these words, the Spirit of the Lord was upon him and he said: \"Helam, I baptize thee, having authority from the Almighty God, as a testimony that ye have entered into a covenant to serve Him until you are dead, as to the mortal body; And may the Spirit of the Lord be poured out upon you, And may He grant unto you eternal life through the redemption of Christ which He hath prepared from the foundation of the world.\""},{"time":436.827,"text":"45. And after Alma had said these words, both Alma and Helam were buried in the water; And they arose and came forth out of the water rejoicing, being filled with the Spirit."},{"time":447.619,"text":"46. And again, Alma took another and went forth a second time into the water and baptized him according to the first, only he did not bury himself again in the water."},{"time":459.688,"text":"47. And after this manner he did baptize everyone that went forth to the Place of Mormon, And they were in number about two hundred and four souls,"},{"time":467.456,"text":"48. Yea, and they were baptized in the Waters of Mormon and were filled with the grace of God;"},{"time":476.24,"text":"49. And they were called the church of God, or the church of Christ, from that time forward."},{"time":482.96,"text":"50. And it came to pass that whosoever was baptized by the power and authority of God was added to His church."},{"time":489.473,"text":"51. And it came to pass that Alma, having authority from God, ordained priests - even one priest to every fifty of their number did he ordain - To preach unto them and to teach them concerning the things pertaining to the kingdom of God."},{"time":504.405,"text":"52. And he commanded them that they should teach nothing save it were the things which he had taught and which had been spoken by the mouth of the holy prophets."},{"time":513.266,"text":"53. Yea, even he commanded them that they should preach nothing save it were repentance and faith on the Lord who hath redeemed His people."},{"time":522.094,"text":"54. And he commanded them that there should be no contention one with another, But that they should look forward with one eye, having one faith and one baptism, Having their hearts knit together in unity and in love one toward another;"},{"time":535.28,"text":"55. And thus he commanded them to preach; And thus they became the children of God."},{"time":542.48,"text":"56. And he commanded them that they should observe the Sabbath day and keep it holy, And also every day they should give thanks to the Lord their God."},{"time":551.56,"text":"57. And he also commanded them that the priests which he had ordained should labor with their own hands for their support;"},{"time":559.12,"text":"58. And there was one day in every week that was set apart that they should gather themselves together to teach the people and to worship the Lord their God, And also as often as it was in their power to assemble themselves together;"},{"time":570.245,"text":"59. And the priests were not to depend upon the people for their support, But for their labor they were to receive the grace of God, that they might wax strong in the Spirit, Having the knowledge of God, that they might teach with power and authority from God."},{"time":585.84,"text":"60. And again, Alma commanded that the people of the church should impart of their substance, everyone according to that which he hath -"},{"time":593.93,"text":"61. If he have more abundantly, he should impart more abundantly, And he that hath but little, but little should be required, And to him that hath not, should be given;"},{"time":604.4,"text":"62. And thus they should impart of their substance of their own free will and good desires toward God, And to those priests that stood in need, yea, and to every needy, naked soul;"},{"time":618.16,"text":"63. And this he said unto them, having been commanded of God;"},{"time":622.707,"text":"64. And they did walk uprightly before God, imparting to one another both temporally and spiritually, according to their needs and their wants."},{"time":631.108,"text":"65. And now it came to pass that all this was done in Mormon, yea, by the Waters of Mormon, in the forest that was near the Waters of Mormon,"},{"time":642.396,"text":"66. Yea, the Place of Mormon, the Waters of Mormon, the Forest of Mormon - How beautiful are they to the eyes of them who there came to the knowledge of their Redeemer!"},{"time":652.461,"text":"67. Yea, and how blessed are they, for they shall sing to His praise forever!"},{"time":658.72,"text":"68. And these things were done in the borders of the land, that they might not come to the knowledge of the king."},{"time":664.669,"text":"69. But behold, it came to pass that the king, having discovered a movement among the people, sent his servants to watch them;"},{"time":673.296,"text":"70. Therefore, on the day that they were assembling themselves together to hear the word of the Lord, they were discovered unto the king."},{"time":682.08,"text":"71. And now the king saith that Alma was stirring up the people to a rebellion against him, therefore he sent his army to destroy them."},{"time":689.857,"text":"72. And it came to pass that Alma and the people of the Lord were apprised of the coming of the king's army; Therefore, they took their tents and their families and departed into the wilderness;"},{"time":701.264,"text":"73. And they were in number about four hundred and fifty souls."},{"time":704.848,"text":"74. And it came to pass that the army of the king returned, having searched in vain for the people of the Lord;"},{"time":713.971,"text":"75. And now behold, the forces of the king were small, having been reduced. And there began to be a division among the remainder of the people,"},{"time":723.19,"text":"76. And the lesser part began to breathe out threatenings against the king, And there began to be a great contention among them."},{"time":731.575,"text":"77. And now there was a man among them whose name was Gideon; And he being a strong man and an enemy to the king, therefore, he drew his sword and swore in his wrath that he would slay the king."},{"time":744.034,"text":"78. And now it came to pass that he fought with the king; And when the king saw that he was about to overpower him, he fled and ran and got upon the tower which was near the temple;"},{"time":754.699,"text":"79. And Gideon pursued after him and was about to get upon the tower to slay the king, And the king cast his eyes round about toward the Land of Shemlon, And behold, the army of the Lamanites were within the borders of the land."},{"time":769.44,"text":"80. And now the king cried out in the anguish of his soul, saying: \"Gideon, spare me! for the Lamanites are upon us and they will destroy them, Yea, they will destroy my people!\""},{"time":781.736,"text":"81. And now the king was not so much concerned about his people as he was about his own life; Nevertheless, Gideon did spare his life."},{"time":790.461,"text":"82. And the king commanded the people that they should flee before the Lamanites, And he himself did go before them, And they did flee into the wilderness with their women and their children."},{"time":802.56,"text":"83. And it came to pass that the Lamanites did pursue them and did overtake them and began to slay them."},{"time":809.2,"text":"84. Now it came to pass that the king commanded them that all the men should leave their wives and their children and flee before the Lamanites;"},{"time":816.615,"text":"85. Now there were many that would not leave them, but had rather stay and perish with them,"},{"time":823.482,"text":"86. And the rest left their wives and their children and fled."},{"time":828.16,"text":"87. And it came to pass that those that tarried with their wives and their children caused that their fair daughters should stand forth and plead with the Lamanites that they would not slay them."},{"time":838.56,"text":"88. And it came to pass that the Lamanites had compassion on them, for they were charmed with the beauty of their women;"},{"time":845.064,"text":"89. Therefore, the Lamanites did spare their lives and took them captives and carried them back to the Land of Nephi, And granted unto them that they might possess the land, under the conditions that they would deliver up the king, Noah, into the hands of the Lamanites, And deliver up their property,"},{"time":862.622,"text":"90. even one half of all they possessed - One half of their gold and their silver and all their precious things; And thus they should pay tribute to the king of the Lamanites from year to year."},{"time":873.722,"text":"91. And now there was one of the sons of the king among those that were taken captive whose name was Limhi."},{"time":881.05,"text":"92. And now Limhi was desirous that his father should not be destroyed; Nevertheless, Limhi was not ignorant of the iniquities of his father, he himself being a just man."},{"time":892.027,"text":"93. And it came to pass that Gideon sent men into the wilderness, secretly, to search for the king and those that were with him."},{"time":900.189,"text":"94. And it came to pass that they met the people in the wilderness, all save the king and his priests."},{"time":907.053,"text":"95. Now they had sworn in their hearts that they would return to the Land of Nephi, And if their wives and their children were slain, and also those that had tarried with them, that they would seek revenge and also perish with them;"},{"time":920.96,"text":"96. And the king commanded them that they should not return; And they were angry with the king and caused that he should suffer, even unto death by fire;"},{"time":929.423,"text":"97. And they were about to take the priests also, to put them to death, And they fled before them."},{"time":935.806,"text":"98. And it came to pass that they were about to return to the Land of Nephi and they met the men of Gideon;"},{"time":942.766,"text":"99. And the men of Gideon told them of all that had happened to their wives and their children, And that the Lamanites had granted unto them that they might possess the land by paying a tribute to the Lamanites of one half of all they possessed;"},{"time":956.64,"text":"100. And the people told the men of Gideon that they had slain the king and his priests had fled from them farther into the wilderness."},{"time":963.492,"text":"101. And it came to pass that after they had ended the ceremony, that they returned to the Land of Nephi, rejoicing because their wives and their children were not slain; And they told Gideon what they had done to the king."},{"time":976.731,"text":"102. And it came to pass that the king of the Lamanites made an oath unto them that his people should not slay them;"},{"time":984.711,"text":"103. And also Limhi, being the son of the king, having the kingdom conferred upon him by the people, made oath unto the king of the Lamanites that his people should pay tribute unto him, even one half of all they possessed."},{"time":996.141,"text":"104. And it came to pass that Limhi began to establish the kingdom and to establish peace among his people."},{"time":1003.293,"text":"105. And the king of the Lamanites set guards round about the land, that he might keep the people of Limhi in the land, that they might not depart into the wilderness;"},{"time":1014.24,"text":"106. And he did support his guards out of the tribute which he did receive from the Nephites."},{"time":1020.48,"text":"107. And now King Limhi did have continual peace in his kingdom for the space of two years, that the Lamanites did not molest them nor seek to destroy them."},{"time":1029.693,"text":"108. Now there was a place in Shemlon where the daughters of the Lamanites did gather themselves together for to sing and to dance and to make themselves merry."},{"time":1038.08,"text":"109. And it came to pass that there was one day a small number of them gathered together to sing and to dance."},{"time":1045.378,"text":"110. And now the priests of King Noah, being ashamed to return to the City of Nephi, Yea, and also fearing that the people would slay them, Therefore, they durst not return to their wives and their children;"},{"time":1059.25,"text":"111. And having tarried in the wilderness and having discovered the daughters of the Lamanites, they laid and watched them; And when there were but few of them gathered together to dance, they came forth out of their secret places and took them and carried them into the wilderness,"},{"time":1074.08,"text":"112. Yea, twenty and four of the daughters of the Lamanites they carried into the wilderness."},{"time":1079.59,"text":"113. And it came to pass that when the Lamanites found that their daughters had been missing, they were angry with the people of Limhi, for they thought it was the people of Limhi;"},{"time":1090.734,"text":"114. Therefore, they sent their armies forth, yea, even the king himself went before his people, And they went up to the Land of Nephi to destroy the people of Limhi."},{"time":1101.84,"text":"115. And now Limhi had discovered them from the tower - even all their preparations for war did he discover; Therefore, he gathered his people together and laid wait for them in the fields and in the forests."},{"time":1114.08,"text":"116. And it came to pass that when the Lamanites had come up, that the people of Limhi began to fall upon them from their waiting places and began to slay them."},{"time":1122.354,"text":"117. And it came to pass that the battle became exceeding sore, for they fought like lions for their prey."},{"time":1128.817,"text":"118. And it came to pass that the people of Limhi began to drive the Lamanites before them, yet they were not half so numerous as the Lamanites;"},{"time":1138.96,"text":"119. But they fought for their lives and for their wives and for their children, Therefore, they exerted themselves and like dragons did they fight."},{"time":1146.74,"text":"120. And it came to pass that they found the king of the Lamanites among the number of their dead, Yet he was not dead, having been wounded and left upon the ground, so speedy was the flight of his people;"},{"time":1159.76,"text":"121. And they took him and bound up his wounds and brought him before Limhi and said: \"Behold, here is the king of the Lamanites; He having received a wound hath fallen among their dead and they have left him, And behold, we have brought him before you; And now, let us slay him!\""},{"time":1176.51,"text":"122. But Limhi saith unto them: \"Ye shall not slay him, but bring him hither that I may see him\"; And they brought him."},{"time":1183.717,"text":"123. And Limhi saith unto him: \"What cause have ye to come up to war against my people?"},{"time":1191.28,"text":"124. Behold, my people have not broken the oath that I made unto you; Therefore, why should ye break the oath which ye made unto my people?\""},{"time":1200.64,"text":"125. And now the king said: \"I have broken the oath because thy people did carry away the daughters of my people; Therefore, in my anger I did cause my people to come up to war against thy people.\""},{"time":1200.911,"text":"126. Now Limhi had heard nothing concerning this matter, therefore he saith: \"I will search among my people and whosoever hath done this thing shall perish\";"},{"time":1222.64,"text":"127. Therefore, he caused a search to be made among his people."},{"time":1227.36,"text":"128. Now when Gideon had heard these things, he being the king's captain, he went forth and said unto the king: \"I pray thee, forbear and do not search this people and lay not this thing to their charge,"},{"time":1239.793,"text":"129. For do ye not remember the priests of thy father which this people sought to destroy?"},{"time":1246.04,"text":"130. And are they not in the wilderness? And is it not they which have stolen the daughters of the Lamanites?"},{"time":1254.32,"text":"131. \"And now behold, and tell the king of these things that he may tell his people, that they may be pacified toward us, For behold, they are already preparing to come against us; And behold also, there are but few of us,"},{"time":1268.851,"text":"132. And behold, they come with their numerous hosts, And except the king doth pacify them toward us, we must perish;"},{"time":1277.76,"text":"133. For are not the words of Abinadi fulfilled which he prophesied against us? And all this because we would not hearken unto the word of the Lord and turn from our iniquities?"},{"time":1289.92,"text":"134. \"And now, let us pacify the king and we fulfill the oath which we have made unto him, For it is better that we should be in bondage than that we should lose our lives; Therefore, let us put a stop to the shedding of so much blood.\""},{"time":1304.16,"text":"135. And now Limhi told the king all the things concerning his father and the priests that had fled into the wilderness, And attributed the carrying away of their daughters to them."},{"time":1314.32,"text":"136. And it came to pass that the king was pacified toward his people, And he said unto them: \"Let us go forth to meet my people without arms; And I swear unto you with an oath that my people shall not slay thy people.\""},{"time":1326.463,"text":"137. And it came to pass that they followed the king and went forth without arms to meet the Lamanites."},{"time":1333.02,"text":"138. And it came to pass that they did meet the Lamanites; And the king of the Lamanites did bow himself down before them and did plead in behalf of the people of Limhi;"},{"time":1343.238,"text":"139. And when the Lamanites saw the people of Limhi, that they were without arms, They had compassion on them and were pacified toward them and returned with their king in peace to their own land."},{"time":1354.697,"text":"140. And it came to pass that Limhi and his people returned to the City of Nephi and began to dwell in the land again in peace."},{"time":1363.04,"text":"141. And it came to pass that after many days the Lamanites began again to be stirred up in anger against the Nephites; And they began to come into the borders of the land round about."},{"time":1373.646,"text":"142. Now they durst not slay them because of the oath which their king had made unto Limhi; But they would smite them on their cheeks and exercise authority over them, And began to put heavy burdens upon their backs and drive them as they would a dumb ass; Yea, all this was done that the word of the Lord might be fulfilled."},{"time":1392.109,"text":"143. And now the afflictions of the Nephites were great; And there was no way that they could deliver themselves out of their hands, for the Lamanites had surrounded them on every side."},{"time":1402.28,"text":"144. And it came to pass that the people began to murmur with the king, because of their afflictions, And they began to be desirous to go against them to battle,"},{"time":1411.765,"text":"145. And they did afflict the king sorely with their complaints, Therefore, he granted unto them that they should do according to their desires;"},{"time":1421.52,"text":"146. And they gathered themselves together again and put on their armor and went forth against the Lamanites, to drive them out of their land."},{"time":1428.968,"text":"147. And it came to pass that the Lamanites did beat them and drive them back and slay many of them."},{"time":1435.591,"text":"148. And now, there was a great mourning and lamentation among the people of Limhi: The widow a mourning for her husband, The son and the daughter a mourning for their father, And the brothers, for their brethren."},{"time":1448.287,"text":"149. Now there were a great many widows in the land and they did cry mightily from day to day, for a great fear of the Lamanites had come upon them."},{"time":1459.12,"text":"150. And it came to pass that their continual cries did stir up the remainder of the people of Limhi to anger against the Lamanites,"},{"time":1466.136,"text":"151. And they went again to battle, but they were driven back again, suffering much loss;"},{"time":1474.786,"text":"152. Yea, they went again, even the third time, and suffered in the like manner; And those that were not slain returned again to the City of Nephi."},{"time":1483.436,"text":"153. And they did humble themselves even to the dust, subjecting themselves to the yoke of bondage, Submitting themselves to be smitten and to be driven to and fro and burdened, according to the desires of their enemies;"},{"time":1496.88,"text":"154. And they did humble themselves, even in the depths of humility; And they did cry mightily to God, Yea, even all the day long did they cry unto their God, that He would deliver them out of their afflictions."},{"time":1508.603,"text":"155. And now the Lord was slow to hear their cry because of their iniquities;"},{"time":1515.92,"text":"156. Nevertheless, the Lord did hear their cries and began to soften the hearts of the Lamanites, that they began to ease their burdens; Yet the Lord did not see fit to deliver them out of bondage."},{"time":1527.92,"text":"157. And it came to pass that they began to prosper by degrees in the land, And began to raise grain more abundantly and flocks and herds, that they did not suffer with hunger."},{"time":1538.96,"text":"158. Now there was a great number of women, more than there was of men; Therefore, King Limhi commanded that every man should impart to the support of the widows and their children, that they might not perish with hunger; And this they did because of the greatness of their number that had been slain."},{"time":1555.52,"text":"159. Now the people of Limhi kept together in a body as much as it was possible and secure their grain and their flocks;"},{"time":1561.84,"text":"160. And the king himself did not trust his person without the walls of the city unless he took his guards with him, fearing that he might by some means fall into the hands of the Lamanites."},{"time":1572.701,"text":"161. And he caused that his people should watch the land round about, That by some means they might take those priests that fled into the wilderness which had stolen the daughters of the Lamanites and that had caused such a great destruction to come upon them;"},{"time":1587.765,"text":"162. For they were desirous to take them, that they might punish them, For they had come into the Land of Nephi by night and carried off their grain and many of their precious things; Therefore, they laid wait for them."},{"time":1600.64,"text":"163. And it came to pass that there was no more disturbance between the Lamanites and the people of Limhi, even until the time that Ammon and his brethren came into the land;"},{"time":1610.96,"text":"164. And the king having been without the gates of the city with his guard, he discovered Ammon and his brethren; And supposing them to be priests of Noah, therefore he caused that they should be taken and bound and cast into prison,"},{"time":1623.592,"text":"165. And had they been the priests of Noah, he would have caused that they should be put to death; But when he found that they were not, but that they were his brethren and had come from the Land of Zarahemla, he was filled with exceeding great joy."},{"time":1638.0,"text":"166. Now King Limhi had sent, previous to the coming of Ammon, a small number of men to search for the Land of Zarahemla, but they could not find it and they were lost in the wilderness;"},{"time":1649.28,"text":"167. Nevertheless, they did find a land which had been peopled, Yea, a land which was covered with dry bones, Yea, a land which had been peopled and which had been destroyed;"},{"time":1661.44,"text":"168. And they, having supposed it to be the Land of Zarahemla, returned to the Land of Nephi, Having arrived in the borders of the land not many days before the coming of Ammon;"},{"time":1672.56,"text":"169. And they brought a record with them, even a record of the people whose bones they had found, And they were engraven on plates of ore."},{"time":1680.56,"text":"170. And now Limhi was again filled with joy on learning from the mouth of Ammon that King Benjamin had a gift from God whereby he could interpret such engravings. Yea, and Ammon also did rejoice;"},{"time":1693.105,"text":"171. Yet Ammon and his brethren were filled with sorrow because so many of their brethren had been slain, And also that King Noah and his priests had caused the people to commit so many sins and iniquities against God;"},{"time":1708.4,"text":"172. And they also did mourn for the death of Abinadi, And also for the departure of Alma and the people that went with him who had formed a church of God, through the strength and power of God and faith on the words which had been spoken by Abinadi;"},{"time":1722.748,"text":"173. Yea, they did mourn for their departure, for they knew not whither they had fled."},{"time":1728.4,"text":"174. Now they would have gladly joined with them, For they themselves had entered into a covenant with God to serve Him and keep His commandments;"},{"time":1737.36,"text":"175. And now since the coming of Ammon, King Limhi had also entered into a covenant with God, and also many of his people, to serve Him and keep His commandments."},{"time":1747.6,"text":"176. And it came to pass that King Limhi and many of his people were desirous to be baptized, but there was none in the land that had authority from God;"},{"time":1757.04,"text":"177. And Ammon declined doing this thing, considering himself an unworthy servant; Therefore, they did not at that time form themselves into a church, waiting upon the Spirit of the Lord."},{"time":1769.44,"text":"178. Now they were desirous to become even as Alma and his brethren which had fled into the wilderness -"},{"time":1776.72,"text":"179. They were desirous to be baptized as a witness and a testimony that they were willing to serve God with all their hearts -"},{"time":1784.028,"text":"180. Nevertheless, they did prolong the time, And an account of their baptism shall be given hereafter."},{"time":1790.784,"text":"181. And now all the study of Ammon and his people, and King Limhi and his people, was to deliver themselves out of the hands of the Lamanites and from bondage."}]
