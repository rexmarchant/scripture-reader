window.CHAPTER_DATA = {

  audioSrc: "https://archive.org/download/1-nephi-ch-6/1%20Nephi%20Ch%206.mp3",
  lyrics: [{"time":0,"text":"First Nephi, Chapter 6"},{"time":3.36,"text":"1. Now it came to pass that I, Nephi, did teach my brethren these things;"},{"time":9.6,"text":"2. And it came to pass that I did read many things to them which were engraven upon the plates of brass, that they might know concerning the doings of the Lord in other lands among people of old;"},{"time":20.64,"text":"3. And I did read many things unto them which were written in the books of Moses;"},{"time":26.08,"text":"4. But that I might more fully persuade them to believe in the Lord their Redeemer, Wherefore, I did read unto them that which was written by the prophet Isaiah,"},{"time":35.52,"text":"5. For I did liken all scriptures unto us, that it might be for our profit and learning."},{"time":41.68,"text":"6. Wherefore, I spake unto them, saying: \"Hear ye the words of the prophet, ye which are a remnant of the house of Israel, a branch which have been broken off; Hear ye the words of the prophet which were written unto all the house of Israel and liken it unto yourselves, that ye may have hope, as well as your brethren from whom ye have been broken off.\""},{"time":62.24,"text":"7. For after this manner hath the prophet written:"},{"time":66.459,"text":"8. \"Hearken and hear this, O house of Jacob, which are called by the name of Israel and are come forth out of the waters of Judah, Which swear by the name of the Lord and make mention of the God of Israel, yet they swear not in truth nor in righteousness;"},{"time":81.451,"text":"9. Nevertheless, they call themselves of the holy city, But they do not stay themselves upon the God of Israel, which is the Lord of Hosts - Yea, the Lord of Hosts is His name:"},{"time":92.818,"text":"10. Behold, I have declared the former things from the beginning; And they went forth out of My mouth and I showed them - I did show them suddenly."},{"time":102.8,"text":"11. And I did it because I knew that thou art obstinate, and thy neck was an iron sinew, and thy brow brass;"},{"time":109.62299999999999,"text":"12. And I have, even from the beginning, declared to thee - Before it came to pass, I showed them thee; And I showed them for fear, lest thou shouldst say, 'Mine idol hath done them, And my graven image and my molten image hath commanded them.'"},{"time":126.64,"text":"13. Thou hast heard and seen all this, And will ye not declare them? And that I have showed thee new things from this time, even hidden things, And thou didst not know them."},{"time":138.72,"text":"14. They are created now and not from the beginning; Even before the day when thou heardest them not, they were declared unto thee, Lest thou shouldst say, 'Behold, I knew them.'"},{"time":150.48,"text":"15. Yea, and thou heardest not. Yea, thou knewest not, Yea, from that time thine ear was not opened; For I knew that thou wouldst deal very treacherously and wast called a transgressor from the womb."},{"time":164.72,"text":"16. Nevertheless, for My name's sake will I defer Mine anger, And for My praise will I refrain from thee that I cut thee not off."},{"time":173.017,"text":"17. For behold, I have refined thee - I have chosen thee in the furnace of affliction."},{"time":179.36,"text":"18. For Mine own sake, yea, for Mine own sake, will I do this; For I will not suffer My name to be polluted. And I will not give My glory unto another."},{"time":191.04,"text":"19. Hearken unto Me, O Jacob, and Israel, My called - for I Am He, and I Am the first, and I Am also the last."},{"time":202.72,"text":"20. Mine hand hath also laid the foundation of the earth, And My right hand hath spanned the heavens. And I called unto them, And they stand up together."},{"time":212.72,"text":"21. All ye, assemble yourselves and hear! Which among them hath declared these things unto them? The Lord hath loved him. Yea, and He will fulfill His word which He hath declared by them. And He will do His pleasure on Babylon, And His arm shall come upon the Chaldeans.\""},{"time":233.92000000000002,"text":"22. Also saith the Lord: \"I, the Lord, yea, I have spoken. Yea, I have called him to declare; I have brought him and he shall make his way prosperous."},{"time":245.945,"text":"23. Come ye near unto Me; I have not spoken in secret from the beginning; From the time that it was declared have I spoken. And the Lord God and His Spirit hath sent Me.\""},{"time":258.12,"text":"24. And thus saith the Lord, thy Redeemer, the Holy One of Israel: \"I have sent Him, The Lord thy God which teacheth thee to profit, which leadeth thee by the way thou shouldst go, hath done it."},{"time":271.36,"text":"25. O that thou hadst hearkened to My commandments! Then had thy peace been as a river, And thy righteousness as the waves of the sea."},{"time":275.727,"text":"26. Thy seed also had been as the sand, The offspring of thy bowels like the gravel thereof; His name should not have been cut off nor destroyed from before Me.\""},{"time":290.24,"text":"27. Go ye forth of Babylon, flee ye from the Chaldeans. With a voice of singing, declare ye - tell this - utter to the end of the earth - say ye, \"The Lord hath redeemed His servant Jacob!\""},{"time":306.08,"text":"28. And they thirsted not - He led them through the deserts - He caused the waters to flow out of the rock for them; He cleaved the rock also and the waters gushed out."},{"time":316.456,"text":"29. And notwithstanding He hath done all this, and greater also, \"There is no peace,\" saith the Lord, \"unto the wicked."},{"time":325.12,"text":"30. And again, hearken, O ye house of Israel - All ye that are broken off and are driven out because of the wickedness of the pastors of My people; Yea, all ye that are broken off, that are scattered abroad, which are of My people, O house of Israel."},{"time":341.436,"text":"31. Listen, O isles, unto Me, And hearken, ye people from far. The Lord hath called Me from the womb; From the bowels of My mother hath He made mention of My name."},{"time":353.099,"text":"32. And He hath made My mouth like a sharp sword; In the shadow of His hand hath He hid Me and made Me a polished shaft - In His quiver hath He hid Me."},{"time":364.164,"text":"33. And said unto Me, 'Thou art My Servant, O Israel, in whom I will be glorified.'"},{"time":370.96,"text":"34. Then I said, 'I have labored in vain. I have spent My strength for naught and in vain; Surely My judgment is with the Lord, And My work with My God.'"},{"time":382.248,"text":"35. And now, saith the Lord that formed Me from the womb, that I should be His Servant to bring Jacob again to Him; Though Israel be not gathered, yet shall I be glorious in the eyes of the Lord, And My God shall be My strength."},{"time":396.865,"text":"36. And He said, 'It is a light thing that Thou shouldst be My Servant, to raise up the tribes of Jacob and to restore the preserved of Israel; I will also give Thee for a light to the Gentiles that Thou mayest be My salvation unto the ends of the earth.'\""},{"time":411.979,"text":"37. Thus saith the Lord, the Redeemer of Israel, His Holy One, to Him whom man despiseth, to Him whom the nations abhorreth, to Servant of rulers: \"Kings shall see and arise, princes also shall worship, Because of the Lord that is faithful.\""},{"time":429.04,"text":"38. Thus said the Lord: \"In an acceptable time have I heard thee, O isles of the sea, And in a day of salvation have I helped thee; And I will preserve thee and give thee My Servant for a covenant of the people, to establish the earth, to cause to inherit the desolate heritages,"},{"time":446.12,"text":"39. That thou mayest say to the prisoners, 'Go forth!' To them that sit in darkness, 'Show yourselves!' They shall feed in the ways and their pastures shall be in all high places,"},{"time":459.831,"text":"40. They shall not hunger, nor thirst, Neither shall the heat nor the sun smite them; For He that hath mercy on them shall lead them, Even by the springs of water shall He guide them."},{"time":471.084,"text":"41. And I will make all My mountains a way, And My highways shall be exalted."},{"time":476.853,"text":"42. And then, O house of Israel, Behold, these shall come from far; And lo, these, from the north and from the west, And these, from the Land of Sinim.\""},{"time":489.68,"text":"43. Sing, O heavens! and be joyful, O earth! For the feet of them which are in the east shall be established. And break forth into singing, O mountains! For they shall be smitten no more. For the Lord hath comforted His people and will have mercy upon His afflicted."},{"time":511.44,"text":"44. But behold, Zion hath said, \"The Lord hath forsaken me, And my Lord hath forgotten me.\" But He will show that He hath not."},{"time":520.88,"text":"45. For can a woman forget her sucking child, that she should not have compassion on the son of her womb? Yea, they may forget, yet will I not forget thee, O house of Israel."},{"time":532.8,"text":"46. Behold, I have graven thee upon the palms of My hands; Thy walls are continually before Me."},{"time":540.245,"text":"47. Thy children shall make haste against thy destroyers. And they that made thee waste shall go forth of thee."},{"time":548.623,"text":"48. Lift up thine eyes round about and behold; All these gather themselves together and they shall come to thee. And as I live,\" saith the Lord, \"thou shalt surely clothe thee with them all as with an ornament, And bind them on even as a bride."},{"time":563.836,"text":"49. For thy waste and thy desolate places and the land of thy destruction shall even now be too narrow by reason of the inhabitants; And they that swallowed thee up shall be far away."},{"time":574.84,"text":"50. The children which thou shalt have - after thou hast lost the other - shall again in thine ears say: 'The place is too strait for me; Give place to me that I may dwell.'"},{"time":586.64,"text":"51. Then shalt thou say in thine heart: 'Who hath begotten me these, seeing I have lost my children, And am desolate, a captive, and removing to and fro? And who hath brought up these? Behold, I was left alone; These - where have they been?'\""},{"time":604.535,"text":"52. Thus saith the Lord God: \"Behold, I will lift up Mine hand to the Gentiles and set up My standard to the people; And they shall bring thy sons in their arms, And thy daughters shall be carried upon their shoulders;"},{"time":618.696,"text":"53. And kings shall be thy nursing fathers, And their queens thy nursing mothers; They shall bow down to thee with their face toward the earth and lick up the dust of thy feet. And thou shalt know that I Am the Lord, For they shall not be ashamed that wait for Me.\""},{"time":635.461,"text":"54. For shall the prey be taken from the mighty? Or the lawful captive delivered?"},{"time":640.555,"text":"55. But thus saith the Lord: \"Even the captive of the mighty shall be taken away, And the prey of the terrible shall be delivered; For I will contend with him that contendeth with thee, And I will save thy children."},{"time":653.5409999999999,"text":"56. And I will feed them that oppress thee with their own flesh. They shall be drunken with their own blood as with sweet wine. And all flesh shall know that I, the Lord, am thy Savior, And thy Redeemer, the Mighty One of Jacob.\""}]
};
