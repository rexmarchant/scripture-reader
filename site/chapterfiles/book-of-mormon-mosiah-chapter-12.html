  lyrics: [{"time":0.0,"text":"Mosiah Chapter 12"},{"time":1.137,"text":"1. Now it came to pass that after the sons of Mosiah had done all these things, they took a small number with them and returned to their father, the king, And desired of him that he would grant unto them that they might, with those whom they had selected, go up to the Land of Nephi,"},{"time":18.658,"text":"2. That they might preach the things which they had heard and that they might impart the word of God to their brethren, the Lamanites, That perhaps they might bring them to the knowledge of the Lord their God and convince them of the iniquity of their fathers;"},{"time":33.12,"text":"3. And that perhaps they might cure them of their hatred toward the Nephites, That they might also be brought to rejoice in the Lord their God,"},{"time":41.4,"text":"4. That they might become friendly to one another and that there should be no more contentions in all the land which the Lord their God hath given them."},{"time":50.48,"text":"5. Now they were desirous that salvation should be declared to every creature, for they could not bear that any human soul should perish;"},{"time":58.202,"text":"6. Yea, even the very thoughts that any soul should endure endless torment did cause them to quake and tremble."},{"time":65.925,"text":"7. And thus did the Spirit of the Lord work upon them, for they were the very vilest of sinners;"},{"time":72.556,"text":"8. And the Lord saw fit in His infinite mercy to spare them; Nevertheless, they suffered much anguish of soul because of their iniquities, And suffering much, fearing that they should be cast off forever."},{"time":84.936,"text":"9. And it came to pass that they did plead with their father many days, that they might go up to the Land of Nephi."},{"time":93.28,"text":"10. And it came to pass that King Mosiah went and inquired of the Lord if he should let his sons go up among the Lamanites to preach the word."},{"time":101.373,"text":"11. And the Lord said unto Mosiah: \"Let them go up, for many shall believe on their words and they shall have eternal life; And I will deliver thy sons out of the hands of the Lamanites.\""},{"time":112.838,"text":"12. And it came to pass that Mosiah granted that they might go and do according to their request;"},{"time":118.828,"text":"13. And they took their journey into the wilderness to go up to preach the word among the Lamanites; And I shall give an account of their proceedings hereafter."},{"time":127.396,"text":"14. Now King Mosiah had no one to confer the kingdom upon, for there was not any of his sons which would accept of the kingdom;"},{"time":136.44,"text":"15. Therefore, he took the records which were engraven upon the plates of brass, and also the plates of Nephi and all the things which he had kept and preserved according to the commandments of God,"},{"time":148.04,"text":"16. And after having translated and caused to be written the records which were on the plates of gold which had been found by the people of Limhi, which were delivered to him by the hand of Limhi -"},{"time":159.136,"text":"17. And this he did because of the great anxiety of his people, for they were desirous beyond measure to know concerning those people which had been destroyed -"},{"time":169.44,"text":"18. And now he translated them by the means of those two stones which were fastened into the two rims of a bow;"},{"time":176.198,"text":"19. Now these things were prepared from the beginning and were handed down from generation to generation for the purpose of interpreting languages;"},{"time":184.928,"text":"20. And they have been kept and preserved by the hand of the Lord, that He should discover to every creature which should possess the land the iniquities and abominations of His people;"},{"time":195.696,"text":"21. And whosoever has these things is called seer after the manner of old times -"},{"time":202.288,"text":"22. Now after Mosiah had finished translating these records, Behold, it gave an account of the people which were destroyed, From the time that they were destroyed back to the building of the Great Tower, At the time the Lord confounded the language of the people,"},{"time":216.24,"text":"23. and they were scattered abroad upon the face of all the earth, Yea, and even from that time until the creation of Adam -"},{"time":225.68,"text":"24. Now this account did cause the people of Mosiah to mourn exceedingly, Yea, they were filled with sorrow;"},{"time":232.0,"text":"25. Nevertheless, it gave them much knowledge in the which they did rejoice;"},{"time":238.72,"text":"26. And this account shall be written hereafter; For behold, it is expedient that all people should know the things which are written in this account -"}]
