<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "1 Nephi",
  chapter: "Chapter 2",
  audioSrc: "https://archive.org/download/1-nephi-ch-2/1%20Nephi%20Ch%202.mp3",
  lyrics: [{"time":0,"text":"First Nephi, Chapter 2"},{"time":3.2,"text":"1. And now I, Nephi, do not give the genealogy of my fathers in this part of my record, Neither at any time shall I give it after upon these plates which I am writing, for it is given in the record which has been kept by my father; Wherefore, I do not write it in this work,"},{"time":13.68,"text":"2. For it sufficeth me to say that we are a descendant of Joseph."},{"time":25.106,"text":"3. And it mattereth not to me that I am particular to give a full account of all the things of my father, for they cannot be written upon these plates, for I desire the room that I may write of the things of God,"},{"time":38.08,"text":"4. For the fullness of mine intent is that I may persuade men to come unto the God of Abraham and the God of Isaac and the God of Jacob and be saved;"},{"time":47.04,"text":"5. Wherefore, the things which are pleasing unto the world I do not write, but the things which are pleasing unto God and unto them which are not of the world;"},{"time":55.52,"text":"6. Wherefore, I shall give commandment unto my seed that they shall not occupy these plates with things which are not of worth unto the children of men."},{"time":65.36,"text":"7. And now I would that ye might know that after my father Lehi had made an end of prophesying concerning his seed, It came to pass that the Lord spake unto him again, saying that it was not meet for him, Lehi, that he should take his family into the wilderness alone, But that his sons should take daughters to wife, that they might raise up seed unto the Lord in the Land of Promise."},{"time":87.12,"text":"8. And it came to pass that the Lord commanded him that I, Nephi, and my brethren should again return into the Land of Jerusalem and bring down Ishmael and his family into the wilderness."},{"time":98.72,"text":"9. And it came to pass that I, Nephi, did again, with my brethren, go forth into the wilderness to go up to Jerusalem."},{"time":106.535,"text":"10. And it came to pass that we went up unto the house of Ishmael, And we did gain favor in the sight of Ishmael insomuch that we did speak unto him the words of the Lord."},{"time":116.352,"text":"11. And it came to pass that the Lord did soften the heart of Ishmael, and also his household, Insomuch that they took their journey with us down into the wilderness to the tent of our father."},{"time":128.08,"text":"12. And it came to pass that as we journeyed in the wilderness, Behold, Laman and Lemuel and two of the daughters of Ishmael, and the two sons of Ishmael and their families, did rebel against us, Yea, against I, Nephi, and Sam and their father Ishmael and his wife and his three other daughters."},{"time":146.014,"text":"13. And it came to pass that in the which rebellion they were desirous to return unto the Land of Jerusalem."},{"time":153.77,"text":"14. And now, I, Nephi, being grieved for the hardness of their hearts, therefore, I spake unto them saying, yea, even unto Laman and unto Lemuel: \"Behold, thou art mine elder brethren, And how is it that ye are so hard in your hearts and so blind in your minds that ye have need that I, your younger brother, should speak unto you, yea, and set an example for you?"},{"time":177.028,"text":"15. How is it that ye have not hearkened unto the word of the Lord?"},{"time":181.836,"text":"16. How is it that ye have forgotten that ye have seen an angel of the Lord?"},{"time":187.2,"text":"17. Yea, and how is it that ye have forgotten how great things the Lord hath done for us in delivering us out of the hands of Laban, and also that we should obtain the record?"},{"time":197.76,"text":"18. Yea, and how is it that ye have forgotten that the Lord is able to do all things according to His will for the children of men, if it so be that they exercise faith in Him? Wherefore, let us be faithful in Him;"},{"time":210.351,"text":"19. And if it so be that we are faithful in Him, we shall obtain the Land of Promise; And ye shall know at some future period that the word of the Lord shall be fulfilled concerning the destruction of Jerusalem,"},{"time":222.73,"text":"20. For all things which the Lord hath spoken concerning the destruction of Jerusalem must be fulfilled."},{"time":229.728,"text":"21. For behold, the Spirit of the Lord ceaseth soon to strive with them;"},{"time":235.379,"text":"22. For behold, they have rejected the prophets and Jeremiah have they cast into prison,"},{"time":240.72,"text":"23. And they have sought to take away the life of my father insomuch that they have driven him out of the land."},{"time":248.232,"text":"24. Now behold I say unto you, that if ye will return unto Jerusalem ye shall also perish with them."},{"time":254.56,"text":"25. And now if ye have choice, go up to the land and remember the words which I speak unto you, that if ye go ye will also perish, For thus the Spirit of the Lord constraineth me that I should speak.\""},{"time":267.065,"text":"26. And it came to pass that when I, Nephi, had spoken these words unto my brethren, they were angry with me."},{"time":274.24,"text":"27. And it came to pass that they did lay their hands upon me, for behold, they were exceeding wroth; And they did bind me with cords, for they sought to take away my life that they might leave me in the wilderness to be devoured by wild beasts."},{"time":289.76,"text":"28. But it came to pass that I prayed unto the Lord, saying: \"O Lord, according to my faith which is in me, wilt Thou deliver me from the hands of my brethren?"},{"time":299.808,"text":"29. Yea, even give me strength that I may burst these bands with which I am bound.\""},{"time":305.28,"text":"30. And it came to pass that when I had said these words, behold, the bands were loosed from off my hands and feet, And I stood before my brethren and I spake unto them again."},{"time":316.08,"text":"31. And it came to pass that they were angry with me again and sought to lay hands upon me;"},{"time":322.004,"text":"32. But behold, one of the daughters of Ishmael, yea, and also her mother and one of the sons of Ishmael, did plead with my brethren insomuch that they did soften their hearts and they did cease striving to take away my life."},{"time":335.924,"text":"33. And it came to pass that they were sorrowful because of their wickedness insomuch that they did bow down before me and did plead with me that I would forgive them of the thing that they had done against me."},{"time":346.796,"text":"34. And it came to pass that I did frankly forgive them all that they had done, And I did exhort them that they would pray unto the Lord their God for forgiveness."},{"time":355.288,"text":"35. And it came to pass that they did so;"},{"time":358.547,"text":"36. And after that they had done praying unto the Lord, we did again travel on our journey toward the tent of our father."},{"time":366.16,"text":"37. And it came to pass that we did come down unto the tent of our father;"},{"time":370.902,"text":"38. And after that I and my brethren and all the house of Ishmael had come down unto the tent of my father, They did give thanks unto the Lord their God,"},{"time":379.769,"text":"39. And they did offer sacrifice and offer burnt offerings unto Him."},{"time":384.218,"text":"40. And it came to pass that we had gathered together all manner of seeds of every kind - both of grain of every kind, and also of the seeds of fruits of every kind."},{"time":394.52,"text":"41. And it came to pass that while my father tarried in the wilderness, he spake unto us, saying: \"Behold, I have dreamed a dream, or in other words, I have seen a vision;"},{"time":406.36,"text":"42. And behold, because of the thing which I have seen, I have reason to rejoice in the Lord because of Nephi, and also of Sam, For I have reason to suppose that they, and also many of their seed, will be saved."},{"time":420.607,"text":"43. But behold, Laman and Lemuel, I fear exceedingly because of you, For behold, methought I saw a dark and dreary wilderness."},{"time":429.28,"text":"44. And it came to pass that I saw a man, And he was dressed in a white robe, And he came and stood before me."},{"time":437.28,"text":"45. And it came to pass that he spake unto me and bade me follow him."},{"time":441.783,"text":"46. And it came to pass that as I followed him, and after I had followed him, I beheld myself, that I was in a dark and dreary waste;"},{"time":450.926,"text":"47. And after that I had traveled for the space of many hours in darkness, I began to pray unto the Lord that He would have mercy on me according to the multitude of His tender mercies."},{"time":461.587,"text":"48. And it came to pass that after I had prayed unto the Lord, behold, a large and spacious field."},{"time":468.192,"text":"49. And it came to pass that I beheld a tree whose fruit was desirable to make one happy;"},{"time":474.16700000000003,"text":"50. And it came to pass that I did go forth and partake of the fruit thereof and beheld that it was most sweet above all that I ever had before tasted."},{"time":484.16,"text":"51. Yea, and I beheld that the fruit thereof was white to exceed all the whiteness that I had ever seen;"},{"time":491.2,"text":"52. And as I partook of the fruit thereof, it filled my soul with exceeding great joy;"},{"time":497.2,"text":"53. Wherefore, I began to be desirous that my family should partake of it also, for I knew that it was desirous above all other fruit."},{"time":505.002,"text":"54. And as I cast my eyes round about that perhaps I might discover my family also - And I beheld a river of water, And it ran along and it was near the tree of which I was partaking the fruit;"},{"time":516.663,"text":"55. And I looked to behold from whence it came and I saw the head thereof a little way off;"},{"time":522.648,"text":"56. And at the head thereof I beheld your mother Sariah and Sam and Nephi; And they stood as if they knew not whither they should go."},{"time":531.12,"text":"57. And it came to pass that I beckoned unto them, And I also did say unto them with a loud voice that they should come unto me and partake of the fruit which was desirable above all other fruit."},{"time":541.516,"text":"58. And it came to pass that they did come unto me and partake of the fruit also."},{"time":547.406,"text":"59. And it came to pass that I was desirous that Laman and Lemuel should come and partake of the fruit also;"},{"time":554.703,"text":"60. Wherefore, I cast mine eyes toward the head of the river, that perhaps I might see them."},{"time":560.344,"text":"61. And it came to pass that I saw them, But they would not come unto me and partake of the fruit."},{"time":566.644,"text":"62. And I beheld a rod of iron; And it extended along the bank of the river and led to the tree by which I stood;"},{"time":574.625,"text":"63. And I also beheld a strait and narrow path which came along by the rod of iron, even to the tree by which I stood;"},{"time":582.01,"text":"64. And it also led by the head of the fountain unto a large and spacious field, as if it had been a world;"},{"time":589.436,"text":"65. And I saw numberless concourses of people, many of whom were pressing forward, that they might obtain the path which led unto the tree by which I stood."},{"time":598.537,"text":"66. And it came to pass that they did come forth and commenced in the path which led to the tree."},{"time":604.581,"text":"67. And it came to pass that there arose a mist of darkness, yea, even an exceeding great mist of darkness, Insomuch that they which had commenced in the path did lose their way, that they wandered off and were lost."},{"time":617.216,"text":"68. And it came to pass that I beheld others pressing forward; And they came forth and caught hold of the end of the rod of iron;"},{"time":625.6,"text":"69. And they did press forward through the mists of darkness, clinging to the rod of iron even until they did come forth and partake of the fruit of the tree."},{"time":634.224,"text":"70. And after that they had partaken of the fruit of the tree, they did cast their eyes about as if they were ashamed."},{"time":641.168,"text":"71. And I also cast my eyes round about and beheld on the other side of the river of water a great and spacious building,"},{"time":648.8,"text":"72. And it stood, as it were, in the air high above the earth;"},{"time":653.343,"text":"73. And it was filled with people - both old and young, both male and female;"},{"time":659.32,"text":"74. And their manner of dress was exceeding fine;"},{"time":663.2,"text":"75. And they were in the attitude of mocking and pointing their fingers toward those which had come up and were partaking of the fruit;"},{"time":669.962,"text":"76. And after that they had tasted of the fruit, they were ashamed because of those that were a scoffing at them, And they fell away into forbidden paths and were lost.\""},{"time":679.558,"text":"77. And now, I, Nephi, do not speak all the words of my father,"},{"time":685.92,"text":"78. But to be short in writing, behold, he saw other multitudes pressing forward, And they came and caught hold of the end of the rod of iron, And they did press their way forward, continually holding fast to the rod of iron until they came forth and fell down and partook of the fruit of the tree;"},{"time":702.452,"text":"79. And he also saw other multitudes pressing their way toward that great and spacious building;"},{"time":709.44,"text":"80. And it came to pass that many were drowned in the depths of the fountain,"},{"time":714.08,"text":"81. And many were lost from his view wandering in strange roads,"},{"time":718.48,"text":"82. And great was the multitude that did enter into that strange building;"},{"time":723.14,"text":"83. And after that they did enter into that building, they did point the finger of scorn at me and those that were partaking of the fruit also, But we heeded them not;"},{"time":732.82,"text":"84. Thus are the words of my father: \"For as many as heeded them had fallen away,"},{"time":738.093,"text":"85. And Laman and Lemuel partook not of the fruit,\" saith my father."},{"time":743.044,"text":"86. And it came to pass that after my father had spoken all the words of his dream or vision, which were many, He said unto us, because of these things which he saw in a vision, he exceedingly feared for Laman and Lemuel -"},{"time":757.2,"text":"87. Yea, he feared lest they should be cast off from the presence of the Lord;"},{"time":762.56,"text":"88. And he did exhort them then with all the feeling of a tender parent that they would hearken to his words, in that perhaps the Lord would be merciful to them and not cast them off."},{"time":773.04,"text":"89. Yea, my father did preach unto them;"},{"time":775.622,"text":"90. And after that he had preached unto them and also prophesied unto them of many things, he bade them to keep the commandments of the Lord;"},{"time":784.733,"text":"91. And he did cease speaking unto them."},{"time":787.065,"text":"92. And all these things did my father see and hear and speak as he dwelt in a tent in the Valley of Lemuel, And also a great many more things which cannot be written upon these plates."},{"time":798.178,"text":"93. And now as I have spoken concerning these plates, behold, they are not the plates upon which I make a full account of the history of my people,"},{"time":808.011,"text":"94. For the plates upon which I make a full account of my people I have given the name of Nephi;"},{"time":814.293,"text":"95. Wherefore, they are called the plates of Nephi after mine own name; And these plates also are called the plates of Nephi."},{"time":823.395,"text":"96. Nevertheless, I have received a commandment of the Lord that I should make these plates for the special purpose that there should be an account engraven of the ministry of my people,"},{"time":832.351,"text":"97. And upon the other plates should be engraven an account of the reigns of the kings and the wars and contentions of my people;"},{"time":839.84,"text":"98. Wherefore, these plates are for the more part of the ministry, And the other plates are for the more part of the reigns of the kings and the wars and contentions of my people;"},{"time":849.6,"text":"99. Wherefore, the Lord hath commanded me to make these plates for a wise purpose in Him, which purpose I know not,"},{"time":856.817,"text":"100. But the Lord knoweth all things from the beginning;"},{"time":860.88,"text":"101. Wherefore, He prepareth a way to accomplish all His works among the children of men, For behold, He hath all power unto the fulfilling of all His words;"},{"time":869.531,"text":"102. And thus it is. Amen."}]
};
