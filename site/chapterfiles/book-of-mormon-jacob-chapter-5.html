  audioSrc: "https://archive.org/download/jacob-ch-5/Jacob%20Ch%205.mp3",
  lyrics: [{"time":0.0,"text":"Jacob Chapter 5"},{"time":1.167,"text":"1. And now it came to pass that after some years had passed away, there came a man among the people of Nephi whose name was Sherem."},{"time":11.28,"text":"2. And it came to pass that he began to preach among the people and to declare unto them that there should be no Christ;"},{"time":18.72,"text":"3. And he preached many things which were flattering unto the people; And this he did that he might overthrow the doctrine of Christ;"},{"time":26.68,"text":"4. And he labored diligently that he might lead away the hearts of the people, insomuch that he did lead away many hearts."},{"time":34.68,"text":"5. And he knowing that I, Jacob, had faith in Christ which should come, Wherefore, he sought much opportunity that he might come unto me;"},{"time":44.08,"text":"6. And he was learned, that he had a perfect knowledge of the language of the people; Wherefore, he could use much flattery and much power of speech according to the power of the devil."},{"time":55.08,"text":"7. And he had hope to shake me from the faith, notwith - standing the many revelations and the many things which I had seen concerning these things; For I truly had seen angels and they had ministered unto me,"},{"time":68.0,"text":"8. And also, I had heard the voice of the Lord speaking unto me in very word from time to time, Wherefore, I could not be shaken."},{"time":77.24,"text":"9. And it came to pass that he came unto me and on this wise did he speak unto me, saying: \"Brother Jacob, I have sought much opportunity that I might speak unto you, For I have heard and also know that thou goest about much, preaching that which ye call the gospel, or the doctrine of Christ;"},{"time":95.32,"text":"10. And ye have led away much of this people, that they pervert the right way of God and keep not the law of Moses, which is the right way, And convert the law of Moses into the worship of a Being which ye say shall come many hundred years hence."},{"time":109.88,"text":"11. \"And now behold, I, Sherem, declare unto you that this is blasphemy, For no man knoweth of such things, for he cannot tell of things to come.\""},{"time":120.6,"text":"12. And after this manner did Sherem contend against me;"},{"time":124.88,"text":"13. But behold, the Lord God poured in His Spirit into my soul, insomuch that I did confound him in all his words."},{"time":133.6,"text":"14. And I saith unto him: \"Deniest thou the Christ which should come?\""},{"time":141.16,"text":"15. And he saith: \"If there should be a Christ, I would not deny Him; But I know that there is no Christ, neither hath been, nor never will be.\""},{"time":148.72,"text":"16. And I saith unto him: \"Believest thou the scriptures?\""},{"time":152.002,"text":"17. And he saith: \"Yea.\""},{"time":155.284,"text":"18. And I saith unto him: \"Then ye do not understand them, for they truly testify of Christ;"},{"time":163.12,"text":"19. Behold, I say unto you that none of the prophets have written nor prophesied, save they have spoken concerning this Christ;"},{"time":171.76,"text":"20. And this is not all - It hath been made manifest unto me, for I have heard and seen; And it also hath been made manifest unto me by the power of the Holy Ghost;"},{"time":182.64,"text":"21. Wherefore, I know if there should be no atonement made, all mankind must be lost.\""},{"time":189.36,"text":"22. And it came to pass that he saith unto me: \"Show me a sign by this power of the Holy Ghost in the which ye know so much.\""},{"time":197.36,"text":"23. And I said unto him: \"What am I, that I should tempt God to show unto thee a sign in the thing which thou knowest to be true?"},{"time":205.76,"text":"24. Yet thou wilt deny it because thou art of the devil;"},{"time":210.08,"text":"25. Nevertheless, not my will be done; But if God shall smite thee, let that be a sign unto thee that He hath power, both in heaven and in earth, And also, that Christ shall come;"},{"time":222.24,"text":"26. And Thy will, O Lord, be done and not mine.\""},{"time":227.2,"text":"27. And it came to pass that when I, Jacob, had spoken these words, the power of the Lord came upon him, insomuch that he fell to the earth."},{"time":237.12,"text":"28. And it came to pass that he was nourished for the space of many days."},{"time":242.48,"text":"29. And it came to pass that he saith unto the people: \"Gather together on the morrow, for I shall die; Wherefore, I desire to speak unto the people before that I shall die.\""},{"time":253.6,"text":"30. And it came to pass that on the morrow that the multitude were gathered together, And he spake plainly unto them and denied the things which he had taught them, And confessed the Christ and the power of the Holy Ghost and the ministering of angels;"},{"time":258.009,"text":"31. And he spake plainly unto them that he had been deceived by the power of the devil;"},{"time":272.8,"text":"32. And he spake of hell and of eternity and of eternal punishment."},{"time":278.24,"text":"33. And he saith: \"I fear lest I have committed the unpardonable sin, For I have lied unto God, for I denied the Christ and said that I believed the scriptures - And they truly testify of Him;"},{"time":290.56,"text":"34. And because that I have thus lied unto God, I greatly fear lest my case shall be awful; But I confess unto God.\""},{"time":298.96,"text":"35. And it came to pass that when he had said these words, he could say no more and he gave up the ghost;"},{"time":305.84,"text":"36. And when the multitude had witnessed that he spake these things as he was about to give up the ghost, they were astonished exceedingly, Insomuch that the power of God came down upon them and they were overcome, that they fell to the earth."},{"time":319.44,"text":"37. Now this thing was pleasing unto me, Jacob, for I had requested it of my Father which was in heaven, For He had heard my cry and answered my prayer."},{"time":329.68,"text":"38. And it came to pass that peace and the love of God was restored again among the people; And they searched the scriptures and hearkened no more to the words of this wicked man."},{"time":339.84,"text":"39. And it came to pass that many means were devised to reclaim and restore the Lamanites to the knowledge of the truth, But it all was vain, for they delighted in wars and bloodsheds, And they had an eternal hatred against us, their brethren;"},{"time":354.4,"text":"40. And they sought by the power of their arms to destroy us continually;"},{"time":359.6,"text":"41. Wherefore, the people of Nephi did fortify against them with their arms and with all their might, trusting in the God and the Rock of their salvation; Wherefore, they became as yet, conquerors of their enemies."},{"time":373.12,"text":"42. And it came to pass that I, Jacob, began to be old; And the record of this people being kept on the other plates of Nephi, wherefore, I conclude this record, Declaring that I have written according to the best of my knowledge by saying"},{"time":388.56,"text":"43. that the time passed away with us, And also our lives passed away, like as it were unto us a dream, We being a lonesome and a solemn people, wanderers cast out from Jerusalem,"},{"time":400.32,"text":"44. Born in tribulation in a wild wilderness and hated of our brethren, which caused wars and contentions; Wherefore, we did mourn out our days."},{"time":410.48,"text":"45. And I, Jacob, saw that I must soon go down to my grave; Wherefore, I said unto my son Enos: \"Take these plates.\""},{"time":420.4,"text":"46. And I told him the things which my brother Nephi had commanded me; And he promised obedience unto the commands."},{"time":428.48,"text":"47. And I make an end of my writing upon these plates, which writing hath been small;"},{"time":434.56,"text":"48. And to the reader I bid farewell, hoping that many of my brethren may read my words; Brethren, adieu."}]
};
