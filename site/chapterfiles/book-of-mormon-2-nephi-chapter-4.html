  lyrics: [{"time":0,"text":"Second Nephi, Chapter 4"},{"time":1.807,"text":"1. Behold, it came to pass that I, Nephi, did cry much unto the Lord my God because of the anger of my brethren,"},{"time":12.2,"text":"2. But behold, their anger did increase against me, insomuch that they did seek to take away my life;"},{"time":20.08,"text":"3. Yea, they did murmur against me, saying: Our younger brother thinketh to rule over us and we have had much trial because of him; Wherefore now let us slay him, that we may not be afflicted more because of his words;"},{"time":34,"text":"4. For behold, we will not that he shall be our ruler, for it belongeth unto us which are the elder brethren to rule over this people."},{"time":42.84,"text":"5. Now I do not write upon these plates all the words which they murmured against me,"},{"time":48.82,"text":"6. But it sufficeth me to say that they did seek to take away my life."},{"time":54.34,"text":"7. And it came to pass that the Lord did warn me that I, Nephi, should depart from them and flee into the wilderness, And all they which would go with me."},{"time":64.5,"text":"8. Wherefore, it came to pass that I, Nephi, did take my family, and also Zoram and his family, and Sam, mine elder brother, and his family, and Jacob and Joseph, my younger brethren, and also my sisters, and all they which would go with me -"},{"time":79.337,"text":"9. And all they which would go with me were they which believed in the warnings and the revelations of God, Wherefore, they did hearken unto my words -"},{"time":92.42,"text":"10. And we did take our tents and whatsoever things were possible for us and did journey in the wilderness for the space of many days."},{"time":101.58,"text":"11. And after that we had journeyed for the space of many days, we did pitch our tents;"},{"time":108.14,"text":"12. And my people would that we should call the name of the place Nephi; Wherefore, we did call it Nephi."},{"time":115.82,"text":"13. And all they which were with me did take it upon them to call themselves the people of Nephi;"},{"time":122.74,"text":"14. And we did observe to keep the judgments and the statutes and the commandments of the Lord in all things, according to the law of Moses."},{"time":132.1,"text":"15. And the Lord was with us and we did prosper exceedingly, For we did sow seed and we did reap again in abundance;"},{"time":140.18,"text":"16. And we began to raise flocks and herds and animals of every kind."},{"time":145.98,"text":"17. And I, Nephi, had also brought the records which were engraven upon the plates of brass, And also the ball, or the compass, which was prepared for my father by the hand of the Lord, according to that which is written."},{"time":160.86,"text":"18. And it came to pass that we began to prosper exceedingly and to multiply in the land;"},{"time":167.42000000000002,"text":"19. And I, Nephi, did take the sword of Laban and after the manner of it did make many swords, Lest by any means the people which were now called Lamanites should come upon us and destroy us,"},{"time":180.7,"text":"20. For I knew their hatred toward me and my children and they which were called my people."},{"time":187.1,"text":"21. And I did teach my people that they should build buildings, And that they should work in all manner of wood, and of iron and of copper, and of brass and of steel, and of gold and of silver, and of precious ores which were in great abundance."},{"time":202.06,"text":"22. And I, Nephi, did build a temple; And I did construct it after the manner of the Temple of Solomon, save it were not built of so many precious things,"},{"time":212.94,"text":"23. for they were not to be found upon the land,"},{"time":216.94,"text":"24. Wherefore, it could not be built like unto Solomon's temple;"},{"time":221.98,"text":"25. But the manner of the construction was like unto the Temple of Solomon, And the workmanship thereof was exceeding fine."},{"time":230.14,"text":"26. And it came to pass that I, Nephi, did cause my people that they should be industrious and that they should labor with their hands."},{"time":239.18,"text":"27. And it came to pass that they would that I should be their king,"},{"time":244.14,"text":"28. But I, Nephi, was desirous that they should have no king; Nevertheless, I did do for them according to that which was in my power."},{"time":254.22,"text":"29. And behold, the words of the Lord had been fulfilled unto my brethren which He spake concerning them, that I should be their ruler and their teacher;"},{"time":264.38,"text":"30. Wherefore, I had been their ruler and their teacher according to the commandments of the Lord, until the time that they sought to take away my life;"},{"time":274.3,"text":"31. Wherefore, the word of the Lord was fulfilled which He spake unto me, saying that, Inasmuch as they will not hearken unto thy words, they shall be cut off from the presence of the Lord."},{"time":286.54,"text":"32. And behold, they were cut off from His presence."},{"time":291.34000000000003,"text":"33. And He had caused the cursing to come upon them, yea, even a sore cursing because of their iniquity,"},{"time":298.94,"text":"34. For behold, they had hardened their hearts against Him, that they had become like unto a flint;"},{"time":305.98,"text":"35. Wherefore, as they were white and exceeding fair and delightsome, That they might not be enticing unto my people, therefore, the Lord God did cause a skin of blackness to come upon them;"},{"time":318.06,"text":"36. And thus saith the Lord God: I will cause that they shall be loathsome unto thy people, save they shall repent of their iniquities;"},{"time":327.1,"text":"37. And cursed shall be the seed of him that mixeth with their seed, for they shall be cursed even with the same cursing."},{"time":335.5,"text":"38. And the Lord spake it and it was done."},{"time":339.26,"text":"39. And because of their cursing which was upon them, they did become an idle people, full of mischief and subtlety, And did seek in the wilderness for beasts of prey;"},{"time":349.9,"text":"40. And the Lord God said unto me: They shall be a scourge unto thy seed, to stir them up in remembrance of Me;"},{"time":358.14,"text":"41. And inasmuch as they will not remember Me and hearken unto My words, they shall scourge them even unto destruction."},{"time":366.3,"text":"42. And it came to pass that I, Nephi, did consecrate Jacob and Joseph, that they should be priests and teachers over the land of my people."},{"time":375.9,"text":"43. And it came to pass that we lived after the manner of happiness;"},{"time":380.94,"text":"44. And thirty years had passed away from the time we left Jerusalem;"},{"time":386.54,"text":"45. And I, Nephi, had kept the records upon my plates which I had made of my people thus far."},{"time":394.22,"text":"46. And it came to pass that the Lord God said unto me: Make other plates; And thou shalt engraven many things upon them which are good in My sight for the profit of thy people."},{"time":404.94,"text":"47. Wherefore, I, Nephi, to be obedient to the commandments of the Lord, went and made these plates upon which I have engraven these things,"},{"time":415.65999999999997,"text":"48. And I engravened that which is pleasing unto God;"},{"time":420.14,"text":"49. And if my people be pleased with the things of God, they be pleased with mine engravings which are upon these plates;"},{"time":427.98,"text":"50. And if my people desire to know the more particular part of the history of my people, they must search mine other plates."},{"time":436.14,"text":"51. And it sufficeth me to say that forty years had passed away and we had already had wars and contentions with our brethren."}]
