<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "1 Nephi",
  chapter: "Chapter 1",
  audioSrc: "https://archive.org/download/1-nephi-ch-1/1%20Nephi%20Ch%201.mp3",
  lyrics: [{"time":0,"text":"First Nephi, Chapter 1"},{"time":1.3746944444444444,"text":"1. I, Nephi, having been born of goodly parents, therefore, I was taught somewhat in all the learning of my father, And having seen many afflictions in the course of my days, nevertheless, having been highly favored of the Lord in all my days, Yea, having had a great knowledge of the goodness and the mysteries of God, Therefore, I make a record of my proceedings in my days; Yea, I make a record in the language of my father, which consists of the learning of the Jews, and the language of the Egyptians;"},{"time":32.80520833333333,"text":"2. And I know that the record which I make to be true, And I make it with mine own hand, And I make it according to my knowledge."},{"time":40.67845833333333,"text":"3. For it came to pass in the commencement of the first year of the reign of Zedekiah, king of Judah, my father Lehi having dwelt at Jerusalem in all his days, And in that same year there came many prophets prophesying unto the people that they must repent or that great City Jerusalem must be destroyed;"},{"time":59.486777777777775,"text":"4. Wherefore, it came to pass that my father Lehi, as he went forth, prayed unto the Lord, yea, even with all his heart, in behalf of his people."},{"time":68.35980555555555,"text":"5. And it came to pass as he prayed unto the Lord there came a pillar of fire and dwelt upon a rock before him, And he saw and heard much; And because of the things which he saw and heard, he did quake and tremble exceedingly."},{"time":82.29420833333333,"text":"6. And it came to pass that he returned to his own house at Jerusalem and he cast himself upon his bed, being overcome with the Spirit and the things which he had seen;"},{"time":92.60441666666667,"text":"7. And being thus overcome with the Spirit, he was carried away in a vision, even that he saw the heavens open, And he thought he saw God sitting upon His throne surrounded with numberless concourses of angels in the attitude of singing and praising their God."},{"time":108.66334722222223,"text":"8. And it came to pass that he saw One descending out of the midst of heaven, And he beheld that His luster was above that of the sun at noonday;"},{"time":117.536375,"text":"9. And he also saw twelve others following Him, And their brightness did exceed that of the stars in the firmament; And they came down and went forth upon the face of the earth."},{"time":128.40895833333335,"text":"10. And the first came and stood before my father and gave unto him a book and bade him that he should read it."},{"time":135.09497222222222,"text":"11. And it came to pass that as he read, he was filled with the Spirit of the Lord; And he read, saying: \"Wo, wo unto Jerusalem, for I have seen thine abominations!\""},{"time":145.15523611111112,"text":"12. Yea, and many things did my father read concerning Jerusalem - that it should be destroyed, And the inhabitants thereof - many should perish by the sword, And many should be carried away captive into Babylon."},{"time":158.15234722222223,"text":"13. And it came to pass that when my father had read and saw many great and marvelous things, he did exclaim many things unto the Lord, such as: \"Great and marvelous are Thy works, O Lord God Almighty! Thy throne is high in the heavens! And Thy power and goodness and mercy are over all the inhabitants of the earth; And because Thou art merciful, Thou wilt not suffer those who come unto Thee, that they shall perish!\""},{"time":184.08408333333335,"text":"14. And after this manner was the language of my father in the praising of his God, For his soul did rejoice and his whole heart was filled because of the things which he had seen, yea, which the Lord had shown unto him."},{"time":197.58108333333337,"text":"15. And now I, Nephi, do not make a full account of the things which my father hath written, For he hath written many things which he saw in visions and in dreams;"},{"time":207.51637500000004,"text":"16. And he also hath written many things which he prophesied and spake unto his children, of which I shall not make a full account, But I shall make an account of my proceedings in my days."},{"time":219.0763055555556,"text":"17. Behold, I make an abridgment of the record of my father upon plates which I have made with mine own hands; Wherefore, after that I have abridged the record of my father, then will I make an account of mine own life."},{"time":232.51081944444448,"text":"18. Therefore, I would that ye should know that after the Lord had shown so many marvelous things unto my father Lehi, yea, concerning the destruction of Jerusalem, Behold, he went forth among the people and began to prophesy and to declare unto them concerning the things which he had both seen and heard."},{"time":251.38162500000004,"text":"19. And it came to pass that the Jews did mock him because of the things which he testified of them, for he truly testified of their wickedness and their abominations;"},{"time":261.56686111111117,"text":"20. And he testified that the things which he saw and heard - and also the things which he read in the book - manifested plainly of the coming of a Messiah and also the redemption of the world;"},{"time":273.37673611111114,"text":"21. And when the Jews heard these things, they were angry with him, Yea, even as with the prophets of old whom they had cast out and stoned and slain;"},{"time":282.4997083333334,"text":"22. And they also sought his life, that they might take it away."},{"time":286.24887500000006,"text":"23. But behold, I, Nephi, will show unto you that the tender mercies of the Lord are over all them whom He hath chosen, because of their faith, to make them mighty, even unto the power of deliverance."},{"time":298.4961527777778,"text":"24. For behold, it came to pass that the Lord spake unto my father, yea, even in a dream, and saith unto him: \"Blessed art thou, Lehi, because of the things which thou hast done;"},{"time":309.36873611111116,"text":"25. And because thou hast been faithful and declared unto this people the things which I commanded thee, Behold, they seek to take away thy life.\""},{"time":318.24176388888895,"text":"26. And it came to pass that the Lord commanded my father, even in a dream, that he should take his family and depart into the wilderness."},{"time":326.61490277777784,"text":"27. And it came to pass that he was obedient unto the word of the Lord; Wherefore, he did as the Lord commanded him."},{"time":333.6133472222223,"text":"28. And it came to pass that he departed into the wilderness;"},{"time":337.1750555555556,"text":"29. And he left his house and the land of his inheritance, and his gold, and his silver, and his precious things, And took nothing with him save it were his family and provisions and tents, And he departed into the wilderness;"},{"time":351.0469722222223,"text":"30. And he came down by the borders near the shores of the Red Sea;"},{"time":354.9835972222223,"text":"31. And he traveled in the wilderness in the borders which were nearer the Red Sea;"},{"time":359.9200000000001,"text":"32. And he did travel in the wilderness with his family, which consisted of my mother Sariah and my elder brethren, which were Laman, Lemuel and Sam."},{"time":368.9804861111112,"text":"33. And it came to pass that when he had traveled three days in the wilderness, he pitched his tent in a valley beside a river of water."},{"time":377.2286527777779,"text":"34. And it came to pass that he built an altar of stones, And he made an offering unto the Lord and gave thanks unto the Lord our God."},{"time":385.3518472222223,"text":"35. And it came to pass that he called the name of the river Laman and it emptied into the Red Sea; And the valley was in the borders near the mouth thereof;"},{"time":394.91222222222234,"text":"36. And when my father saw that the waters of the river emptied into the fountain of the Red Sea, he spake unto Laman, saying: \"O that thou mightest be like unto this river, continually running into the fountain of all righteousness!\""},{"time":409.2840277777779,"text":"37. And he also spake unto Lemuel, saying: \"O that thou mightest be like unto this valley, firm and steadfast and immovable in keeping the commandments of the Lord!\""},{"time":419.3442916666668,"text":"38. Now this he spake because of the stiff-neckedness of Laman and Lemuel, For behold, they did murmur in many things against their father because that he was a visionary man and that he had led them out of the Land of Jerusalem, To leave the land of their inheritance and their gold and their silver and their precious things and to perish in the wilderness;"},{"time":441.5268611111112,"text":"39. And this they said that he had done because of the foolish imaginations of his heart."},{"time":446.83818055555565,"text":"40. And thus Laman and Lemuel, being the eldest, did murmur against their father;"},{"time":451.6496111111112,"text":"41. And they did murmur because they knew not the dealings of that God who had created them;"},{"time":457.148388888889,"text":"42. Neither did they believe that Jerusalem, that great city, could be destroyed according to the words of the prophets;"},{"time":464.39677777777786,"text":"43. And they were like unto the Jews which were at Jerusalem which sought to take away the life of my father."},{"time":470.9578194444445,"text":"44. And it came to pass that my father did speak unto them in the Valley of Lemuel with power, Being filled with the Spirit until their frames did shake before him;"},{"time":480.9555972222223,"text":"45. And he did confound them, that they durst not utter against him; Wherefore, they did do as he commanded them;"},{"time":487.7665833333334,"text":"46. And my father dwelt in a tent."},{"time":489.6411666666667,"text":"47. And it came to pass that I, Nephi, being exceeding young, nevertheless, being large in stature, And also having great desires to know of the mysteries of God,"},{"time":499.51397222222226,"text":"48. Wherefore, I cried unto the Lord; And behold, He did visit me and did soften my heart, that I did believe all the words which had been spoken by my father; Wherefore, I did not rebel against him like unto my brothers;"},{"time":513.0734583333334,"text":"49. And I spake unto Sam, making known unto him the things which the Lord had manifested unto me by His Holy Spirit."},{"time":520.0719027777778,"text":"50. And it came to pass that he believed in my words,"},{"time":523.1337222222223,"text":"51. But behold, Laman and Lemuel would not hearken unto my words;"},{"time":526.9453750000001,"text":"52. And being grieved because of the hardness of their hearts, I cried unto the Lord for them."},{"time":532.5691250000001,"text":"53. And it came to pass that the Lord spake unto me, saying: \"Blessed art thou, Nephi, because of thy faith, for thou hast sought Me diligently with lowliness of heart;"},{"time":542.8168472222223,"text":"54. And inasmuch as ye shall keep My commandments, ye shall prosper and shall be led to a Land of Promise, Yea, even a land which I have prepared for you, a land which is choice above all other lands;"},{"time":555.0641250000001,"text":"55. And inasmuch as thy brethren shall rebel against thee, they shall be cut off from the presence of the Lord;"},{"time":561.750138888889,"text":"56. And inasmuch as thou shalt keep My commandments, thou shalt be made a ruler and a teacher over thy brethren;"},{"time":568.498638888889,"text":"57. For behold, in that day that they shall rebel against Me, I will curse them even with a sore curse, And they shall have no power over thy seed except they shall rebel against Me also;"},{"time":579.9335972222224,"text":"58. And if it so be that they rebel against Me, they shall be a scourge unto thy seed, to stir them up in the ways of remembrance.\""},{"time":587.8693333333334,"text":"59. And it came to pass that I, Nephi, returned from speaking with the Lord to the tent of my father."},{"time":593.9304861111112,"text":"60. And it came to pass that he spake unto me, saying: \"Behold, I have dreamed a dream in the which the Lord hath commanded me that thou and thy brethren shall return to Jerusalem,"},{"time":604.9280416666668,"text":"61. For behold, Laban hath the record of the Jews, and also a genealogy of my forefathers, And they are engraven upon plates of brass;"},{"time":613.0512361111113,"text":"62. Wherefore, the Lord hath commanded me that thou and thy brothers should go unto the house of Laban and seek the records and bring them down hither into the wilderness."},{"time":623.4864166666669,"text":"63. \"And now behold, thy brothers murmur, saying it is a hard thing which I have required of them; But behold, I have not required it of them, but it is a commandment of the Lord;"},{"time":634.4214861111113,"text":"64. Therefore go, my son, and thou shalt be favored of the Lord because thou hast not murmured.\""},{"time":640.1702083333336,"text":"65. And it came to pass that I, Nephi, said unto my father: \"I will go and do the things which the Lord hath commanded, For I know that the Lord giveth no commandments unto the children of men save He shall prepare a way for them, that they may accomplish the thing which He commandeth them.\""},{"time":658.1662083333335,"text":"66. And it came to pass that when my father had heard these words, he was exceeding glad, for he knew that I had been blessed of the Lord;"},{"time":666.5393472222224,"text":"67. And I, Nephi, and my brethren took our journey in the wilderness with our tents to go up to the Land of Jerusalem."},{"time":673.6627638888891,"text":"68. And it came to pass that when we had gone up to the Land of Jerusalem, I and my brethren did consult one with another, And we cast lots which of us should go in unto the house of Laban."},{"time":685.2226944444446,"text":"69. And it came to pass that the lot fell upon Laman; And Laman went in unto the house of Laban and he talked with him as he sat in his house;"},{"time":693.8457777777779,"text":"70. And he desired of Laban the records which were engraven upon the plates of brass which contained the genealogy of my father."},{"time":701.5940555555557,"text":"71. And behold, it came to pass that Laban was angry and thrust him out from his presence, And he would not that he should have the records;"},{"time":710.0921666666668,"text":"72. Wherefore, he said unto him: \"Behold, thou art a robber and I will slay thee!\""},{"time":714.9660833333335,"text":"73. But Laman fled out of his presence and told the things which Laban had done unto us;"},{"time":720.2149166666668,"text":"74. And we began to be exceeding sorrowful; And my brethren were about to return unto my father in the wilderness,"},{"time":727.088388888889,"text":"75. But behold, I said unto them that, \"As the Lord liveth and as we live, we will not go down unto our father in the wilderness until we have accomplished the thing which the Lord hath commanded us;"},{"time":739.2731805555557,"text":"76. Wherefore, let us be faithful in keeping the commandments of the Lord."},{"time":743.6472083333334,"text":"77. \"Therefore, let us go down to the land of our father's inheritance, For behold, he left gold and silver and all manner of riches;"},{"time":751.7079166666667,"text":"78. And all this he hath done because of the commandment of the Lord, For he knowing that Jerusalem must be destroyed because of the wickedness of the people -"},{"time":761.393263888889,"text":"79. For behold, they have rejected the words of the prophets -"},{"time":765.0174583333335,"text":"80. Wherefore, if my father should dwell in the land after that he hath been commanded to flee out of the land, behold, he would also perish;"},{"time":773.5780555555557,"text":"81. Wherefore, it must needs be that he flee out of the land."},{"time":777.139763888889,"text":"82. \"And behold, it is wisdom in God that we should obtain these records, that we might preserve unto our children the language of our fathers,"},{"time":785.8253333333334,"text":"83. And also that we may preserve unto them the words which have been spoken by the mouth of all the holy prophets which have been delivered unto them by the Spirit and power of God since the world began, even down unto this present time.\""},{"time":800.5095694444445,"text":"84. And it came to pass that after this manner of language did I persuade my brethren, that they might be faithful in keeping the commandments of God."},{"time":809.6325416666667,"text":"85. And it came to pass that we went down to the land of our inheritance, And we did gather together our gold and our silver and our precious things;"},{"time":818.6930277777778,"text":"86. And after that we had gathered these things together, we went up again unto the house of Laban."},{"time":824.6292083333334,"text":"87. And it came to pass that we went in unto Laban and desired him that he would give unto us the records which were engraven upon the plates of brass, For which we would give unto him our gold and our silver and all our precious things."},{"time":839.1884722222222,"text":"88. And it came to pass that when Laban saw our property, that it was exceeding great, He did lust after it insomuch that he thrust us out and sent his servants to slay us, that he might obtain our property."},{"time":851.8731527777778,"text":"89. And it came to pass that we did flee before the servants of Laban, And we were obliged to leave behind our property and it fell into the hands of Laban."},{"time":861.3710416666667,"text":"90. And it came to pass that we fled into the wilderness and the servants of Laban did not overtake us; And we hid ourselves in the cavity of a rock."},{"time":870.4315277777778,"text":"91. And it came to pass that Laman was angry with me, and also with my father; And also was Lemuel, for he hearkened unto the words of Laman;"},{"time":878.992125,"text":"92. Wherefore, Laman and Lemuel did speak many hard words unto us, their younger brothers, And they did smite us, even with a rod."},{"time":886.865375,"text":"93. And it came to pass as they smote us with a rod, behold, an angel of the Lord came and stood before them and he spake unto them, saying: \"Why do ye smite your younger brother with a rod?"},{"time":898.4877916666667,"text":"94. Know ye not that the Lord hath chosen him to be a ruler over you, and this because of your iniquities?"},{"time":904.8613750000001,"text":"95. Behold, thou shalt go up to Jerusalem again and the Lord will deliver Laban into your hands.\""},{"time":910.6725833333334,"text":"96. And after that the angel had spake unto us, he departed;"},{"time":914.1718055555556,"text":"97. And after that the angel had departed, Laman and Lemuel again began to murmur, saying: \"How is it possible that the Lord will deliver Laban into our hands?"},{"time":923.8571527777779,"text":"98. Behold, he is a mighty man and he can command fifty, yea, even he can slay fifty; Then why not us?\""},{"time":930.0432777777778,"text":"99. And it came to pass that I spake unto my brethren, saying: \"Let us go up again unto Jerusalem and let us be faithful in keeping the commandments of the Lord, For behold, He is mightier than all the earth; Then why not mightier than Laban and his fifty, yea, or even than his tens of thousands?"},{"time":948.3517083333334,"text":"100. \"Therefore, let us go up; Let us be strong like unto Moses, For he truly spake unto the waters of the Red Sea and they divided hither and thither and our fathers came through out of captivity on dry ground, And the armies of Pharaoh did follow and were drowned in the waters of the Red Sea."},{"time":966.4726805555556,"text":"101. \"Now behold, ye know that this is true; And ye also know that an angel hath spoken unto you; Wherefore, can ye doubt?"},{"time":973.7835555555556,"text":"102. \"Let us go up; The Lord is able to deliver us, even as our fathers, And to destroy Laban, even as the Egyptians.\""},{"time":980.8444861111111,"text":"103. Now when I had spoken these words, they were yet wroth and did still continue to murmur; Nevertheless, they did follow me up until we came without the walls of Jerusalem;"},{"time":991.467125,"text":"104. And it was by night; And I caused that they should hide themselves without the wall;"},{"time":996.7159583333333,"text":"105. And after that they had hid themselves, I, Nephi, crept into the city and went forth toward the house of Laban;"},{"time":1003.6519166666667,"text":"106. And I was led by the Spirit, not knowing beforehand the things which I should do."},{"time":1008.7132916666667,"text":"107. Nevertheless, I went forth; And as I came near unto the house of Laban, I beheld a man, And he had fallen to the earth before me, for he was drunken with wine;"},{"time":1018.6485833333334,"text":"108. And when I came to him, I found that it was Laban;"},{"time":1021.7728888888889,"text":"109. And I beheld his sword, And I drew it forth from the sheath thereof and the hilt thereof was of pure gold, And the workmanship thereof was exceeding fine, And I saw that the blade thereof was of the most precious steel."},{"time":1035.4573472222223,"text":"110. And it came to pass that I was constrained by the Spirit that I should kill Laban,"},{"time":1040.5812083333335,"text":"111. But I said in my heart, 'Never at any time have I shed the blood of man.' And I shrunk and would that I might not slay him."},{"time":1048.2670000000003,"text":"112. And the Spirit saith unto me again: \"Behold, the Lord hath delivered him into thy hands.\" Yea, and I also knew that he had sought to take away mine own life; Yea, and he would not hearken unto the commandments of the Lord; And he also had taken away our property."},{"time":1064.7008472222226,"text":"113. And it came to pass that the Spirit said unto me again: \"Slay him! for the Lord hath delivered him into thy hands;"},{"time":1071.8242638888892,"text":"114. Behold, the Lord slayeth the wicked to bring forth His righteous purposes;"},{"time":1076.4482361111113,"text":"115. It is better that one man should perish than that a nation should dwindle and perish in unbelief.\""},{"time":1082.5718750000003,"text":"116. And now when I, Nephi, had heard these words, I remembered the words of the Lord which He spake unto me in the wilderness, saying that, \"Inasmuch as thy seed shall keep My commandments, they shall prosper in the Land of Promise.\""},{"time":1096.8811944444449,"text":"117. Yea, and I also thought that they could not keep the commandments of the Lord according to the law of Moses, save they should have the law;"},{"time":1105.5667638888892,"text":"118. And I also knew that the law was engraven upon the plates of brass."},{"time":1109.7533333333336,"text":"119. And again, I knew that the Lord had delivered Laban into my hands for this cause: That I might obtain the records according to His commandments;"},{"time":1118.7513333333336,"text":"120. Therefore, I did obey the voice of the Spirit and took Laban by the hair of the head, And I smote off his head with his own sword."},{"time":1126.874527777778,"text":"121. And after that I had smote off his own head with his own sword, I took the garments of Laban and put them upon mine own body, yea, even every whit, And I did gird on his armor about my loins;"},{"time":1138.8093750000003,"text":"122. And after that I had done this, I went forth unto the treasury of Laban."},{"time":1143.3083750000003,"text":"123. And as I went forth toward the treasury of Laban, behold, I saw the servant of Laban which had the keys of the treasury;"},{"time":1150.8067083333335,"text":"124. And I commanded him in the voice of Laban that he should go with me into the treasury, And he supposing me to be his master Laban, for he beheld the garments and also the sword girded about my loins,"},{"time":1163.2414444444446,"text":"125. And he spake unto me concerning the elders of the Jews, he knowing that his master Laban had been out by night among them,"},{"time":1170.8647500000002,"text":"126. And I spake unto him as if it had been Laban."},{"time":1173.6766250000003,"text":"127. And I also spake unto him that I should carry the engravings which were upon the plates of brass to my elder brethren which were without the wall."},{"time":1182.7995972222225,"text":"128. And I also bade him that he should follow me;"},{"time":1185.6114722222226,"text":"129. And he supposing that I spake of the brethren of the church and that I was truly that Laban whom I had slain, wherefore, he did follow me;"},{"time":1194.234555555556,"text":"130. And he spake unto me many times concerning the elders of the Jews as I went forth unto my brethren which were without the wall."},{"time":1202.170291666667,"text":"131. And it came to pass that when Laman saw me, he was exceedingly frightened, and also Lemuel and Sam,"},{"time":1208.356416666667,"text":"132. And they fled from before my presence, For they supposed it was Laban and that he had slain me and had sought to take away their lives also."},{"time":1217.1044722222225,"text":"133. And it came to pass that I called after them and they did hear me; Wherefore, they did cease to flee from my presence."},{"time":1224.4778333333336,"text":"134. And it came to pass that when the servant of Laban beheld my brethren, he began to tremble and was about to flee from before me and return to the City of Jerusalem."},{"time":1234.7255555555557,"text":"135. And now I, Nephi, being a man large in stature, and also having received much strength of the Lord, Therefore, I did seize upon the servant of Laban and held him that he should not flee."},{"time":1246.3479722222223,"text":"136. And it came to pass that I spake with him, that if he would hearken unto my words as the Lord liveth and as I live Even so, that if he would hearken unto our words, we would spare his life."},{"time":1258.1578472222222,"text":"137. And I spake unto him even with an oath that he need not fear, That he should be a free man like unto us if he would go down in the wilderness with us."},{"time":1267.530763888889,"text":"138. And I also spake unto him, saying: \"Surely the Lord hath commanded us to do this thing; And shall we not be diligent in keeping the commandment of the Lord?"},{"time":1277.2785972222223,"text":"139. Therefore, if thou wilt go down into the wilderness to my father, thou shalt have place with us.\""},{"time":1283.33975,"text":"140. And it came to pass that Zoram did take courage at the words which I spake;"},{"time":1288.0262083333334,"text":"141. Now Zoram was the name of the servant, And he promised that he would go down into the wilderness unto our father;"},{"time":1295.087138888889,"text":"142. Yea, and he also made an oath unto us that he would tarry with us from that time forth."},{"time":1300.5234305555557,"text":"143. Now we were desirous that he should tarry with us for this cause: That the Jews might not know concerning our flight into the wilderness, lest they should pursue us and destroy us."},{"time":1311.7709305555557,"text":"144. And it came to pass that when Zoram had made an oath unto us, our fears did cease concerning him."},{"time":1317.8320833333335,"text":"145. And it came to pass that we took the plates of brass and the servant of Laban and departed into the wilderness and journeyed unto the tent of our father."},{"time":1327.3924583333335,"text":"146. And it came to pass that after we had come down into the wilderness unto our father, behold, he was filled with joy; And also my mother Sariah was exceeding glad, for she truly had mourned because of us, For she had supposed that we had perished in the wilderness."},{"time":1343.8887916666667,"text":"147. And she also had complained against my father, telling him that he was a visionary man, saying: \"Behold, thou hast led us forth from the land of our inheritance, And my sons are no more and we perish in the wilderness.\""},{"time":1357.5732500000001,"text":"148. And after this manner of language had my mother complained against my father."},{"time":1362.3846805555556,"text":"149. And it had come to pass that my father spake unto her, saying: \"I know that I am a visionary man, For if I had not seen the things of God in a vision, I should not have known the goodness of God, but had tarried at Jerusalem and had perished with my brethren."},{"time":1378.5685833333334,"text":"150. \"But behold, I have obtained a Land of Promise, in the which things I do rejoice;"},{"time":1383.6299583333334,"text":"151. Yea, and I know that the Lord will deliver my sons out of the hands of Laban and bring them down again unto us in the wilderness.\""},{"time":1391.7531527777778,"text":"152. And after this manner of language did my father Lehi comfort my mother Sariah concerning us while we journeyed in the wilderness up to the Land of Jerusalem to obtain the record of the Jews."},{"time":1403.625513888889,"text":"153. And when we had returned to the tent of my father, behold, their joy was full and my mother was comforted."},{"time":1410.2490416666667,"text":"154. And she spake, saying: \"Now I know of a surety that the Lord hath commanded my husband to flee into the wilderness;"},{"time":1417.4349444444445,"text":"155. Yea, and I also know of a surety that the Lord hath protected my sons and delivered them out of the hands of Laban, And gave them power whereby they could accomplish the thing which the Lord hath commanded them.\""},{"time":1430.682,"text":"156. And after this manner of language did she speak."},{"time":1433.6813333333334,"text":"157. And it came to pass that they did rejoice exceedingly and did offer sacrifice and burnt offerings unto the Lord; And they gave thanks unto the God of Israel."},{"time":1443.491652777778,"text":"158. And after that they had given thanks unto the God of Israel, my father Lehi took the records which were engraven upon the plates of brass and he did search them from the beginning;"},{"time":1454.739152777778,"text":"159. And he beheld that they did contain the five books of Moses which gave an account of the creation of the world,"},{"time":1461.6751111111112,"text":"160. And also of Adam and Eve which were our first parents,"},{"time":1465.0493611111112,"text":"161. And also a record of the Jews from the beginning, even down to the commencement of the reign of Zedekiah, king of Judah,"},{"time":1472.5476944444445,"text":"162. And also the prophecies of the holy prophets from the beginning, even down to the commencement of the reign of Zedekiah,"},{"time":1480.0460277777777,"text":"163. And also many prophecies which have been spoken by the mouth of Jeremiah."},{"time":1484.607513888889,"text":"164. And it came to pass that my father Lehi also found upon the plates of brass a genealogy of his fathers;"},{"time":1491.0435833333333,"text":"165. Wherefore, he knew that he was a descendant of Joseph, Yea, even that Joseph which was the son of Jacob which was sold into Egypt and which was preserved by the hand of the Lord, that he might preserve his father Jacob and all his household from perishing with famine;"},{"time":1507.7898611111111,"text":"166. And they were also led out of captivity and out of the Land of Egypt by that same God who had preserved them;"},{"time":1514.6008472222222,"text":"167. And thus my father Lehi did discover the genealogy of his fathers;"},{"time":1518.7249305555556,"text":"168. And Laban also was a descendant of Joseph; Wherefore, he and his fathers had kept the records."},{"time":1524.598625,"text":"169. And now when my father saw all these things, he was filled with the Spirit and began to prophesy concerning his seed, That these plates of brass should go forth unto all nations, kindreds and tongues and people which were of his seed;"},{"time":1539.220375,"text":"170. Wherefore, he said that these plates of brass should never perish, neither should they be dimmed anymore by time;"},{"time":1546.2813055555557,"text":"171. And he prophesied many things concerning his seed."},{"time":1549.4056111111113,"text":"172. And it came to pass that thus far I and my father had kept the commandments wherewith the Lord had commanded us,"},{"time":1556.4040555555557,"text":"173. And we had obtained the record which the Lord had commanded us and searched them and found that they were desirable, Yea, even of great worth unto us insomuch that we could preserve the commandments of the Lord unto our children;"},{"time":1570.7133750000003,"text":"174. Wherefore, it was wisdom in the Lord that we should carry them with us as we journeyed in the wilderness toward the Land of Promise."}]
};
