<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "2 Nephi",
  chapter: "Chapter 6",
  audioSrc: "https://archive.org/download/2-nephi-ch-6/2%20Nephi%20Ch%206.mp3",
  lyrics: [{"time":0,"text":"Second Nephi, Chapter 6"},{"time":3.4,"text":"1. And now my beloved brethren, I have read these things that ye might know concerning the covenants of the Lord that He hath covenanted with all the house of Israel,"},{"time":13.76,"text":"2. That He hath spoken unto the Jews by the mouth of His holy prophets, even from the beginning down, from generation to generation, Until the time cometh that they shall be restored to the true church and fold of God,"},{"time":27.72,"text":"3. When they shall be gathered home to the lands of their inheritance and shall be established in all their lands of promise."},{"time":35.4,"text":"4. Behold, my beloved brethren, I speak unto you these things that ye may rejoice and lift up your heads forever because of the blessings which the Lord God shall bestow upon your children,"},{"time":47.6,"text":"5. For I know that thou hast searched much, many of you, to know of things to come;"},{"time":54.12,"text":"6. Wherefore, I know that ye know that our flesh must waste away and die,"},{"time":60.12,"text":"7. Nevertheless, in our bodies we shall see God."},{"time":64.88,"text":"8. Yea, and I know that ye know that in the body He shall show Himself unto they at Jerusalem from whence we came,"},{"time":73.28,"text":"9. For it is expedient that it should be among them;"},{"time":77.84,"text":"10. For it behooveth the great Creator that He suffereth Himself to become subject unto man in the flesh and die for all men, that all men might become subject unto Him;"},{"time":88.88,"text":"11. For as death hath passed upon all men to fulfill the merciful plan of the great Creator, there must needs be a power of resurrection,"},{"time":98.24000000000001,"text":"12. And the resurrection must needs come unto man by reason of the fall,"},{"time":104,"text":"13. And the fall came by reason of transgression;"},{"time":108.64,"text":"14. And because man became fallen, they were cut off from the presence of the Lord;"},{"time":114.88,"text":"15. Wherefore, it must needs be an infinite atonement -"},{"time":119.92,"text":"16. save it should be an infinite atonement, this corruption could not put on incorruption;"},{"time":126.6,"text":"17. Wherefore, the first judgment which came upon man must needs have remained to an endless duration,"},{"time":134.32,"text":"18. And if so, this flesh must have laid down to rot and to crumble to its mother earth, to rise no more."},{"time":142.16,"text":"19. O the wisdom of God, His mercy and grace!"},{"time":146.92000000000002,"text":"20. For behold, if the flesh should rise no more, our spirits must become subject to that angel which fell from before the presence of the Eternal God and became the devil, to rise no more;"},{"time":159.84,"text":"21. And our spirits must have become like unto him, And we become devils - angels to a devil - to be shut out from the presence of our God and to remain with the father of lies, in misery like unto himself;"},{"time":173.32,"text":"22. Yea, to that being who beguiled our first parents,"},{"time":177.233,"text":"23. Who transformeth himself nigh unto an angel of light and stirreth up the children of men unto secret combinations of murder and all manner of secret works of darkness."},{"time":189.84,"text":"24. O how great the goodness of our God! Who prepareth a way for our escape from the grasp of this awful monster -"},{"time":198.84,"text":"25. Yea, that monster death and hell, which I call the death of the body, and also the death of the spirit;"},{"time":206.68,"text":"26. And because of the way of deliverance of our God, the Holy One of Israel, this death of which I have spoken, which is the temporal, shall deliver up its dead, which death is the grave;"},{"time":219.16,"text":"27. And this death of which I have spoken, which is the spiritual death, shall deliver up its dead, which spiritual death is hell;"},{"time":228.84,"text":"28. Wherefore, death and hell must deliver up its dead; And hell must deliver up its captive spirits,"},{"time":236.68,"text":"29. And the grave must deliver up its captive bodies, And the bodies and the spirits of men will be restored one to the other,"},{"time":245.12,"text":"30. And it is by the power of the resurrection of the Holy One of Israel."},{"time":250.52,"text":"31. O how great the plan of our God! For on the other hand, the paradise of God must deliver up the spirits of the righteous, And the grave deliver up the bodies of the righteous,"},{"time":263.2,"text":"32. And the spirit and the body is restored to itself again and all men become incorruptible and immortal; And they are living souls, having a perfect knowledge like unto us in the flesh,"},{"time":275.44,"text":"33. Save it be that our knowledge shall be perfect;"},{"time":280,"text":"34. Wherefore, we shall have a perfect knowledge of all our guilt and our uncleanness and our nakedness;"},{"time":287.76,"text":"35. And the righteous shall have a perfect knowledge of their enjoyment and their righteousness, being clothed with purity, Yea, even with the robe of righteousness."},{"time":298.52,"text":"36. And it shall come to pass that when all men shall have passed from this first death unto life, insomuch as they have become immortal, They must appear before the judgment seat of the Holy One of Israel;"},{"time":310.6,"text":"37. And then cometh the judgment; And then must they be judged according to the holy judgment of God;"},{"time":317.96,"text":"38. And assuredly as the Lord liveth - for the Lord God hath spoken it and it is His eternal word which cannot pass away - That they which are righteous shall be righteous still, And they which are filthy shall be filthy still;"},{"time":331.84,"text":"39. Wherefore, they which are filthy are the devil and his angels,"},{"time":337.2,"text":"40. And they shall go away into everlasting fire prepared for them; And their torment is a lake of fire and brimstone, whose flames ascendeth up forever and ever and hath no end."},{"time":348.84000000000003,"text":"41. O the greatness and the justice of our God! For He executeth all His words, And they have gone forth out of His mouth and His law must be fulfilled."},{"time":360.4,"text":"42. But behold, the righteous, the saints of the Holy One of Israel - They which have believed in the Holy One of Israel, They which have endured the crosses of the world and despised the shame of it - They shall inherit the kingdom of God which was prepared for them from the foundation of the world, And their joy shall be full forever."},{"time":379.4,"text":"43. O the greatness of the mercy of our God, the Holy One of Israel! For He delivereth His saints from that awful monster the devil and death and hell, And that lake of fire and brimstone, which is endless torment."},{"time":394.32,"text":"44. O how great the holiness of our God! For He knoweth all things and there is not anything save He knows it;"},{"time":403.04,"text":"45. And He cometh into the world that He may save all men, if they will hearken unto His voice."},{"time":410.12,"text":"46. For behold, He suffereth the pains of all men, Yea, the pains of every living creature - both men and women and children - which belong to the family of Adam;"},{"time":421.76,"text":"47. And He suffereth this that the resurrection might pass upon all men, that all might stand before Him at the great and judgment day."},{"time":430.56,"text":"48. And He commandeth all men that they must repent and be baptized in His name, having perfect faith in the Holy One of Israel, or they cannot be saved in the kingdom of God;"},{"time":442.08,"text":"49. And if they will not repent and believe in His name and be baptized in His name and endure to the end, they must be damned,"},{"time":450.96,"text":"50. For the Lord God, the Holy One of Israel, hath spoken it."},{"time":456.84000000000003,"text":"51. Wherefore, He hath given a law; And where there is no law given, there is no punishment;"},{"time":464.24,"text":"52. And where there is no punishment, there is no condemnation;"},{"time":469.4,"text":"53. And where there is no condemnation, the mercies of the Holy One of Israel hath claim upon them because of the atonement,"},{"time":477.6,"text":"54. For they are delivered by the power of Him; For the atonement satisfieth the demands of His justice upon all those who hath not the law given to them, That they are delivered from that awful monster death and hell and the devil, And the lake of fire and brimstone, which is endless torment;"},{"time":494.08,"text":"55. And they are restored to that God who gave them breath, which is the Holy One of Israel."},{"time":500.76,"text":"56. But wo unto him that hath the law given! Yea, that hath all the commandments of God, like unto us, and that transgresseth them and that wasteth the days of his probation, For awful is his state!"},{"time":515.44,"text":"57. O that cunning plan of the evil one!"},{"time":519.48,"text":"58. O the vainness and the frailties and the foolishness of men!"},{"time":524.52,"text":"59. When they are learned, they think they are wise and they hearken not unto the counsel of God, For they set it aside, supposing they know of themselves;"},{"time":534.52,"text":"60. Wherefore, their wisdom is foolishness and it profiteth them not; Wherefore, they shall perish;"},{"time":541.96,"text":"61. But to be learned is good, if it so be that they hearken unto the counsels of God."},{"time":548.36,"text":"62. But wo unto the rich, which are rich as to the things of the world!"},{"time":554.2,"text":"63. For because that they are rich, they despise the poor, and they persecute the meek, and their hearts are upon their treasures; Wherefore, their treasure is their god;"},{"time":565.16,"text":"64. And behold, their treasure shall perish with them also."},{"time":570.28,"text":"65. And wo unto the deaf that will not hear! for they shall perish;"},{"time":573.665,"text":"66. Wo unto the blind that will not see! for they shall perish also;"},{"time":582.477,"text":"67. Wo unto the uncircumcised of heart! for a knowledge of their iniquities shall smite them at the last day;"},{"time":590.7909999999999,"text":"68. Wo unto the liar! for he shall be thrust down to hell;"},{"time":597.064,"text":"69. Wo unto the murderer who deliberately killeth! for he shall die;"},{"time":604.282,"text":"70. Wo unto them who commit whoredoms! for they shall be thrust down to hell;"},{"time":612.546,"text":"71. Yea, wo unto they that worship idols! for the devil of all devils delighteth in them;"},{"time":623.549,"text":"72. And in fine, wo unto all they that die in their sins! for they shall return to God and behold His face and remain in their sins."},{"time":630.12,"text":"73. O my beloved brethren, remember the awfulness in transgressing against that Holy God! And also the awfulness of yielding to the enticings of that cunning one;"},{"time":642.04,"text":"74. Remember - to be carnally - minded is death, and to be spiritually - minded is life eternal."},{"time":650.2,"text":"75. O my beloved brethren, give ear to my words!"},{"time":655.16,"text":"76. Remember the greatness of the Holy One of Israel;"},{"time":659.56,"text":"77. Do not say that I have spoken hard things against you, for if ye do, ye will revile against the truth, For I have spoken the words of your Maker;"},{"time":669.96,"text":"78. I know that the words of truth are hard against all uncleanness, but the righteous fear it not, for they love the truth and are not shaken."},{"time":679.4,"text":"79. O then my beloved brethren, come unto the Lord, the Holy One of Israel!"},{"time":685.8,"text":"80. Remember that His paths are righteousness;"},{"time":689.96,"text":"81. Behold, the way for man is narrow, but it lieth in a straight course before him, And the keeper of the gate is the Holy One of Israel, and He employeth no servant there;"},{"time":701.64,"text":"82. And there is none other way, save it be by the gate, For He cannot be deceived, for the Lord God is His name;"},{"time":710.04,"text":"83. And whoso knocketh, to him will He open; And the wise and the learned and they that are rich, which are puffed up because of their learning and their wisdom and their riches, yea, they are they whom He despiseth;"},{"time":723.96,"text":"84. And save they shall cast these things away and consider themselves fools before God and come down in the depths of humility, He will not open unto them;"},{"time":734.36,"text":"85. But the things of the wise and the prudent shall be hid from them forever, Yea, that happiness which is prepared for the saints."},{"time":743.16,"text":"86. O my beloved brethren, remember my words! Behold, I take off my garments and I shake them before you;"},{"time":752.68,"text":"87. I pray the God of my salvation, that He view me with His all-searching eye;"},{"time":758.84,"text":"88. Wherefore, ye shall know at the last day, when all men shall be judged of their works, that the God of Israel did witness that I shook your iniquities from my soul, And that I stand with brightness before Him and am rid of your blood."},{"time":773.72,"text":"89. O my beloved brethren, turn away from your sins! Shake off the chains of him that would bind you fast;"},{"time":782.76,"text":"90. Come unto that God who is the Rock of your salvation;"},{"time":787.56,"text":"91. Prepare your souls for that glorious day when justice shall be administered unto the righteous, even the day of judgment, that ye may not shrink with awful fear,"},{"time":798.44,"text":"92. That ye may not remember your awful guilt in perfectness and be constrained to exclaim, Holy, holy are Thy judgments, O Lord God Almighty!"},{"time":809.08,"text":"93. But I know my guilt - I transgressed Thy law, and my transgressions are mine; And the devil hath obtained me, that I am a prey to his awful misery."},{"time":819.8,"text":"94. But behold, my brethren, is it expedient that I should awake you to an awful reality of these things?"},{"time":828.12,"text":"95. Would I harrow up your souls if your minds were pure?"},{"time":832.84,"text":"96. Would I be plain unto you, according to the plainness of the truth, if ye were freed from sin?"},{"time":840.04,"text":"97. Behold, if ye were holy, I would speak unto you of holiness, But as ye are not holy, and ye look upon me as a teacher, it must needs be expedient that I teach you the consequences of sin."},{"time":853.72,"text":"98. Behold, my soul abhorreth sin, And my heart delighteth in righteousness, And I will praise the holy name of my God!"},{"time":862.92,"text":"99. Come, my brethren: Everyone that thirsteth, come ye to the waters; And he that hath no money, come, buy and eat. Yea, come, buy wine and milk without money and without price."},{"time":877.96,"text":"100. Wherefore, do not spend money for that which is of no worth, Nor your labor for that which cannot satisfy."},{"time":885.96,"text":"101. Hearken diligently unto me and remember the words which I have spoken, And come unto the Holy One of Israel"},{"time":893.96,"text":"102. and feast upon that which perisheth not, neither can be corrupted: And let your soul delight in fatness."},{"time":901.88,"text":"103. Behold, my beloved brethren, remember the words of your God - Pray unto Him continually by day and give thanks unto His holy name by night;"},{"time":912.6,"text":"104. Let your hearts rejoice and behold how great the covenants of the Lord, And how great His condescensions unto the children of men;"},{"time":921.48,"text":"105. And because of His greatness and His grace and mercy, He hath promised unto us that our seed shall not utterly be destroyed, according to the flesh, but that He would preserve them; And in future generations they shall become a righteous branch unto the house of Israel."},{"time":937.48,"text":"106. And now my brethren, I would speak unto you more, But on the morrow I will declare unto you the remainder of my words. Amen."}]
};
