  lyrics: [{"time":0,"text":"Second Nephi, Chapter 2"},{"time":2.806,"text":"1. And now I speak unto you, Joseph, my last born:"},{"time":9.12,"text":"2. Thou wast born in the wilderness of mine afflictions, Yea, in the days of my greatest sorrow did thy mother bear thee;"},{"time":17.92,"text":"3. And may the Lord consecrate also unto thee this land, which is a most precious land, for thine inheritance and the inheritance of thy seed with thy brethren, for thy security forever, If it so be that ye shall keep the commandments of the Holy One of Israel."},{"time":33.44,"text":"4. And now Joseph, my last born whom I have brought out of the wilderness of mine afflictions, May the Lord bless thee forever, for thy seed shall not utterly be destroyed;"},{"time":45.36,"text":"5. For behold, thou art the fruit of my loins and I am a descendant of Joseph which was carried captive into Egypt;"},{"time":52.4,"text":"6. And great were the covenants of the Lord which He made unto Joseph. Wherefore, Joseph truly saw our day;"},{"time":61.392,"text":"7. And he obtained a promise of the Lord that out of the fruit of his loins the Lord God would raise up a righteous branch unto the house of Israel -"},{"time":72.8,"text":"8. Not the Messiah, but a branch which was to be broken off, Nevertheless, to be remembered in the covenants of the Lord -"},{"time":80.54599999999999,"text":"9. That the Messiah should be made manifest unto them in the latter days in the Spirit of power, Unto the bringing of them out of darkness unto light - yea, out of hidden darkness, and out of captivity unto freedom."},{"time":94.53999999999999,"text":"10. For Joseph truly testified, saying: A seer shall the Lord my God raise up which shall be a choice seer unto the fruit of my loins;"},{"time":103.68,"text":"11. Yea, Joseph truly said: Thus saith the Lord unto me: A choice seer will I raise up out of the fruit of thy loins, And he shall be esteemed highly among the fruit of thy loins."},{"time":116.8,"text":"12. And unto him will I give commandment that he shall do a work for the fruit of thy loins, his brethren, which shall be of great worth unto them, Even to the bringing of them to the knowledge of the covenants which I have made with thy fathers;"},{"time":129.804,"text":"13. And I will give unto him a commandment that he shall do none other work, save the work which I shall command him;"},{"time":139.04,"text":"14. And I will make him great in Mine eyes, for he shall do My work;"},{"time":144.88,"text":"15. And he shall be great like unto Moses, whom I have said I would raise up unto you to deliver My people, O house of Israel;"},{"time":152.07999999999998,"text":"16. And Moses will I raise up to deliver thy people out of the Land of Egypt;"},{"time":157.753,"text":"17. But a seer will I raise up out of the fruit of thy loins, And unto him will I give power to bring forth My word unto the seed of thy loins -"},{"time":168.536,"text":"18. And not to the bringing forth My word only, saith the Lord, But to the convincing them of My word which shall have already gone forth among them."},{"time":178.56,"text":"19. Wherefore, the fruit of thy loins shall write, And the fruit of the loins of Judah shall write;"},{"time":184.4,"text":"20. And that which shall be written by the fruit of thy loins - And also that which shall be written by the fruit of the loins of Judah - Shall grow together"},{"time":193.699,"text":"21. Unto the confounding of false doctrines, And laying down of contentions, And establishing peace among the fruit of thy loins,"},{"time":202.88,"text":"22. And bringing them to the knowledge of their fathers in the latter days,"},{"time":208.16,"text":"23. And also to the knowledge of My covenants, saith the Lord;"},{"time":214.8,"text":"24. And out of weakness he shall be made strong in that day when My work shall commence among all My people, unto the restoring thee, O house of Israel, saith the Lord."},{"time":225.92000000000002,"text":"25. And thus prophesied Joseph, saying: Behold, that seer will the Lord bless;"},{"time":233.2,"text":"26. And they that seek to destroy him shall be confounded;"},{"time":237.92000000000002,"text":"27. For this promise of which I have obtained of the Lord, of the fruit of thy loins, shall be fulfilled;"},{"time":245.301,"text":"28. Behold, I am sure of the fulfilling of this promise;"},{"time":250.48,"text":"29. And his name shall be called after me, And it shall be after the name of his father,"},{"time":256.8,"text":"30. And he shall be like unto me; For the thing which the Lord shall bring forth by his hand, by the power of the Lord, shall bring my people unto salvation."},{"time":266.56,"text":"31. Yea, thus prophesied Joseph: I am sure of this thing, even as I am sure of the promise of Moses, For the Lord hath said unto me, I will preserve thy seed forever;"},{"time":278.64,"text":"32. And the Lord hath said, I will raise up a Moses, And I will give power unto him in a rod,"},{"time":285.84000000000003,"text":"33. And I will give judgment unto him in writing;"},{"time":289.36,"text":"34. Yet I will not loose his tongue that he shall speak much, for I will not make him mighty in speaking,"},{"time":298.96,"text":"35. But I will write unto him My law by the finger of Mine own hand, And I will make one a spokesman for him."},{"time":306.88,"text":"36. And the Lord said unto me also: I will raise up unto the fruit of thy loins and I will make for him a spokesman;"},{"time":314,"text":"37. And I, behold, I will give unto him that he shall write the writing of the fruit of thy loins unto the fruit of thy loins, And the spokesman of thy loins shall declare it."},{"time":326,"text":"38. And the words which he shall write shall be the words which are expedient in My wisdom should go forth unto the fruit of thy loins;"},{"time":334.88,"text":"39. And it shall be as if the fruit of thy loins had cried unto them from the dust, for I know their faith;"},{"time":340.88,"text":"40. And they shall cry from the dust, yea, even repentance unto their brethren, even that after many generations have gone by them."},{"time":350.32,"text":"41. And it shall come to pass that their cry shall go, even according to the simpleness of their words;"},{"time":357.36,"text":"42. Because of their faith, their words shall proceed forth out of My mouth unto their brethren, which are the fruit of thy loins;"},{"time":365.04,"text":"43. And the weakness of their words will I make strong in their faith, unto the remembering of My covenant which I made unto thy fathers."},{"time":377.52,"text":"44. And now behold, my son Joseph, after this manner did my father of old prophesy:"},{"time":384.96,"text":"45. Wherefore, because of this covenant, thou art blessed, For thy seed shall not be destroyed, for they shall hearken unto the words of the book;"},{"time":394.8,"text":"46. And there shall raise up one mighty among them which shall do much good, both in word and in deed, Being an instrument in the hands of God, With exceeding faith"},{"time":405.84000000000003,"text":"47. to work mighty wonders and do that thing which is great in the sight of God, Unto the bringing to pass much restoration unto the house of Israel and unto the seed of thy brethren."},{"time":417.36,"text":"48. And now, blessed art thou, Joseph;"},{"time":421.2,"text":"49. Behold, thou art little; Wherefore, hearken unto the words of thy brother Nephi and it shall be done unto thee even according to the words which I have spoken;"},{"time":432.64,"text":"50. Remember the words of thy dying father. Amen."}]
