window.CHAPTER_DATA = {

  audioSrc: "https://archive.org/download/mosiah-ch-6/Mosiah%20Ch%206.mp3",
  lyrics: [{"time":0.0,"text":"Mosiah Chapter 6"},{"time":1.392,"text":"1. I, Zeniff, having been taught in all the language of the Nephites, And having had a knowledge of the Land of Nephi, or of the land of our fathers' first inheritance, And I having been sent as a spy among the Lamanites that I might spy out their forces, that our army might come upon them and destroy them -"},{"time":20.24,"text":"2. But when I saw that which was good among them, I was desirous that they should not be destroyed, Therefore, I contended with my brethren in the wilderness, for I would that our ruler should make a treaty with them."},{"time":33.653,"text":"3. But he, being an austere and a bloodthirsty man, commanded that I should be slain, but I was rescued by the shedding of much blood,"},{"time":41.803,"text":"4. For father fought against father and brother against brother until the greatest number of our army was destroyed in the wilderness;"},{"time":50.593,"text":"5. And we returned, those of us that were spared, to the Land of Zarahemla to relate that tale to their wives and their children."},{"time":60.0,"text":"6. And yet I, being overzealous to inherit the land of our fathers, collected as many as were desirous to go up to possess the land and started again on our journey into the wilderness to go up to the land; But we were smitten with famine and sore afflictions, for we were slow to remember the Lord our God;"},{"time":77.582,"text":"7. Nevertheless, after many days wandering in the wilderness, we pitched our tents in the place where our brethren were slain, which was near to the land of our fathers."},{"time":86.994,"text":"8. And it came to pass that I went again with four of my men into the city, in unto the king, that I might know of the disposition of the king, And that I might know if I might go in with my people and possess the land in peace."},{"time":100.866,"text":"9. And I went in unto the king and he covenanted with me that I might possess the Land of Lehi-Nephi and the Land of Shilom,"},{"time":109.6,"text":"10. And he also commanded that his people should depart out of that land, And I and my people went into the land, that we might possess it;"},{"time":117.562,"text":"11. And we began to build buildings and to repair the walls of the city, Yea, even the walls of the City of Lehi-Nephi, and the City of Shilom;"},{"time":128.286,"text":"12. And we began to till the ground, Yea, even with all manner of seeds - with seeds of corn and of wheat and of barley, and with neas and with sheum, and with seeds of all manner of fruits; And we did begin to multiply and prosper in the land."},{"time":143.74,"text":"13. Now it was the cunning and the craftiness of King Laman to bring my people into bondage that he yielded up the land, that we might possess it;"},{"time":153.391,"text":"14. Therefore, it came to pass that after we had dwelt in the land for the space of twelve years, that King Laman began to grow uneasy, Lest by any means my people should wax strong in the land and that they could not overpower them and bring them into bondage."},{"time":168.645,"text":"15. Now they were a lazy and an idolatrous people; Therefore, they were desirous to bring us into bondage, that they might glut themselves with the labors of our hands, Yea, that they might feast themselves upon the flocks of our fields."},{"time":183.444,"text":"16. Therefore, it came to pass that King Laman began to stir up his people, that they should contend with my people; Therefore, there began to be wars and contentions in the land;"},{"time":194.36,"text":"17. For in the thirteenth year of my reign in the Land of Nephi, away on the south of the Land of Shilom, when my people were watering and feeding their flocks and tilling their lands, A numerous host of Lamanites came upon them and began to slay them and to take of their flocks and the corn of their fields;"},{"time":212.987,"text":"18. Yea, and it came to pass that they fled, all that were not overtaken, even into the City of Nephi, and did call upon me for protection."},{"time":213.314,"text":"19. And it came to pass that I did arm them with bows and with arrows, with swords and with scimitars, and with clubs and with slings, and with all manner of weapons which we could invent; And I and my people did go forth against the Lamanites to battle,"},{"time":237.928,"text":"20. Yea, in the strength of the Lord did we go forth to battle against the Lamanites,"},{"time":244.044,"text":"21. For I and my people did cry mightily to the Lord that He would deliver us out of the hands of our enemies, For we were awakened to a remembrance of the deliverance of our fathers."},{"time":255.164,"text":"22. And God did hear our cries and did answer our prayers, And we did go forth in His might,"},{"time":262.655,"text":"23. Yea, we did go forth against the Lamanites, And in one day and a night we did slay three thousand and forty-three - we did slay them, even until we had driven them out of our land;"},{"time":275.076,"text":"24. And I, myself, with mine own hands, did help bury their dead;"},{"time":281.422,"text":"25. And behold, to our great sorrow and lamentation, two hundred and seventy - nine of our brethren were slain."},{"time":289.76,"text":"26. And it came to pass that we again began to establish the kingdom, And we again began to possess the land in peace;"},{"time":296.552,"text":"27. And I caused that there should be weapons of war made of every kind, That thereby I might have weapons for my people against the time the Lamanites should come up again to war against my people,"},{"time":308.053,"text":"28. And I set guards round about the land, that the Lamanites might not come upon us again unawares and destroy us;"},{"time":315.411,"text":"29. And thus I did guard my people and my flocks and keep them from falling into the hands of our enemies."},{"time":322.766,"text":"30. And it came to pass that we did inherit the land of our fathers for many years, yea, for the space of twenty and two years;"},{"time":332.152,"text":"31. And I did cause that the men should till the ground and raise all manner of grain and all manner of fruit of every kind,"},{"time":338.936,"text":"32. And I did cause that the women should spin and toil and work, and work all manner of fine linen, yea, and cloth of every kind, that we might clothe our nakedness;"},{"time":350.862,"text":"33. And thus we did prosper in the land - Thus we did have continual peace in the land for the space of twenty and two years."},{"time":358.585,"text":"34. And it came to pass that King Laman died and his son began to reign in his stead,"},{"time":366.24,"text":"35. And he began to stir his people up in rebellion against my people, Therefore, they began to prepare for war and to come up to battle against my people;"},{"time":376.16,"text":"36. But I having sent my spies out round about the Land of Shemlon that I might discover their preparations, that I might guard against them, that they might not come upon my people and destroy them."},{"time":386.282,"text":"37. And it came to pass that they came up upon the north of the Land of Shilom with their numerous hosts - Men armed with bows and with arrows, and with swords and with scimitars, and with stones and with slings;"},{"time":399.093,"text":"38. And they had their heads shaved, that they were naked; And they were girded about with a leathern girdle about their loins."},{"time":407.018,"text":"39. And it came to pass that I caused that the women and children of my people should be hid in the wilderness;"},{"time":414.632,"text":"40. And I also caused that all my old men that could bear arms, and also all my young men that were able to bear arms, should gather themselves together to go to battle against the Lamanites, And I did place them in their ranks, every man according to his age."},{"time":429.896,"text":"41. And it came to pass that we did go up to battle against the Lamanites;"},{"time":434.842,"text":"42. And I, even I in my old age, did go up to battle against the Lamanites."},{"time":443.2,"text":"43. And it came to pass that we did go up in the strength of the Lord to battle;"},{"time":448.08,"text":"44. Now the Lamanites knew nothing concerning the Lord, nor the strength of the Lord, Therefore, they depended upon their own strength,"},{"time":456.107,"text":"45. Yet they were a strong people as to the strength of men. They were a wild and ferocious and a bloodthirsty people, believing in the tradition of their fathers, which is this:"},{"time":467.388,"text":"46. Believing that they were driven out of the Land of Jerusalem because of the iniquities of their fathers, And that they were wronged in the wilderness by their brethren; And they were also wronged while crossing the sea;"},{"time":480.132,"text":"47. And again, that they were wronged while in the land of their first inheritance, after they had crossed the sea."},{"time":487.92,"text":"48. And all this because that Nephi was more faithful in keeping the commandments of the Lord, Therefore, he was favored of the Lord, for the Lord heard his prayers and answered them, And he took the lead of their journey in the wilderness."},{"time":500.785,"text":"49. And his brethren were wroth with him because they understood not the dealings of the Lord;"},{"time":506.936,"text":"50. They were also wroth with him upon the waters because they hardened their hearts against the Lord."},{"time":513.327,"text":"51. And again, they were wroth with him when they had arrived to the Promised Land because they said that he had taken the ruling of the people out of their hands; And they sought to kill him."},{"time":525.44,"text":"52. And again, they were wroth with him because he departed into the wilderness as the Lord had commanded him and took the records which were engraven on the plates of brass, For they said that he robbed them."},{"time":536.522,"text":"53. And thus they have taught their children that they should hate them and that they should murder them and that they should rob and plunder them and do all they could to destroy them; Therefore, they have an eternal hatred toward the children of Nephi."},{"time":550.635,"text":"54. For this very cause hath King Laman - by his cunning and lying craftiness and his fair promises - hath deceived me, that I have brought this my people up into this land that they may destroy them; Yea, and we have suffered this many years in the land."},{"time":566.926,"text":"55. And now I, Zeniff, after having told all these things unto my people concerning the Lamanites, I did stimulate them to go to battle with their mights, putting their trust in the Lord; Therefore, we did contend with them face to face."},{"time":581.823,"text":"56. And it came to pass that we did drive them again out of our land; And we slew them with a great slaughter, even so many that we did not number them."},{"time":590.96,"text":"57. And it came to pass that we returned again to our own land, And my people again began to tend their flocks and to till their ground."},{"time":600.413,"text":"58. And now I, being old, did confer the kingdom upon one of my sons; Therefore, I say no more; And may the Lord bless my people. Amen."}]
};
