<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "2 Nephi",
  chapter: "Chapter 1",
  audioSrc: "https://archive.org/download/2-nephi-ch-1/2%20Nephi%20Ch%201.mp3",
  lyrics: [{"time":0,"text":"Second Nephi, Chapter 1"},{"time":3.2,"text":"1. And now it came to pass after I, Nephi, had made an end of teaching my brethren, our father Lehi also spake many things unto them and rehearsed unto them how great things the Lord had done for them in bringing them out of the Land of Jerusalem;"},{"time":18.24,"text":"2. And he spake unto them concerning their rebellions upon the waters and the mercies of God in sparing their lives, that they were not swallowed up in the sea;"},{"time":27.52,"text":"3. And he also spake unto them concerning the Land of Promise which they had obtained, how merciful the Lord had been in warning us that we should flee out of the Land of Jerusalem,"},{"time":38,"text":"4. \"For behold,\" saith he, \"I have seen a vision in the which I know that Jerusalem is destroyed,"},{"time":45.04,"text":"5. And had we remained in Jerusalem, we should also have perished."},{"time":50.24,"text":"6. But,\" said he, \"notwithstanding our afflictions, we have obtained a Land of Promise, a land which is choice above all other lands,"},{"time":59.04,"text":"7. A land which the Lord God hath covenanted with me should be a land for the inheritance of my seed;"},{"time":65.627,"text":"8. Yea, the Lord hath consecrated this land unto me and to my children forever,"},{"time":72.215,"text":"9. And also all they which should be led out of other countries by the hand of the Lord."},{"time":79.242,"text":"10. Wherefore, I, Lehi, prophesy according to the workings of the Spirit which is in me that there shall be none come into this land save they should be brought by the hand of the Lord;"},{"time":89.992,"text":"11. Wherefore, this land is consecrated unto him whom He shall bring;"},{"time":94.947,"text":"12. And if it so be that they shall serve Him according to the commandments which He hath given, it shall be a land of liberty unto them;"},{"time":104.22999999999999,"text":"13. Wherefore, they shall never be brought down into captivity; If so, it shall be because of iniquity,"},{"time":111.049,"text":"14. For if iniquity shall abound, cursed shall be the land for their sakes;"},{"time":116.42699999999999,"text":"15. But unto the righteous, it shall be blessed forever."},{"time":120.827,"text":"16. And behold, it is wisdom that this land should be kept as yet from the knowledge of other nations,"},{"time":128.902,"text":"17. For behold, many nations would overrun this land, that there would be no place for an inheritance."},{"time":136.527,"text":"18. Wherefore, I, Lehi, have obtained a promise that inasmuch as they which the Lord God shall bring out of the Land of Jerusalem shall keep His commandments, they shall prosper upon the face of this land,"},{"time":147.924,"text":"19. And they shall be kept from all other nations, that they may possess this land unto themselves;"},{"time":154.025,"text":"20. And if it so be that they shall keep His commandments, they shall be blessed upon the face of this land,"},{"time":161.538,"text":"21. And there shall be none to molest them, nor to take away the land of their inheritance, And they shall dwell safely forever."},{"time":168.70600000000002,"text":"22. But behold, when the time cometh that they shall dwindle in unbelief - After that they have received so great blessings from the hand of the Lord, Having a knowledge of the creation of the earth and all men, knowing the great and marvelous works of the Lord from the creation of the world, Having power given them to do all things by faith, Having all the commandments from the beginning, And having been brought by His infinite goodness into this precious Land of Promise -"},{"time":195.76,"text":"23. Behold I say, if the day shall come that they will reject the Holy One of Israel, the true Messiah, their Redeemer and their God, Behold, the judgments of Him that is just shall rest upon them -"},{"time":207.667,"text":"24. Yea, He will bring other nations unto them and He will give unto them power, And He will take away from them the lands of their possessions, And He will cause them to be scattered and smitten;"},{"time":219.659,"text":"25. Yea, as one generation passeth to another, there shall be bloodsheds and great visitations among them."},{"time":227.28,"text":"26. Wherefore my sons, I would that ye would remember, Yea, I would that ye would hearken unto my words."},{"time":240.141,"text":"27. O that ye would awake! Awake from a deep sleep, yea, even from the sleep of hell, And shake off the awful chains by which ye are bound, which are the chains which bind the children of men, that they are carried away captive down to the eternal gulf of misery and wo!"},{"time":253.002,"text":"28. Awake and arise from the dust and hear the words of a trembling parent whose limbs ye must soon lay down in the cold and silent grave from whence no traveler can return - A few more days and I go the way of all the earth;"},{"time":267.936,"text":"29. But behold, the Lord hath redeemed my soul from hell; I have beheld His glory and I am encircled about eternally in the arms of His love!"},{"time":276.888,"text":"30. And I desire that ye should remember to observe the statutes and the judgments of the Lord; Behold, this hath been the anxiety of my soul from the beginning;"},{"time":287.587,"text":"31. My heart hath been weighed down with sorrow from time to time, For I have feared - lest for the hardness of your hearts, lest the Lord your God should come out in the fullness of His wrath upon you - that ye be cut off and destroyed forever,"},{"time":301.609,"text":"32. Or that a cursing should come upon you for the space of many generations, And ye are visited by sword and by famine, And are hated and are led according to the will and captivity of the devil."},{"time":312.404,"text":"33. O my sons, that these things might not come upon you, But that ye might be a choice and a favored people of the Lord!"},{"time":323.2,"text":"34. But behold, His will be done, for His ways are righteousness forever; And He hath said that, 'Inasmuch as ye shall keep My commandments, ye shall prosper in the land, But inasmuch as ye will not keep My commandments, ye shall be cut off from My presence.'"},{"time":338.29,"text":"35. And now, that my soul might have joy in you and that my heart might leave this world with gladness because of you, that I might not be brought down with grief and sorrow to the grave,"},{"time":350.02,"text":"36. Arise from the dust, my sons, and be men! And be determined in one mind and in one heart, united in all things, That ye may not come down into captivity, That ye may not be cursed with a sore cursing,"},{"time":364.712,"text":"37. And also that ye may not incur the displeasure of a just God upon you unto the destruction, yea, the eternal destruction of both soul and body."},{"time":376.12,"text":"38. Awake, my sons! Put on the armor of righteousness;"},{"time":380.104,"text":"39. Shake off the chains with which ye are bound and come forth out of obscurity and arise from the dust;"},{"time":388.555,"text":"40. Rebel no more against your brother, whose views have been glorious, And who hath kept the commandments from the time we left Jerusalem, And who hath been an instrument in the hands of God in bringing us forth into the Land of Promise,"},{"time":401.896,"text":"41. For were it not for him, we must have perished with hunger in the wilderness;"},{"time":408.32,"text":"42. Nevertheless, ye sought to take away his life; Yea, and he hath suffered much sorrow because of you;"},{"time":415.15999999999997,"text":"43. And I exceedingly fear and tremble because of you, lest he shall suffer again."},{"time":421.6,"text":"44. For behold, ye have accused him that he sought power and authority over you,"},{"time":427.52,"text":"45. But I know that he hath not sought for power nor authority over you, But he hath sought the glory of God and your own eternal welfare."},{"time":435.653,"text":"46. And ye have murmured because he hath been plain unto you -"},{"time":439.983,"text":"47. Ye say that he hath used sharpness, Ye say that he hath been angry with you;"},{"time":447.394,"text":"48. But behold, his sharpness was the sharpness of the power of the word of God which was in him;"},{"time":453.76,"text":"49. And that which ye call anger was the truth according to that which is in God, which he could not constrain, manifesting boldly concerning your iniquities;"},{"time":462.235,"text":"50. And it must needs be that the power of God must be with him, even unto his commanding you, that ye must obey;"},{"time":471.707,"text":"51. But behold, it was not him, But it was the Spirit of the Lord which was in him which opened his mouth to utterance, that he could not shut it."},{"time":480.96,"text":"52. And now my son Laman, and also Lemuel and Sam, and also my sons which are the sons of Ishmael, Behold, if ye will hearken unto the voice of Nephi, ye shall not perish;"},{"time":493.76,"text":"53. And if ye will hearken unto him, I leave unto you a blessing, yea, even my first blessing;"},{"time":501.12,"text":"54. But if ye will not hearken unto him, I take away my first blessing, yea, even my blessing, And it shall rest upon him."},{"time":509.989,"text":"55. And now Zoram, I speak unto you: Behold, thou art the servant of Laban; Nevertheless, thou hast been brought out of the Land of Jerusalem, And I know that thou art a true friend unto my son Nephi forever;"},{"time":524.24,"text":"56. Wherefore, because thou hast been faithful, thy seed shall be blessed with his seed, that they dwell in prosperity long upon the face of this land,"},{"time":532.88,"text":"57. And nothing, save it shall be iniquity among them, shall harm or disturb their prosperity upon the face of this land forever;"},{"time":540.747,"text":"58. Wherefore, if ye shall keep the commandments of the Lord, the Lord hath consecrated this land for the security of thy seed with the seed of my son."},{"time":551.04,"text":"59. And now Jacob, I speak unto you: Thou art my firstborn in the days of my tribulation in the wilderness;"},{"time":558.291,"text":"60. And behold, in thy childhood thou hast suffered afflictions and much sorrow because of the rudeness of thy brethren;"},{"time":569.268,"text":"61. Nevertheless Jacob, my firstborn in the wilderness, thou knowest the greatness of God, And He shall consecrate thine afflictions for thy gain,"},{"time":579.04,"text":"62. Wherefore, thy soul shall be blessed, And thou shalt dwell safely with thy brother Nephi, And thy days shall be spent in the service of thy God."},{"time":588.994,"text":"63. Wherefore, I know that thou art redeemed because of the righteousness of thy Redeemer, For thou hast beheld that in the fullness of time He cometh to bring salvation unto men,"},{"time":598.995,"text":"64. And thou hast beheld in thy youth His glory; Wherefore, thou art blessed, even as they unto whom He shall minister in the flesh."},{"time":607.92,"text":"65. For the Spirit is the same yesterday, today and forever;"},{"time":612.542,"text":"66. And the way is prepared from the fall of man, And salvation is free;"},{"time":619.318,"text":"67. And men are instructed sufficiently, that they know good from evil;"},{"time":624.96,"text":"68. And the law is given unto men,"},{"time":627.346,"text":"69. And by the law no flesh is justified, or by the law men are cut off,"},{"time":632.8,"text":"70. Yea, by the temporal law they were cut off, and also by the spiritual law - They perish from that which is good and become miserable forever;"},{"time":642.176,"text":"71. Wherefore, redemption cometh in and through the Holy Messiah, For He is full of grace and truth;"},{"time":649.398,"text":"72. Behold, He offereth Himself a sacrifice for sin to answer the ends of the law unto all those which have a broken heart and a contrite spirit, And unto none else can the ends of the law be answered."},{"time":662.805,"text":"73. Wherefore, how great the importance to make these things known unto the inhabitants of the earth, That they may know that there is no flesh that can dwell in the presence of God, save it be through the merits and mercy and grace of the Holy Messiah,"},{"time":675.712,"text":"74. Which layeth down His life, according to the flesh, and taketh it again, by the power of the Spirit,"},{"time":683.294,"text":"75. That He may bring to pass the resurrection of the dead, being the first that should rise."},{"time":689.817,"text":"76. Wherefore, He is the firstfruits unto God, inasmuch as He shall make intercession for all the children of men;"},{"time":698.16,"text":"77. And they that believe in Him shall be saved;"},{"time":701.67,"text":"78. And because of the intercession for all, all men cometh unto God;"},{"time":706.467,"text":"79. Wherefore, they stand in the presence of Him, to be judged of Him according to the truth and holiness which is in Him."},{"time":716.96,"text":"80. Wherefore, the ends of the law which the Holy One hath given - unto the inflicting of the punishment, which is affixed, Which punishment that is affixed is in opposition to that of the happiness, which is affixed - to answer the ends of the atonement."},{"time":732.24,"text":"81. For it must needs be that there is an opposition in all things;"},{"time":736.08,"text":"82. If not so, my firstborn in the wilderness, righteousness could not be brought to pass - neither wickedness, neither holiness, nor misery, neither good, nor bad."},{"time":749.44,"text":"83. Wherefore, all things must needs be a compound in one."},{"time":754.64,"text":"84. Wherefore, if it should be one body, it must needs remain as dead - having no life, neither death, nor corruption, nor incorruption, happiness, nor misery, neither sense, nor insensibility;"},{"time":769.2,"text":"85. Wherefore, it must needs have been created for a thing of naught;"},{"time":774.32,"text":"86. Wherefore, there would have been no purpose in the end of its creation;"},{"time":779.68,"text":"87. Wherefore, this thing must needs destroy the wisdom of God and His eternal purposes, And also the power and the mercy and the justice of God."},{"time":790.24,"text":"88. And if ye shall say there is no law, ye shall also say there is no sin;"},{"time":795.92,"text":"89. And if ye shall say there is no sin, ye shall also say there is no righteousness;"},{"time":802.08,"text":"90. And if there be no righteousness, there be no happiness;"},{"time":806.96,"text":"91. And if there be no righteousness nor happiness, there be no punishment nor misery;"},{"time":813.12,"text":"92. And if these things are not, there is no God;"},{"time":817.44,"text":"93. And if there is no God, we are not, neither the earth, For there could have been no creation of things, neither to act, nor to be acted upon; Wherefore, all things must have vanished away."},{"time":829.28,"text":"94. And now my son, I speak unto you these things for your profit and learning,"},{"time":835.507,"text":"95. For there is a God and He hath created all things - Both the heavens and the earth and all things that in them is,"},{"time":844.35,"text":"96. Both things to act and things to be acted upon."},{"time":848.16,"text":"97. And to bring about His eternal purposes in the end of man - After that He had created our first parents, and the beasts of the field, and the fowls of the air, and in fine, all things which are created - It must needs be that there was an opposition,"},{"time":863.976,"text":"98. Even the forbidden fruit in opposition to the tree of life, the one being sweet and the other bitter;"},{"time":871.4110000000001,"text":"99. Wherefore, the Lord God gave unto man that he should act for himself;"},{"time":876.436,"text":"100. Wherefore, man could not act for himself, save it should be that he were enticed by the one or the other."},{"time":884.12,"text":"101. And I, Lehi, according to the things which I have read, must needs suppose that an angel of God, according to that which is written, had fallen from heaven;"},{"time":894.256,"text":"102. Wherefore, he became a devil, having sought that which was evil before God;"},{"time":900.08,"text":"103. And because that he had fallen from heaven and had become miserable forever, and he sought also the misery of all mankind,"},{"time":907.672,"text":"104. Wherefore, he saith unto Eve - yea, even that old serpent which is the devil, which is the father of all lies - wherefore, he saith, 'Partake of the forbidden fruit and ye shall not die, but ye shall be as God, knowing good and evil.'"},{"time":924.672,"text":"105. And after that Adam and Eve had partaken of the forbidden fruit, they were driven out from the garden of Eden to till the earth;"},{"time":933.52,"text":"106. And they have brought forth children, yea, even the family of all the earth;"},{"time":938.5889999999999,"text":"107. And the days of the children of men were prolonged according to the will of God, that they might repent while in the flesh;"},{"time":946.96,"text":"108. Wherefore, their state became a state of probation, And their time was lengthened, according to the commandments which the Lord God gave unto the children of men,"},{"time":957.335,"text":"109. For He gave commandment that all men must repent,"},{"time":960.818,"text":"110. For He showed unto all men that they were lost because of the transgression of their parents."},{"time":967.3,"text":"111. And now behold, if Adam had not transgressed, he would not have fallen, but he would have remained in the garden of Eden;"},{"time":976.564,"text":"112. And all things which were created must have remained in the same state which they were after that they were created, And they must have remained forever and had no end;"},{"time":985.68,"text":"113. And they would have had no children; Wherefore, they would have remained in a state of innocence - having no joy, for they knew no misery, doing no good, for they knew no sin."},{"time":998.72,"text":"114. But behold, all things have been done in the wisdom of Him who knoweth all things;"},{"time":1003.68,"text":"115. Adam fell, that men might be, And men are, that they might have joy,"},{"time":1010.64,"text":"116. And the Messiah cometh in the fullness of time, that He might redeem the children of men from the fall;"},{"time":1016.335,"text":"117. And because that they are redeemed from the fall, they have become free forever, knowing good from evil,"},{"time":1023.634,"text":"118. To act for themselves and not to be acted upon, save it be by the punishment of the Lord at the great and last day, according to the commandments which God hath given."},{"time":1035.6,"text":"119. Wherefore, men are free, according to the flesh; And all things are given them which are expedient unto man;"},{"time":1042.249,"text":"120. And they are free to choose liberty and eternal life through the great Mediator of all men, Or to choose captivity and death, according to the captivity and power of the devil,"},{"time":1053.867,"text":"121. For he seeketh that all men might be miserable like unto himself."},{"time":1059.787,"text":"122. And now my sons, I would that ye should look to the great Mediator and hearken unto His great commandments,"},{"time":1068,"text":"123. And be faithful unto His words and choose eternal life, according to the will of His Holy Spirit,"},{"time":1075.2,"text":"124. And not choose eternal death, according to the will of the flesh and the evil which is therein,"},{"time":1081.52,"text":"125. Which giveth the spirit of the devil power to captivate, to bring you down to hell, that he may reign over you in his own kingdom."},{"time":1090.189,"text":"126. I have spoken these few words unto you all, my sons, in the last days of my probation;"},{"time":1097.128,"text":"127. And I have chosen the good part, according to the words of the prophet;"},{"time":1102.229,"text":"128. And I have none other object, save it be the everlasting welfare of your souls. Amen."}]
};
