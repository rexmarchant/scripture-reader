window.CHAPTER_DATA = {

  audioSrc: "https://archive.org/download/mosiah-ch-2/Mosiah%20Ch%202.mp3",
  lyrics: [{"time":0.0,"text":"Mosiah Chapter 2"},{"time":1.048,"text":"1. And now it came to pass that when King Benjamin had made an end of speaking the words which had been delivered unto him by the angel of the Lord, that he cast his eyes round about on the multitude; And behold, they had fallen to the earth, for the fear of the Lord had come upon them,"},{"time":18.535,"text":"2. And they had viewed themselves in their own carnal state even less than the dust of the earth;"},{"time":24.947,"text":"3. And they all cried aloud with one voice, saying: \"O have mercy and apply the atoning blood of Christ, that we may receive forgiveness of our sins and our hearts may be purified!"},{"time":35.849,"text":"4. For we believe in Jesus Christ, the Son of God, who created heaven and earth and all things, Who shall come down among the children of men.\""},{"time":46.084,"text":"5. And it came to pass that after they had spoken these words, the Spirit of the Lord came upon them, And they were filled with joy,"},{"time":55.6,"text":"6. having received a remission of their sins and having peace of conscience because of the exceeding faith which they had in Jesus Christ which should come, according to the words which King Benjamin had spoken unto them."},{"time":67.12,"text":"7. And King Benjamin again opened his mouth and began to speak unto them, saying: \"My friends and my brethren, my kindred and my people, I would again call your attention that ye may hear and understand the remainder of my words which I shall speak unto you."},{"time":84.08,"text":"8. \"For behold, that if the knowledge of the goodness of God at this time hath awakened you to a sense of your nothingness and your worthlessness and fallen state,"},{"time":92.48,"text":"9. I say unto you, that if ye have come to a knowledge of the goodness of God and His matchless power and His wisdom and His patience and His longsuffering toward the children of men,"},{"time":104.24,"text":"10. And also the atonement which hath been prepared from the foundation of the world, that thereby salvation might come to him that should put his trust in the Lord, And should be diligent in keeping His commandments and continue in the faith, even unto the end of his life - I mean the life of the mortal body -"},{"time":122.367,"text":"11. I say that this is the man that receiveth salvation through the atonement which was prepared from the foundation of the world for all mankind, Which ever was, ever since the fall of Adam, or which is or which ever shall be, even unto the end of the world."},{"time":137.937,"text":"12. And there is none other salvation save this which hath been spoken of; Neither are there any conditions whereby man can be saved, except the conditions which I have told you:"},{"time":149.52,"text":"13. \"Believe in God; Believe that He is and that He created all things, both in heaven and in earth;"},{"time":156.64,"text":"14. Believe that He hath all wisdom and all power, both in heaven and in earth;"},{"time":161.12,"text":"15. Believe that man doth not comprehend all the things which the Lord can comprehend."},{"time":168.48,"text":"16. \"And again, believe that ye must repent of your sins and forsake them, And humble yourselves before God and ask in sincerity of heart that He would forgive you;"},{"time":178.383,"text":"17. And now if you believe all these things, see that ye do them!"},{"time":183.084,"text":"18. \"And again, I say unto you as I have said before, that as ye have come to the knowledge of the glory of God,"},{"time":191.044,"text":"19. Or if ye have known of His goodness and have tasted of His love and have received a remission of your sins, which causeth such exceeding great joy in your souls,"},{"time":200.96,"text":"20. Even so, I would that ye should remember and always retain in remembrance the greatness of God and your own nothingness and His goodness and longsuffering toward you unworthy creatures;"},{"time":211.717,"text":"21. And humble yourselves, even in the depths of humility, calling on the name of the Lord daily, And standing steadfastly in the faith of that which is to come which was spoken by the mouth of the angel."},{"time":224.968,"text":"22. \"And behold, I say unto you that if ye do this, ye shall always rejoice and be filled with the love of God and always retain a remission of your sins;"},{"time":235.92,"text":"23. And ye shall grow in the knowledge of the glory of Him that created you, or in the knowledge of that which is just and true."},{"time":242.947,"text":"24. \"And ye will not have a mind to injure one another, but to live peaceably and to render to every man according to that which is his due."},{"time":252.48,"text":"25. \"And ye will not suffer your children, that they go hungry or naked;"},{"time":257.84,"text":"26. Neither will ye suffer that they transgress the laws of God and fight and quarrel one with another and serve the devil which is the master of sin - or which is the evil spirit which hath been spoken of by our fathers, he being an enemy to all righteousness -"},{"time":272.08,"text":"27. But ye will teach them to walk in the ways of truth and soberness; Ye will teach them to love one another and to serve one another."},{"time":280.341,"text":"28. \"And also, ye yourselves will succor those that stand in need of your succor; Ye will administer of your substance unto him that standeth in need;"},{"time":290.8,"text":"29. And ye will not suffer that the beggar putteth up his petition to you in vain and turn him out to perish."},{"time":296.64,"text":"30. \"Perhaps thou shalt say, ' The man hath brought upon himself his misery, therefore I will stay my hand and will not give unto him of my food, nor impart unto him of my substance that he may not suffer, for his punishments are just ';"},{"time":310.88,"text":"31. But I say unto you O man, whosoever doeth this, the same hath great cause to repent; And except he repenteth of that which he hath done, he perisheth forever and hath no interest in the kingdom of God."},{"time":326.8,"text":"32. \"For behold, are we not all beggars? Do we not all depend upon the same Being, even God, for all the substance which we have? For both food and raiment and for gold and for silver and for all the riches which we have of every kind?"},{"time":343.624,"text":"33. \"And behold, even at this time ye have been calling on His name and begging for a remission of your sins;"},{"time":350.762,"text":"34. And hath He suffered that ye have begged in vain?"},{"time":354.292,"text":"35. Nay, He hath poured out His Spirit upon you, And hath caused that your hearts should be filled with joy, And hath caused that your mouths should be stopped, that ye could not find utterance, so exceeding great was your joy."},{"time":369.68,"text":"36. \"And now, if God who hath created you, on whom you are dependent for your lives and for all that ye have and are, doth grant unto you whatsoever ye ask that is right, in faith believing that ye shall receive, O then, how had ye ought to impart of the substance that ye have one to another!"},{"time":387.6,"text":"37. \"And if ye judge the man who putteth up his petition to you for your substance, that he perish not, and condemn him, How much more just will be your condemnation for withholding your substance which doth not belong to you, but to God to whom also your life belongeth?"},{"time":403.013,"text":"38. And yet ye put up no petition, or repenteth not of the thing which thou hast done;"},{"time":409.735,"text":"39. I say unto you, wo be unto that man! for his substance shall perish with him. \"And now, I say these things unto those which are rich as pertaining to the things of this world."},{"time":423.14,"text":"40. \"And again I say unto the poor, ye that have not and yet hath sufficient that ye remain from day to day - I mean all you that deny the beggar because ye have not - I would that ye say in your hearts that ' I give not because I have not, but if I had I would give. '"},{"time":438.533,"text":"41. \"And now, if ye say this in your hearts, ye remain guiltless, Otherwise, ye are condemned and your condemnation is just, for ye covet that which ye have not received."},{"time":451.36,"text":"42. \"And now for the sake of these things which I have spoken unto you - that is, for the sake of retaining a remission of your sins from day to day, that ye may walk guiltless before God -"},{"time":463.36,"text":"43. I would that ye should impart of your substance to the poor, Every man according to that which he hath, such as - feeding the hungry, clothing the naked, visiting the sick and administering to their relief, both spiritually and temporally, according to their wants."},{"time":478.72,"text":"44. \"And see that all these things are done in wisdom and order, for it is not requisite that a man should run faster than what he hath strength."},{"time":488.044,"text":"45. \"And again, it is expedient that he should be diligent, that thereby he might win the prize; Therefore, all things must be done in order."},{"time":497.503,"text":"46. \"And I would that ye should remember that whosoever among you that borroweth of his neighbor should return the thing that he borroweth according as he doth agree,"},{"time":506.636,"text":"47. Or else thou shalt commit sin, And perhaps thou shalt cause thy neighbor to commit sin also."},{"time":513.069,"text":"48. \"And finally, I cannot tell you all the things whereby ye may commit sin, for there are divers ways and means, Even so many that I cannot number them."},{"time":523.664,"text":"49. \"But this much I can tell you: That if ye do not watch yourselves and your thoughts and your words and your deeds, And observe to keep the commandments of God and continue in the faith of what ye have heard concerning the coming of our Lord, even unto the end of your lives, Ye must perish."},{"time":539.615,"text":"50. \"And now O man, remember and perish not!\""}]
};
