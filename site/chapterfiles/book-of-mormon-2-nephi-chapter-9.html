<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "2 Nephi",
  chapter: "Chapter 9",
  audioSrc: "https://archive.org/download/2-nephi-ch-9/2%20Nephi%20Ch%209.mp3",
  lyrics: [{"time":0,"text":"Second Nephi, Chapter 9"},{"time":1.712,"text":"1. In the year that King Uzziah died, I saw also the Lord sitting upon a throne, high and lifted up, And His train filled the temple."},{"time":13.28,"text":"2. Above it stood the seraphim; Each one had six wings - with twain he covered his face, and with twain he covered his feet, and with twain he did fly."},{"time":22.96,"text":"3. And one cried unto another and said: Holy, holy, holy is the Lord of Hosts! The whole earth is full of His glory!"},{"time":34.56,"text":"4. And the posts of the door moved at the voice of him that cried, And the house was filled with smoke."},{"time":41.84,"text":"5. Then said I: Wo is me! for I am undone because I am a man of unclean lips, And I dwell in the midst of a people of unclean lips; For mine eyes have seen the King, the Lord of Hosts."},{"time":55.76,"text":"6. Then flew one of the seraphim unto me, having a live coal in his hand which he had taken with the tongs from off the altar;"},{"time":63.4,"text":"7. And he laid it upon my mouth and said: Lo, this has touched thy lips; And thine iniquity is taken away, And thy sin purged."},{"time":73.2,"text":"8. And also I heard the voice of the Lord, saying: Whom shall I send? And who will go for Us? Then I said: Here am I! send me."},{"time":85.44,"text":"9. And He said: Go, and tell this people: Hear ye indeed - but they understood not; And see ye indeed - but they perceived not."},{"time":95.84,"text":"10. Make the heart of this people fat, And make their ears heavy and shut their eyes, Lest they see with their eyes, and hear with their ears, and understand with their heart, and convert and be healed."},{"time":109.527,"text":"11. Then said I: Lord, how long? And He said: Until the cities be wasted without inhabitant, and the houses without man, and the land be utterly desolate,"},{"time":122.48,"text":"12. and the Lord have removed men far away, For there shall be a great forsaking in the midst of the land."},{"time":131.12,"text":"13. But yet, in it there shall be a tenth; And they shall return and shall be eaten, as a teil tree and as an oak whose substance is in them when they cast their leaves - So the holy seed shall be the substance thereof."},{"time":145.52,"text":"14. And it came to pass in the days of Ahaz, the son of Jotham, the son of Uzziah, king of Judah, That Rezin, king of Syria, and Pekah, the son of Remaliah, king of Israel, went up toward Jerusalem to war against it but could not prevail against it."},{"time":162.438,"text":"15. And it was told the house of David, saying: Syria is confederate with Ephraim. And his heart was moved, and the heart of his people, as the trees of the wood are moved with the wind."},{"time":176.461,"text":"16. Then said the Lord unto Isaiah: Go forth now to meet Ahaz - thou and Shear-Jashub, thy son - at the end of the conduit of the upper pool in the highway of the Fuller's Field;"},{"time":188.547,"text":"17. And say unto him: Take heed and be quiet; Fear not, neither be fainthearted, for the two tails of these smoking firebrands, For the fierce anger of Rezin with Syria and of the son of Remaliah."},{"time":202.996,"text":"18. Because Syria, Ephraim and the son of Remaliah have taken evil counsel against thee, saying,"},{"time":209.56,"text":"19. Let us go up against Judah and vex it, And let us make a breach therein for us and set a king in the midst of it, yea, the son of Tabeal,"},{"time":220.2,"text":"20. Thus saith the Lord God: It shall not stand! Neither shall it come to pass."},{"time":228.72,"text":"21. For the head of Syria is Damascus, And the head of Damascus, Rezin; And within threescore and five years shall Ephraim be broken, that it be not a people,"},{"time":239.04,"text":"22. And the head of Ephraim is Samaria, And the head of Samaria is Remaliah's son. If ye will not believe, surely ye shall not be established."},{"time":252.16,"text":"23. Moreover, the Lord spake again unto Ahaz, saying:"},{"time":257.44,"text":"24. Ask thee a sign of the Lord thy God; Ask either in the depths, Or in the heights above."},{"time":263.28,"text":"25. But Ahaz said: I will not ask, Neither will I tempt the Lord!"},{"time":270.64,"text":"26. And he said: Hear ye now, O house of David! Is it a small thing for you to weary men, But will ye weary my God also?"},{"time":280.52,"text":"27. Therefore, the Lord Himself shall give you a sign: Behold, a virgin shall conceive and shall bear a Son and shall call His name Immanuel."},{"time":290.96,"text":"28. Butter and honey shall He eat, that He may know to refuse the evil and to choose the good."},{"time":299.28,"text":"29. For before the Child shall know to refuse the evil and choose the good, The land that thou abhorrest shall be forsaken of both her kings."},{"time":321.331,"text":"30. The Lord shall bring upon thee and upon thy people and upon thy father's house days that have not come, From the day that Ephraim departed from Judah, the king of Assyria."},{"time":351.849,"text":"31. And it shall come to pass in that day, that the Lord shall hiss for the fly that is in the uttermost part of Egypt, And for the bee that is in the Land of Assyria."},{"time":360.214,"text":"32. And they shall come and shall rest - all of them - in the desolate valleys, and in the holes of the rocks, and upon all thorns, and upon all bushes."},{"time":368.578,"text":"33. In the same day shall the Lord shave with a razor that is hired, by them beyond the river, by the king of Assyria, the head and the hair of the feet, And it shall also consume the beard."},{"time":369.684,"text":"34. And it shall come to pass that in that day, a man shall nourish a young cow and two sheep;"},{"time":372.598,"text":"35. And it shall come to pass, for the abundance of milk they shall give, he shall eat butter; For butter and honey shall everyone eat that is left in the land."},{"time":378.516,"text":"36. And it shall come to pass in that day, every place shall be - where there were a thousand vines at a thousand silverlings - which shall be for briers and thorns."},{"time":381.52,"text":"37. With arrows and with bows shall men come thither, Because all the land shall become briers and thorns."},{"time":387.178,"text":"38. And all hills that shall be digged with the mattock, There shall not come thither the fear of briers and thorns; But it shall be for the sending forth of oxen and the treading of lesser cattle."},{"time":399.476,"text":"39. Moreover, the word of the Lord said unto me: Take thee a great roll and write in it with a man's pen concerning Maher-Shalal-Hash-Baz."},{"time":409.312,"text":"40. And I took unto me faithful witnesses to record, Uriah the priest and Zechariah the son of Jeberechiah."},{"time":417.64,"text":"41. And I went unto the prophetess and she conceived and bear a son. Then said the Lord to me: Call his name Maher-Shalal-Hash-Baz."},{"time":429.04,"text":"42. For behold, the child shall not have knowledge to cry, My father and My mother, before the riches of Damascus and the spoil of Samaria shall be taken away before the king of Assyria."},{"time":441.28,"text":"43. The Lord spake also unto me again, saying:"},{"time":448.28,"text":"44. Forasmuch as this people refuseth the waters of Shiloah that go softly along, And rejoice in Rezin and Remaliah's son;"},{"time":455.28,"text":"45. Now therefore, behold, the Lord bringeth up upon them the waters of the river, strong and many, Even the king of Assyria and all his glory; And he shall come up over all his channels and go over all his banks;"},{"time":468.379,"text":"46. And he shall pass through Judah, He shall overflow and go over, He shall reach even to the neck; And the stretching out of his wings shall fill the breadth of Thy land, O Immanuel."},{"time":480.36,"text":"47. Associate yourselves, O ye people, and ye shall be broken in pieces! And give ear, all ye of far countries. Gird yourselves, and ye shall be broken in pieces; Gird yourselves, and ye shall be broken in pieces."},{"time":498.541,"text":"48. Take counsel together, and it shall come to naught; Speak the word, and it shall not stand, For God is with us."},{"time":507.253,"text":"49. For the Lord spake thus to me with a strong hand, And instructed me that I should not walk in the way of this people, saying:"},{"time":517.28,"text":"50. Say ye not, a confederacy, to all to whom this people shall say, a confederacy; Neither fear ye their fear, nor be afraid."},{"time":526.179,"text":"51. Sanctify the Lord of Hosts Himself, And let Him be your fear, And let Him be your dread."},{"time":533.592,"text":"52. And He shall be for a sanctuary; But for a stone of stumbling and for a rock of offense, to both the houses of Israel; For a gin and a snare, to the inhabitants of Jerusalem."},{"time":544.924,"text":"53. And many among them shall stumble and fall and be broken and be snared and be taken."},{"time":552.48,"text":"54. Bind up the testimony, seal the law among my disciples."},{"time":559.36,"text":"55. And I will wait upon the Lord that hideth His face from the house of Jacob; And I will look for Him."},{"time":566.72,"text":"56. Behold! I and the children whom the Lord hath given me are for signs and for wonders in Israel from the Lord of Hosts, which dwelleth in Mount Zion."},{"time":576.974,"text":"57. And when they shall say unto you, Seek unto them that have familiar spirits and unto wizards that peep and mutter, Should not a people seek unto their God? For the living to hear from the dead?"},{"time":590.72,"text":"58. To the law and to the testimony! And if they speak not according to this word, it is because there is no light in them."},{"time":599.335,"text":"59. And they shall pass through it hardly bestead and hungry; And it shall come to pass that when they shall be hungry, They shall fret themselves and curse their King and their God and look upward."},{"time":611.44,"text":"60. And they shall look unto the earth and behold trouble and darkness, dimness of anguish, And shall be driven to darkness."},{"time":620.24,"text":"61. Nevertheless, the dimness shall not be such as was in her vexation, When at the first He lightly afflicted the Land of Zebulon and the Land of Naphtali, And afterward did more grievously afflict by the way of the Red Sea, beyond Jordan, in Galilee, of the nations."},{"time":635.656,"text":"62. The people that walked in darkness have seen a great light; They that dwell in the land of the shadow of death - upon them hath the light shined."},{"time":646.72,"text":"63. Thou hast multiplied the nation and increased the joy; They joy before Thee, according to the joy in harvest and as men rejoice when they divide the spoil."},{"time":657.28,"text":"64. For Thou hast broken the yoke of his burden and the staff of his shoulder, the rod of his oppressor,"},{"time":663.656,"text":"65. For every battle of the warrior with confused noise and garments rolled in blood, But this shall be with burning and fuel of fire."},{"time":672.745,"text":"66. For unto us a Child is born, unto us a Son is given; And the government shall be upon His shoulder. And His name shall be called Wonderful, Counselor, The Mighty God, The Everlasting Father, The Prince of Peace."},{"time":687.36,"text":"67. Of the increase of government and peace, there is no end upon the throne of David and upon His kingdom, To order it and to establish it with judgment and with justice from henceforth, even forever. The zeal of the Lord of Hosts will perform this."},{"time":703.68,"text":"68. The Lord sent His word unto Jacob and it hath lighted upon Israel."},{"time":709.52,"text":"69. And all the people shall know - Even Ephraim and the inhabitants of Samaria - That say in the pride and the stoutness of heart:"},{"time":720.08,"text":"70. The bricks are fallen down, but we will build with hewn stones; The sycamores are cut down, but we will change them into cedars."},{"time":729.84,"text":"71. Therefore, the Lord shall set up the adversaries of Rezin against him and join his enemies together,"},{"time":737.04,"text":"72. The Syrians before and the Philistines behind; And they shall devour Israel with open mouth. For all this His anger is not turned away, But His hand stretched out still."},{"time":749.92,"text":"73. For the people turneth not unto Him that smiteth them, Neither do they seek the Lord of Hosts."},{"time":756.96,"text":"74. Therefore will the Lord cut off from Israel head and tail, branch and rush in one day -"},{"time":764.08,"text":"75. The ancient, he is the head; And the prophet that teacheth lies, he is the tail."},{"time":770,"text":"76. For the leaders of this people cause them to err; And they that are led of them are destroyed."},{"time":777.04,"text":"77. Therefore, the Lord shall have no joy in their young men, Neither shall have mercy on their fatherless and widows; For every one of them is a hypocrite and an evildoer, And every mouth speaketh folly. For all this His anger is not turned away, But His hand stretched out still."},{"time":794.32,"text":"78. For wickedness burneth as the fire; It shall devour the briers and thorns and shall kindle in the thickets of the forests; And they shall mount up like the lifting up of smoke."},{"time":807.76,"text":"79. Through the wrath of the Lord of Hosts is the land darkened, And the people shall be as the fuel of the fire; No man shall spare his brother."},{"time":816.057,"text":"80. And he shall snatch on the right hand and be hungry; And he shall eat on the left hand and they shall not be satisfied; They shall eat every man the flesh of his own arm."},{"time":828.793,"text":"81. Manasseh, Ephraim; and Ephraim, Manasseh - they together shall be against Judah. For all this His anger is not turned away, But His hand stretched out still."},{"time":838.418,"text":"82. Wo unto them that decree unrighteous decrees! And that write grievousness which they have prescribed,"},{"time":848.042,"text":"83. To turn aside the needy from judgment and to take away the right from the poor of My people, That widows may be their prey and that they may rob the fatherless."},{"time":859.68,"text":"84. And what will ye do in the day of visitation? And in the desolation which shall come from far? To whom will ye flee for help? And where will ye leave your glory?"},{"time":871.92,"text":"85. Without Me they shall bow down under the prisoners, And they shall fall under the slain. For all this His anger is not turned away, But His hand stretched out still."},{"time":885.2,"text":"86. O Assyrian! the rod of Mine anger and their staff in their hand is their indignation."},{"time":892.64,"text":"87. I will send him against a hypocritical nation, And against the people of My wrath will I give him a charge, To take the spoil and to take the prey and to tread them down like the mire of the streets."},{"time":903.475,"text":"88. Howbeit he meaneth not so, Neither doth his heart think so; But in his heart it is to destroy, And cut off nations not a few."},{"time":914.311,"text":"89. For he saith: Are not my princes altogether kings?"},{"time":918.8,"text":"90. Is not Calno as Carchemish? Is not Hamath as Arpad? Is not Samaria as Damascus?"},{"time":928.88,"text":"91. As my hand hath founded the kingdoms of the idols and whose graven images did excel them of Jerusalem and of Samaria,"},{"time":936.395,"text":"92. Shall I not, as I have done unto Samaria and her idols, so do to Jerusalem and to her idols?"},{"time":946.24,"text":"93. Wherefore, it shall come to pass that when the Lord hath performed His whole work upon Mount Zion and upon Jerusalem, I will punish the fruit of the stout heart of the king of Assyria and the glory of his high looks."},{"time":958.708,"text":"94. For he saith: By the strength of my hand and by my wisdom, I have done these things, for I am prudent; And I have moved the borders of the people and have robbed their treasures, And I have put down the inhabitants like a valiant man;"},{"time":974.96,"text":"95. And my hand hath found as a nest the riches of the people; And as one gathereth eggs that are left, have I gathered all the earth; And there was none that moved the wing, or opened the mouth, or peeped."},{"time":988.4,"text":"96. Shall the axe boast itself against him that heweth therewith? Shall the saw magnify itself against him that shaketh it? As if the rod should shake itself against them that lift it up! Or as if the staff should lift up itself as if it were no wood!"},{"time":1006.16,"text":"97. Therefore shall the Lord, the Lord of Hosts, send among his fat ones, leanness; And under his glory He shall kindle a burning like the burning of a fire."},{"time":1016.72,"text":"98. And the Light of Israel shall be for a fire and his Holy One for a flame, And shall burn and shall devour his thorns and his briers in one day;"},{"time":1026.8,"text":"99. And shall consume the glory of his forest and of his fruitful field, both soul and body; And they shall be as when a standardbearer fainteth."},{"time":1036.64,"text":"100. And the rest of the trees of his forest shall be few, that a child may write them."},{"time":1042.08,"text":"101. And it shall come to pass in that day that the remnant of Israel, and such as are escaped of the house of Jacob, shall no more again stay upon him that smote them, But shall stay upon the Lord, the Holy One of Israel, in truth."},{"time":1056.88,"text":"102. The remnant shall return, yea, even the remnant of Jacob, unto the Mighty God."},{"time":1064.16,"text":"103. For though thy people Israel be as the sand of the sea, Yet a remnant of them shall return; The consumption decreed shall overflow with righteousness."},{"time":1074.16,"text":"104. For the Lord God of Hosts shall make a consumption, even determined in all the land."},{"time":1080.96,"text":"105. Therefore, thus saith the Lord God of Hosts: O My people that dwellest in Zion, Be not afraid of the Assyrian; He shall smite thee with a rod and shall lift up his staff against thee after the manner of Egypt."},{"time":1097.12,"text":"106. For yet a very little while and the indignation shall cease, And Mine anger, in their destruction."},{"time":1107.32,"text":"107. And the Lord of Hosts shall stir up a scourge for him, according to the slaughter of Midian at the rock of Oreb; And as His rod was upon the sea, so shall He lift it up after the manner of Egypt."},{"time":1117.52,"text":"108. And it shall come to pass in that day, that his burden shall be taken away from off thy shoulder, and his yoke from off thy neck, And the yoke shall be destroyed because of the anointing."},{"time":1129.2,"text":"109. He is come to Aiath, He is passed to Migron; At Michmash he hath laid up his carriages;"},{"time":1136.16,"text":"110. They are gone over the passage; They have taken up their lodging at Geba. Ramath is afraid. Gibeah of Saul is fled."},{"time":1146.72,"text":"111. Lift up the voice, O daughter of Gallim! Cause it to be heard unto Laish, O poor Anathoth!"},{"time":1154.48,"text":"112. Madmenah is removed, The inhabitants of Gebim gather themselves to flee."},{"time":1162.24,"text":"113. As yet shall he remain at Nob that day; He shall shake his hand against the mount of the daughter of Zion, the Hill of Jerusalem."},{"time":1170.754,"text":"114. Behold, the Lord, the Lord of Hosts, shall lop the bough with terror; And the high ones of stature shall be hewn down; And the haughty shall be humbled;"},{"time":1181.584,"text":"115. And He shall cut down the thickets of the forests with iron, And Lebanon shall fall by a Mighty One."},{"time":1189.093,"text":"116. And there shall come forth a Rod out of the stem of Jesse, And a Branch shall grow out of his roots."},{"time":1196.745,"text":"117. And the Spirit of the Lord shall rest upon Him - the Spirit of wisdom and understanding, the Spirit of counsel and might, the Spirit of knowledge and of the fear of the Lord -"},{"time":1207.975,"text":"118. And shall make Him of quick understanding in the fear of the Lord. And He shall not judge after the sight of His eyes, Neither reprove after the hearing of His ears;"},{"time":1218.532,"text":"119. But with righteousness shall He judge the poor, And reprove with equity for the meek of the earth; And He shall smite the earth with the rod of His mouth, And with the breath of His lips shall He slay the wicked."},{"time":1231.76,"text":"120. And righteousness shall be the girdle of His loins, And faithfulness the girdle of His reins."},{"time":1238.034,"text":"121. The wolf also shall dwell with the lamb, And the leopard shall lie down with the kid, And the calf and the young lion and the fatling together; And a little child shall lead them."},{"time":1249.351,"text":"122. And the cow and the bear shall feed; Their young ones shall lie down together; And the lion shall eat straw like the ox."},{"time":1258.304,"text":"123. And the sucking child shall play on the hole of the asp, And the weaned child shall put his hand on the cockatrice's den."},{"time":1267.027,"text":"124. They shall not hurt nor destroy in all My holy mountain, For the earth shall be full of the knowledge of the Lord, as the waters cover the sea."},{"time":1276.023,"text":"125. And in that day there shall be a Root of Jesse, which shall stand for an ensign of the people; To it shall the Gentiles seek, And His rest shall be glorious."},{"time":1287.6,"text":"126. And it shall come to pass in that day, that the Lord shall set His hand again the second time to recover the remnant of His people which shall be left - From Assyria, and from Egypt, and from Pathros, and from Cush, and from Elam, and from Shinar, and from Hamath, and from the islands of the sea."},{"time":1305.798,"text":"127. And He shall set up an ensign for the nations, And shall assemble the outcasts of Israel, And gather together the dispersed of Judah from the four corners of the earth."},{"time":1316.4470000000001,"text":"128. The envy of Ephraim also shall depart, And the adversaries of Judah shall be cut off; Ephraim shall not envy Judah, And Judah shall not vex Ephraim."},{"time":1328,"text":"129. But they shall fly upon the shoulders of the Philistines toward the west; They shall spoil them of the east together; They shall lay their hand upon Edom and Moab; And the children of Ammon shall obey them."},{"time":1339.861,"text":"130. And the Lord shall utterly destroy the tongue of the Egyptian Sea; And with His mighty wind He shall shake His hand over the river, And shall smite it in the seven streams and make men go over dryshod."},{"time":1352.96,"text":"131. And there shall be a highway for the remnant of His people which shall be left, from Assyria, Like as it was to Israel in the day that he came up out of the Land of Egypt."},{"time":1362.64,"text":"132. And in that day thou shalt say: O Lord, I will praise Thee; Though Thou wast angry with me, Thine anger is turned away, And Thou comfortedst me."},{"time":1373.617,"text":"133. Behold, God is my salvation, I will trust and not be afraid; For the Lord Jehovah is my strength and my song; He also is become my salvation."},{"time":1384.998,"text":"134. Therefore, with joy shall ye draw water out of the wells of salvation;"},{"time":1392.88,"text":"135. And in that day shall ye say: Praise the Lord, call upon His name, Declare His doings among the people, Make mention that His name is exalted."},{"time":1402.734,"text":"136. Sing unto the Lord, for He hath done excellent things - this is known in all the earth."},{"time":1410.44,"text":"137. Cry out and shout, thou inhabitant of Zion; For great is the Holy One of Israel in the midst of thee!"}]
};
