  lyrics: [{"time":0.0,"text":"Jarom Chapter 1"},{"time":1.06,"text":"1. Now behold, I, Jarom, write a few words according to the commandment of my father Enos, that our genealogy may be kept;"},{"time":12.72,"text":"2. And as these plates are small, and as these things are written for the intent of the benefit of our brethren the Lamanites, Wherefore, it must needs be that I write a little; But I shall not write the things of my prophesying, nor of my revelations,"},{"time":27.96,"text":"3. For what could I write more than my fathers have written?"},{"time":32.448,"text":"4. For have not they revealed the plan of salvation?"},{"time":36.12,"text":"5. I say unto you, Yea, And this sufficeth me."},{"time":41.12,"text":"6. Behold, it is expedient that much should be done among this people, Because of the hardness of their hearts, and the deafness of their ears, and the blindness of their minds, and the stiffness of their necks;"},{"time":54.2,"text":"7. Nevertheless, God is exceeding merciful unto them and hath not as yet swept them off from the face of the land;"},{"time":61.84,"text":"8. And there are many among us which have many revelations, for they are not all stiff-necked;"},{"time":68.08,"text":"9. And as many as are not stiff-necked and have faith have communion with the Holy Spirit, which maketh manifest unto the children of men according to their faith."},{"time":77.68,"text":"10. And now behold, two hundred years had passed away and the people of Nephi had waxed strong in the land;"},{"time":85.48,"text":"11. They had observed to keep the law of Moses and the Sabbath day holy unto the Lord;"},{"time":92.04,"text":"12. And they profaned not, neither did they blaspheme;"},{"time":96.52,"text":"13. And the laws of the land were exceeding strict;"},{"time":100.64,"text":"14. And they were scattered upon much of the face of the land, and the Lamanites also;"},{"time":106.56,"text":"15. And they were exceeding more numerous than were they of the Nephites; And they loved murder and would drink the blood of beasts."},{"time":114.64,"text":"16. And it came to pass that they came many times against us, the Nephites, to battle,"},{"time":120.92,"text":"17. But our kings and our leaders were mighty men in the faith of the Lord, And they taught the people the ways of the Lord."},{"time":128.28,"text":"18. Wherefore, we withstood the Lamanites and swept them away out of our lands and began to fortify our cities, or whatsoever place of our inheritance;"},{"time":138.32,"text":"19. And we multiplied exceedingly and spread upon the face of the land, And became exceeding rich in gold and in silver, and in precious things, and in fine workmanship of wood, in buildings and in machinery, and also in iron and copper and brass and steel, Making all manner of tools of every kind to till the ground, And weapons of war -"},{"time":158.96,"text":"20. yea, the sharp - pointed arrow and the quiver, and the dart and the javelin, and all preparations for war;"},{"time":167.36,"text":"21. And thus being prepared to meet the Lamanites, they did not prosper against us."},{"time":173.36,"text":"22. But the word of the Lord was verified which He spake unto our fathers, saying that, \"Inasmuch as ye will keep My commandments, ye shall prosper in the land.\""},{"time":183.84,"text":"23. And it came to pass that the prophets of the Lord did threaten the people of Nephi according to the word of God, That if they did not keep the commandments, but should fall into transgression, they should be destroyed from off the face of the land."},{"time":197.68,"text":"24. Wherefore, the prophets and the priests and the teachers did labor diligently, exhorting with all longsuffering the people to diligence, Teaching the law of Moses and the intent for which it was given,"},{"time":210.2,"text":"25. Persuading them to look forward unto the Messiah and believe in Him to come as though He already was;"},{"time":217.12,"text":"26. And after this manner did they teach them."},{"time":220.6,"text":"27. And it came to pass that by so doing, they kept them from being destroyed upon the face of the land,"},{"time":227.68,"text":"28. For they did prick their hearts with the word, continually stirring them up unto repentance."},{"time":233.92,"text":"29. And it came to pass that two hundred and thirty and eight years had passed away, after the manner of wars and contentions and dissensions for the space of much of the time;"},{"time":244.52,"text":"30. And I, Jarom, do not write more, for the plates are small."},{"time":250.32,"text":"31. But behold, my brethren, ye can go to the other plates of Nephi, For behold, upon them the record of our wars are engraven according to the writings of the kings, or that which they caused to be written;"},{"time":263.88,"text":"32. And I deliver these plates into the hands of my son Omni, that they may be kept according to the commandments of my fathers."}]
