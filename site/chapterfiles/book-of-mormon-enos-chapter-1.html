  audioSrc: "https://archive.org/download/enos-ch-1/Enos%20Ch%201.mp3",
  lyrics: [{"time":0.0,"text":"Enos Chapter 1"},{"time":1.308,"text":"1. Behold, it came to pass that I, Enos, knowing my father, that he was a just man, for he taught me in his language and also in the nurture and admonition of the Lord;"},{"time":14.64,"text":"2. And blessed be the name of my God for it;"},{"time":17.513,"text":"3. And I will tell you of the wrestle which I had before God, before that I received a remission of my sins."},{"time":25.086,"text":"4. Behold, I went to hunt beasts in the forest; And the words which I had often heard my father speak concerning eternal life and the joy of the saints - And the words of my father sunk deep into my heart;"},{"time":39.12,"text":"5. And my soul hungered; And I kneeled down before my Maker and I cried unto Him in mighty prayer and supplication for mine own soul;"},{"time":47.25,"text":"6. And all the day long did I cry unto Him; Yea, and when the night came, I did still raise my voice high, that it reached the heavens;"},{"time":58.24,"text":"7. And there came a voice unto me, saying: \"Enos, thy sins are forgiven thee and thou shalt be blessed.\""},{"time":66.16,"text":"8. And I, Enos, knew that God could not lie; Wherefore, my guilt was swept away."},{"time":73.76,"text":"9. And I saith: \"Lord, how is it done?\""},{"time":76.825,"text":"10. And He saith unto me: \"Because of thy faith in Christ whom thou hast not heard nor seen;"},{"time":83.774,"text":"11. And many years passeth away before that He shall manifest Himself in the flesh; Wherefore, go to it - thy faith hath made thee whole.\""},{"time":93.92,"text":"12. Now it came to pass that when I had heard these words, I began to feel a desire for the welfare of my brethren the Nephites; Wherefore, I did pour out my whole soul unto God for them."},{"time":105.6,"text":"13. And while I was thus struggling in the spirit, behold, the voice of the Lord came into my mind again, saying:"},{"time":112.539,"text":"14. \"I will visit thy brethren according to their diligence in keeping My commandments;"},{"time":119.68,"text":"15. I have given unto them this land and it is a holy land, And I curse it not, save it be for the cause of iniquity;"},{"time":127.625,"text":"16. Wherefore, I will visit thy brethren according as I have said, And their transgressions will I bring down with sorrow upon their own heads.\""},{"time":137.28,"text":"17. And after that I, Enos, had heard these words, my faith began to be unshaken in the Lord, And I prayed unto Him with many long strugglings for my brethren the Lamanites."},{"time":149.36,"text":"18. And it came to pass that after I had prayed and labored with all diligence, the Lord said unto me: \"I will grant unto thee according to thy desires because of thy faith.\""},{"time":159.04,"text":"19. And now behold, this was the desire which I desired of Him: That if it should so be that my people the Nephites, should fall into transgression and by any means be destroyed, and the Lamanites should not be destroyed, That the Lord God would preserve a record of my people the Nephites,"},{"time":176.64,"text":"20. Even if it so be by the power of His holy arm, That it might be brought forth at some future day unto the Lamanites, that perhaps they might be brought unto salvation;"},{"time":186.08,"text":"21. For at the present our strugglings were vain in restoring them to the true faith,"},{"time":194.0,"text":"22. And they swore in their wrath that if it were possible they would destroy our records and us, and also all the traditions of our fathers."},{"time":202.8,"text":"23. Wherefore, I, knowing that the Lord God was able to preserve our records, I cried unto Him continually,"},{"time":210.96,"text":"24. For He had said unto me: \"Whatsoever thing ye shall ask in faith, believing that ye shall receive, in the name of Christ, ye shall receive it.\""},{"time":221.2,"text":"25. And I had faith and I did cry unto God that He would preserve the records;"},{"time":226.88,"text":"26. And He covenanted with me that He would bring them forth unto the Lamanites in His own due time;"},{"time":233.44,"text":"27. And I, Enos, knew that it would be according to the covenant which He had made, Wherefore, my soul did rest;"},{"time":242.32,"text":"28. And the Lord said unto me: \"Thy fathers have also required of Me this thing; And it shall be done unto them according to their faith, for their faith was like unto thine.\""},{"time":253.2,"text":"29. And now it came to pass that I, Enos, went about among the people of Nephi prophesying of things to come and testifying of the things which I had heard and seen;"},{"time":262.96,"text":"30. And I bear record that the people of Nephi did seek diligently to restore the Lamanites unto the true faith in God,"},{"time":269.575,"text":"31. But our labors were vain - their hatred was fixed, And they were led by their evil nature, that they became wild and ferocious and a bloodthirsty people, Full of idolatry and filthiness,"},{"time":281.488,"text":"32. feeding upon beasts of prey, dwelling in tents, And wandering about in the wilderness with a short skin girded about their loins and their heads shaven; And their skill was in the bow and the scimitar and the axe;"},{"time":296.964,"text":"33. And many of them did eat nothing, save it was raw meat; And they were continually seeking to destroy us."},{"time":304.062,"text":"34. And it came to pass that the people of Nephi did till the land, And raise all manner of grain and of fruit, and flocks of herds, and flocks of all manner of cattle of every kind, and goats, and wild goats, and also much horses."},{"time":320.267,"text":"35. And there were exceeding many prophets among us;"},{"time":324.33,"text":"36. And the people were a stiff-necked people, hard to understand;"},{"time":329.68,"text":"37. And there was nothing - save it was exceeding harshness, preaching and prophesying of wars and contentions and destructions, And continually reminding them of death and the duration of eternity and the judgments and the power of God,"},{"time":343.929,"text":"38. And all these things, stirring them up continually to keep them in the fear of the Lord -"},{"time":350.052,"text":"39. I say there was nothing short of these things and exceeding great plainness of speech would keep them from going down speedily to destruction."},{"time":359.2,"text":"40. And after this manner do I write concerning them;"},{"time":362.48,"text":"41. And I saw wars between the Nephites and the Lamanites in the course of my days."},{"time":368.28,"text":"42. And it came to pass that I began to be old; And an hundred and seventy and nine years had passed away from the time that our father Lehi left Jerusalem;"},{"time":378.256,"text":"43. And as I saw that I must soon go down to my grave - Having been wrought upon by the power of God that I must preach and prophesy unto this people and declare the word according to the truth which is in Christ,"},{"time":390.56,"text":"44. And I have declared it in all my days and have rejoiced in it above that of the world -"},{"time":397.76,"text":"45. And I soon go to the place of my rest, which is with my Redeemer, for I know that in Him I shall rest;"},{"time":403.891,"text":"46. And I rejoice in the day when my mortal shall put on immortality and shall stand before Him; Then shall I see His face with pleasure and He will say unto me: \"Come unto Me, ye blessed - There is a place prepared for you in the mansions of My Father.\" Amen."}]
};
