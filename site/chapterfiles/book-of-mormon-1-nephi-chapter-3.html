<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "1 Nephi",
  chapter: "Chapter 3",
  audioSrc: "https://archive.org/download/1-nephi-ch-3/1%20Nephi%20Ch%203.mp3",
  lyrics: [{"time":0,"text":"First Nephi, Chapter 3"},{"time":1.3971375,"text":"1. And now I, Nephi, proceed to give an account upon these plates of my proceedings and my reign and ministry; Wherefore, to proceed with mine account I must speak somewhat of the things of my father, and also of my brethren."},{"time":15.495524999999999,"text":"2. For behold, it came to pass that after my father had made an end of speaking the words of his dream, and also of exhorting them to all diligence, He spake unto them concerning the Jews - How that after they were destroyed, yea, even that great City Jerusalem, and that many were carried away captive into Babylon, That according to the own due time of the Lord they should return again, yea, even be brought back out of captivity;"},{"time":42.8032125,"text":"3. And after that they are brought back out of captivity to possess again their land of inheritance,"},{"time":48.96331875,"text":"4. Yea, even six hundred years from the time that my father left Jerusalem, a Prophet would the Lord God raise up among the Jews, Yea, even a Messiah, or in other words, a Savior of the world."},{"time":60.966,"text":"5. And he also spake concerning the prophets - How great a number had testified of these things concerning this Messiah of which he had spoken, or this Redeemer of the world;"},{"time":71.82556875,"text":"6. Wherefore, all mankind was in a lost and in a fallen state and ever would be, save they should rely on this Redeemer."},{"time":79.25580000000001,"text":"7. And he spake also concerning a prophet which should come before the Messiah to prepare the way of the Lord;"},{"time":86.05096875000001,"text":"8. Yea, even he should go forth and cry in the wilderness: \"Prepare ye the way of the Lord and make His paths straight,"},{"time":93.41769375000001,"text":"9. For there standeth One among you whom ye know not; And He is mightier than I, whose shoe's latchet I am not worthy to unloose.\""},{"time":101.48298750000001,"text":"10. And much spake my father concerning this thing;"},{"time":104.46778125,"text":"11. And my father saith that he should baptize in Bethabara beyond Jordan, And he also spake that he should baptize with water, yea, even that he should baptize the Messiah with water;"},{"time":115.89890625,"text":"12. And after that he had baptized the Messiah with water, he should behold and bear record that he had baptized the Lamb of God which should take away the sin of the world."},{"time":126.6314625,"text":"13. And it came to pass that after my father had spoken these words, he spake unto my brethren concerning the gospel which should be preached among the Jews,"},{"time":136.34791875,"text":"14. And also concerning the dwindling of the Jews in unbelief;"},{"time":140.03128124999998,"text":"15. And after that they had slain the Messiah which should come, And after that He had been slain, He should rise from the dead and should make Himself manifest by the Holy Ghost unto the Gentiles."},{"time":152.28798749999999,"text":"16. Yea, even my father spake much concerning the Gentiles, and also concerning the house of Israel - That they should be compared like unto an olive tree whose branches should be broken off and should be scattered upon all the face of the earth;"},{"time":167.6565,"text":"17. Wherefore, he said it must needs be that we should be led with one accord into the Land of Promise, unto the fulfilling of the word of the Lord that we should be scattered upon all the face of the earth;"},{"time":180.54826875,"text":"18. And after that the house of Israel should be scattered, they should be gathered together again;"},{"time":186.5813625,"text":"19. Or, in fine, that after the Gentiles had received the fullness of the gospel, the natural branches of the olive tree - or the remnants of the house of Israel - should be grafted in, or come to the knowledge of the true Messiah, their Lord and their Redeemer."},{"time":202.96597500000001,"text":"20. And after this manner of language did my father prophesy and speak unto my brethren,"},{"time":208.30050000000003,"text":"21. And also many more things which I do not write in this book, For I have written as many of them as were expedient for me in mine other book."},{"time":217.19137500000002,"text":"22. And all these things of which I have spoken were done as my father dwelt in a tent in the Valley of Lemuel."},{"time":223.98654375,"text":"23. And it came to pass that after I, Nephi - Having heard all the words of my father concerning the things which he saw in a vision,"},{"time":232.17885,"text":"24. And also the things which he spake by the power of the Holy Ghost, which power he received by faith on the Son of God,"},{"time":239.67258750000002,"text":"25. And the Son of God was the Messiah which should come -"},{"time":243.10192500000002,"text":"26. And it came to pass that I, Nephi, was desirous also that I might see and hear and know of these things by the power of the Holy Ghost, which is the gift of God unto all those who diligently seek Him, as well in times of old as in the time that He should manifest Himself unto the children of men,"},{"time":261.96328125,"text":"27. For He is the same yesterday, today and forever,"},{"time":265.01158125,"text":"28. And the way is prepared for all men from the foundation of the world, if it so be that they repent and come unto Him."},{"time":272.4418125,"text":"29. For he that diligently seeketh shall find,"},{"time":275.109075,"text":"30. And the mysteries of God shall be unfolded to them by the power of the Holy Ghost, as well in this time as in times of old,"},{"time":282.92034375000003,"text":"31. And as well in times of old as in times to come;"},{"time":285.96864375,"text":"32. Wherefore, the course of the Lord is one eternal round."},{"time":289.46148750000003,"text":"33. Therefore, remember O man, for all thy doings thou shalt be brought into judgment;"},{"time":294.66900000000004,"text":"34. Wherefore, if ye have sought to do wickedly in the days of your probation, then ye are found unclean before the judgment seat of God,"},{"time":303.11533125000005,"text":"35. And no unclean thing can dwell with God, wherefore, ye must be cast off forever;"},{"time":308.19583125,"text":"36. And the Holy Ghost giveth authority that I should speak these things and deny them not."},{"time":313.72087500000004,"text":"37. For it came to pass that after I had desired to know the things that my father had seen, and believing that the Lord was able to make them known unto me,"},{"time":323.43733125000006,"text":"38. Wherefore, as I sat pondering in mine heart, I was caught away in the Spirit of the Lord, yea, into an exceeding high mountain, A mountain which I never had before seen and upon which I never had before set my foot."},{"time":337.0911750000001,"text":"39. And the Spirit saith unto me: \"Behold, what desirest thou?\""},{"time":340.83804375000005,"text":"40. And I saith: \"I desire to behold the things which my father saw.\""},{"time":344.9659500000001,"text":"41. And the Spirit saith unto me: \"Believest thou that thy father saw the tree of which he hath spoken?\""},{"time":351.31657500000006,"text":"42. And I said: \"Yea, thou knowest that I believe all the words of my father.\""},{"time":356.01603750000004,"text":"43. And when I had spake these words, the Spirit cried with a loud voice, saying: \"Hosanna to the Lord, the Most High God! for He is God over all the earth, yea, even above all!"},{"time":367.00261875,"text":"44. \"And blessed art thou, Nephi, because thou believest in the Son of the Most High God; Wherefore, thou shalt behold the things which thou hast desired;"},{"time":376.52855625,"text":"45. And behold, this thing shall be given unto thee for a sign: That after thou hast beheld the tree which bore the fruit of which thy father tasted, thou shalt also behold a Man descending out of heaven, And Him shall ye witness; And after that ye shall have witnessed Him, ye shall bear record that it is the Son of God.\""},{"time":396.78705,"text":"46. And it came to pass that the Spirit saith unto me: \"Look!\" And I looked and beheld a tree; And it was like unto the tree which my father had seen; And the beauty thereof was far beyond, yea, exceeding of all beauty; And the whiteness thereof did exceed the whiteness of the driven snow."},{"time":414.9498375,"text":"47. And it came to pass that after that I had seen the tree, I said unto the Spirit: \"I behold Thou hast shown unto me the tree which is most precious above all.\""},{"time":424.983825,"text":"48. And He saith unto me: \"What desirest thou?\""},{"time":427.71459375,"text":"49. And I said unto Him: \"To know the interpretation thereof.\""},{"time":431.39795625,"text":"50. For I spake unto Him as a man speaketh, for I beheld that He was in the form of a man, Yet nevertheless, I knew that it was the Spirit of the Lord; And He spake unto me as a man speaketh with another."},{"time":444.09920625,"text":"51. And it came to pass that He said unto me: \"Look!\" And I looked as if to look upon Him and I saw Him not, for He had gone from before my presence."},{"time":453.3076125,"text":"52. And it came to pass that I looked and beheld the great City Jerusalem, and also other cities;"},{"time":459.21369375,"text":"53. And I beheld the City of Nazareth; And in the City of Nazareth I beheld a virgin and she was exceeding fair and white."},{"time":466.70743125,"text":"54. And it came to pass that I saw the heavens open and an angel came down and stood before me; And he saith unto me: \"Nephi, what beholdest thou?\""},{"time":475.78882500000003,"text":"55. And I saith unto him: \"A virgin most beautiful and fair above all other virgins.\""},{"time":480.93283125000005,"text":"56. And he saith unto me: \"Knowest thou the Condescension of God?\""},{"time":484.87021875000005,"text":"57. And I said unto him: \"I know that He loveth His children, Nevertheless, I do not know the meaning of all things.\""},{"time":492.04642500000006,"text":"58. And he said unto me: \"Behold, the virgin which thou seest is the mother of God, after the manner of the flesh.\""},{"time":499.09561875,"text":"59. And it came to pass that I beheld that she was carried away in the Spirit;"},{"time":503.79508125,"text":"60. And after that she had been carried away in the Spirit a time, for the space of a time, the angel spake unto me, saying: \"Look!\""},{"time":511.92388125,"text":"61. And I looked and beheld the virgin again, bearing a Child in her arms;"},{"time":516.36931875,"text":"62. And the angel said unto me: \"Behold the Lamb of God, yea, even the Eternal Father!"},{"time":521.57683125,"text":"63. Knowest thou the meaning of the tree which thy father saw?\""},{"time":525.3237,"text":"64. And I answered him, saying: \"Yea, it is the love of God which sheddeth itself abroad in the hearts of the children of men; Wherefore, it is the most desirable above all things.\""},{"time":536.5643062500001,"text":"65. And he spake unto me, saying: \"Yea, and the most joyous to the soul!\""},{"time":540.9462375,"text":"66. And after that he had said these words, he said unto me: \"Look!\" And I looked and I beheld the Son of God a going forth among the children of men;"},{"time":550.21815,"text":"67. And I saw many fall down at His feet and worship Him."},{"time":553.5839812500001,"text":"68. And it came to pass that I beheld that the rod of iron which my father had seen was the word of God which led to the fountain of living waters, or to the tree of life, which waters are a representation of the love of God;"},{"time":567.6188625000001,"text":"69. And I also beheld that the tree of life was a representation of the love of God."},{"time":572.6993625000001,"text":"70. And the angel said unto me again: \"Look and behold the Condescension of God.\""},{"time":577.5893437500001,"text":"71. And I looked and beheld the Redeemer of the world of which my father had spoken;"},{"time":582.6698437500002,"text":"72. And I also beheld the prophet which should prepare the way before Him;"},{"time":587.1152812500002,"text":"73. And the Lamb of God went forth and was baptized of him;"},{"time":590.6081250000002,"text":"74. And after that He was baptized, I beheld the heavens open and the Holy Ghost come down out of heaven and abode upon Him in the form of a dove;"},{"time":599.6260125000002,"text":"75. And I beheld that He went forth ministering unto the people in power and great glory;"},{"time":605.0240437500003,"text":"76. And the multitudes were gathered together to hear Him;"},{"time":608.4533812500002,"text":"77. And I beheld that they cast Him out from among them;"},{"time":611.7557062500002,"text":"78. And I also beheld twelve others following Him;"},{"time":614.6769937500002,"text":"79. And it came to pass that they were carried away in the Spirit from before my face, that I saw them not."},{"time":621.2181375000001,"text":"80. And it came to pass that the angel spake unto me, saying: \"Look!\" And I looked and I beheld the heavens open again;"},{"time":628.5213562500002,"text":"81. And I saw angels descending upon the children of men, And they did minister unto them."},{"time":633.9828937500001,"text":"82. And he spake unto me again, saying: \"Look!\" And I looked and I beheld the Lamb of God going forth among the children of men;"},{"time":641.8576687500001,"text":"83. And I beheld multitudes of people which were sick and which were afflicted of all manner of diseases and with devils and unclean spirits;"},{"time":650.5580250000002,"text":"84. And the angel spake and showed all these things unto me;"},{"time":654.1143750000001,"text":"85. And they were healed by the power of the Lamb of God, And the devils and the unclean spirits were cast out."},{"time":660.9095437500001,"text":"86. And it came to pass that the angel spake unto me again, saying: \"Look!\" And I looked and beheld the Lamb of God, that He was taken by the people, Yea, the Everlasting God was judged of the world; And I saw and bear record;"},{"time":675.0079312500001,"text":"87. And I, Nephi, saw that He was lifted up upon the cross and slain for the sins of the world;"},{"time":680.787,"text":"88. And after that He was slain I saw the multitudes of the earth, that they were gathered together to fight against the apostles of the Lamb, for thus were the twelve called by the angel of the Lord;"},{"time":693.234225,"text":"89. And the multitude of the earth was gathered together;"},{"time":696.6000562500001,"text":"90. And I beheld that they were in a large and spacious building like unto the building which my father saw."},{"time":703.2047062500001,"text":"91. And the angel of the Lord spake unto me, saying: \"Behold the world and the wisdom thereof;"},{"time":708.9202687500001,"text":"92. Yea, behold, the house of Israel hath gathered together to fight against the twelve apostles of the Lamb.\""},{"time":715.6519312500001,"text":"93. And it came to pass that I saw and bear record that the great and spacious building was the pride of the world,"},{"time":722.701125,"text":"94. And it fell; And the fall thereof was exceeding great."},{"time":726.1304625,"text":"95. And the angel of the Lord spake unto me, saying: \"Thus shall be the destruction of all nations, kindreds, tongues and people that shall fight against the twelve apostles of the Lamb.\""},{"time":737.75210625,"text":"96. And it came to pass that the angel said unto me: \"Look and behold thy seed, and also the seed of thy brethren!\""},{"time":744.8013,"text":"97. And I looked and beheld the land, the Land of Promise;"},{"time":748.2306375,"text":"98. And I beheld multitudes of people, yea, even as it were in number as many as the sand of the sea."},{"time":754.39074375,"text":"99. And it came to pass that I beheld multitudes gathered together to battle one against the other; And I beheld wars and rumors of wars and great slaughters with the sword among my people."},{"time":766.1393999999999,"text":"100. And it came to pass that I beheld many generations pass away after the manner of wars and contentions in the land;"},{"time":773.3791124999999,"text":"101. And I beheld many cities, yea, even that I did not number them."},{"time":777.38000625,"text":"102. And it came to pass that I saw a mist of darkness on the face of the Land of Promise;"},{"time":782.7780375,"text":"103. And I saw lightnings, And I heard thunderings and earthquakes and all manner of tumultuous noises;"},{"time":789.0016499999999,"text":"104. And I saw the earth, that it rent, And the rocks, that they rent;"},{"time":793.12955625,"text":"105. And I saw mountains tumbling into pieces;"},{"time":795.7333124999999,"text":"106. And I saw the plains of the earth, that they were broken up;"},{"time":799.5436874999999,"text":"107. And I saw many cities, that they were sunk;"},{"time":802.27445625,"text":"108. And I saw many, that they were burnt with fire;"},{"time":805.25925,"text":"109. And I saw many, that they did tumble to the earth because of the quaking thereof."},{"time":810.4032562499999,"text":"110. And it came to pass that after I saw these things, I saw the vapor of darkness, that it passed from off the face of the earth."},{"time":818.4050437499999,"text":"111. And behold, I saw the multitudes which had not fallen because of the great and terrible judgments of the Lord;"},{"time":825.3907312499999,"text":"112. And I saw the heavens open and the Lamb of God descending out of heaven; And He came down and He showed Himself unto them;"},{"time":833.13849375,"text":"113. And I also saw and bear record that the Holy Ghost fell upon twelve others, And they were ordained of God and chosen."},{"time":840.568725,"text":"114. And the angel spake unto me, saying: \"Behold the twelve disciples of the Lamb which are chosen to minister unto thy seed.\""},{"time":848.3164875,"text":"115. And he saith unto me: \"Thou remembereth the twelve apostles of the Lamb? Behold, they are they which shall judge the twelve tribes of Israel;"},{"time":857.27086875,"text":"116. Wherefore, the twelve ministers of thy seed shall be judged of them, for ye are of the house of Israel; And these twelve ministers which thou beholdest shall judge thy seed;"},{"time":868.25745,"text":"117. And behold, they are righteous forever, For because of their faith in the Lamb of God, their garments are made white in His blood.\""},{"time":876.5767687499999,"text":"118. And the angel saith unto me: \"Look!\" And I looked and beheld three generations did pass away in righteousness; Their garments were white, even like unto the Lamb of God;"},{"time":887.309325,"text":"119. And the angel said unto me: \"These are made white in the blood of the Lamb because of their faith in Him.\""},{"time":894.0409874999999,"text":"120. And I, Nephi, also saw many of the fourth generation which did pass away in righteousness."},{"time":899.75655,"text":"121. And it came to pass that I saw the multitudes of the earth gathered together;"},{"time":904.64653125,"text":"122. And the angel said unto me: \"Behold thy seed, and also the seed of thy brethren.\""},{"time":909.7905374999999,"text":"123. And it came to pass that I looked and beheld the people of my seed gathered together in multitudes against the seed of my brethren, And they were gathered together to battle;"},{"time":920.8406249999999,"text":"124. And the angel spake unto me, saying: \"Behold the fountain of filthy water which thy father saw, yea, even the river of which he spake; And the depths thereof are the depths of hell;"},{"time":932.3352562499999,"text":"125. And the mists of darkness are the temptations of the devil which blindeth the eyes and hardeneth the hearts of the children of men, And leadeth them away into broad roads, that they perish and are lost."},{"time":945.16351875,"text":"126. \"And the large and spacious building which thy father saw is vain imaginations and the pride of the children of men;"},{"time":952.53024375,"text":"127. And a great and a terrible gulf divideth them, Yea, even the sword of the justice of the Eternal God and Jesus Christ, which is the Lamb of God, of whom the Holy Ghost beareth record from the beginning of the world until this time, And from this time henceforth and forever.\""},{"time":969.9944624999999,"text":"128. And while the angel spoke these words, I beheld and saw that the seed of my brethren did contend against my seed according to the word of the angel;"},{"time":979.3933874999999,"text":"129. And because of the pride of my seed and the temptations of the devil, I beheld that the seed of my brethren did overpower the people of my seed."},{"time":988.5382874999999,"text":"130. And it came to pass that I beheld and saw the people of the seed of my brethren, that they had overcome my seed; And they went forth in multitudes upon the face of the land;"},{"time":999.5248687499999,"text":"131. And I saw them gathered together in multitudes,"},{"time":1002.5096624999999,"text":"132. And I saw wars and rumors of wars among them; And in wars and rumors of wars I saw many generations pass away."},{"time":1009.4953499999999,"text":"133. And the angel said unto me: \"Behold, these shall dwindle in unbelief.\""},{"time":1013.9407874999999,"text":"134. And it came to pass that I beheld that after they had dwindled in unbelief, They became a dark and loathsome and a filthy people, full of idleness and all manner of abominations."},{"time":1025.2449,"text":"135. And it came to pass that the angel spake unto me, saying: \"Look!\" And I looked and beheld many nations and kingdoms."},{"time":1032.611625,"text":"136. And the angel saith unto me: \"What beholdest thou?\""},{"time":1035.85044375,"text":"137. And I said: \"I behold many nations and kingdoms.\""},{"time":1038.96225,"text":"138. And he saith unto me: \"These are the nations and kingdoms of the Gentiles.\""},{"time":1043.72521875,"text":"139. And it came to pass that I saw among the nations of the Gentiles the formation of a great church;"},{"time":1049.885325,"text":"140. And the angel said unto me: \"Behold the formation of a church which is most abominable above all other churches, Which slayeth the saints of God, yea, and tortureth them, and bindeth them down, and yoketh them with a yoke of iron, and bringeth them down into captivity.\""},{"time":1067.0320125,"text":"141. And it came to pass that I beheld this great and abominable church; And I saw the devil, that he was the founder of it;"},{"time":1074.58925625,"text":"142. And I also saw gold and silver and silks and scarlets and fine-twined linen and all manner of precious clothing; And I saw many harlots."},{"time":1083.2261062500002,"text":"143. And the angel spake unto me, saying: \"Behold, the gold and the silver and the silks and the scarlets and the fine-twined linen and the precious clothing and the harlots are the desires of this great and abominable church;"},{"time":1097.2609875,"text":"144. And also for the praise of the world do they destroy the saints of God and bring them down into captivity.\""},{"time":1104.05615625,"text":"145. And it came to pass that I looked and beheld many waters; And they divided the Gentiles from the seed of my brethren."},{"time":1111.4863874999999,"text":"146. And it came to pass that the angel saith unto me: \"Behold, the wrath of God is upon the seed of thy brethren!\""},{"time":1118.472075,"text":"147. And I looked and beheld a man among the Gentiles which were separated from the seed of my brethren by the many waters; And I beheld the Spirit of God, that it came down and wrought upon the man, And he went forth upon the many waters, even unto the seed of my brethren which were in the Promised Land."},{"time":1137.5874562499998,"text":"148. And it came to pass that I beheld the Spirit of God, that it wrought upon other Gentiles; And they went forth out of captivity upon the many waters."},{"time":1146.9863812499998,"text":"149. And it came to pass that I beheld many multitudes of Gentiles upon the Land of Promise;"},{"time":1152.5114249999997,"text":"150. And I beheld the wrath of God, that it was upon the seed of my brethren, And they were scattered before the Gentiles and they were smitten;"},{"time":1161.3387937499997,"text":"151. And I beheld the Spirit of the Lord, that it was upon the Gentiles, that they did prosper and obtain the land for their inheritance; And I beheld that they were white and exceeding fair and beautiful, like unto my people before that they were slain."},{"time":1177.1518499999997,"text":"152. And it came to pass that I, Nephi, beheld that the Gentiles which had gone forth out of captivity did humble themselves before the Lord, And the power of the Lord was with them;"},{"time":1188.3924562499997,"text":"153. And I beheld that their mother Gentiles were gathered together upon the waters, and upon the land also, to battle against them;"},{"time":1196.4577499999996,"text":"154. And I beheld that the power of God was with them, And also that the wrath of God was upon all those that were gathered together against them to battle;"},{"time":1206.0471937499997,"text":"155. And I, Nephi, beheld that the Gentiles which had gone out of captivity were delivered by the power of God out of the hands of all other nations;"},{"time":1215.1920937499997,"text":"156. And it came to pass that I, Nephi, beheld that they did prosper in the land."},{"time":1220.0185687499998,"text":"157. And I beheld a book, And it was carried forth among them;"},{"time":1223.6384249999999,"text":"158. And the angel saith unto me: \"Knowest thou the meaning of the book?\""},{"time":1227.9568499999998,"text":"159. And I saith: \"I know not.\""},{"time":1229.6080124999999,"text":"160. And he saith: \"Behold, it proceedeth out of the mouth of a Jew.\" And I, Nephi, beheld it;"},{"time":1235.2600687499998,"text":"161. And he saith unto me: \"The book which thou beholdest is a record of the Jews which contains the covenants of the Lord which He hath made unto the house of Israel,"},{"time":1245.5480812499998,"text":"162. And it also containeth many of the prophecies of the holy prophets;"},{"time":1249.8029999999997,"text":"163. And it is a record like unto the engravings which are upon the plates of brass, save there are not so many, Nevertheless, they contain the covenants of the Lord which He hath made unto the house of Israel;"},{"time":1262.8217812499997,"text":"164. Wherefore, they are of great worth unto the Gentiles.\""},{"time":1266.2511187499997,"text":"165. And the angel of the Lord said unto me: \"Thou hast beheld that the book proceeded forth from the mouth of a Jew; And when it proceeded forth from the mouth of a Jew it contained the fullness of the gospel of the Lord, of whom the twelve apostles bore record, And they bore record according to the truth which is in the Lamb of God;"},{"time":1287.2716874999996,"text":"166. Wherefore, these things go forth from the Jews in purity unto the Gentiles, according to the truth which is in God."},{"time":1294.5749062499997,"text":"167. \"And after that they go forth by the hand of the twelve apostles of the Lamb from the Jews unto the Gentiles, Behold, after this thou seest the formation of that great and abominable church, which is the most abominable of all other churches."},{"time":1309.9434187499996,"text":"168. \"For behold, they have taken away from the gospel of the Lamb many parts which are plain and most precious,"},{"time":1316.7385874999995,"text":"169. And also many covenants of the Lord have they taken away;"},{"time":1320.3584437499997,"text":"170. And all this have they done that they might pervert the right ways of the Lord, that they might blind the eyes and harden the hearts of the children of men."},{"time":1330.2654187499998,"text":"171. \"Wherefore, thou seest that after the book hath gone forth through the hands of the great and abominable church that there are many plain and most precious things taken away from the book, which is the book of the Lamb of God;"},{"time":1344.6178312499997,"text":"172. And after that these plain and precious things were taken away, it goeth forth unto all the nations of the Gentiles;"},{"time":1351.9845562499997,"text":"173. And after it goeth forth unto all the nations of the Gentiles - yea, even across the many waters which thou hast seen, with the Gentiles which have gone forth out of captivity -"},{"time":1363.2251624999997,"text":"174. And thou seest because of the many plain and precious things which have been taken out of the book - which were plain unto the understanding of the children of men according to the plainness which is in the Lamb of God -"},{"time":1377.1965374999997,"text":"175. And because of these things which are taken away out of the gospel of the Lamb, An exceeding great many do stumble, yea, insomuch that Satan hath great power over them."},{"time":1387.8655874999997,"text":"176. \"Nevertheless, thou beholdest that the Gentiles which have gone forth out of captivity and have been lifted up above by the power of God above all other nations upon the face of the land - Which is choice above all other lands,"},{"time":1402.2815062499997,"text":"177. Which is the land which the Lord God hath covenanted with thy father that his seed should have for the land of their inheritance - Wherefore, thou seest that the Lord God will not suffer that the Gentiles will utterly destroy the mixture of thy seed which is among thy brethren."},{"time":1419.9362437499997,"text":"178. \"Neither will He suffer that the Gentiles shall destroy the seed of thy brethren;"},{"time":1425.0802499999998,"text":"179. Neither will the Lord God suffer that the Gentiles shall forever remain in that state of awful woundedness, which thou beholdest that they are in because of the plain and most precious parts of the gospel of the Lamb which hath been kept back by that abominable church, whose formation thou hast seen;"},{"time":1444.1956312499997,"text":"180. 'Wherefore, ' saith the Lamb of God, 'I will be merciful unto the Gentiles unto the visiting of the remnant of the house of Israel in great judgment.'\""},{"time":1453.7850749999998,"text":"181. And it came to pass that the angel of the Lord spake unto me, saying: \"' Behold, saith the Lamb of God, ' after that I have visited the remnant of the house of Israel - and this remnant of which I speak is the seed of thy father -"},{"time":1468.3915124999999,"text":"182. Wherefore, after that I have visited them in judgment and smitten them by the hand of the Gentiles,"},{"time":1474.6786312499999,"text":"183. And after that the Gentiles do stumble exceedingly because of the most plain and most precious parts of the gospel of the Lamb which hath been kept back by that abominable church which is the mother of harlots, ' saith the Lamb, 'Wherefore, I will be merciful unto the Gentiles in that day, ' saith the Lamb, 'Insomuch that I will bring forth unto them in Mine own power much of My gospel, which shall be plain and most precious, ' saith the Lamb."},{"time":1503.0659249999999,"text":"184. 'For behold, ' saith the Lamb, 'I will manifest Myself unto thy seed, that they shall write many things which I shall minister unto them, which shall be plain and precious;"},{"time":1513.9889999999998,"text":"185. And after that thy seed shall be destroyed and dwindle in unbelief, and also the seed of thy brethren, Behold, these things shall be hid up to come forth unto the Gentiles by the gift and power of the Lamb;"},{"time":1527.0712874999997,"text":"186. And in them shall be written My gospel, ' saith the Lamb, 'and My rock and My salvation;"},{"time":1532.6598374999996,"text":"187. And blessed are they which shall seek to bring forth My Zion at that day, for they shall have the gift and the power of the Holy Ghost;"},{"time":1541.2331812499997,"text":"188. And if they endure unto the end, they shall be lifted up at the last day and shall be saved in the everlasting kingdom of the Lamb;"},{"time":1549.5524999999998,"text":"189. Yea, whoso shall publish peace, that shall publish tidings of great joy, how beautiful upon the mountains shall they be! '\""},{"time":1557.3637687499997,"text":"190. And it came to pass that I beheld the remnant of the seed of my brethren, And also the book of the Lamb of God which had proceeded forth from the mouth of the Jew; And I beheld that it came forth from the Gentiles unto the remnant of the seed of my brethren;"},{"time":1573.7483812499997,"text":"191. And after it had come forth unto them, I beheld other books which came forth by the power of the Lamb from the Gentiles unto them, Unto the convincing of the Gentiles and the remnant of the seed of my brethren, And also to the Jews which were scattered upon all the face of the earth, That the records of the prophets and of the twelve apostles of the Lamb are true."},{"time":1596.9916687499997,"text":"192. And the angel spake unto me, saying: \"These last records which thou hast seen among the Gentiles shall establish the truth of the first, which are of the twelve apostles of the Lamb, And shall make known the plain and precious things which have been taken away from them;"},{"time":1614.2018624999996,"text":"193. And shall make known to all kindreds, tongues and people that the Lamb of God is the Eternal Father and the Savior of the world, And that all men must come unto Him or they cannot be saved;"},{"time":1626.2045437499996,"text":"194. And they must come according to the words which shall be established by the mouth of the Lamb;"},{"time":1632.1741312499996,"text":"195. And the words of the Lamb shall be made known in the records of thy seed, as well as in the records of the twelve apostles of the Lamb;"},{"time":1640.7474749999997,"text":"196. Wherefore, they both shall be established in one;"},{"time":1643.8592812499996,"text":"197. For there is one God and one Shepherd over all the earth;"},{"time":1647.4791374999998,"text":"198. And the time cometh that He shall manifest Himself unto all nations - both unto the Jews, and also unto the Gentiles;"},{"time":1654.9093687499997,"text":"199. And after that He hath manifested Himself unto the Jews, and also unto the Gentiles, Then He shall manifest Himself unto the Gentiles, and also unto the Jews;"},{"time":1664.9433562499996,"text":"200. And the last shall be first, and the first shall be last."},{"time":1668.5632124999997,"text":"201. \"And it shall come to pass that if the Gentiles shall hearken unto the Lamb of God in that day that He shall manifest Himself unto them in word and also in power, in very deed, Unto the taking away of their stumbling blocks, if it so be that they harden not their hearts against the Lamb, And if it so be that they harden not their hearts against the Lamb of God, they shall be numbered among the seed of thy father,"},{"time":1694.9818124999997,"text":"202. Yea, they shall be numbered among the house of Israel;"},{"time":1698.4111499999997,"text":"203. And they shall be a blessed people upon the Promised Land forever;"},{"time":1702.6025624999997,"text":"204. They shall be no more brought down into captivity,"},{"time":1705.7778749999998,"text":"205. And the house of Israel shall no more be confounded;"},{"time":1709.0801999999999,"text":"206. And that great pit which hath been digged for them by that great and abominable church which was founded by the devil and his children, that he might lead away the souls of men down to hell,"},{"time":1721.1463875,"text":"207. Yea, that great pit which hath been digged for the destruction of men shall be filled by those who digged it unto their utter destruction, \" saith the Lamb of God -"},{"time":1731.5614125,"text":"208. \"Not the destruction of the soul, save it be the casting of it into that hell which hath no end -"},{"time":1737.7215187499999,"text":"209. For behold, this is according to the captivity of the devil, And also according to the justice of God upon all those who will work wickedness and abomination before Him.\""},{"time":1748.51758125,"text":"210. And it came to pass that the angel spake unto me, Nephi, saying: \"Thou hast beheld that if the Gentiles repent, it shall be well with them;"},{"time":1757.34495,"text":"211. And thou also knowest concerning the covenants of the Lord unto the house of Israel;"},{"time":1762.679475,"text":"212. And thou also hast heard that whoso repenteth not must perish;"},{"time":1766.6168625,"text":"213. Therefore, wo be unto the Gentiles if it so be that they harden their hearts against the Lamb of God,"},{"time":1773.03099375,"text":"214. 'For the time cometh, ' saith the Lamb of God, ' that I will work a great and a marvelous work among the children of men -"},{"time":1780.77875625,"text":"215. A work which shall be everlasting, either on the one hand or on the other,"},{"time":1785.47821875,"text":"216. Either to the convincing of them unto peace and life eternal, Or unto the deliverance of them to the hardness of their hearts and the blindness of their minds, Unto their being brought down into captivity and also unto destruction, both temporally and spiritually, according to the captivity of the devil of which I have spoken.'\""},{"time":1806.43528125,"text":"217. And it came to pass that when the angel had spoken these words, he saith unto me, \"Remember thou the covenants of the Father unto the house of Israel?\""},{"time":1816.024725,"text":"218. I saith unto him, \"Yea.\""},{"time":1817.548875,"text":"219. And it came to pass that he saith unto me: \"Look and behold that great and abominable church which is the mother of abominations, whose founder is the devil.\""},{"time":1827.5828625,"text":"220. And he saith unto me: \"Behold, there are save it be two churches -"},{"time":1831.774275,"text":"221. The one is the church of the Lamb of God, And the other is the church of the devil;"},{"time":1837.04529375,"text":"222. Wherefore, whoso belongeth not to the church of the Lamb of God belongeth to that great church which is the mother of abominations,"},{"time":1845.3646125,"text":"223. And she is the whore of all the earth.\""},{"time":1847.84135625,"text":"224. And it came to pass that I looked and beheld the whore of all the earth; And she sat upon many waters;"},{"time":1854.31899375,"text":"225. And she had dominion over all the earth among all nations, kindreds, tongues and people."},{"time":1859.9075437499998,"text":"226. And it came to pass that I beheld the church of the Lamb of God, And its numbers were few because of the wickedness and abominations of the whore which sat upon many waters;"},{"time":1870.8941249999998,"text":"227. Nevertheless, I beheld that the church of the Lamb, which were the saints of God, were also upon all the face of the earth,"},{"time":1878.7053937499998,"text":"228. And their dominion upon the face of the earth was small because of the wickedness of the great whore which I saw."},{"time":1885.8815999999997,"text":"229. And it came to pass that I beheld that the great mother of abominations did gather together in multitudes upon the face of all the earth among all the nations of the Gentiles to fight against the Lamb of God."},{"time":1899.0908999999997,"text":"230. And it came to pass that I, Nephi, beheld the power of the Lamb of God, that it descended upon the saints of the church of the Lamb and upon the covenant people of the Lord which were scattered upon all the face of the earth;"},{"time":1913.3798062499998,"text":"231. And they were armed with righteousness and with the power of God in great glory."},{"time":1918.4603062499998,"text":"232. And it came to pass that I beheld that the wrath of God was poured out upon that great and abominable church insomuch that there were wars and rumors of wars among all the nations and kindreds of the earth;"},{"time":1931.5425937499997,"text":"233. And as there began to be wars and rumors of wars among all the nations which belonged to the mother of abominations, the angel spake unto me, saying:"},{"time":1941.0050249999997,"text":"234. \"Behold, the wrath of God is upon the mother of harlots;"},{"time":1944.5613749999998,"text":"235. And behold, thou seest all these things;"},{"time":1947.1016249999998,"text":"236. And when the day cometh that the wrath of God is poured out upon the mother of harlots, which is the great and abominable church of all the earth, whose founder is the devil,"},{"time":1958.1517124999998,"text":"237. Then at that day, the work of the Father shall commence in preparing the way for the fulfilling of His covenants which He hath made to His people which are of the house of Israel.\""},{"time":1969.5828374999999,"text":"238. And it came to pass that the angel spake unto me, saying: \"Look!\" And I looked and beheld a man; And he was dressed in a white robe;"},{"time":1977.9656624999998,"text":"239. And the angel said unto me: \"Behold one of the twelve apostles of the Lamb!"},{"time":1982.7286312499998,"text":"240. Behold, he shall see and write the remainder of these things,"},{"time":1986.6025124999999,"text":"241. Yea, and also many things which have been;"},{"time":1989.269775,"text":"242. And he shall also write concerning the end of the world;"},{"time":1992.826125,"text":"243. Wherefore, the things which he shall write are just and true;"},{"time":1996.7000062500001,"text":"244. And behold, they are written in the book which thou beheld proceeding out of the mouth of the Jew;"},{"time":2002.92361875,"text":"245. And at the time they proceeded out of the mouth of the Jew, or at the time the book proceeded out of the mouth of the Jew, The things which were written were plain and pure and most precious and easy to the understanding of all men."},{"time":2017.65706875,"text":"246. \"And behold, the things which this apostle of the Lamb shall write are many things which thou hast seen;"},{"time":2024.26171875,"text":"247. And behold, the remainder shalt thou see;"},{"time":2026.865475,"text":"248. But the things which thou shalt see hereafter, thou shalt not write, For the Lord God hath ordained the apostle of the Lamb of God, that he should write them,"},{"time":2036.8994625,"text":"249. And also others which have been - To them hath He shown all things and they have written them;"},{"time":2042.86905,"text":"250. And they are sealed up to come forth in their purity, according to the truth which is in the Lamb, in the own due time of the Lord unto the house of Israel.\""},{"time":2052.83953125,"text":"251. And I, Nephi, heard and bore record that the name of the apostle of the Lamb was John, according to the word of the angel."},{"time":2060.5872937500003,"text":"252. And behold, I, Nephi, am forbidden that I should write the remainder of the things which I saw, Wherefore, the things which I have written sufficeth me;"},{"time":2070.2402437500004,"text":"253. And I have not written but a small part of the things which I saw,"},{"time":2074.4316562500003,"text":"254. And I bear record that I saw the things which my father saw; And the angel of the Lord did make them known unto me."},{"time":2081.734875,"text":"255. And now I make an end of speaking concerning the things which I saw while I was carried away in the Spirit;"},{"time":2088.53004375,"text":"256. And if all the things which I saw are not written, the things which I have written are true; And thus it is. Amen."}]
};
