  lyrics: [{"time":0,"text":"Second Nephi, Chapter 15"},{"time":3.6,"text":"1. And now I, Nephi, cannot write all the things which were taught among my people, Neither am I mighty in writing, like unto speaking, For when a man speaketh by the power of the Holy Ghost, the power of the Holy Ghost carrieth it unto the hearts of the children of men."},{"time":20.72,"text":"2. But behold, there are many that harden their hearts against the Holy Spirit, that it hath no place in them; Wherefore, they cast many things away which are written and esteem them as things of naught."},{"time":33.2,"text":"3. But I, Nephi, have written what I have written; And I esteem it as of great worth, and especially unto my people,"},{"time":41.76,"text":"4. For I pray for them continually by day, And mine eyes water my pillow by night because of them; And I cry unto my God in faith and I know that He will hear my cry; And I know that the Lord God will consecrate my prayers for the gain of my people;"},{"time":57.12,"text":"5. And the things which I have written in weakness will He make strong unto them, for it persuadeth them to do good; It maketh known unto them of their fathers, And it speaketh of Jesus, and persuadeth men to believe in Him, and to endure to the end, which is life eternal,"},{"time":73.12,"text":"6. And it speaketh harsh against sin, according to the plainness of the truth; Wherefore, no man will be angry at the words which I have written, save he shall be of the spirit of the devil."},{"time":85.28,"text":"7. I glory in plainness! I glory in truth! I glory in my Jesus, for He hath redeemed my soul from hell!"},{"time":95.84,"text":"8. I have charity for my people, And great faith in Christ that I shall meet many souls spotless at His judgment seat."},{"time":104.24000000000001,"text":"9. I have charity for the Jew - I say Jew because I mean them from whence I came; I also have charity for the Gentiles;"},{"time":112.96000000000001,"text":"10. But behold, for none of these I cannot hope, except they shall be reconciled unto Christ, And enter into the narrow gate and walk in the strait path which leads to life, And continue in the path until the end of the day of probation."},{"time":127.92,"text":"11. And now my beloved brethren, and also Jew and all ye ends of the earth, Hearken unto these words and believe in Christ; And if ye believe not in these words, believe in Christ;"},{"time":140.4,"text":"12. And if ye shall believe in Christ, ye will believe in these words, for they are the words of Christ and He hath given them unto me; And they teach all men that they should do good."},{"time":151.6,"text":"13. And if they are not the words of Christ, judge ye, For Christ will show unto you with power and great glory that they are His words at the last day;"},{"time":161.28,"text":"14. And you and I shall stand face to face before His bar, And ye shall know that I have been commanded of Him to write these things, notwithstanding my weakness."},{"time":171.44,"text":"15. And I pray the Father in the name of Christ that many of us, if not all, may be saved in His kingdom at that great and last day."},{"time":180.8,"text":"16. And now my beloved brethren, all they which are of the house of Israel and all ye ends of the earth, I speak unto you as the voice of one crying from the dust - Farewell, until that great day shall come."},{"time":193.76,"text":"17. And you that will not partake of the goodness of God and respect the words of the Jews, And also my words and the words which shall proceed forth out of the mouth of the Lamb of God, Behold, I bid you an everlasting farewell, for these words shall condemn you at the last day,"},{"time":210.4,"text":"18. For what I seal on earth shall be brought against you at the judgment bar; For thus hath the Lord commanded me and I must obey. Amen."}]
