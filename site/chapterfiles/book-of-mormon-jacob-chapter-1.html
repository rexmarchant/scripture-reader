  lyrics: [{"time":0.0,"text":"Jacob Chapter 1"},{"time":0.819,"text":"1. For behold, it came to pass that fifty and five years had passed away from the time that Lehi left Jerusalem; Wherefore, Nephi gave me, Jacob, a commandment concerning these small plates upon which these things are engraven;"},{"time":17.57,"text":"2. And he gave me, Jacob, a commandment that I should write upon these plates a few of the things which I considered to be most precious, That I should not touch, save it were lightly, concerning the history of this people, which are called the people of Nephi;"},{"time":32.338,"text":"3. For he said that the history of his people should be engraven upon his other plates, And that I should preserve these plates and hand them down unto my seed from generation to generation;"},{"time":43.013,"text":"4. And if there were preaching which was sacred, or revelation which was great, or prophesying, That I should engraven the heads of them upon these plates, And touch upon them as much as it were possible, for Christ's sake and for the sake of our people."},{"time":58.88,"text":"5. For because of faith and great anxiety, it truly had been made manifest unto us concerning our people, what things should happen unto them;"},{"time":67.13,"text":"6. And we also had many revelations and the spirit of much prophecy; Wherefore, we knew of Christ and His kingdom which should come;"},{"time":76.88,"text":"7. Wherefore, we labored diligently among our people that we might persuade them to come unto Christ and partake of the goodness of God, that they might enter into His rest, Lest by any means He should swear in His wrath they should not enter in, as in the provocation in the days of temptation while the children of Israel were in the wilderness."},{"time":96.72,"text":"8. Wherefore, we would to God that we could persuade all men not to rebel against God, to provoke Him to anger, But that all men would believe in Christ and view His death and suffer His cross and bear the shame of the world; Wherefore, I, Jacob, take it upon me to fulfill the commandment of my brother Nephi."},{"time":114.872,"text":"9. Now Nephi began to be old and he saw that he must soon die; Wherefore, he anointed a man to be a king and a ruler over his people; Now according to the reigns of the kings,"},{"time":127.2,"text":"10. The people having loved Nephi exceedingly - he having been a great protector for them, having wielded the sword of Laban in their defense and having labored in all his days for their welfare - Wherefore, the people were desirous to retain in remembrance his name;"},{"time":143.6,"text":"11. And whoso should reign in his stead were called by the people Second Nephi, Third Nephi, etc., according to the reigns of the kings; And thus they were called by the people, let them be of whatsoever name they would."},{"time":157.16,"text":"12. And it came to pass that Nephi died."},{"time":160.16,"text":"13. Now the people which were not Lamanites were Nephites; Nevertheless, they were called Nephites, Jacobites, Josephites, Zoramites; Lamanites, Lemuelites and Ishmaelites;"},{"time":172.96,"text":"14. But I, Jacob, shall not hereafter distinguish them by these names, But I shall call them Lamanites, they that seek to destroy the people of Nephi, And they which are friendly to Nephi I shall call Nephites, or the people of Nephi, according to the reigns of the kings."},{"time":192.08,"text":"15. And now it came to pass that the people of Nephi under the reign of the second king began to grow hard in their hearts, And indulge themselves somewhat in wicked practices, such as like unto David of old, desiring many wives and concubines, and also Solomon his son;"},{"time":204.68,"text":"16. Yea, and they also began to search much gold and silver and began to be lifted up somewhat in pride;"},{"time":217.28,"text":"17. Wherefore, I, Jacob, gave unto them these words as I taught them in the temple, having firstly obtained mine errand from the Lord."}
