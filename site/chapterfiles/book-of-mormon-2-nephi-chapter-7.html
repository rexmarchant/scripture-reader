  lyrics: [{"time":0,"text":"Second Nephi, Chapter 7"},{"time":2.28,"text":"1. And now I, Jacob, speak unto you again, my beloved brethren, concerning this righteous branch of which I have spoken;"},{"time":12.56,"text":"2. For behold, the promises which we have obtained are promises unto us, according to the flesh."},{"time":19.351,"text":"3. Wherefore, as it hath been shown unto me that many of our children shall perish in the flesh because of unbelief, nevertheless, God will be merciful unto many,"},{"time":30,"text":"4. And our children shall be restored, that they may come to that which will give them the true knowledge of their Redeemer."},{"time":38.73,"text":"5. Wherefore, as I said unto you, it must needs be expedient that Christ - for in the last night the angel spake unto me that this should be His name - that He should come among the Jews, among they which are the more wicked part of the world,"},{"time":52.632,"text":"6. And they shall crucify Him, for thus it behooveth our God;"},{"time":58.3,"text":"7. And there is none other nation on earth that would crucify their God,"},{"time":63.84,"text":"8. For should the mighty miracles be wrought among other nations, they would repent and know that He be their God;"},{"time":72.056,"text":"9. But because of priestcrafts and iniquities, they at Jerusalem will stiffen their necks against Him, that He be crucified."},{"time":80,"text":"10. Wherefore, because of their iniquities, destructions, famines, pestilences and bloodsheds shall come upon them,"},{"time":88.43299999999999,"text":"11. And they which shall not be destroyed shall be scattered among all nations."},{"time":95.03999999999999,"text":"12. But behold, thus saith the Lord God: When the day cometh that they shall believe in Me, that I Am Christ, Then have I covenanted with their fathers that they shall be restored in the flesh upon the earth unto the lands of their inheritance."},{"time":108.762,"text":"13. And it shall come to pass that they shall be gathered in from their long dispersion - from the isles of the sea, and from the four parts of the earth;"},{"time":117.975,"text":"14. And the nations of the Gentiles shall be great in the eyes of Me, saith God, in carrying them forth to the lands of their inheritance;"},{"time":128.4,"text":"15. Yea, the kings of the Gentiles shall be nursing fathers unto them, And their queens shall become nursing mothers."},{"time":136.277,"text":"16. Wherefore, the promises of the Lord are great unto the Gentiles, For He hath spoken it, And who can dispute?"},{"time":146.261,"text":"17. But behold, this land, saith God, shall be a land of thine inheritance; And the Gentiles shall be blessed upon the land,"},{"time":155.387,"text":"18. And this land shall be a land of liberty unto the Gentiles, And there shall be no kings upon the land which shall raise up unto the Gentiles;"},{"time":165.003,"text":"19. And I will fortify this land against all other nations,"},{"time":171.28,"text":"20. And he that fighteth against Zion shall perish, saith God; For he that raiseth up a king against Me shall perish,"},{"time":178.316,"text":"21. For I, the Lord, the King of heaven, will be their king, And I will be a light unto them forever that hear My words."},{"time":188.69,"text":"22. Wherefore, for this cause - that My covenants may be fulfilled which I have made unto the children of men, that I will do unto them while they are in the flesh - I must needs destroy the secret works of darkness and of murders and of abominations;"},{"time":202.357,"text":"23. Wherefore, he that fighteth against Zion - both Jew and Gentile, both bond and free, both male and female - Shall perish;"},{"time":213.12,"text":"24. For they are they which are the whore of all the earth;"},{"time":217.92000000000002,"text":"25. For they which are not for Me are against Me, saith our God;"},{"time":222.299,"text":"26. For I will fulfill My promises which I have made unto the children of men, that I will do unto them while they are in the flesh."},{"time":231.36,"text":"27. Wherefore my beloved brethren, thus saith our God: I will afflict thy seed by the hand of the Gentiles;"},{"time":239.6,"text":"28. Nevertheless, I will soften the hearts of the Gentiles, that they shall be like unto a father to them;"},{"time":246.944,"text":"29. Wherefore, the Gentiles shall be blessed and numbered among the house of Israel."},{"time":254.64,"text":"30. Wherefore, I will consecrate this land unto thy seed and they which shall be numbered among thy seed, forever, for the land of their inheritance,"},{"time":263.84,"text":"31. For it is a choice land, saith God unto me, above all other lands;"},{"time":270,"text":"32. Wherefore, I will have all men that dwell thereon that they shall worship Me, saith God."},{"time":277.067,"text":"33. And now my beloved brethren, seeing that our merciful God hath given us so great knowledge concerning these things, Let us remember Him and lay aside our sins and not hang down our heads, for we are not cast off."},{"time":292.092,"text":"34. Nevertheless, we have been driven out of the land of our inheritance, but we have been led to a better land,"},{"time":299.52,"text":"35. For the Lord hath made the sea our path and we are upon an isle of the sea;"},{"time":305.482,"text":"36. But great are the promises of the Lord unto they which are upon the isles of the sea."},{"time":311.748,"text":"37. Wherefore, as it saith isles, there must needs be more than this, And they are inhabited also by our brethren;"},{"time":319.781,"text":"38. For behold, the Lord God hath led away from time to time from the house of Israel according to His will and pleasure."},{"time":329.418,"text":"39. And now behold, the Lord remembereth all they which are broken off; Wherefore, He remembereth us also;"},{"time":338.382,"text":"40. Therefore, cheer up your hearts, And remember that ye are free to act for yourselves - to choose the way of everlasting death, or the way of eternal life;"},{"time":348.72,"text":"41. Wherefore my beloved brethren, reconcile yourselves to the will of God and not to the will of the devil and the flesh."},{"time":357.648,"text":"42. And remember, that after ye are reconciled unto God, That it is only in and through the grace of God that ye are saved;"},{"time":366.08,"text":"43. Wherefore, may God raise you from death by the power of the resurrection, And also from everlasting death by the power of the atonement,"},{"time":375.68,"text":"44. That ye may be received into the eternal kingdom of God, That ye may praise Him through grace divine. Amen."}]
