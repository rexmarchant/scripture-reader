<script>
window.CHAPTER_DATA = {
  scriptureSet: "Book of Mormon",
  book: "Mosiah",
  chapter: "Chapter 1",
  audioSrc: "https://archive.org/download/mosiah-ch-1/Mosiah%20Ch%201.mp3",
  lyrics: [{"time":0.0,"text":"Mosiah Chapter 1"},{"time":1.158,"text":"1. And now there was no more contention in all the Land of Zarahemla among all the people which belonged to King Benjamin, So that King Benjamin had continual peace all the remainder of his days."},{"time":13.6,"text":"2. And it came to pass that he had three sons, And he called their names Mosiah and Helorum and Helaman;"},{"time":20.569,"text":"3. And he caused that they should be taught in all the language of his fathers, that thereby they might become men of understanding, And that they might know concerning the prophecies which had been spoken by the mouths of their fathers, which were delivered them by the hand of the Lord."},{"time":37.116,"text":"4. And he also taught them concerning the records which were engraven on the plates of brass, saying: \"My sons, I would that ye should remember that were it not for these plates which contain these records and these commandments, We must have suffered in ignorance, even at this present time, not knowing the mysteries of God;"},{"time":55.722,"text":"5. For it were not possible that our father Lehi could have remembered all these things, to have taught them to his children, except it were for the help of these plates;"},{"time":65.688,"text":"6. For he having been taught in the language of the Egyptians, therefore he could read these engravings and teach them to his children, that thereby they could teach them to their children, And so fulfilling the commandments of God, even down to this present time."},{"time":80.344,"text":"7. \"I say unto you my sons, were it not for these things which have been kept and preserved by the hand of God, that we might read and understand of His mysteries and have His commandments always before our eyes, That even our fathers would have dwindled in unbelief;"},{"time":96.64,"text":"8. And we should have been like unto our brethren, the Lamanites, which know nothing concerning these things, Or even do not believe them when they are taught them, because of the traditions of their fathers which are not correct."},{"time":109.609,"text":"9. \"O my sons, I would that ye should remember that these sayings are true, and also that these records are true,"},{"time":117.947,"text":"10. And behold, also the plates of Nephi which contain the records and the sayings of our fathers from the time they left Jerusalem until now - and they are true; And we can know of their surety because we have them before our eyes."},{"time":133.307,"text":"11. \"And now my sons, I would that ye should remember to search them diligently, that ye may profit thereby;"},{"time":140.64,"text":"12. And I would that ye should keep the commandments of God, that ye may prosper in the land according to the promises which the Lord made unto our fathers.\""},{"time":149.459,"text":"13. And many more things did King Benjamin teach his sons which are not written in this book."},{"time":155.36,"text":"14. And it came to pass that after King Benjamin had made an end of teaching his sons, that he waxed old and he saw that he must very soon go the way of all the earth; Therefore, he thought it expedient that he should confer the kingdom upon one of his sons."},{"time":169.94,"text":"15. Therefore, he had Mosiah brought before him; And these are the words which he spake unto him, saying: \"My son, I would that ye should make a proclamation throughout all this land among all this people - or the people of Zarahemla and the people of Mosiah which dwell in this land - that thereby they may be gathered together,"},{"time":189.81,"text":"16. For on the morrow I shall proclaim unto this my people, out of mine own mouth, that thou art a king and a ruler over this people which the Lord our God hath given us."},{"time":200.72,"text":"17. \"And moreover, I shall give this people a name that thereby they may be distinguished above all the people which the Lord God hath brought out of the Land of Jerusalem; And this I do because they have been a diligent people in keeping the commandments of the Lord;"},{"time":215.52,"text":"18. And I give unto them a name that never shall be blotted out, except it be through transgression."},{"time":221.393,"text":"19. \"Yea, and moreover I say unto you, that if this highly favored people of the Lord should fall into transgression and become a wicked and an adulterous people, That the Lord will deliver them up, that thereby they become weak like unto their brethren,"},{"time":237.707,"text":"20. And He will no more preserve them by His matchless and marvelous power, as He hath hitherto preserved our fathers;"},{"time":245.506,"text":"21. For I say unto you, that if He had not extended His arm in the preservation of our fathers, they must have fallen into the hands of the Lamanites and become victims to their hatred.\""},{"time":256.623,"text":"22. And it came to pass that after King Benjamin had made an end of these sayings to his son, that he gave him charge concerning all the affairs of the kingdom."},{"time":266.805,"text":"23. And moreover, he also gave him charge concerning the records which were engraven on the plates of brass, And also the plates of Nephi,"},{"time":276.396,"text":"24. And also the sword of Laban, And the ball, or director, which led our fathers through the wilderness, which was prepared by the hand of the Lord that thereby they might be led, everyone according to the heed and diligence which they gave unto Him -"},{"time":291.327,"text":"25. Therefore, as they were unfaithful, they did not prosper nor progress in their journey, but were driven back and incurred the displeasure of God upon them;"},{"time":301.68,"text":"26. And therefore they were smitten with famine and sore afflictions to stir them up in remembrance of their duty."},{"time":307.781,"text":"27. And now it came to pass that Mosiah went and did as his father had commanded him and proclaimed unto all the people which were in the Land of Zarahemla, That thereby they might gather themselves together to go up to the temple to hear the words which his father should speak unto them."},{"time":324.336,"text":"28. And it came to pass that after Mosiah had done as his father had commanded him and had made a proclamation throughout all the land, That the people gathered themselves together throughout all the land, that they might go up to the temple to hear the words which King Benjamin should speak unto them;"},{"time":340.981,"text":"29. And there were a great number, even so many that they did not number them, For they had multiplied exceedingly and waxed great in the land."},{"time":349.991,"text":"30. And they also took of the firstlings of their flocks, that they might offer sacrifice and burnt offerings according to the law of Moses,"},{"time":358.42,"text":"31. And also, that they might give thanks to the Lord their God who had brought them out of the Land of Jerusalem, And who had delivered them out of the hands of their enemies and had appointed just men to be their teachers, And also a just man to be their king"},{"time":373.592,"text":"32. who had established peace in the Land of Zarahemla, And who had taught them to keep the commandments of God, that thereby they might rejoice and be filled with love toward God and all men."},{"time":385.2,"text":"33. And it came to pass that when they came up to the temple, they pitched their tents round about, Every man according to his family - consisting of his wife, and his sons and his daughters, and their sons and their daughters, from the eldest down to the youngest - Every family being separate one from another."},{"time":402.104,"text":"34. And they pitched their tents round about the temple, Every man having his tent with the door thereof toward the temple, that thereby they might remain in their tents and hear the words which King Benjamin should speak unto them;"},{"time":415.712,"text":"35. For the multitude being so great that King Benjamin could not teach them all within the walls of the temple, Therefore, he caused a tower to be erected, that thereby his people might hear the words which he should speak unto them."},{"time":428.88,"text":"36. And it came to pass that he began to speak to his people from the tower; And they could not all hear his words because of the greatness of the multitude,"},{"time":439.28,"text":"37. Therefore, he caused that the words which he spake should be written and sent forth among those that were not under the sound of his voice, that they might also receive his words."},{"time":450.4,"text":"38. And these are the words which he spake and caused to be written, saying: \"My brethren, all ye that have assembled yourselves together, you that can hear my words which I shall speak unto you this day,"},{"time":463.68,"text":"39. For I have not commanded you to come up hither to trifle with the words which I shall speak, But that you should hearken unto me and open your ears, that ye may hear, And your hearts, that ye may understand, And your minds, that the mysteries of God may be unfolded to your view."},{"time":463.924,"text":"40. \"I have not commanded you to come up hither that ye should fear me, or that ye should think that I, of myself, am more than a mortal man;"},{"time":488.926,"text":"41. But I am like as yourselves, subject to all manner of infirmities in body and mind."},{"time":495.112,"text":"42. \"Yet as I have been chosen by this people and was consecrated by my father, And was suffered by the hand of the Lord that I should be a ruler and a king over this people, And have been kept and preserved by His matchless power to serve thee with all the might, mind and strength which the Lord hath granted unto me -"},{"time":513.533,"text":"43. I say unto you, that as I have been suffered to spend my days in your service, even up to this time, And have not sought gold nor silver nor no manner of riches of you;"},{"time":525.031,"text":"44. Neither have I suffered that ye should be confined in dungeons, Nor that ye should make slaves one of another, Or that ye should murder or plunder or steal or commit adultery;"},{"time":535.233,"text":"45. Or even I have not suffered that ye should commit any manner of wickedness, And have taught you that ye should keep the commandments of the Lord in all things which He hath commanded you."},{"time":546.493,"text":"46. \"And even I, myself, have labored with mine own hands that I might serve you, And that ye should not be laden with taxes, And that there should nothing come upon you which was grievous to be borne; And of all these things which I have spoken, ye yourselves are witnesses this day."},{"time":563.351,"text":"47. \"Yet, my brethren, I have not done these things that I might boast, Neither do I tell these things that thereby I might accuse you; But I tell you these things that ye may know that I can answer a clear conscience before God this day."},{"time":579.053,"text":"48. \"Behold I say unto you, that because I said unto you that I had spent my days in your service, I do not desire to boast, for I have only been in the service of God;"},{"time":590.046,"text":"49. And behold, I tell you these things that ye may learn wisdom, That ye may learn that when ye are in the service of your fellow beings, ye are only in the service of your God."},{"time":601.611,"text":"50. \"Behold, ye have called me your king; And if I, whom ye call your king, do labor to serve you, then had not ye ought to labor to serve one another?"},{"time":612.96,"text":"51. And behold also, if I, whom ye call your king, who has spent his days in your service and yet hath been in the service of God, doth merit any thanks from you, O how had you ought to thank your heavenly King!"},{"time":625.302,"text":"52. \"I say unto you my brethren, that if you should render all the thanks and praise which your whole souls hath power to possess to that God who hath created you, And hath kept and preserved you, And hath caused that ye should rejoice, And hath granted that ye should live in peace, one with another -"},{"time":642.893,"text":"53. I say unto you, that if ye should serve Him who hath created you from the beginning, And art preserving you from day to day by lending you breath, that ye may live and move and do according to your own will, And even supporting you from one moment to another -"},{"time":659.52,"text":"54. I say, if ye should serve Him with all your whole soul, and yet ye would be unprofitable servants."},{"time":667.04,"text":"55. \"And behold, all that He requires of you is to keep His commandments; And He hath promised you that if ye would keep His commandments, ye should prosper in the land;"},{"time":677.158,"text":"56. And He never doth vary from that which He hath said; Therefore, if ye do keep His commandments, He doth bless you and prosper you."},{"time":686.8,"text":"57. \"And now in the first place, He hath created you and granted unto you your lives, for which ye are indebted unto Him."},{"time":694.449,"text":"58. \"And secondly, He doth require that ye should do as He hath commanded you, for which, if ye do, He doth immediately bless you, And therefore, He hath paid you,"},{"time":706.8,"text":"59. And ye are still indebted unto Him and art and will be forever and ever; Therefore, of what have ye to boast?"},{"time":715.216,"text":"60. \"And now I ask, can ye say aught of yourselves? I answer you, Nay,"},{"time":717.696,"text":"61. Ye cannot say that thou art even as much as the dust of the earth, yet thou wast created of the dust of the earth; But behold, it belongeth to Him who created you;"},{"time":731.68,"text":"62. And I, even I whom ye call your king, am no better than ye yourselves are, for I am also of the dust."},{"time":741.04,"text":"63. \"And thou beholdest that I am old and am about to yield up this mortal frame to its mother earth;"},{"time":748.16,"text":"64. Therefore, as I said unto you that I had served you, walking with a clear conscience before God, Even so, I at this time have caused that ye should assemble yourselves together, that I might be found blameless, And that your blood should not come upon me when I shall stand to be judged of God of the things whereof He hath commanded me concerning you."},{"time":768.8,"text":"65. \"I say unto you that I have caused that ye should assemble yourselves together, that I might rid my garments of your blood at this period of time when I am about to go down to my grave,"},{"time":778.88,"text":"66. that I might go down in peace, And my immortal spirit may join the choirs above in singing the praises of a just God."},{"time":787.625,"text":"67. \"And moreover, I say unto you that I have caused that ye should assemble yourselves together, that I might declare unto you that I can no longer be your teacher nor your king,"},{"time":798.116,"text":"68. For even at this time my whole frame doth tremble exceedingly while attempting to speak unto you;"},{"time":804.4,"text":"69. But the Lord God doth support me and hath suffered me that I should speak unto you, And hath commanded me that I should declare unto you this day that my son Mosiah is a king and a ruler over you."},{"time":817.142,"text":"70. \"And now my brethren, I would that ye should do as ye hath hitherto done,"},{"time":822.44,"text":"71. As ye have kept my commandments, and also the commandments of my father, and have prospered and have been kept from falling into the hands of your enemies;"},{"time":833.436,"text":"72. Even so, if ye shall keep the commandments of my son - or the commandments of God which shall be delivered unto you by him - Ye shall prosper in the land and your enemies shall have no power over you."},{"time":846.202,"text":"73. \"But O my people, beware lest there shall arise contentions among you and ye list to obey the evil spirit which was spoken of by my father Mosiah!"},{"time":855.649,"text":"74. For behold, there is a wo pronounced upon him that listeth to obey that spirit; For if he listeth to obey him and remaineth and dieth in his sins, the same drinketh damnation to his own soul,"},{"time":868.864,"text":"75. For he receiveth for his wages an everlasting punishment, having transgressed the law of God contrary to his own knowledge."},{"time":877.181,"text":"76. \"I say unto you that there are not any among you, except it be your little children, that have not been taught concerning these things but what knoweth that ye are eternally indebted to your heavenly Father,"},{"time":890.24,"text":"77. to render to Him all that you have and are; And also have been taught concerning the records which contain the prophecies which hath been spoken by the holy prophets, even down to the time our father Lehi left Jerusalem, And also all that hath been spoken by our fathers until now;"},{"time":907.44,"text":"78. And behold also, they spake that which was commanded them of the Lord, Therefore, they are just and true."},{"time":914.16,"text":"79. \"And now I say unto you my brethren, that after ye have known and have been taught all these things, If ye should transgress and go contrary to that which hath been spoken, That ye do withdraw yourselves from the Spirit of the Lord, that it may have no place in you to guide you in wisdom's paths, that ye may be blessed, prospered and preserved -"},{"time":935.36,"text":"80. I say unto you, that the man that doeth these things, the same cometh out in open rebellion against God;"},{"time":942.098,"text":"81. Therefore, he listeth to obey the evil spirit and becometh an enemy to all righteousness;"},{"time":949.28,"text":"82. Therefore, the Lord hath no place in him, for He dwelleth not in unholy temples."},{"time":957.04,"text":"83. \"Therefore, if that man repenteth not and remaineth and dieth an enemy to God, the demands of divine justice doth awaken his immortal soul to a lively sense of his own guilt,"},{"time":968.72,"text":"84. Which doth cause him to shrink from the presence of the Lord, And doth fill his breast with guilt and pain and anguish, which is like an unquenchable fire whose flames ascendeth up forever and ever."},{"time":980.96,"text":"85. \"And now I say unto you, that mercy hath no claim on that man; Therefore, his final doom is to endure a never - ending torment."},{"time":989.107,"text":"86. \"O all ye old men, and also ye young men and you little children which can understand my words, for I have spoken plain unto you that ye might understand,"},{"time":1001.36,"text":"87. I pray that ye should awake to a remembrance of the awful situation of those that have fallen into transgression."},{"time":1007.33,"text":"88. \"And moreover, I would desire that ye should consider on the blessed and happy state of those that keep the commandments of God,"},{"time":1017.049,"text":"89. For behold, they are blessed in all things, both temporal and spiritual;"},{"time":1022.036,"text":"90. And if they hold out faithful to the end, they are received into heaven, that thereby they may dwell with God in a state of never - ending happiness."},{"time":1033.2,"text":"91. \"O remember, remember that these things are true, for the Lord God hath spoken it!"},{"time":1039.76,"text":"92. \"And again my brethren, I would call your attention, for I have somewhat more to speak unto you,"},{"time":1046.72,"text":"93. For behold, I have things to tell you concerning that which is to come; And the things which I shall tell you are made known unto me by an angel from God;"},{"time":1055.76,"text":"94. And he said unto me, 'Awake! ' and I awoke, And behold, he stood before me."},{"time":1064.64,"text":"95. \"And he said unto me: 'Awake and hear the words which I shall tell thee, For behold, I am come to declare unto thee glad tidings of great joy!"},{"time":1073.925,"text":"96. 'For the Lord hath heard thy prayers and hath judged of thy righteousness, And hath sent me to declare unto thee that thou mayest rejoice and that thou mayest declare unto thy people, that they may also be filled with joy."},{"time":1088.8,"text":"97. 'For behold, the time cometh and is not far distant, that with power the Lord Omnipotent who reigneth, which was and is from all eternity to all eternity, Shall come down from heaven among the children of men, And shall dwell in a tabernacle of clay,"},{"time":1103.84,"text":"98. And shall go forth amongst men, Working mighty miracles, such as - healing the sick, raising the dead, causing the lame to walk, the blind to receive their sight, and the deaf to hear, and curing all manner of diseases;"},{"time":1119.68,"text":"99. And He shall cast out devils, or the evil spirits, which dwelleth in the hearts of the children of men."},{"time":1126.226,"text":"100. 'And lo, He shall suffer temptations and pain of body, hunger, thirst and fatigue, even more than man can suffer, except it be unto death;"},{"time":1137.524,"text":"101. For behold, blood cometh from every pore, so great shall be His anguish for the wickedness and the abominations of His people."},{"time":1146.32,"text":"102. 'And He shall be called Jesus Christ, the Son of God, the Father of heaven and of earth, the Creator of all things from the beginning; And His mother shall be called Mary;"},{"time":1157.44,"text":"103. And lo, He cometh unto His own that salvation might come unto the children of men, even through faith on His name."},{"time":1164.815,"text":"104. 'And even after all this, they shall consider Him as a man and say that He hath a devil, And shall scourge Him and shall crucify Him,"},{"time":1173.96,"text":"105. And He shall rise the third day from the dead; And behold, He standeth to judge the world."},{"time":1181.16,"text":"106. 'And behold, all these things are done that a righteous judgment might come upon the children of men."},{"time":1188.861,"text":"107. 'For behold, and also His blood atoneth for the sins of those who have fallen by the transgression of Adam, who hath died not knowing the will of God concerning them and who have ignorantly sinned."},{"time":1201.04,"text":"108. 'But wo, wo unto him who knoweth that he rebelleth against God! For salvation cometh to none such, except it be through repentance and faith on the Lord Jesus Christ."},{"time":1213.12,"text":"109. 'And the Lord God hath sent His holy prophets among all the children of men to declare these things to every kindred, nation and tongue, That thereby whosoever should believe that Christ should come, the same might receive remission of their sins and rejoice with exceeding great joy, even as though He had already come among them."},{"time":1231.964,"text":"110. 'Yet the Lord God saw that His people were a stiff-necked people and He appointed unto them a law, even the law of Moses."},{"time":1240.48,"text":"111. 'And many signs and wonders and types and shadows showed He unto them concerning His coming;"},{"time":1247.371,"text":"112. And also holy prophets spake unto them concerning His coming,"},{"time":1253.2,"text":"113. And yet they hardened their hearts and understood not that the law of Moses availeth nothing, except it were through the atonement of His blood."},{"time":1261.365,"text":"114. 'And even if it were possible that little children could sin, they could not be saved; But I say unto you, they are blessed;"},{"time":1270.684,"text":"115. For behold, as in Adam, or by nature, they fall, even so the blood of Christ atoneth for their sins."},{"time":1278.96,"text":"116. 'And moreover, I say unto you that there shall be no other name given, nor no other way nor means whereby salvation can come unto the children of men - Only in and through the name of Christ, the Lord Omnipotent."},{"time":1291.86,"text":"117. 'For behold, He judgeth and His judgment is just, And the infant perisheth not that dieth in his infancy;"},{"time":1300.386,"text":"118. But men drinketh damnation to their own souls, except they humble themselves and become as little children, And believeth that salvation was and is and is to come, in and through the atoning blood of Christ, the Lord Omnipotent."},{"time":1315.04,"text":"119. 'For the natural man is an enemy to God and has been from the fall of Adam and will be forever and ever,"},{"time":1321.516,"text":"120. But if he yieldeth to the enticings of the Holy Spirit and putteth off the natural man - And he becometh a saint through the atonement of Christ the Lord, And becometh as a child - submissive, meek, humble, patient, full of love, Willing to submit to all things which the Lord seeth fit to inflict upon him, even as a child doth submit to his father."},{"time":1344.88,"text":"121. 'And moreover I say unto you, that the time shall come when the knowledge of a Savior shall spread throughout every nation, kindred, tongue and people;"},{"time":1354.289,"text":"122. And behold, when that time cometh, none shall be found blameless before God, except it be little children, Only through repentance and faith on the name of the Lord God Omnipotent."},{"time":1366.858,"text":"123. 'And even at this time when thou shalt have taught thy people the things which the Lord thy God hath commanded thee, Even then are they found no more blameless in the sight of God, Only according to the words which I have spoken unto thee.'"},{"time":1380.706,"text":"124. \"And now, I have spoken the words which the Lord God hath commanded me,"},{"time":1387.36,"text":"125. And thus saith the Lord: 'They shall stand as a bright testimony against this people at the judgment day,"},{"time":1393.256,"text":"126. Whereof they shall be judged, every man according to his works, whether they be good or whether they be evil."},{"time":1401.36,"text":"127. 'And if they be evil, they are consigned to an awful view of their own guilt and abominations, Which doth cause them to shrink from the presence of the Lord into a state of misery and endless torment from whence they can no more return; Therefore, they have drunk damnation to their own souls."},{"time":1418.542,"text":"128. 'Therefore, they have drunk out of the cup of the wrath of God, Which justice could no more deny unto them than it could deny that Adam should fall because of his partaking of the forbidden fruit; Therefore, mercy could have claim on them no more forever."},{"time":1434.64,"text":"129. 'And their torment is as a lake of fire and brimstone, whose flames are unquenchable and whose smoke ascendeth up forever and ever.'"},{"time":1442.548,"text":"130. \"Thus hath the Lord commanded me. Amen.\""}]
};
